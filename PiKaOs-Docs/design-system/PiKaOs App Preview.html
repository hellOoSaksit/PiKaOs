            {edit ? T("Save changes", "บันทึก") : T("Create user", "สร้างสมาชิก")}
          </Btn>
        </div>
      </div>
    </div>
  );
}

/* ---------------- USER DETAIL (admin view of one member) ---------------- */
function UserDetail({ Sys, userId, onAgent }) {
  const { users, roles, can, T } = Sys;
  const u = userById(users, userId);
  if (!u) return <div className="content-pad" data-no-lex><Empty icon="👤" title={T("User not found", "ไม่พบสมาชิก")} /></div>;

  const role = roleByKey(roles, u.role);
  const agents = (window.__chars || []).filter(c => ownerOf(c.id) === u.id);
  const override = (Sys.userPerms[u.id]) || {};
  const effective = resolvePerms(u.role, Sys.rolePerms, override);
  const manageUsers = can("user.manage");
  const manageRoles = can("role.manage");
  const manageTokens = can("token.manage");
  const pct = usagePct(u);

  const LEDGER = [
    { t: T("Quest run · auth-service", "รันงาน · auth-service"), tok: 4200, when: T("2h ago", "2 ชม.") },
    { t: T("Codex embed · 6 docs", "ฝังคลังความรู้ · 6 เอกสาร"), tok: 1850, when: T("5h ago", "5 ชม.") },
    { t: T("Recall query", "ค้นความรู้"), tok: 640, when: T("yesterday", "เมื่อวาน") },
  ];

  return (
    <div className="content-pad fade-in" data-no-lex>
      <button className="back-link" onClick={() => Sys.go("admin")}>← {T("Back to users", "กลับไปรายชื่อสมาชิก")}</button>

      <div className="udetail-head">
        <span className="udetail-avatar">{u.avatar}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="row" style={{ gap: 10, alignItems: "center" }}>
            <h1 style={{ fontFamily: "var(--font-head)", fontSize: 24, margin: 0, color: "var(--ink)" }}>{u.display}</h1>
            <RoleBadge roleKey={u.role} roles={roles} T={T} />
            <StatusPill status={u.status} T={T} />
          </div>
          <div className="mono faint" style={{ fontSize: 12, marginTop: 4 }}>@{u.username} · {u.email} · {T("joined", "เข้าร่วม")} {u.joined}</div>
        </div>
        {manageUsers && (
          <div className="row" style={{ gap: 8 }}>
            <Btn kind="ghost" sm icon="✎" onClick={() => Sys.openUserForm(u)}>{T("Edit", "แก้ไข")}</Btn>
            {u.id !== Sys.me.id && (
              <Btn kind="ghost" sm onClick={() => Sys.toggleSuspend(u)}>{u.status === "active" ? T("Suspend", "ระงับ") : T("Restore", "คืนสถานะ")}</Btn>
            )}
          </div>

      </div>

      <div className="grid cols-4 stagger" style={{ margin: "18px 0" }}>

        <StatTile label={T("Quota", "โควตา")} value={u.quota == null ? "∞" : fmtTok(u.quota)} unit={u.quota == null ? "" : "token"} delta={T(u.period, u.period)} icon="📊" />
        <StatTile label={T("Agents owned", "Agent ที่ดูแล")} value={agents.length} icon="🎭" />
        <StatTile label={T("Last seen", "ใช้งานล่าสุด")} value={u.lastLogin} icon="🕑" />
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1fr 320px", gap: 16, alignItems: "start" }}>
        <div className="col" style={{ gap: 16 }}>
          <Panel title={T("Owned agents", "Agent ที่ดูแล")} en="AGENTS" icon="🎭">
            {agents.length === 0
              ? <Empty icon="🎭" title={T("No agents yet", "ยังไม่มี Agent")} />
              : <div className="grid cols-2">{agents.map(a => <AgentCard key={a.id} a={a} onClick={() => onAgent(a)} />)}</div>}
          </Panel>

          <Panel title={T("Recent token usage", "การใช้โทเคนล่าสุด")} en="LEDGER" icon="🔵" bodyPad={false}>
            <div style={{ padding: 6 }}>
              {LEDGER.map((l, i) => (

                  <span style={{ flex: 1, fontSize: 13, color: "var(--ink)" }}>{l.t}</span>
                  <span className="mono" style={{ fontSize: 12.5, color: "var(--sapphire)" }}>−{fmtTok(l.tok)}</span>
                  <span className="mono faint" style={{ fontSize: 11, width: 64, textAlign: "right" }}>{l.when}</span>
                </div>
              ))}

          </Panel>
        </div>

        <div className="col" style={{ gap: 16 }}>
          {manageTokens && u.quota != null && (
            <Panel title={T("Quota usage", "การใช้โควตา")} en="QUOTA" icon="📊">
              <div className="row" style={{ justifyContent: "space-between", marginBottom: 8 }}>
                <span className="muted" style={{ fontSize: 13 }}>{fmtTok(u.used)} / {fmtTok(u.quota)}</span>
                <span className={`mono ${pct >= 90 ? "" : "gold-text"}`} style={{ fontSize: 13, color: pct >= 90 ? "var(--crimson)" : undefined }}>{pct}%</span>
              </div>
              <Meter kind="mana" val={pct} />
              <div className="row" style={{ gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                {[50000, 100000, 300000, null].map(qn => (
                  <button key={String(qn)} className={`quota-chip ${u.quota === qn ? "on" : ""}`} onClick={() => Sys.setQuota(u, qn)}>
                    {qn == null ? T("Unlimited", "ไม่จำกัด") : fmtTok(qn)}
                  </button>
                ))}
                <button className="quota-chip reset" onClick={() => Sys.resetUsage(u)}>↺ {T("Reset usage", "รีเซ็ตการใช้")}</button>
              </div>
            </Panel>
          )}

          <Panel title={T("Role", "บทบาท")} en="ROLE" icon="🔑">
            {manageRoles ? (
              <Select block value={u.role} disabled={u.id === Sys.me.id} onChange={v => Sys.setRole(u, v)}
                options={roles.map(r => ({ value: r.key, label: T(r.en, r.th) }))} />
            ) : <RoleBadge roleKey={u.role} roles={roles} T={T} />}
            <div className="muted" style={{ fontSize: 12, marginTop: 8, lineHeight: 1.5 }}>{T(role.en, role.th)} — {T(role.descEn || role.desc, role.desc)}</div>
            {u.id === Sys.me.id && <div className="perm-hint mono" style={{ marginTop: 8 }}>{T("you can't change your own role", "เปลี่ยนบทบาทตัวเองไม่ได้")}</div>}
          </Panel>

          <Panel title={T("Permission overrides", "สิทธิ์เฉพาะราย")} en="OVERRIDES" icon="⚙️">
            <div className="muted" style={{ fontSize: 11.5, marginBottom: 10, lineHeight: 1.5 }}>
              {T("Final = role permissions + grants − denies (deny wins).", "สิทธิ์สุดท้าย = ของบทบาท + grant − deny (deny ชนะ)")}
            </div>
            <div className="col" style={{ gap: 6 }}>
              {PERMISSIONS.map(p => {
                const fromRole = (Sys.rolePerms[u.role] || []).includes(p.key);
                const ov = override[p.key]; // grant | deny | undefined
                const has = effective.has(p.key);
                const cycle = () => {
                  if (!manageRoles) return;
                  const next = ov === "grant" ? "deny" : ov === "deny" ? null : (fromRole ? "deny" : "grant");
                  Sys.setUserPerm(u, p.key, next);
                };
                return (
                  <div key={p.key} className={`perm-row ${manageRoles ? "editable" : ""}`} onClick={cycle}>
                    <span className={`perm-state ${has ? "on" : "off"}`}>{has ? "✓" : "✕"}</span>
                    <span className="perm-name">{T(p.en, p.th)}</span>
                    {ov && <span className={`perm-tag ${ov}`}>{ov === "grant" ? "+grant" : "−deny"}</span>}
                  </div>
                );
              })}
            </div>
          </Panel>
        </div>
      </div>
    </div>
  );
}

/* ---------------- ROLES & PERMISSIONS (matrix) ---------------- */
function RolesPermissions({ Sys }) {
  const { roles, can, T } = Sys;
  const editable = can("role.manage");
  const groups = [...new Set(PERMISSIONS.map(p => p.group))];

  // batched edits: stage toggles in a draft, commit on Save
  const base = Sys.rolePerms;
  const [draft, setDraft] = useState(null);   // null = in sync with Sys
  const cur = draft || base;
  const toggle = (rk, pk, on) => setDraft(d => {
    const src = d || base; const set = new Set(src[rk] || []);
    if (on) set.add(pk); else set.delete(pk);
    return { ...src, [rk]: [...set] };
  });
  const diffKeys = (rk) => {
    const a = new Set(base[rk] || []), b = new Set((draft || base)[rk] || []);
    return [...new Set([...a, ...b])].filter(k => a.has(k) !== b.has(k));
  };
  const changes = draft ? roles.reduce((n, r) => r.key === "admin" ? n : n + diffKeys(r.key).length, 0) : 0;
  const saveAll = () => {
    if (!draft) return;
    roles.forEach(r => { if (r.key === "admin") return; diffKeys(r.key).forEach(k => Sys.setRolePerm(r.key, k, (draft[r.key] || []).includes(k))); });
    setDraft(null);
  };
  const cancelAll = () => setDraft(null);

  return (
    <div className="content-pad fade-in" data-no-lex>
      <PageHead kicker={T("Administration · Access", "ผู้ดูแลระบบ · สิทธิ์")} title={T("Roles & Permissions", "บทบาทและสิทธิ์")} tag="local"
        desc={T("Each role is a preset bundle of permissions. Toggle cells to change what a role can do, then Save your changes.",
                "แต่ละบทบาทคือชุดสิทธิ์สำเร็จรูป · กดที่ช่องเพื่อปรับว่าบทบาทนั้นทำอะไรได้ แล้วกดบันทึก")}
        actions={editable ? <Btn kind="gold" sm icon="➕" onClick={() => Sys.addRole()}>{T("New role", "เพิ่มบทบาท")}</Btn> : <span className="perm-hint mono">{T("view only", "ดูอย่างเดียว")}</span>} />

      <HelpNote tag="local">{T("Admin always has every permission (locked). System roles can be tuned but not deleted.",
        "ผู้ดูแลระบบมีทุกสิทธิ์เสมอ (ล็อกไว้) · บทบาทระบบปรับได้แต่ลบไม่ได้")}</HelpNote>

      <Panel bodyPad={false} className="rbac-panel">
        <div className="rbac-scroll">
          <table className="rbac-matrix">
            <thead>
              <tr>
                <th className="rbac-permcol">{T("Permission", "สิทธิ์")}</th>
                {roles.map(r => (
                  <th key={r.key} className="rbac-rolecol">
                    <RoleBadge roleKey={r.key} roles={roles} T={T} />
                    <span className="rbac-rolecount mono faint">{Sys.users.filter(u => u.role === r.key).length} {T("users", "คน")}</span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {groups.map(g => (
                <React.Fragment key={g}>
                  <tr className="rbac-grouprow"><td colSpan={roles.length + 1}>{g}</td></tr>
                  {PERMISSIONS.filter(p => p.group === g).map(p => (
                    <tr key={p.key}>
                      <td className="rbac-permcol">
                        <div className="rbac-permname">{T(p.en, p.th)}</div>
                        <div className="mono faint" style={{ fontSize: 10 }}>{p.key}</div>
                      </td>
                      {roles.map(r => {
                        const locked = r.key === "admin"; // admin = all, locked
                        const on = locked ? true : (cur[r.key] || []).includes(p.key);
                        const changed = !locked && draft && (new Set(base[r.key] || []).has(p.key) !== on);
                        return (
                          <td key={r.key} className="rbac-cell">
                            <button className={`rbac-toggle ${on ? "on" : ""} ${locked || !editable ? "locked" : ""} ${changed ? "changed" : ""}`}
                              onClick={() => editable && !locked && toggle(r.key, p.key, !on)}
                              title={locked ? T("admin always has all", "admin มีทุกสิทธิ์เสมอ") : ""}>
                              {on ? "✓" : ""}
                            </button>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
      </Panel>

      <SaveBar count={changes} onSave={saveAll} onCancel={cancelAll}
        saveLabel={T("Save changes", "บันทึก")} cancelLabel={T("Cancel", "ยกเลิก")}
        label={T(changes + " unsaved change" + (changes === 1 ? "" : "s"), "แก้ไข " + changes + " รายการ ยังไม่บันทึก")} />
    </div>
  );
}

/* ---------------- AUDIT LOG ---------------- */
function AuditLog({ Sys }) {
  const { audit, users, roles, T } = Sys;
  const [filter, setFilter] = useState("all");
  const [q, setQ] = useState("");
  const [date, setDate] = useState(null);   // วันที่เลือกจาก DatePicker (null = ทุกวัน)
  const name = (id, type) => type === "role"
    ? (() => { const r = roleByKey(roles, id); return T(r.en, r.th); })()
    : (userById(users, id) || { display: id }).display;

  // relative time strings → a real Date (now − parsed offset) so the DatePicker can match a day
  const deriveDate = (s) => {
    s = String(s || ""); const now = new Date();
    if (/เมื่อวาน|yesterday/i.test(s)) { const d = new Date(now); d.setDate(d.getDate() - 1); return d; }
    const dm = s.match(/(\d+)\s*(?:วัน|day)/i);
    if (dm) { const d = new Date(now); d.setDate(d.getDate() - (+dm[1])); return d; }
    return now;   // นาที/ชม./เมื่อสักครู่ = วันนี้
  };
  const sameDay = (a, b) => a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

  const ACTION_PILL = {
    user: ["User", "สมาชิก"], quota: ["Quota", "โควตา"], role: ["Role", "บทบาท"],
    permission: ["Permission", "สิทธิ์"], workflow: ["Workflow", "เวิร์กโฟลว์"],
  };
  const actionTypes = ["all", "user", "quota", "role", "permission", "workflow"];

  const query = q.trim().toLowerCase();
  const list = audit.filter(e => {
    if (filter !== "all" && !e.action.startsWith(filter)) return false;
    if (date && !sameDay(deriveDate(e.time), date)) return false;
    if (query) {
      const m = ACTION_META[e.action] || { th: e.action, en: e.action };
      const hay = [name(e.actor, "user"), name(e.target, e.targetType), e.meta, T(m.en, m.th), e.action, e.time]
        .join(" ").toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });
  const hasFilter = filter !== "all" || !!date || !!query;

  return (
    <div className="content-pad fade-in" data-no-lex>
      <PageHead kicker={T("Administration · Audit", "ผู้ดูแลระบบ · ตรวจสอบ")} title={T("Audit Log", "บันทึกการตรวจสอบ")} tag="local"
        desc={T("Every change to users, roles, quota and permissions — who did what, and when.",
                "ทุกการเปลี่ยนแปลงเรื่องสมาชิก บทบาท โควตา และสิทธิ์ — ใครทำอะไรเมื่อไหร่")} />

      <div className="audit-filters">
        <div className="audit-search">
          <span className="as-ic">🔍</span>
          <input value={q} onChange={e => setQ(e.target.value)}
            placeholder={T("Search actor, target, detail…", "ค้นหาผู้ทำ · เป้าหมาย · รายละเอียด…")} />
          {q && <button className="as-clear" title={T("Clear", "ล้าง")} onClick={() => setQ("")}>✕</button>}
        </div>
        <DatePicker value={date} onChange={setDate} />
        {date && <button className="audit-date-clear" title={T("All dates", "ทุกวัน")} onClick={() => setDate(null)}>✕</button>}
      </div>

      <div className="audit-pills">
        {actionTypes.map(a => (
          <button key={a} className={`tab-pill ${filter === a ? "on" : ""}`} onClick={() => setFilter(a)}>
            {a === "all" ? T("All", "ทั้งหมด") : T(ACTION_PILL[a][0], ACTION_PILL[a][1])}
          </button>
        ))}
        <span className="audit-count mono">{list.length} {T("entries", "รายการ")}</span>
        {hasFilter && <button className="audit-clear-all" onClick={() => { setFilter("all"); setDate(null); setQ(""); }}>{T("Clear filters", "ล้างตัวกรอง")}</button>}
      </div>

      <Panel bodyPad={false}>
        <div style={{ padding: 6 }}>
          {list.length === 0 ? <Empty icon="📋" title={T("No matching entries", "ไม่มีรายการที่ตรง")} sub={hasFilter ? T("Try clearing the filters", "ลองล้างตัวกรอง") : null} /> :
            list.map(e => {
              const m = ACTION_META[e.action] || { icon: "•", tone: "info", th: e.action, en: e.action };
              return (
                <div key={e.id} className="audit-row">
                  <span className={`audit-ic`} data-tone={m.tone}>{m.icon}</span>
                  <div className="audit-body">
                    <div className="audit-line">
                      <span className="audit-actor">{name(e.actor, "user")}</span>
                      <span className="muted"> {T(m.en, m.th).toLowerCase()} </span>
                      <span className="audit-target">{name(e.target, e.targetType)}</span>
                    </div>
                    <div className="mono faint" style={{ fontSize: 11 }}>{e.meta}</div>
                  </div>
                  <span className="mono faint audit-time">{e.time}</span>
                </div>
              );
            })}
        </div>
      </Panel>
    </div>
  );
}
Object.assign(window, { UserForm, UserDetail, RolesPermissions, AuditLog });

/* ============================================================
   WORKFLOWS · "โต๊ะปรุงเวท" (Activepieces) — §4.7
   - workflow list (enable/disable, run)
   - run modal: builds a form from input_schema → simulated webhook → tool_run
   - tool_runs history: status, input/output/error, filter by agent/quest/status
   - builder canvas: mock embedded Activepieces editor (step graph)
   Bilingual via Sys.T, container marked data-no-lex.
   ============================================================ */

function WfStatusBadge({ status, T }) {
  const s = WF_STATUS[status] || WF_STATUS.ok;
  return <span className={`badge ${s.cls}`} data-no-lex>{status === "running" && <span className="spin-dot" />}{T(s.en, s.th)}</span>;
}

function agentName(id) { const a = (window.__chars || []).find(c => c.id === id); return a ? a.name.split(" ")[0] : null; }
function agentIcon(id) { const a = (window.__chars || []).find(c => c.id === id); return a ? a.icon : "🤖"; }
function questTitle(id) { const q = (typeof QUESTS !== "undefined" ? QUESTS : []).find(x => x.id === id); return q ? q.title : null; }

/* ---------------- RUN MODAL ---------------- */
function RunModal({ Sys, wf, onClose }) {
  const { T } = Sys;
  const [form, setForm] = useState(() => {
    const o = {};
    (wf.input_schema || []).forEach(f => { o[f.key] = f.type === "select" ? (f.options[0] || "") : ""; });
    return o;
  });
  const [run, setRun] = useState(null);       // null | {status,output,error,dur}
  const [running, setRunning] = useState(false);
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const missing = (wf.input_schema || []).some(f => f.required && !String(form[f.key] ?? "").trim());

  const go = async () => {
    if (missing || running) return;
    setRunning(true); setRun({ status: "running" });
    const res = await simulateRun(wf, form);
    setRun(res);
    Sys.recordRun(wf, form, res);
    setRunning(false);
  };

  return (
    <div className="drawer-overlay" onClick={onClose} style={{ justifyContent: "center", alignItems: "center", padding: 24 }}>
      <div className="userform ornate" onClick={e => e.stopPropagation()} style={{ width: "min(580px, 96vw)" }}>
        <div className="builder-head">
          <span className="ph-icon" style={{ fontSize: 20 }}>{wf.icon}</span>
          <div>
            <div className="kicker">{T("Run workflow", "ร่ายเวิร์กโฟลว์")} · {WF_TRIGGER[wf.trigger].ic} {T(WF_TRIGGER[wf.trigger].en, WF_TRIGGER[wf.trigger].th)}</div>
            <h2 style={{ fontFamily: "var(--font-head)", fontSize: 19, margin: "2px 0 0", color: "var(--ink)" }}>{T(wf.nameEn, wf.name)}</h2>
          </div>
          <button className="drawer-close" onClick={onClose} style={{ marginLeft: "auto" }}>✕</button>
        </div>

        <div className="userform-body">
          {!run || run.status === "running" ? (
            <>
              <div className="muted" style={{ fontSize: 12.5, lineHeight: 1.55 }}>{T(wf.descEn, wf.desc)}</div>
              <div className="wf-endpoint mono">POST {wf.webhook_url}</div>
              {(wf.input_schema || []).map(f => (
                <Field key={f.key} label={T(f.labelEn, f.label) + (f.required ? " *" : "")}>
                  {f.type === "select" ? (
                    <Select block value={form[f.key]} onChange={v => set(f.key, v)} options={f.options.map(o => ({ value: o, label: o }))} />
                  ) : f.type === "textarea" ? (
                    <textarea className="bf-input" rows={3} value={form[f.key]} onChange={e => set(f.key, e.target.value)} placeholder={f.placeholder || ""} />
                  ) : (
                    <input className="bf-input" type={f.type === "number" ? "number" : "text"} value={form[f.key]} onChange={e => set(f.key, e.target.value)} placeholder={f.placeholder || ""} />
                  )}
                </Field>
              ))}
              {(wf.input_schema || []).length === 0 && <div className="muted" style={{ fontSize: 12.5 }}>{T("This workflow takes no input.", "เวิร์กโฟลว์นี้ไม่ต้องป้อนข้อมูล")}</div>}
            </>
          ) : (
            <div className="col" style={{ gap: 14 }}>
              <div className="row" style={{ gap: 10, alignItems: "center" }}>
                <WfStatusBadge status={run.status} T={T} />
                <span className="mono faint" style={{ fontSize: 12 }}>{T("completed in", "ใช้เวลา")} {run.dur}</span>
              </div>
              <div>
                <div className="kicker" style={{ marginBottom: 6 }}>{T("Input", "ข้อมูลเข้า")}</div>
                <pre className="wf-json">{JSON.stringify(form, null, 2)}</pre>
              </div>
              {run.status === "ok" ? (
                <div>
                  <div className="kicker" style={{ marginBottom: 6 }}>{T("Output", "ผลลัพธ์")}</div>
                  <pre className="wf-json ok">{JSON.stringify(run.output, null, 2)}</pre>
                </div>
              ) : (
                <div>
                  <div className="kicker" style={{ marginBottom: 6 }}>{T("Error", "ข้อผิดพลาด")}</div>
                  <pre className="wf-json err">{run.error}</pre>
                </div>
              )}
            </div>
          )}
        </div>

        <div className="userform-foot">
          {!run || run.status === "running" ? (
            <>
              <Btn kind="ghost" onClick={onClose}>{T("Cancel", "ยกเลิก")}</Btn>
              <Btn kind="gold" icon={running ? "" : "✦"} onClick={go} style={{ opacity: missing ? .5 : 1, pointerEvents: missing || running ? "none" : "auto" }}>
                {running ? T("Running…", "กำลังรัน…") : T("Run now", "รันเลย")}
              </Btn>
            </>
          ) : (
            <>
              <Btn kind="ghost" onClick={() => setRun(null)}>{T("Run again", "รันอีกครั้ง")}</Btn>
              <Btn kind="gold" onClick={onClose}>{T("Done", "เสร็จสิ้น")}</Btn>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------------- TOOL RUN ROW (expandable) ---------------- */
function ToolRunRow({ Sys, r }) {
  const { T, workflows } = Sys;
  const [open, setOpen] = useState(false);
  const wf = wfById(workflows, r.wf) || { name: r.wf, nameEn: r.wf, icon: "⚙️" };
  return (
    <div className={`toolrun ${open ? "open" : ""}`}>
      <button className="toolrun-head" onClick={() => setOpen(o => !o)}>
        <span className="tr-ic">{wf.icon}</span>
        <div className="tr-main">
          <div className="tr-top">
            <span className="tr-name">{T(wf.nameEn, wf.name)}</span>
            <WfStatusBadge status={r.status} T={T} />
          </div>
          <div className="tr-meta mono">
            {r.agent && <span>{agentIcon(r.agent)} {agentName(r.agent)}</span>}
            {r.quest && <><span>·</span><span>📜 {questTitle(r.quest) || r.quest}</span></>}
            <span>·</span><span>{r.dur}</span>
            <span>·</span><span>{typeof r.started === "object" ? T(r.started.en, r.started.th) : r.started}</span>
          </div>
        </div>
        <span className="tr-caret">{open ? "▾" : "▸"}</span>
      </button>
      {open && (
        <div className="toolrun-body">
          <div className="tr-col">
            <div className="kicker" style={{ marginBottom: 5 }}>{T("Input", "ข้อมูลเข้า")}</div>
            <pre className="wf-json">{JSON.stringify(r.input, null, 2)}</pre>
          </div>
          <div className="tr-col">
            <div className="kicker" style={{ marginBottom: 5 }}>{r.status === "failed" ? T("Error", "ข้อผิดพลาด") : T("Output", "ผลลัพธ์")}</div>
            {r.status === "failed"
              ? <pre className="wf-json err">{r.error}</pre>
              : <pre className="wf-json ok">{JSON.stringify(r.output, null, 2)}</pre>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- MAIN SCREEN ---------------- */
function Workflows({ Sys }) {
  const { workflows, toolRuns, can, T } = Sys;
  const [runWf, setRunWf] = useState(null);
  const [buildWf, setBuildWf] = useState(null);
  const [statusFilter, setStatusFilter] = useState("all");
  const [agentFilter, setAgentFilter] = useState("all");

  const manage = can("workflow.manage");
  const mayRun = can("quest.run") || can("workflow.manage");
  const enabledCount = workflows.filter(w => w.enabled).length;
  const okRate = toolRuns.length ? Math.round(toolRuns.filter(r => r.status === "ok").length / toolRuns.length * 100) : 0;
  const agentsInRuns = [...new Set(toolRuns.map(r => r.agent).filter(Boolean))];

  const runs = toolRuns
    .filter(r => statusFilter === "all" || r.status === statusFilter)
    .filter(r => agentFilter === "all" || r.agent === agentFilter);

  return (
    <div className="content-pad fade-in">
      <PageHead kicker={T("Automation · Workflows", "ระบบอัตโนมัติ · เวิร์กโฟลว์")} title={T("Workflows", "โต๊ะปรุงเวท")} tag="local"
        desc={T("Reusable automations agents can cast — built in Activepieces, triggered by webhook, schedule or an agent. Every run is logged below.",
                "ชุดงานอัตโนมัติที่ agent เรียกใช้ได้ — สร้างด้วย Activepieces ทริกเกอร์ผ่าน webhook ตามเวลา หรือให้ agent เรียก · ทุกการรันถูกบันทึกด้านล่าง")}
        actions={manage ? <Btn kind="gold" sm icon="➕" onClick={() => setBuildWf(workflows[0])}>{T("New workflow", "สร้างเวิร์กโฟลว์")}</Btn> : <span className="perm-hint mono">{T("run only", "รันได้อย่างเดียว")}</span>} />

      <HelpNote tag="local">{T("Toggle a workflow on/off, run it with inputs (a tool_run is recorded), or open the spellcraft table to view its step graph. Runs and toggles are saved on your device.",
        "เปิด/ปิดเวิร์กโฟลว์ รันพร้อมป้อนข้อมูล (จะบันทึกเป็น tool_run) หรือเปิดโต๊ะปรุงเวทเพื่อดูผังขั้นตอน · การรันและสถานะถูกบันทึกในเครื่อง")}</HelpNote>

      <div className="grid cols-4 stagger" style={{ margin: "16px 0 18px" }}>
        <StatTile label={T("Workflows", "เวิร์กโฟลว์")} value={workflows.length} unit={T("flows", "ชุด")} icon="⚗️" />
        <StatTile label={T("Enabled", "เปิดใช้")} value={`${enabledCount}/${workflows.length}`} delta={T("active flows", "ที่เปิดอยู่")} deltaTone="up" icon="🟢" />
        <StatTile label={T("Total runs", "การรันทั้งหมด")} value={toolRuns.length} unit="runs" icon="▶" />
        <StatTile label={T("Success rate", "อัตราสำเร็จ")} value={okRate + "%"} delta={T("recent runs", "การรันล่าสุด")} deltaTone={okRate >= 80 ? "up" : "down"} icon="✓" />
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1fr 380px", gap: 16, alignItems: "start" }}>
        {/* ---- workflow list ---- */}
        <Panel title={T("Workflow library", "คลังเวิร์กโฟลว์")} en="LIBRARY" icon="⚗️" bodyPad={false}>
          <div className="col" style={{ gap: 0 }}>
            {workflows.map(w => (
              <div key={w.id} className={`wf-card ${w.enabled ? "" : "off"}`}>
                <span className="wf-ic">{w.icon}</span>
                <div className="wf-body" onClick={() => setBuildWf(w)}>
                  <div className="wf-top">
                    <span className="wf-name">{T(w.nameEn, w.name)}</span>
                    <span className="wf-trigger mono">{WF_TRIGGER[w.trigger].ic} {T(WF_TRIGGER[w.trigger].en, WF_TRIGGER[w.trigger].th)}</span>
                  </div>
                  <div className="wf-desc">{T(w.descEn, w.desc)}</div>
                  <div className="wf-foot mono">
                    <span>{w.runs} {T("runs", "ครั้ง")}</span>
                    <span>·</span>
                    <span className="row" style={{ gap: 5 }}>{T("last", "ล่าสุด")} <WfStatusBadge status={w.lastStatus} T={T} /></span>
                    <span>·</span>
                    <span>{w.steps.length} {T("steps", "ขั้น")}</span>
                  </div>
                </div>
                <div className="wf-actions">
                  <button className={`wf-switch ${w.enabled ? "on" : ""}`} title={w.enabled ? T("Enabled", "เปิด") : T("Disabled", "ปิด")}
                    onClick={() => manage ? Sys.toggleWorkflow(w) : null} disabled={!manage} style={{ opacity: manage ? 1 : .5 }}>
                    <span className="wf-knob" />
                  </button>
                  <Btn kind="ghost" sm icon="🛠" onClick={() => setBuildWf(w)}>{T("Builder", "โต๊ะปรุง")}</Btn>
                  {mayRun && <Btn kind="gold" sm icon="✦" onClick={() => setRunWf(w)} style={{ opacity: w.enabled ? 1 : .5, pointerEvents: w.enabled ? "auto" : "none" }}>{T("Run", "รัน")}</Btn>}
                </div>
              </div>
            ))}
          </div>
        </Panel>

        {/* ---- tool_runs history ---- */}
        <Panel title={T("Run history", "ประวัติการรัน")} en="TOOL RUNS" icon="🧾" bodyPad={false}
          right={<span className="mono faint" style={{ fontSize: 11 }}>{runs.length}</span>}>
          <div style={{ padding: 12 }}>
            <div className="row" style={{ gap: 7, marginBottom: 10, flexWrap: "wrap" }}>
              {["all", "ok", "failed", "running"].map(s => (
                <button key={s} className={`tab-pill ${statusFilter === s ? "on" : ""}`} onClick={() => setStatusFilter(s)}>
                  {s === "all" ? T("all", "ทั้งหมด") : T(WF_STATUS[s].en, WF_STATUS[s].th)}
                </button>
              ))}
            </div>
            {agentsInRuns.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <Select block value={agentFilter} onChange={setAgentFilter}
                  options={[{ value: "all", label: T("All agents", "ทุก Agent") }, ...agentsInRuns.map(id => ({ value: id, label: agentName(id) }))]} />
              </div>
            )}
            {runs.length === 0
              ? <Empty icon="🧾" title={T("No runs match", "ไม่มีการรันที่ตรง")} sub={T("Run a workflow or change the filter", "ลองรันเวิร์กโฟลว์ หรือเปลี่ยนตัวกรอง")} />
              : <div className="col" style={{ gap: 8 }}>{runs.map(r => <ToolRunRow key={r.id} Sys={Sys} r={r} />)}</div>}
          </div>
        </Panel>
      </div>

      {runWf && <RunModal Sys={Sys} wf={runWf} onClose={() => setRunWf(null)} />}
      {buildWf && <BuilderCanvas Sys={Sys} wf={buildWf} onClose={() => setBuildWf(null)} />}
    </div>
  );
}

Object.assign(window, { Workflows, RunModal, BuilderCanvas, ToolRunRow, WfStatusBadge });

function deadlineUrgency(q) {
  // smaller = more urgent. parse "เหลือ N ชม." else push to back
  const m = /(\d+)\s*ชม/.exec(q.deadline || "");
  if (m) return parseInt(m[1], 10);
  if (q.status === "review") return 1000;
  return 2000;
}

/* ---- one metric card with optional sparkline ---- */
function Metric({ icon, label, value, unit, foot, footTone, spark, hotFrom }) {
  return (
    <div className="me-metric">
      <div className="mm-head">
        <span className="mm-label">{label}</span>
        <span className="mm-ico">{icon}</span>
      </div>
      <div className="mm-value">{value}{unit && <span className="mm-unit">{unit}</span>}</div>
      {spark
        ? <div className="mm-spark">{spark.map((v, i) => {
            const max = Math.max(...spark) || 1;
            return <i key={i} className={hotFrom != null && i >= hotFrom ? "hot" : ""} style={{ height: `${Math.max(12, Math.round(v / max * 100))}%` }} />;
          })}</div>
        : null}
      {foot && <div className={`mm-foot ${footTone || ""}`}>{foot}</div>}
    </div>
  );
}

/* ---- today's focus: the most urgent active quest, with a live checklist ---- */

  const shown = open ? granted : granted.slice(0, 6);
  return (
    <Panel title={T("My access", "สิทธิ์ของฉัน")} en="ACCESS" icon="🔑">
      <div className="me-role-row">
        <RoleBadge roleKey={me.role} roles={Sys.roles} T={T} />
        <span className="muted" style={{ fontSize: 12 }}>{T(roleByKey(Sys.roles, me.role).en, roleByKey(Sys.roles, me.role).th)}</span>
      </div>
      <div className="col" style={{ gap: 5 }}>
        {shown.map(p => <div key={p.key} className="access-line"><span className="access-tick">✓</span>{T(p.en, p.th)}</div>)}
        {granted.length === 0 && <div className="muted" style={{ fontSize: 12.5 }}>{T("Read-only access", "สิทธิ์อ่านอย่างเดียว")}</div>}

      </div>
    </Panel>
  );
}

function FocusQuest({ q, T, onOpen }) {
  const defs = QUEST_STEPS[q.id] || Array.from({ length: q.steps }, (_, i) => ({ th: `ขั้นตอนที่ ${i + 1}`, en: `Step ${i + 1}` }));
  const [done, setDone] = useState(() => defs.map((_, i) => i < q.stepDone));
  const doneCount = done.filter(Boolean).length;
  const prog = Math.round(doneCount / defs.length * 100);
  const party = q.party.map(byId).filter(Boolean);
  const lead = byId(q.lead);
  const toggle = (i) => setDone(d => d.map((v, j) => j === i ? !v : v));

  return (
    <div className="focus-quest fade-in">
      <div className="fq-banner"><span className="fq-pulse" />{T("Today's focus", "งานที่ต้องโฟกัสวันนี้")}</div>
      <div className="fq-body">
        <div className="fq-top">
          <RankGem r={q.rank} />
          <div className="fq-title">{q.title}</div>
          <span className="fq-deadline">⏳ {q.deadline}</span>
        </div>
        <div className="fq-desc">{q.desc}</div>

        </div>
      </div>
    </div>
  );
}

/* ---- token budget rail: usage ring + split + by-agent breakdown ---- */
function BudgetPanel({ me, myAgents, T }) {
  const pct = usagePct(me);
  const remaining = me.quota == null ? null : Math.max(0, me.quota - me.used);
  const ringColor = me.quota == null ? "var(--emerald)" : pct >= 90 ? "var(--crimson)" : pct >= 70 ? "var(--gold)" : "var(--emerald)";
  const periodTh = { weekly: "สัปดาห์นี้", monthly: "เดือนนี้", daily: "วันนี้" }[me.period] || me.period;
  const periodEn = { weekly: "this week", monthly: "this month", daily: "today" }[me.period] || me.period;

  // distribute usage across my agents, weighted by their mana draw
  const totalMana = myAgents.reduce((s, a) => s + a.mana, 0) || 1;
  const shares = myAgents.map(a => ({ a, tok: Math.round(me.used * a.mana / totalMana) }))
    .sort((x, y) => y.tok - x.tok);
  const maxShare = Math.max(...shares.map(s => s.tok), 1);

  // rough daily burn → projected runway
  const dailyBurn = Math.round(me.used / 5);
  const daysLeft = remaining == null ? null : (dailyBurn ? Math.floor(remaining / dailyBurn) : 99);

  return (
    <Panel title={T("Token budget", "งบโทเคน")} en="BUDGET" icon="🔵">
      {me.quota == null ? (
        <div className="muted" style={{ fontSize: 13, padding: "6px 0" }}>{T("Your account has no token limit.", "บัญชีของคุณไม่จำกัดโทเคน")}</div>
      ) : (
        <>
          <div className="budget-ring-wrap">
            <div className="budget-ring" style={{ background: `conic-gradient(${ringColor} ${pct * 3.6}deg, var(--bg-4) 0deg)` }}>
              <div className="br-inner">
                <div className="br-pct" style={{ color: pct >= 90 ? "var(--crimson)" : "var(--ink)" }}>{pct}%</div>
                <div className="br-cap">{T("used", "ใช้แล้ว")}</div>
              </div>
            </div>
            <div className="budget-meta">
              <div className="bm-row"><span className="bm-k">{T("Used", "ใช้ไป")}</span><span className="bm-v">{fmtTok(me.used)}</span></div>
              <div className="bm-row"><span className="bm-k">{T("Quota", "โควตา")}</span><span className="bm-v">{fmtTok(me.quota)}</span></div>
              <div className="bm-row"><span className="bm-k">{T("Remaining", "คงเหลือ")}</span><span className={`bm-v ${pct >= 90 ? "crit" : ""}`}>{fmtTok(remaining)}</span></div>
            </div>
          </div>

          <div className="budget-split">
            <div className="bs-cell">
              <div className="bs-k">{T("Daily burn", "เผาผลาญ/วัน")}</div>
              <div className="bs-v">{fmtTok(dailyBurn)} <small>token</small></div>
            </div>
            <div className="bs-cell">
              <div className="bs-k">{T("Runway", "พอใช้อีก")}</div>
              <div className="bs-v">{daysLeft} <small>{T("days", "วัน")}</small></div>
            </div>
          </div>

          <div className="bm-row" style={{ marginTop: 4 }}>
            <span className="mono faint" style={{ fontSize: 11 }}>{T("resets", "รีเซ็ต")} · {T(periodEn, periodTh)}</span>
            <span className="mono faint" style={{ fontSize: 11 }}>{fmtTok(remaining)} {T("left", "เหลือ")}</span>
          </div>

          {pct >= 90 && <div className="quota-warn" data-no-lex>⚠ {T("You're near your quota — large jobs may be blocked.", "ใกล้เต็มโควตา — งานใหญ่อาจถูกระงับ")}</div>}
        </>
      )}

      {myAgents.length > 0 && (
        <div className="by-agent">
          <div className="ba-cap">{T("By agent", "แยกตาม Agent")}</div>
          {shares.map(({ a, tok }) => (
            <div className="ba-row" key={a.id}>
              <span className="ba-ico">{a.icon}</span>
              <span className="ba-name">{a.name.split(" ")[0]}</span>
              <span className="ba-bar"><i style={{ width: `${Math.round(tok / maxShare * 100)}%` }} /></span>
              <span className="ba-val">{fmtTok(tok)}</span>
            </div>
          ))}
        </div>
      )}
    </Panel>
  );
}

  const [addVocab, setAddVocab] = useState(null);
  const confirmUnclear = (i) => setAddVocab({ key: i.key, alias: i.pageTerm || "" });
  const submitVocab = () => {
    if (!addVocab) return; const key = addVocab.key; const v = String(addVocab.alias || "").trim();
    if (v) { const cur = aliasOv[key] || []; if (!cur.includes(v)) saveAliasOv({ ...aliasOv, [key]: [...cur, v] }); }
    saveConfirmed([...new Set([...confirmed, key])]);
    const cn = (mergedTerms(result ? result.cat : cat).find(t2 => t2.key === key) || {}).canon || key;
    slog(t("log.act.addUnclear"), v + " → " + cn);
    setAddVocab(null);
  };
  const saveRmAlias = (o) => { setRmAlias(o); try { localStorage.setItem("guildos.sitemap.rmalias", JSON.stringify(o)); } catch (e) { } };
  const saveThOver = (o) => { setThOver(o); try { localStorage.setItem("guildos.sitemap.thover", JSON.stringify(o)); } catch (e) { } };
  const saveCanonOver = (o) => { setCanonOver(o); try { localStorage.setItem("guildos.sitemap.canonover", JSON.stringify(o)); } catch (e) { } };
  const editAlias = async (key, a) => {
    const n = await (window.uiPrompt ? window.uiPrompt({ title: t("edit.alias.prompt"), defaultValue: a }) : Promise.resolve(false));
    if (!n || n === a) return;                                  // false = ยกเลิก
    delAliasRaw(key, a); const cur = aliasOv[key] || []; saveAliasOv({ ...aliasOv, [key]: [...cur, String(n).trim()] });
    slog(t("log.act.editAlias"), a + " → " + String(n).trim() + " · " + key);
  };
  const delAliasRaw = (key, a) => {
    const extra = aliasOv[key] || [];
    if (extra.includes(a)) saveAliasOv({ ...aliasOv, [key]: extra.filter(x => x !== a) });
    else saveRmAlias({ ...rmAlias, [key]: [...new Set([...(rmAlias[key] || []), a])] });
  };
  const editTerm = async (key, curTh) => {
    const n = await (window.uiPrompt ? window.uiPrompt({ title: t("edit.desc.title"), defaultValue: curTh }) : Promise.resolve(false));
    if (!n) return; saveThOver({ ...thOver, [key]: String(n).trim() }); slog(t("log.act.editDesc"), key + " → " + String(n).trim());
  };
  const editCanon = async (key, curCanon) => {
    const n = await (window.uiPrompt ? window.uiPrompt({ title: t("edit.canon.title"), defaultValue: curCanon }) : Promise.resolve(false));
    if (!n || n === curCanon) return; saveCanonOver({ ...canonOver, [key]: String(n).trim() }); slog(t("log.act.editCanon"), curCanon + " → " + String(n).trim());
  };
  const addTerm = async () => {
    const canon = await (window.uiPrompt ? window.uiPrompt({ title: t("add.canon.title"), placeholder: t("add.canon.ph") }) : Promise.resolve(""));
    if (!canon || !canon.trim()) return;
    const th = await (window.uiPrompt ? window.uiPrompt({ title: t("add.desc.title"), placeholder: t("add.desc.ph") }) : Promise.resolve(""));
    const cur = customTerms[cat] || [];
    saveCustomTerms({ ...customTerms, [cat]: [...cur, { canon: canon.trim(), th: (th || canon).trim(), aliases: [] }] });
    slog(t("log.act.addCanon"), canon.trim() + " " + t("log.inCat", { cat }));
  };
  const removeTerm = async (key) => {
    if (!(window.uiConfirm && await window.uiConfirm({ title: t("removeCanon.title"), message: t("removeCanon.msg", { key }), danger: true, confirmText: t("common.delete") }))) return;
    const cur = customTerms[cat] || [];
    if (cur.some(t2 => t2.canon === key)) saveCustomTerms({ ...customTerms, [cat]: cur.filter(t2 => t2.canon !== key) });
    else saveRemoved([...new Set([...removed, key])]);
    slog(t("log.act.removeCanon"), key + " " + t("log.inCat", { cat }));
  };
  const catKey = (c) => typeof c === "string" ? c : c.key;
  const customDef = (k) => customCats.map(c => typeof c === "string" ? { key: c, from: [] } : c).find(c => c.key === k);
  const derivedFrom = (c) => { if (c === "IRWD") return ["IR", "WD"]; const d = customDef(c); return d ? (d.from || []) : []; };
  const isDerived = (c) => derivedFrom(c).length > 0;
  const baseTermsFor = (c) => {
    if (SM_VOCAB[c]) return [...SM_VOCAB[c], ...(customTerms[c] || [])].filter(t2 => !removed.includes(t2.canon)).map(t2 => ({ ...t2, category: t2.category || c }));
    const from = derivedFrom(c);
    if (from.length) { const out = [], seen = {}; from.forEach(s => baseTermsFor(s).forEach(t2 => { if (!seen[t2.canon]) { seen[t2.canon] = 1; out.push(t2); } })); return out; }
    return (customTerms[c] || []).filter(t2 => !removed.includes(t2.canon)).map(t2 => ({ ...t2, category: t2.category || c }));
  };
  const mergedTerms = (c) => baseTermsFor(c).map(t2 => {
    const key = t2.canon;
    const rm = rmAlias[key] || [];
    const aliases = [...(t2.aliases || []), ...((aliasOv[key]) || [])].filter(a => !rm.includes(a));
    return { key, canon: canonOver[key] != null ? canonOver[key] : t2.canon, th: thOver[key] != null ? thOver[key] : t2.th, aliases, category: t2.category };
  });
  const isExtra = (canon, a) => ((aliasOv[canon]) || []).includes(a);
  const addAlias = async (canon) => {
    const n = (await (window.uiPrompt ? window.uiPrompt({ title: t("addAlias.title"), placeholder: t("addAlias.ph") }) : Promise.resolve("")));
    if (!n || !n.trim()) return; const cur = aliasOv[canon] || [];
    saveAliasOv({ ...aliasOv, [canon]: [...cur, n.trim()] });
    slog(t("log.act.addAlias"), n.trim() + " → " + canon);
  };
  const removeAlias = (canon, a) => { delAliasRaw(canon, a); slog(t("log.act.removeAlias"), a + " · " + canon); };
  // ป้ายหมวด = ข้อมูล (ผู้ใช้เพิ่ม/แก้/ลบเอง) — ไม่แปล · มีแค่คำต่อท้าย " · รวม/combined" ที่เป็น UI
  const cats = [...SM_BASE_CATS.filter(c => !hiddenCats.includes(c.key)),
    ...customCats.map(c => ({ key: catKey(c), label: ((typeof c === "object" && c.label) ? c.label : catKey(c)) + (isDerived(catKey(c)) ? t("cats.combined") : "") }))];
  const trainForCat = train.filter(t2 => isDerived(cat) ? false : t2.category === cat);
  const catJson = JSON.stringify({ category: cat, passThreshold: passTh, vocab: mergedTerms(cat).map(t2 => ({ canon: t2.canon, th: t2.th, aliases: t2.aliases })), trainedFiles: trainForCat.map(t2 => ({ file: t2.name, rows: t2.rows })) }, null, 2);
  const readOnly = isDerived(cat) || !canEdit;
  const downloadReport = () => {
    if (!result) return;
    const ev = i => ({ pageTerm: i.pageTerm, matchedTo: i.canon, category: i.category, confidence: i.conf, aliasDiff: i.alias, evidence: i.evTag + " · " + i.evPath });
    const rep = { url: result.url, category: result.cat, scannedAt: new Date(result.at).toISOString(), passThreshold: passTh, score,
      complete: complete.map(ev), unclear: unclear.map(ev), missing: missing.map(i => ({ canon: i.canon, th: i.th, category: i.category })) };
    const blob = new Blob([JSON.stringify(rep, null, 2)], { type: "application/json;charset=utf-8" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "sitemap-report-" + result.url.replace(/^https?:\/\//, "").replace(/[^\w.-]+/g, "_") + ".json"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500);
  };

  const addTrain = (e) => {
    const files = [...e.target.files]; e.target.value = "";
    const add = files.map(f => ({ id: "tr" + Date.now() + Math.random().toString(36).slice(2, 5), name: f.name, category: cat, rows: Math.floor(Math.random() * 900) + 120, ts: Date.now() }));
    const nx = [...add, ...train]; setTrain(nx); smSaveTrain(nx);
    slog(t("log.act.addExcel"), add.map(f => f.name).join(", ") + " " + t("log.inCat", { cat }));
  };
  const removeTrain = (id) => { const nx = train.filter(t2 => t2.id !== id); setTrain(nx); smSaveTrain(nx); };
  const createCat = () => {
    const k = newCatName.trim(); if (!k) return;
    const def = { key: k, from: newCatFrom };
    const nx = [...customCats, def]; setCustomCats(nx); try { localStorage.setItem("guildos.sitemap.cats", JSON.stringify(nx)); } catch (e) { }
    setCat(k); setAddingCat(false); setNewCatName(""); setNewCatFrom([]);
  };
  const toggleFrom = (k) => setNewCatFrom(f => f.includes(k) ? f.filter(x => x !== k) : [...f, k]);
  const deleteCat = async (k) => {
    const usedBy = customCats.map(c => typeof c === "object" ? c : { key: c, from: [] }).filter(c => (c.from || []).includes(k)).map(c => c.key);
    if (usedBy.length) { window.uiAlert && window.uiAlert({ title: t("deleteCat.cantTitle"), message: t("deleteCat.usedBy", { key: k, list: usedBy.join(", ") }) }); return; }
    if (!(window.uiConfirm && await window.uiConfirm({ title: t("deleteCat.title"), message: t("deleteCat.msg", { key: k }), danger: true, confirmText: t("deleteCat.confirm") }))) return;
    if (SM_VOCAB[k]) saveHidden([...new Set([...hiddenCats, k])]);
    else { const nx = customCats.filter(c => catKey(c) !== k); setCustomCats(nx); try { localStorage.setItem("guildos.sitemap.cats", JSON.stringify(nx)); } catch (e) { } }
    slog(t("log.act.deleteCat"), k);
    if (cat === k) { const rem = [...SM_BASE_CATS.filter(c => c.key !== k && !hiddenCats.includes(c.key)).map(c => c.key), ...customCats.filter(c => catKey(c) !== k).map(c => catKey(c))]; setCat(rem[0] || ""); }
  };
  const isCustom = customCats.some(c => catKey(c) === cat);

  const run = (u) => {
    const target = (u ?? url).trim(); if (!target) return;
    setBusy(true); setResult(null);
    const h = window.uiLoading && window.uiLoading({ title: settings.useAi ? t("scan.fetchAi") : t("scan.fetch"), message: (settings.bypassPopup !== false ? t("scan.skipPopup") : "") + target });
    setTimeout(() => {
      const norm = target.replace(/^https?:\/\//, "").replace(/\/+$/, "").toLowerCase();
      const terms = mergedTerms(cat);
      const SRC = ["<nav>", "<h1>", "<h2>", "เมนู footer", "sitemap.xml", "breadcrumb"];
      const PATHS = ["/", "/investor", "/about-us", "/cg", "/ir", "/sustainability", "/board"];
      const items = terms.map(t2 => {
        const hh = smHash(norm + ":" + t2.canon);
        const conf = hh % 100;                              // match confidence 0–99
        const pool = [t2.th, ...(t2.aliases || [])];
        const pageTerm = pool[hh % pool.length];
        return { ...t2, conf, pageTerm, alias: pageTerm !== t2.th, evTag: SRC[hh % SRC.length], evPath: PATHS[(hh >> 3) % PATHS.length] };
      });
      setResult({ url: target, cat, items, at: Date.now() });
      setBusy(false); h && h.close();
    }, 1000);
  };
  const UNCLEAR = 18;                                        // band below pass threshold = "ไม่ชัด"
  const statusOf = (i) => confirmed.includes(i.key) ? "complete" : i.conf >= passTh ? "complete" : i.conf >= passTh - UNCLEAR ? "unclear" : "missing";
  const complete = result ? result.items.filter(i => statusOf(i) === "complete") : [];
  const unclear = result ? result.items.filter(i => statusOf(i) === "unclear") : [];
  const missing = result ? result.items.filter(i => statusOf(i) === "missing") : [];
  const score = result && result.items.length ? Math.round(complete.length / result.items.length * 100) : 0;
  const grade = score >= 80 ? { t: t("grade.strong"), c: "ok" } : score >= 55 ? { t: t("grade.partial"), c: "warn" } : { t: t("grade.low"), c: "bad" };
  const evHref = (i) => { let b = (result ? result.url : "").replace(/\/+$/, ""); if (b && !/^https?:\/\//.test(b)) b = "https://" + b; return b + (i.pageTerm ? "#:~:text=" + encodeURIComponent(i.pageTerm) : ""); };
  const dateLocale = lang === "en" ? "en-US" : "th-TH";

  return (
    <div className="content-pad fade-in" data-no-lex>
      <PageHead kicker={t("head.kicker")} title={t("head.title")} tag="demo" desc={t("head.desc")} />

      <div className="sm-pipe">
        {[["🗺️", "vocab"], ["🧩", "format"], ["🌐", "fetch"], ["⚖️", "compare"], ["📑", "report"]].map((s) => (
          <div className="sm-pstage" key={s[1]}><div className="sm-pico">{s[0]}</div><div className="sm-pt">{t("pipe." + s[1] + ".t")}</div><div className="sm-pd">{t("pipe." + s[1] + ".d")}</div></div>
        ))}
      </div>

      {/* 1) categories */}
      <div className="sm-section-h mono">{t("cats.section")}</div>
      <div className="sm-cats">
        {cats.map(c => <button key={c.key} className={`sm-cat ${cat === c.key ? "on" : ""}`} onClick={() => setCat(c.key)}>{c.label}</button>)}
        <button className="sm-cat add" onClick={() => setAddingCat(v => !v)}>{t("cats.add")}</button>
        {cat && <button className="sm-cat del" onClick={() => deleteCat(cat)}>{t("cats.delete", { cat })}</button>}
      </div>
      {addingCat && (
        <div className="sm-addcat">
          <div className="sm-addcat-row">
            <input className="bf-input" style={{ maxWidth: 220 }} value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder={t("addcat.namePh")} />
            <Btn kind="gold" sm onClick={createCat} style={{ opacity: newCatName.trim() ? 1 : .5, pointerEvents: newCatName.trim() ? "auto" : "none" }}>{t("addcat.create")}</Btn>
            <Btn kind="ghost" sm onClick={() => { setAddingCat(false); setNewCatName(""); setNewCatFrom([]); }}>{t("common.cancel")}</Btn>
          </div>
          <div className="sm-addcat-from">
            <span className="mono muted" style={{ fontSize: 12 }}>{t("addcat.from")}</span>
            <Select value="" minWidth={240} placeholder={t("addcat.pickSource")} onChange={v => { if (v) toggleFrom(v); }}
              options={[{ value: "", label: t("addcat.pickSource") },
                ...cats.filter(c => !isDerived(c.key) && !newCatFrom.includes(c.key)).map(c => ({ value: c.key, label: c.label }))]} />
            {newCatFrom.map(k => <span key={k} className="sm-fromchip on">{k}<button onClick={() => toggleFrom(k)}>✕</button></span>)}
            {newCatFrom.length === 0 && <span className="mono faint" style={{ fontSize: 11 }}>{t("addcat.emptyHint")}</span>}
          </div>
        </div>
      )}

      <div className="sm-subtabs">
        <button className={`sm-subtab ${tab === "url" ? "on" : ""}`} onClick={() => setTab("url")}>{t("tab.url")}</button>
        <button className={`sm-subtab ${tab === "map" ? "on" : ""}`} onClick={() => setTab("map")}>{t("tab.map")}</button>
        <button className={`sm-subtab ${tab === "log" ? "on" : ""}`} onClick={() => setTab("log")}>{t("tab.log")}</button>
      </div>

      {tab === "log" ? (
        <div className="sm-logwrap">
          <div className="sm-section-h mono" style={{ display: "flex", alignItems: "center", gap: 12 }}>{t("log.title")}
            {canEdit && log.length > 0 && <button className="sm-jsonbtn" style={{ marginLeft: "auto" }} onClick={() => { setLog([]); try { localStorage.removeItem("guildos.sitemap.log"); } catch (e) { } }}>{t("log.clear")}</button>}
          </div>
          {log.length === 0 ? <Empty icon="📜" title={t("log.empty.title")} sub={t("log.empty.sub")} /> : (
            <div className="sm-log">{log.map(l => (
              <div key={l.id} className="sm-logrow">
                <span className="sm-log-act">{l.action}</span>
                <span className="sm-log-detail">{l.detail}</span>
                <span className="sm-log-actor mono">👤 {l.actor}</span>
                <span className="sm-log-time mono">{new Date(l.ts).toLocaleString(dateLocale, { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</span>
              </div>
            ))}</div>
          )}
        </div>
      ) : tab === "map" ? (
        <>
          {/* training data (Excel → JSON) */}
          <div className="sm-train">
            <div className="sm-train-head">
              <span className="mono muted" style={{ fontSize: 12.5 }}>{t("train.summary", { files: trainForCat.length, terms: mergedTerms(cat).length, cat })}</span>
              <button className="sm-jsonbtn" onClick={() => setShowJson(v => !v)}>{showJson ? t("train.hideJson") : t("train.viewJson")}</button>
              {!readOnly && <button className="sm-up" onClick={() => fileRef.current && fileRef.current.click()}>{t("train.upload")}</button>}
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" multiple style={{ display: "none" }} onChange={addTrain} />
            </div>
            {readOnly && <div className="sm-readonly mono">{t("train.readonly", { sources: derivedFrom(cat).join(" + ") })}</div>}
            {showJson && <pre className="sm-json">{catJson}</pre>}
            {trainForCat.length > 0 && <div className="sm-train-list">{trainForCat.map(t2 => (
              <div key={t2.id} className="sm-tr">
                <span className="sm-tr-ic">📊</span>
                <div className="sm-tr-body"><div className="sm-tr-name mono">{t2.name}</div><div className="sm-tr-meta">{t("train.rows", { rows: t2.rows, cat: t2.category })}</div></div>
                <button className="sm-tr-x" onClick={() => removeTrain(t2.id)} title={t("common.delete")}>✕</button>
              </div>
            ))}</div>}
          </div>

          {/* mapping table: main keyword → variant terms */}
          <div className="sm-section-h mono" style={{ display: "flex", alignItems: "center", gap: 12 }}>{t("map.title")}
            {!readOnly && <button className="sm-jsonbtn" style={{ marginLeft: "auto" }} onClick={addTerm}>{t("map.addTerm")}</button>}
          </div>
          {!readOnly && <div className="mono faint" style={{ fontSize: 11, margin: "-4px 0 8px" }}>{t("map.hint")}</div>}
          <div className="sm-map">
            {mergedTerms(cat).length === 0 && <div className="muted" style={{ fontSize: 13, padding: "10px 2px" }}>{t("map.empty")}</div>}
            {mergedTerms(cat).map(t2 => (
              <div key={t2.key} className="sm-maprow">
                <div className="sm-mapkey">
                  <div className="sm-mapcanon mono">{t2.canon}{!readOnly && <button className="sm-edit" onClick={() => editCanon(t2.key, t2.canon)} title={t("edit.canon.title")}>✎</button>}</div>
                  <div className="sm-mapth">{t2.th}{!readOnly && <button className="sm-edit" onClick={() => editTerm(t2.key, t2.th)} title={t("edit.desc.title")}>✎</button>}</div>
                  <span className="sm-item-cat mono">{t2.category}</span>
                </div>
                <span className="sm-arrow">→</span>
                <div className="sm-mapvars">
                  {t2.aliases.length === 0 && <span className="muted" style={{ fontSize: 12 }}>{t("map.noAlias")}</span>}
                  {t2.aliases.map(a => (
                    <span key={a} className={`sm-var ${isExtra(t2.key, a) ? "extra" : ""}`}>{a}{!readOnly && <><button onClick={() => editAlias(t2.key, a)} title={t("edit.alias.title")}>✎</button><button onClick={() => removeAlias(t2.key, a)} title={t("common.delete")}>✕</button></>}</span>
                  ))}
                  {!readOnly && <button className="sm-var add" onClick={() => addAlias(t2.key)} title={t("addAlias.title")}>＋</button>}
                </div>
                {!readOnly && <button className="sm-maprow-del" onClick={() => removeTerm(t2.key)} title={t("removeCanon.title")}>🗑</button>}
              </div>
            ))}
          </div>
        </>
      ) : (
        <>
          {/* scan URL */}
          <div className="sm-bar">
            <span className="sm-ic">🔗</span>
            <input value={url} onChange={e => setUrl(e.target.value)} onKeyDown={e => e.key === "Enter" && run()} placeholder="https://company.listed.co.th" />
            {url && <button className="sm-clear" onClick={() => setUrl("")}>✕</button>}
            <Btn kind="gold" icon="🔍" onClick={() => run()}>{t("scan.match")}</Btn>
          </div>
          <label className="sm-aicheck">
            <input type="checkbox" checked={settings.useAi} onChange={e => setSetting("useAi", e.target.checked)} />
            <span>{t("scan.aiCheck")} <span className="mono faint">({settings.model} · {settings.apiMode})</span></span>
          </label>
          <label className="sm-aicheck">
            <input type="checkbox" checked={settings.bypassPopup !== false} onChange={e => setSetting("bypassPopup", e.target.checked)} />
            <span>{t("scan.bypass")} <span className="mono faint">{t("scan.bypassHint")}</span></span>
          </label>
          <div className="sm-thbar">
            <span className="mono muted" style={{ fontSize: 12.5 }}>{t("settings.engine")}</span>
            <Select value={settings.engine || "rapidfuzz (fuzzy)"} onChange={v => setSetting("engine", v)} minWidth={170}
              options={["rapidfuzz (fuzzy)", "AI semantic", "exact match"].map(m => ({ value: m, label: m }))} />
            <span className="mono faint" style={{ fontSize: 11 }}>{t("settings.engine.hint")}</span>
          </div>
          <div className="sm-examples">
            <span className="mono faint">{t("scan.try")}:</span>
            {["www.set.or.th", "www.scb.co.th", "www.cpall.co.th"].map(e => <button key={e} className="sm-chip" onClick={() => { setUrl("https://" + e); run("https://" + e); }}>{e}</button>)}
          </div>
          <div className="sm-thbar">
            <span className="mono muted" style={{ fontSize: 12.5 }}>{t("scan.threshold")}</span>
            <input type="range" min="50" max="95" step="5" value={passTh} onChange={e => setPassTh(+e.target.value)} />
            <span className="sm-thval mono">{passTh}%</span>
            <span className="mono faint" style={{ fontSize: 11 }}>{t("scan.bandHint", { lo: passTh - 18, hi: passTh })}</span>
          </div>

      {busy && <Panel><div className="sm-loading"><span className="typing-bubble" style={{ display: "inline-flex" }}><span /><span /><span /></span> {t("scan.loading")}</div></Panel>}
      {!busy && !result && <Empty icon="🗺️" title={t("scan.noscan.title")} sub={t("scan.noscan.sub")} />}

      {!busy && result && (
        <>
          <div className="sm-summary">
            <div className={`sm-score ${grade.c}`}>
              <div className="sm-score-num">{score}<span>%</span></div>
              <div className="sm-score-lbl mono">{t("summary.matched")}</div>
            </div>
            <div className="sm-sumdetail">
              <div className="sm-target mono">🌐 {result.url} · {t("summary.catLabel")} {result.cat}</div>
              <div className="sm-track"><div className={`sm-fill ${grade.c}`} style={{ width: score + "%" }} /></div>
              <div className="sm-counts">
                <span className={`sm-grade ${grade.c}`}>{grade.t}</span>
                <span className="sm-cnt ok">{t("count.complete", { n: complete.length })}</span>
                <span className="sm-cnt unclear">{t("count.unclear", { n: unclear.length })}</span>
                <span className="sm-cnt miss">{t("count.missing", { n: missing.length })}</span>

const typeOf = (k) => TOOL_TYPES.find(t => t.key === k) || TOOL_TYPES[TOOL_TYPES.length - 1];
/* รองรับทั้ง spec แบบ object และ tuple [key,label,ph] เดิม */
const normField = (d) => (Array.isArray(d) ? { k: d[0], label: d[1], ph: d[2] } : d);

/* ----- AI model & API settings (moved here from the Sitemap Match screen) -----
   อ่าน/เขียน localStorage "guildos.sitemap.settings" ตัวเดียวกับที่ Sitemap Match ใช้ตอนสแกน */
const SM_SET_KEY = "guildos.sitemap.settings";
const SM_MODELS = ["Qwen 3.6 32B", "GLM 5.1", "Llama 3.3 70B"];
const SM_APIMODES = ["Local · Ollama (dev)", "Local · vLLM (prod)", "Cloud API", "MCP"];
const SM_ENGINES = ["rapidfuzz (fuzzy)", "AI semantic", "exact match"];
// ใช้ i18n t() — รีไซเคิลคีย์ settings.* / head.title ที่มีอยู่แล้วจากหน้า Sitemap Match
function AiApiPanel({ mayEdit, t }) {

    try { const v = JSON.parse(localStorage.getItem(SM_SET_KEY) || "null"); if (v) return v; } catch (e) { }

  });
  const set = (k, v) => { const nx = { ...s, [k]: v }; setS(nx); try { localStorage.setItem(SM_SET_KEY, JSON.stringify(nx)); } catch (e) { } };
  const ro = !mayEdit;

  return (
    <div className="tool-toolsettings">
      <div className="tool-section-head">

      <Panel title={tx("tab.settings")} en="AI MODEL & API" icon="🤖">
        <div style={{ opacity: ro ? .6 : 1, pointerEvents: ro ? "none" : "auto" }}>
          <div className="bf-2">
            <div className="bf"><label className="bf-label">{tx("settings.model")}</label>
              <Select block value={s.model} onChange={v => set("model", v)} options={modelOpts.map(m => ({ value: m, label: m }))} />
              <span className="bf-hint">{tx("settings.model.hint")}</span></div>
            <div className="bf"><label className="bf-label">{tx("settings.apiMode")}</label>
              <Select block value={s.apiMode} onChange={v => set("apiMode", v)} options={SM_APIMODES.map(m => ({ value: m, label: m }))} />
              <span className="bf-hint">{tx("settings.apiMode.hint")}</span></div>
            <div className="bf"><label className="bf-label">{tx("settings.endpoint")}</label>
              <input className="bf-input mono" style={{ fontSize: 12.5 }} value={s.apiUrl || ""} onChange={e => set("apiUrl", e.target.value)} placeholder="http://localhost:11434/v1" data-no-lex />
              <span className="bf-hint">{tx("settings.endpoint.hint")}</span></div>
            <div className="bf"><label className="bf-label">{tx("settings.apiKey")}</label>
              <SecretInput value={s.apiKey || ""} onChange={e => set("apiKey", e.target.value)} placeholder={tx("settings.apiKeyPh")} />
              <span className="bf-hint">{tx("settings.apiKey.hint")}</span></div>
          </div>
          <div className="sm-set-note mono">{tx("settings.note")}</div>

}
function SecretInput({ value, onChange, placeholder }) {
  const [show, setShow] = useState(false);
  return (
    <div className="bf-secret">
      <input className="bf-input mono" style={{ fontSize: 12.5, paddingRight: 58 }} type={show ? "text" : "password"}
        value={value} onChange={onChange} placeholder={placeholder} autoComplete="new-password" data-no-lex />
      <button type="button" className="bf-secret-eye mono" onClick={() => setShow(s => !s)}>{show ? "HIDE" : "SHOW"}</button>
    </div>
  );
}

function ToolField({ d, value, onChange }) {
  const kind = d.kind || "text";
  const span = d.full ? { gridColumn: "1 / -1" } : null;
  if (kind === "toggle") {
    return (
      <div className="bf bf-toggle" style={span}>
        <Switch checked={!!value} onChange={onChange} label={d.label} />
      </div>
    );
  }
  return (
    <div className="bf" style={span}>
      <label className="bf-label">{d.label}</label>
      {kind === "select" ? (
        <Select block value={value || (d.opts[0] && d.opts[0].value)} onChange={onChange} options={d.opts} />
      ) : kind === "secret" ? (
        <SecretInput value={value || ""} onChange={e => onChange(e.target.value)} placeholder={d.ph} />
      ) : kind === "textarea" ? (
        <textarea className={"bf-input area" + (d.mono ? " mono" : "")} style={d.mono ? { fontSize: 12.5 } : null} rows={3}
          value={value || ""} onChange={e => onChange(e.target.value)} placeholder={d.ph}></textarea>
      ) : (
        <input className={"bf-input" + (d.mono ? " mono" : "")} style={d.mono ? { fontSize: 12.5 } : null}
          type={kind === "number" ? "number" : "text"} value={value ?? ""} onChange={e => onChange(e.target.value)} placeholder={d.ph} />
      )}
    </div>
  );
}

function ToolForm({ initial, onSave, onCancel, t }) {
  const tx = t || ((k) => k);
  const [f, setF] = useState(initial || { name: "", type: "mcp", enabled: true, config: {} });
  const tt = typeOf(f.type);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const setCfg = (k, v) => setF(p => ({ ...p, config: { ...p.config, [k]: v } }));
  const ok = f.name.trim().length > 0;
  return (
    <div className="tool-form">
      <div className="bf-2">
        <div className="bf"><label className="bf-label">{tx("toolform.name")}</label>
          <input className="bf-input" value={f.name} onChange={e => set("name", e.target.value)} placeholder={tx("toolform.namePh", { label: tt.label })} /></div>
        <div className="bf"><label className="bf-label">{tx("toolform.type")}</label>
          <Select block value={f.type} onChange={v => set("type", v)}
            options={TOOL_TYPES.map(t => ({ value: t.key, label: `${t.icon} ${t.label}` }))} /></div>
      </div>
      {tt.desc && <div className="tool-type-desc">{tt.desc}</div>}
      <div className="bf-2">
        {tt.fields.map(normField).map(d => (
          <ToolField key={d.k} d={d} value={f.config[d.k]} onChange={v => setCfg(d.k, v)} />
        ))}
      </div>
      <div className="row" style={{ gap: 8, justifyContent: "flex-end" }}>
        <Btn kind="ghost" sm onClick={onCancel}>{tx("common.cancel")}</Btn>
        <Btn kind="gold" sm onClick={() => ok && onSave(f)} style={{ opacity: ok ? 1 : .5, pointerEvents: ok ? "auto" : "none" }}>{initial ? tx("toolform.save") : tx("toolform.create")}</Btn>
      </div>
    </div>
  );
}

function ToolsManager({ can, t }) {
  const mayEdit = !can || can("options.manage");
  const tx = t || ((k) => k);
  const [tools, setTools] = useState(() => loadToolCfgs());
  const [editing, setEditing] = useState(null);     // tool id | "new" | null
  const [positions, setPositions] = useState(() => loadOptions().positions || []);
  const [newPos, setNewPos] = useState("");
  const [toolQuery, setToolQuery] = useState("");
  const [toolsOpen, setToolsOpen] = useState(true);

  const commit = (list) => { setTools(saveToolCfgs(list)); };
  const saveTool = (f) => {
    if (editing === "new") commit([{ ...f, id: "t" + Date.now() }, ...tools]);
    else commit(tools.map(t => (t.id === editing ? { ...t, ...f } : t)));
    setEditing(null);
  };
  const delTool = async (t2) => {
    const ok = window.uiConfirm
      ? await window.uiConfirm({ title: tx("tools.delToolTitle"), message: tx("tools.delToolMsg", { name: t2.name }), danger: true, confirmText: tx("tools.delToolTitle") })
      : window.confirm(tx("tools.delToolMsg", { name: t2.name }));
    if (!ok) return;
    removeOption("tools", t2.name);
    commit(tools.filter(x => x.id !== t2.id));
  };
  const toggleTool = (t) => commit(tools.map(x => (x.id === t.id ? { ...x, enabled: x.enabled === false } : x)));

  const addPos = () => { const v = newPos.trim(); if (!v) return; addOption("positions", v); setPositions(loadOptions().positions); setNewPos(""); };
  const delPos = async (p) => {
    const ok = window.uiConfirm
      ? await window.uiConfirm({ title: tx("tools.delPosTitle"), message: tx("tools.delPosMsg", { name: p }), danger: true, confirmText: tx("tools.delPosTitle") })
      : window.confirm(tx("tools.delPosMsg", { name: p }));
    if (!ok) return;
    removeOption("positions", p); setPositions(loadOptions().positions);
  };

  return (
    <div className="content-pad fade-in">
      <PageHead kicker={tx("tools.kicker")} title={tx("tools.title")} desc={tx("tools.desc")}
        actions={mayEdit ? <Btn kind="gold" sm icon="➕" onClick={() => setEditing("new")}>{tx("tools.add")}</Btn> : null} />
      <HelpNote tag={tx("tools.helpTag")}>{tx("tools.help")}</HelpNote>

      <Modal className="tool-modal" open={editing != null} onClose={() => setEditing(null)}
        title={editing === "new" ? tx("tools.modal.add") : tx("tools.modal.edit")}>
        {editing != null && (
          <ToolForm key={String(editing)} t={t} initial={editing === "new" ? null : tools.find(t2 => t2.id === editing)} onSave={saveTool} onCancel={() => setEditing(null)} />
        )}
      </Modal>

      <div className="tool-toolsettings">
        <div className="tool-section-head">
          <span className="tsh-ic">🧰</span>
          <span className="tsh-title">{tx("tools.catalog")}</span>
          <span className="tsh-kicker mono">TOOL CATALOG</span>
          <span className="tsh-right" data-no-lex>
            <span className="mono faint" style={{ fontSize: 11 }}>{tx("tools.count", { n: tools.length })}</span>
            <button type="button" className="tool-collapse" title={toolsOpen ? tx("tools.collapse") : tx("tools.expand")}
              onClick={() => setToolsOpen(o => !o)}>
              <span style={{ display: "inline-block", transition: "transform .18s", transform: toolsOpen ? "rotate(0deg)" : "rotate(-90deg)" }}>▾</span>
            </button>
          </span>
        </div>
        <Panel>
        {toolsOpen && <>
        <div className="tool-search">
          <span className="ts-ic">🔍</span>
          <input value={toolQuery} onChange={e => setToolQuery(e.target.value)} placeholder={tx("tools.search")} data-no-lex />
          {toolQuery && <button type="button" className="ts-clear" onClick={() => setToolQuery("")}>✕</button>}
        </div>
        {(() => {
          const q = toolQuery.trim().toLowerCase();
          const shown = q ? tools.filter(t2 => { const tt = typeOf(t2.type); return (t2.name + " " + tt.label + " " + t2.type).toLowerCase().includes(q); }) : tools;
          if (tools.length === 0) return <Empty icon="🧰" title={tx("tools.empty")} sub={tx("tools.emptySub")} />;
          if (shown.length === 0) return <div className="muted" style={{ fontSize: 13, padding: "14px 4px" }}>{tx("tools.noMatch")}</div>;
          return <div className="tool-list">
              {shown.map(t2 => { const tt = typeOf(t2.type); const off = t2.enabled === false; return (
                <div key={t2.id} className={`tool-row ${off ? "off" : ""}`}>
                  <span className="tool-ic">{tt.icon}</span>
                  <div className="tool-bd">
                    <div className="tool-name">{t2.name}</div>
                    <div className="tool-meta mono">{tt.label}{Object.entries(t2.config || {}).filter(([, v]) => v && typeof v === "string").slice(0, 2).map(([k, v]) => ` · ${k}: ${String(v).length > 26 ? String(v).slice(0, 26) + "…" : v}`).join("")}</div>
                  </div>
                  {mayEdit && <label className="ck-inline" title={off ? tx("tools.disabled") : tx("tools.enabled")} data-no-lex>
                    <input type="checkbox" checked={!off} onChange={() => toggleTool(t2)} />
                  </label>}
                  {mayEdit && <button type="button" className="chip-act" title={tx("tools.edit")} onClick={() => setEditing(t2.id)}>✎</button>}
                  {mayEdit && <button type="button" className="chip-act danger" title={tx("tools.delete")} onClick={() => delTool(t2)}>✕</button>}
                </div>
              ); })}
            </div>;
        })()}
        {mayEdit && (
          <button type="button" className="tool-add-row" onClick={() => setEditing("new")}>{tx("tools.addNew")}</button>
        )}
        </>}
        </Panel>
      </div>

      <AiApiPanel mayEdit={mayEdit} t={t} />

      <div className="tool-toolsettings">
        <div className="tool-section-head">
          <span className="tsh-ic">🔌</span>
          <span className="tsh-title">{tx("api.title")}</span>
          <span className="tsh-kicker mono">API CONNECTIONS</span>
        </div>
        <ApiConnections t={t} bare />
      </div>

      <div className="tool-toolsettings">
        <div className="tool-section-head">
          <span className="tsh-ic">🎖️</span>
          <span className="tsh-title">{tx("tools.positions")}</span>
          <span className="tsh-kicker mono">POSITION OPTIONS</span>
        </div>
        <Panel>
        <div className="opt-chips" style={{ marginBottom: 10 }}>
          {positions.map(p => (
            <span key={p} className="opt-chip manage">{p}
              {mayEdit && <button type="button" className="chip-act danger" title={tx("tools.delPosTitle")} onClick={() => delPos(p)}>✕</button>}
            </span>
          ))}
          {positions.length === 0 && <span className="muted" style={{ fontSize: 12 }}>{tx("tools.noPositions")}</span>}
        </div>
        {mayEdit && (
          <div className="opt-add-row" style={{ maxWidth: 360 }}>
            <input className="bf-input" placeholder={tx("tools.addPosPh")} value={newPos} onChange={e => setNewPos(e.target.value)} onKeyDown={e => e.key === "Enter" && addPos()} />
            <Btn kind="ghost" sm onClick={addPos}>{tx("tools.addBtn")}</Btn>
          </div>
        )}
        </Panel>
      </div>
    </div>
  );
}

/* PiKaOs — ES module (migrated from PiKaOs-Core/ui-modal.jsx). */

/* ============================================================
   UI MODAL — in-app confirm / prompt / alert (replaces native
   window.confirm & window.prompt). Imperative API returns a
   Promise; supports danger styling, a text input (prompt), and
   two-step confirmation for destructive / overwrite actions.
     await uiConfirm({ title, message, danger, twoStep })  -> bool
     await uiPrompt({ title, message, defaultValue })       -> string|false
     await uiAlert({ title, message })                      -> true
   ============================================================ */
(function () {
  let current = null; let subs = [];
  const emit = () => subs.forEach(fn => fn());
  window.__getModal = () => current;
  window.__subModal = (fn) => { subs.push(fn); return () => { subs = subs.filter(x => x !== fn); }; };
  window.uiConfirm = (opts = {}) => new Promise(res => { current = { opts, resolve: (v) => { current = null; emit(); res(v); } }; emit(); });
  window.uiPrompt = (opts = {}) => window.uiConfirm({ ...opts, input: true });
  window.uiAlert = (opts = {}) => window.uiConfirm({ ...opts, alert: true });
})();

function UIModalHost() {
  const [, force] = React.useReducer(x => x + 1, 0);
  const [val, setVal] = useState("");
  const [armed, setArmed] = useState(false);
  const [count, setCount] = useState(0);
  useEffect(() => window.__subModal(() => {
    const m = window.__getModal();
    setVal((m && m.opts && m.opts.defaultValue) || "");
    setArmed(false); force();
  }), []);
  const m = window.__getModal();
  // delete-style confirms (move-to-trash / delete) get a red button + safety countdown
  const _o = m ? m.opts : null;
  const isDelete = !!_o && !_o.alert && !_o.input && /ลบ|ถังขยะ|trash|delete|ทิ้ง/i.test((_o.title || "") + " " + (_o.message || ""));
  const destructive = !!_o && (_o.danger || isDelete);
  // 3-second safety countdown on destructive confirms (and the 2nd step of two-step)
  const needsCountdown = !!m && destructive && (!m.opts.twoStep || armed);
  useEffect(() => {
    if (!needsCountdown) { setCount(0); return; }
    setCount(3);
    const iv = setInterval(() => setCount(c => { if (c <= 1) { clearInterval(iv); return 0; } return c - 1; }), 1000);
    return () => clearInterval(iv);
  }, [m, armed, needsCountdown]);
  if (!m) return null;
  const o = m.opts;
  const ok = () => {
    if (count > 0) return;
    if (o.twoStep && !armed) { setArmed(true); return; }
    if (o.input) { const v = val.trim(); if (!v) return; m.resolve(v); return; }
    m.resolve(true);
  };
  const cancel = () => m.resolve(false);
  const baseLabel = o.twoStep && armed ? (o.confirmText2 || "ยืนยันถาวร") : (o.confirmText || "ตกลง");
  // centered status icon + delete-style (red) confirm button
  const iconCls = o.alert ? "info" : (destructive ? "trash" : "ask");
  const iconGlyph = o.icon || (o.alert ? "i" : (destructive ? "🗑" : "?"));
  const confirmKind = destructive ? "btn-danger" : "btn-gold";
  return (
    <div className="pk-overlay open" onClick={cancel}>
      <div className="pk-modal status" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className={`status-ic ${iconCls}`}>{iconGlyph}</div>
        <h3>{o.title || "ยืนยัน"}</h3>
        {o.message && <p>{o.message}</p>}
        {o.input && <input className="pk-input" autoFocus value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => { if (e.key === "Enter") ok(); if (e.key === "Escape") cancel(); }} placeholder={o.placeholder || ""} />}
        {o.twoStep && armed && <div className="pk-warn">⚠️ {o.warnText || "กดยืนยันอีกครั้งเพื่อดำเนินการถาวร — การกระทำนี้ย้อนกลับไม่ได้"}</div>}
        <div className="pk-foot">
          {!o.alert && <button className="btn btn-ghost" onClick={cancel}>{o.cancelText || "ยกเลิก"}</button>}
          <button className={`btn ${confirmKind} ${count > 0 ? "is-counting" : ""}`} onClick={ok} disabled={count > 0}>
            {baseLabel}{count > 0 && <span className="btn-cd">{count}</span>}
          </button>
        </div>
      </div>
    </div>
  );
}
Object.assign(window, { UIModalHost });

/* ============================================================
   UI LOADING — imperative popup loader (module).
     const h = uiLoading("กำลังบันทึก…");   // or { title, message }
     h.update("กำลังส่งให้ HERMES…");        // change text
     h.close();                              // dismiss
   Mount <UILoadingHost /> once near the app root.
   ============================================================ */
(function () {
  let cur = null; let subs = [];
  const emit = () => subs.forEach(fn => fn());
  window.__getLoading = () => cur;
  window.__subLoading = (fn) => { subs.push(fn); return () => { subs = subs.filter(x => x !== fn); }; };
  window.uiLoading = (opts = {}) => {
    if (typeof opts === "string") opts = { message: opts };
    cur = { title: "กำลังโหลด", ...opts, _id: Date.now() }; emit();
    const handle = {
      update: (o) => { if (cur) { cur = { ...cur, ...(typeof o === "string" ? { message: o } : o) }; emit(); } return handle; },
      close: () => { cur = null; emit(); },
    };
    handle.done = handle.close;
    return handle;
  };
  window.uiLoadingHide = () => { cur = null; emit(); };
  // run an async (or timed) task behind the loader
  window.uiLoadingRun = async (opts, fn) => {
    const h = window.uiLoading(opts);
    try { return await (typeof fn === "function" ? fn(h) : fn); }
    finally { h.close(); }
  };
})();

function UILoadingHost() {
