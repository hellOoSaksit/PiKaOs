const ToastCtx = createContext(null);

/**
 * ToastProvider — wrap the app. Exposes useToast() → toast(msg, type).
 * type: "ok" | "err". Card springs up bottom-right, auto-dismiss 3s.
 */
function ToastProvider({ children }) {
  const [items, setItems] = useState([]);

  const remove = useCallback((id) => {
    setItems((list) => list.map((t) => (t.id === id ? { ...t, leaving: true } : t)));
    setTimeout(() => setItems((list) => list.filter((t) => t.id !== id)), 250);
  }, []);

  const toast = useCallback((msg, type = 'ok') => {
    const id = Math.random().toString(36).slice(2);
    setItems((list) => [...list, { id, msg, type }]);
    setTimeout(() => remove(id), 3000);
  }, [remove]);

  return (
    <ToastCtx.Provider value={toast}>
      {children}
      <div className="toast-stack">
        {items.map((t) => (
          <div key={t.id} className={'toast ' + t.type + (t.leaving ? ' leaving' : '')} role="status">
            <span className="t-ic">{t.type === 'err' ? '✕' : '✓'}</span>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

function useToast() {
  const ctx = useContext(ToastCtx);
  if (!ctx) return () => {};
  return ctx;
}

function useOutside(ref, onClose, open) {
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };
  }, [open, onClose, ref]);
}

/**
 * Tags — input that holds chips. Enter adds, Backspace on empty removes last.
 * Removal plays the shrink-fade before drop. accent: chips use the t-gold tint.
 */
function Tags({ value = [], onChange, placeholder = 'Add tag…', accent = false }) {
  const [draft, setDraft] = useState('');
  const [leaving, setLeaving] = useState(null);
  const inputRef = useRef(null);

  const add = (t) => {
    const v = t.trim();
    if (!v || value.includes(v)) { setDraft(''); return; }
    onChange && onChange([...value, v]);
    setDraft('');
  };
  const remove = (t) => {
    setLeaving(t);
    setTimeout(() => { onChange && onChange(value.filter((x) => x !== t)); setLeaving(null); }, 160);
  };
  const onKey = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); add(draft); }
    else if (e.key === 'Backspace' && !draft && value.length) remove(value[value.length - 1]);
  };

  return (
    <div className="tag-input" onClick={() => inputRef.current && inputRef.current.focus()}>
      {value.map((t) => (
        <span key={t} className={'pk-tag' + (accent ? ' t-gold' : '') + (leaving === t ? ' leaving' : '')}>
          {t}
          <button type="button" className="x" onClick={(e) => { e.stopPropagation(); remove(t); }} aria-label={'remove ' + t}>✕</button>
        </span>
      ))}
      <input
        ref={inputRef}
        value={draft}
        placeholder={placeholder}
        onChange={(e) => setDraft(e.target.value)}
        onKeyDown={onKey}
      />
    </div>
  );
}

const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
const DOW = ['SU', 'MO', 'TU', 'WE', 'TH', 'FR', 'SA'];

const fmt = (d) => `${String(d.getDate()).padStart(2, '0')} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;

function relLabel(d) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const t = new Date(d); t.setHours(0, 0, 0, 0);
  const days = Math.round((t - today) / 86400000);
  if (days === 0) return '· today';
  if (days === 1) return '· tomorrow';
  if (days === -1) return '· yesterday';
  if (days > 0) return `· in ${days} days`;
  return `· ${-days} days ago`;
}

/**
 * DatePicker — trigger shows mono DD MMM YYYY; calendar pops in a .dd-menu.
 * today = gold ring, selected = solid gold pill. value/onChange are Date objects.
 */
function DatePicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [view, setView] = useState(() => (value ? new Date(value) : new Date()));
  const ref = useRef(null);

  useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };
  }, []);

  const y = view.getFullYear(), m = view.getMonth();
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push({ dim: true, n: new Date(y, m, i - startDow + 1).getDate() });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ n: d, date: new Date(y, m, d) });

  const sameDay = (a, b) => a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

  return (
    <div className={'dd' + (open ? ' open' : '')} ref={ref}>
      <button type="button" className="dd-btn date-btn" style={{ minWidth: 190 }} onClick={() => setOpen((o) => !o)}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 9 }}>

/* ===== components/ui/SoftDeleteRow.jsx ===== */
/**
 * SoftDeleteRow — canonical destructive flow: 🗑 → (parent shows countdown modal) →
 * soft delete → 5s undo bar → permanent. This component renders ONE row and manages
 * its own soft-delete + undo timer. onPurge() fires when the 5s elapses without undo.
 *
 * Pass `armed` to skip straight to soft-deleted (e.g. after a confirm modal),
 * or call the returned handlers. Simplest usage: handles its own delete on 🗑 click,
 * assuming the confirm happened elsewhere — set confirmFirst={false}.
 */
function SoftDeleteRow({ icon = '📄', title, meta, undoSeconds = 5, onDelete, onUndo, onPurge }) {
  const [state, setState] = useState('idle'); // idle | deleted | removing
  const [left, setLeft] = useState(undoSeconds);
  const timer = useRef(null);
  const ticker = useRef(null);

  const startDelete = () => {
    setState('deleted'); setLeft(undoSeconds);
    onDelete && onDelete();
    ticker.current = setInterval(() => setLeft((s) => Math.max(0, s - 1)), 1000);
    timer.current = setTimeout(() => {
      clearInterval(ticker.current);
      setState('removing');
      setTimeout(() => { setState('gone'); onPurge && onPurge(); }, 300);
    }, undoSeconds * 1000);
  };
  const undo = () => {
    clearTimeout(timer.current); clearInterval(ticker.current);
    setState('idle'); onUndo && onUndo();
  };
  useEffect(() => () => { clearTimeout(timer.current); clearInterval(ticker.current); }, []);

  if (state === 'gone') return null;

  return (
    <div className={'sd-row' + (state === 'deleted' ? ' deleted' : '') + (state === 'removing' ? ' removing' : '')}>
      <span className="sd-ic">{icon}</span>
      <div className="sd-main">
        <div className="sd-title">{title}</div>
        {meta && <div className="sd-meta">{meta}</div>}
      </div>
      {state === 'idle' ? (
        <button type="button" className="sd-del" onClick={startDelete} aria-label="delete">🗑</button>
      ) : (
        <div className="sd-undo">
          <span className="sd-count">{left}</span>
          <div className="sd-timer"><div className="sd-timer-fill" style={{ width: '100%', transition: `width ${undoSeconds}s linear`, animation: 'none' }} ref={(el) => { if (el) requestAnimationFrame(() => { el.style.width = '0%'; }); }} /></div>
          <button type="button" className="btn btn-ghost btn-sm" onClick={undo}>Undo</button>
        </div>
      )}
    </div>
  );
}

/* ===== components/ui/Todo.jsx ===== */
let _id = 0;
const uid = () => 'td' + (++_id);

/**
 * Todo — head (title + done/total + mini progress), add row, list.
 * Checked tints emerald + strike; ✕ slides out. Self-contained state.
 */
function Todo({ title = 'Tasks', initial = [] }) {
  const [items, setItems] = useState(() => initial.map((t) => (typeof t === 'string' ? { id: uid(), text: t, done: false } : { id: uid(), ...t })));
  const [draft, setDraft] = useState('');
  const [adding, setAdding] = useState(null);
  const [removing, setRemoving] = useState(null);

  const done = items.filter((i) => i.done).length;
  const pct = items.length ? (done / items.length) * 100 : 0;

  const add = () => {
    const v = draft.trim();
    if (!v) return;
    const id = uid();
    setItems((l) => [...l, { id, text: v, done: false }]);
    setAdding(id); setDraft('');
    setTimeout(() => setAdding(null), 400);
  };
  const toggle = (id) => setItems((l) => l.map((i) => (i.id === id ? { ...i, done: !i.done } : i)));
  const remove = (id) => {
    setRemoving(id);
    setTimeout(() => { setItems((l) => l.filter((i) => i.id !== id)); setRemoving(null); }, 300);
  };

  return (
    <div className="todo">
      <div className="todo-head">
        <div className="l"><b>{title}</b><span className="todo-count">{done}/{items.length}</span></div>
        <Progress className="todo-prog" value={pct} hideLabel />
      </div>
      <div className="todo-add">
        <input className="bf-input" value={draft} placeholder="Add a task…" onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && add()} />
        <Button kind="gold" onClick={add}>Add</Button>
      </div>
      {items.length === 0 ? (
        <div className="todo-empty">Nothing here yet — add your first task.</div>
      ) : (
        <ul className="todo-list">
          {items.map((it) => (
            <li key={it.id} className={'todo-item' + (it.done ? ' done' : '') + (adding === it.id ? ' adding' : '') + (removing === it.id ? ' removing' : '')}>
              <Checkbox checked={it.done} onChange={() => toggle(it.id)} />
              <span className="todo-text">{it.text}</span>
              {it.priority && <span className={'qbadge ' + it.priority}>{it.priorityLabel || it.priority}</span>}
              <button type="button" className="sd-del" onClick={() => remove(it.id)} aria-label="delete">✕</button>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

/* ===== components/ui/Search.jsx ===== */
function mark(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return text;
  return (<>{text.slice(0, i)}<mark className="hl">{text.slice(i, i + q.length)}</mark>{text.slice(i + q.length)}</>);
}

/**
 * Search — field (🔍 + ⌘K hint + clear ✕) with a results popover.
 * items: [{ icon, title, meta, type }]. Live-filters by title/meta, highlights matches,
 * ↑/↓ move active row, Enter selects, Esc/outside close. onSelect(item).
 */
function Search({ items = [], placeholder = 'Search tickets, people, files…', onSelect }) {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const [active, setActive] = useState(0);
  const ref = useRef(null);

  const results = useMemo(() => {
    if (!q) return items.slice(0, 6);
    const s = q.toLowerCase();
    return items.filter((it) => (it.title + ' ' + (it.meta || '')).toLowerCase().includes(s));
  }, [q, items]);

  useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);

  const choose = (it) => { onSelect && onSelect(it); setOpen(false); };
  const onKey = (e) => {
    if (e.key === 'Escape') setOpen(false);
    else if (e.key === 'ArrowDown') { e.preventDefault(); setActive((a) => Math.min(results.length - 1, a + 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive((a) => Math.max(0, a - 1)); }
    else if (e.key === 'Enter' && results[active]) choose(results[active]);
  };

  return (
    <div className={'search' + (open ? ' open' : '') + (q ? ' has-text' : '')} ref={ref}>
      <div className="search-field">
        <span className="search-ic">🔍</span>
        <input
          className="search-input" value={q} placeholder={placeholder}
          onChange={(e) => { setQ(e.target.value); setOpen(true); setActive(0); }}
          onFocus={() => setOpen(true)} onKeyDown={onKey}
        />
        <span className="search-kbd">⌘K</span>
        <button type="button" className="search-clear" onClick={() => { setQ(''); setActive(0); }} aria-label="clear">✕</button>
      </div>
      <div className="search-results" role="listbox">
        <div className="search-group-lbl">{q ? results.length + ' results' : 'Recent'}</div>
        {results.length === 0 ? (
          <div className="search-empty">No matches for <span className="q">{q}</span></div>
        ) : results.map((it, i) => (
          <button
            key={i}
            type="button"
            className={'search-res' + (i === active ? ' active' : '')}
            onMouseEnter={() => setActive(i)}
            onClick={() => choose(it)}
          >
            {it.icon && <span className="search-res-ic">{it.icon}</span>}
            <span className="search-res-main">
              <span className="search-res-title">{mark(it.title, q)}</span>
              {it.meta && <span className="search-res-meta">{it.meta}</span>}
            </span>
            {it.type && <span className="qbadge st-queued">{it.type}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ===== components/ui/Filter.jsx ===== */
/**
 * Filter — search box + multi-select facets combine live over `rows`.
 * rows: [{ icon, title, meta, status, priority }].
 * facets: [{ key, label, options:[{value,label}] }] — each maps to a row field.
 * Active facet chips + clear-all + matched/total count; re-renders the row list.
 */
function Filter({ rows = [], facets = [] }) {
  const [q, setQ] = useState('');
  const [sel, setSel] = useState({}); // { facetKey: [values] }

  const setFacet = (key, values) => setSel((s) => ({ ...s, [key]: values }));
  const clearAll = () => { setSel({}); setQ(''); };

  const active = facets.flatMap((f) => (sel[f.key] || []).map((v) => ({ key: f.key, value: v, label: (f.options.find((o) => o.value === v) || {}).label || v })));

  const matched = useMemo(() => rows.filter((r) => {
    if (q && !(r.title + ' ' + (r.meta || '')).toLowerCase().includes(q.toLowerCase())) return false;
    for (const f of facets) {
      const vals = sel[f.key] || [];
      if (vals.length && !vals.includes(r[f.key])) return false;
    }
    return true;
  }), [rows, q, sel, facets]);

  return (
    <div>
      <div className="filter-bar">
        <div className="search has-text" style={{ maxWidth: 240 }}>
          <div className="search-field">
            <span className="search-ic">🔍</span>
            <input className="search-input" value={q} placeholder="Search items…" onChange={(e) => setQ(e.target.value)} />
          </div>
        </div>
        {facets.map((f) => (
          <MultiSelect key={f.key} label={f.label} options={f.options} values={sel[f.key] || []} onChange={(v) => setFacet(f.key, v)} />
        ))}
      </div>

      <div className="filter-active">
        <span className="filter-active-lbl">Filters</span>
        {active.map((a) => (
          <span key={a.key + a.value} className="pk-tag t-gold">
            {a.label}
            <button type="button" className="x" onClick={() => setFacet(a.key, (sel[a.key] || []).filter((x) => x !== a.value))}>✕</button>
          </span>
        ))}
        {(active.length > 0 || q) && <button type="button" className="filter-clear" onClick={clearAll}>Clear all</button>}
        <span className="filter-count">{matched.length} of {rows.length}</span>
      </div>

      {matched.length === 0 ? (
        <div className="filter-empty">No items match those filters.</div>
      ) : (
        <div className="filter-list">
          {matched.map((r, i) => (
            <div key={i} className="filter-row">
              {r.icon && <span className="filter-row-ic">{r.icon}</span>}
              <div className="filter-row-main">
                <span className="filter-row-title">{r.title}</span>
                {r.meta && <span className="filter-row-meta">{r.meta}</span>}
              </div>
              <div className="filter-row-badges">
                {r.status && <span className={'qbadge st-' + r.status}>{r.status}</span>}
                {r.priority && <span className={'qbadge pr-' + r.priority}>{r.priority}</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ===== components/ui/LoadingPopup.jsx ===== */
const STAGES = [
  [0, 'Connecting…'],
  [35, 'Fetching records…'],
  [70, 'Almost there…'],
  [92, 'Finishing up…'],
];

/**
 * LoadingPopup — centered modal with the pixel-art CEO walk sprite (walks in place),
 * an auto-advancing progress bar, and a status label that cycles by threshold.
 * At 100% the walker stops on frame 0, the fill turns emerald, then onDone() fires.
 * Sprite sheet lives at public/assets/ceo-walk.png (40 frames, 158px cells).
 */
function LoadingPopup({ open, title = 'Loading your workspace', onDone }) {
  const [pct, setPct] = useState(0);

  useEffect(() => {
    if (!open) { setPct(0); return; }
    setPct(0);
    const iv = setInterval(() => {
      setPct((p) => {
        if (p >= 100) { clearInterval(iv); return 100; }
        return Math.min(100, p + Math.random() * 13 + 4);
      });
    }, 360);
    return () => clearInterval(iv);
  }, [open]);

  useEffect(() => {
    if (open && pct >= 100) {
      const t = setTimeout(() => onDone && onDone(), 700);
      return () => clearTimeout(t);
    }
  }, [pct, open, onDone]);

  const done = pct >= 100;
  const label = [...STAGES].reverse().find(([t]) => pct >= t)[1];

  return (
    <div className={'pk-overlay' + (open ? ' open' : '')}>
      <div className="pk-modal load" role="status">
        <div className="load-title">{done ? 'Ready' : title}</div>
        <div className="load-frame">
          <div className={'walker' + (done ? ' done' : '')} />
        </div>
        <div className="load-track"><div className={'load-fill' + (done ? ' done' : '')} style={{ width: pct + '%' }} /></div>
        <div className="load-meta">
          <span className="load-label">{done ? 'Done' : label}</span>
          <span className="load-pct">{Math.round(pct)}%</span>
        </div>
      </div>
    </div>
  );
}

    document.addEventListener('mousedown', onDoc);

          ))}

      </div>
    </div>
  );
}

/* ===== components/ui/Letters3D.jsx ===== */
const TILTS = ['-9deg', '6deg', '-5deg', '8deg', '-7deg', '5deg'];

/**
 * Letters3D — PiKaOs 3D cartoon word. Renders one <span class="ltr"> per glyph.
 * Drops in on mount (staggered), jelly-wobbles on click. Relies on the global
 * `.ltr` recipe in src/styles/styles.css. Covers Latin + Thai via Mitr.
 *
 * props: word (string), drop (bool, default true), dropStep (s), style, className
 */
function Letters3D({ word = 'PiKaOs', drop = true, dropStep = 0.18, className = '', style }) {
  const ref = useRef(null);
  useEffect(() => {
    // ensure drop only runs as the entrance (not on re-render)
  }, []);

  const jelly = (e) => {
    const el = e.currentTarget;
    el.classList.remove('jelly', 'drop');
    void el.offsetWidth; // force reflow → restart animation
    el.classList.add('jelly');
  };

  return (
    <span
      ref={ref}
      className={'pk-letters' + (className ? ' ' + className : '')}
      style={{ display: 'inline-flex', gap: '0.04em', '--drop-step': dropStep + 's', ...style }}
      aria-label={word}
    >
      {word.split('').map((ch, i) => (
        <span
          key={i}
          className={'ltr' + (drop ? ' drop' : '')}
          onClick={jelly}
          style={{ '--i': i, '--tilt': TILTS[i % TILTS.length] }}
        >
          {ch}
        </span>
      ))}
    </span>
  );
}

const LOGO_TILTS = ["-9deg", "6deg", "-5deg", "8deg", "-7deg", "5deg"];
function validateUser(v) {
  const s = (v || "").trim();
  if (!s) return "login.val.userReq";
  if (s.includes("@")) {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(s)) return "login.val.emailBad";
  } else {
    if (s.length < 3) return "login.val.userShort";
    if (!/^[a-zA-Z0-9._-]+$/.test(s)) return "login.val.userChars";
  }
  return "";
}
function validatePw(v) {
  if (!v) return "login.val.pwReq";
  if (v.length < 6) return "login.val.pwShort";
  return "";
}
function LoginErr({ children }) {
  return (
    <span className="lf-error">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.6" />
        <path d="M8 4.5V8.8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" />
        <circle cx="8" cy="11.4" r="0.9" fill="currentColor" />
      </svg>
      {children}
    </span>
  );
}

          onSubmit={isForgot ? submitForgot : submit} noValidate>
          <div className="login-cardhead">
            <h1 className="login-card-title">{isForgot ? t("login.reset.title") : t("login.title")}</h1>

                  onBlur={() => setTouched((s) => ({ ...s, pw: true }))} />

  useEffect(() => {

  // simulate a live agent reply
  useEffect(() => {
    const replies = [

/* ---------------- PIXEL FLOORPLAN (characters walk) ---------------- */
const FLOOR_ROOMS = [
  { th: "ห้องสภา", en: "COUNCIL", x: 5, y: 9, w: 43, h: 40 },
  { th: "คลังความรู้", en: "CODEX VAULT", x: 52, y: 8, w: 43, h: 36 },
  { th: "ลานฝึก", en: "TRAINING YARD", x: 6, y: 54, w: 40, h: 40 },
  { th: "โรงตีเหล็ก", en: "FORGE", x: 52, y: 50, w: 43, h: 44 },
];

function FloorMap({ chars, height = 220, big = false, onAgent }) {
  const [pos, setPos] = useState(() => Object.fromEntries(chars.map(c => [c.id, c.pos || randPos()])));

  // keep a position for every current character
  useEffect(() => {
    setPos(prev => {
      const next = { ...prev };
      chars.forEach(c => { if (!next[c.id]) next[c.id] = c.pos || randPos(); });
      Object.keys(next).forEach(id => { if (!chars.find(c => c.id === id)) delete next[id]; });
      return next;
    });
  }, [chars.map(c => c.id).join(",")]);

  // wander
  useEffect(() => {
    if (!chars.length) return;
    const iv = setInterval(() => {
      setPos(prev => {
        const c = chars[Math.floor(Math.random() * chars.length)];
        if (!c) return prev;
        const cur = prev[c.id] || randPos();
        return { ...prev, [c.id]: {
          x: Math.max(10, Math.min(90, cur.x + (Math.random() * 22 - 11))),
          y: Math.max(14, Math.min(86, cur.y + (Math.random() * 16 - 8))),
        } };
      });
    }, 2400);
    return () => clearInterval(iv);
  }, [chars.length]);

  return (
    <div className="worldmap" style={{ height }}>
      {FLOOR_ROOMS.map(r => (
        <div key={r.en} className="wm-room" style={{ left: r.x + "%", top: r.y + "%", width: r.w + "%", height: r.h + "%" }}>
          <span className="wm-label">{r.th} · {r.en}</span>
        </div>
      ))}
      {chars.length === 0 && (
        <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center" }}>
          <div>
            <div style={{ fontSize: 30, opacity: .5 }}>🏰</div>
            <div className="muted" style={{ fontSize: 13, marginTop: 6 }}>หอคอยยังว่างเปล่า — เรียกนักผจญภัยมาประจำการ</div>
          </div>
        </div>
      )}
      {chars.map(c => {
        const p = pos[c.id] || c.pos || { x: 50, y: 50 };
        return (
          <button key={c.id} className="wm-token" onClick={() => onAgent && onAgent(c)}
            style={{ left: p.x + "%", top: p.y + "%", border: "none", background: "transparent", cursor: onAgent ? "pointer" : "default", padding: 0 }}>
            {window.CharacterSprite ? <CharacterSprite charId={c.characterId} walking={false} h={big ? 52 : 42} style={{ position: "static" }} /> : <PixelSprite char={c} h={big ? 46 : 38} bob style={{ position: "static", transform: "none" }} />}
            <span className="wm-name" style={{ borderColor: c.color }}>{c.name.split(" ")[0]}{big ? " · " + (c.position || c.role || "") : ""}</span>
          </button>
        );
      })}
    </div>
  );
}

const WORKS_LS = "guildos.works.v1";
function loadWorks() { try { return JSON.parse(localStorage.getItem(WORKS_LS) || "[]"); } catch (e) { return []; } }
function saveWorks(w) { try { localStorage.setItem(WORKS_LS, JSON.stringify(w)); } catch (e) { } }
function taskHash(s) { let h = 0; s = String(s || ""); for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; return h; }
function taskTotal(w) { return w.total || 20; }
function taskStep(w) {
  const total = taskTotal(w);
  if (typeof w.step === "number") return Math.max(0, Math.min(w.step, total));
  const st = w.status || "queued";
  if (st === "done") return total;
  if (st === "queued") return 0;
  const base = st === "review" ? 0.78 : 0.5;            // active ≈ half done
  const jitter = (taskHash(w.id) % 18) / 100;           // +0–0.17
  return Math.max(1, Math.round(total * (base + jitter)));
}

/* ---- per-task UUID + room code + auto-generated .md brief ---- */
function genUUID() {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16); });
}
function genTaskCode(roomNo, uuid) { return `GQ-${String(roomNo).padStart(2, "0")}-${uuid.slice(0, 4).toUpperCase()}`; }
function taskMetaBlock({ code, uuid, roomNo, roomName, priority, created, kind }) {

  let dt = ""; try { dt = new Date(created).toLocaleString("th-TH", { dateStyle: "medium", timeStyle: "short" }); } catch (e) { dt = String(created); }
  return `> **Task File:** \`${code}-${kind}.md\`
> **UUID:** \`${uuid}\`
> **ห้อง (Room):** ${roomName || "—"} · #${roomNo}
> **ความสำคัญ:** ${pr}
> **สร้างเมื่อ:** ${dt}`;
}

function taskMdToHtml(md) {
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = s => esc(s).replace(/`([^`]+)`/g, "<code>$1</code>").replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  const lines = md.split("\n"); let html = "", inUl = false, inOl = false;
  const close = () => { if (inUl) { html += "</ul>"; inUl = false; } if (inOl) { html += "</ol>"; inOl = false; } };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, ""); let m;
    if (/^### /.test(line)) { close(); html += "<h3>" + inline(line.slice(4)) + "</h3>"; continue; }
    if (/^## /.test(line)) { close(); html += "<h2>" + inline(line.slice(3)) + "</h2>"; continue; }
    if (/^# /.test(line)) { close(); html += "<h1>" + inline(line.slice(2)) + "</h1>"; continue; }
    if (/^> /.test(line)) { close(); html += "<blockquote>" + inline(line.slice(2)) + "</blockquote>"; continue; }
    if (m = line.match(/^(\d+)\.\s+(.*)/)) { if (!inOl) { close(); html += "<ol>"; inOl = true; } html += "<li>" + inline(m[2]) + "</li>"; continue; }
    if (m = line.match(/^[-*]\s+(.*)/)) { if (!inUl) { close(); html += "<ul>"; inUl = true; } const t = m[1].replace(/^\[ \]\s*/, "☐ ").replace(/^\[[xX]\]\s*/, "☑ "); html += "<li>" + inline(t) + "</li>"; continue; }
    if (line.trim() === "") { close(); continue; }
    close(); html += "<p>" + inline(line) + "</p>";
  }
  close(); return html;
}

/* semantic concept map: lets near-meaning queries still find the right docs */
const RECALL_CONCEPTS = [
  ["security", ["token", "auth", "login", "เข้าสู่ระบบ", "ความปลอดภัย", "รั่ว", "refresh", "ปลอดภัย", "credential"]],
  ["rag",      ["retrieval", "ค้นหา", "ค้นคืน", "vector", "embedding", "hybrid", "rerank", "semantic", "ความหมาย"]],
  ["test",     ["test", "ทดสอบ", "qa", "คุณภาพ", "bug", "บั๊ก", "regression", "edge case"]],
  ["onboard",  ["onboarding", "เริ่มต้น", "นักผจญภัยใหม่", "สมาชิกใหม่", "เข้าร่วม", "มือใหม่"]],
  ["deps",     ["dependency", "อัปเดต", "ช่องโหว่", "เวอร์ชัน", "package", "ล้าสมัย", "vulnerab"]],
];
function recallDocText(d) { return (d.title + " " + (KBODY[d.id] || d.body || "") + " " + (d.tags || []).join(" ")); }
function recallScore(doc, query) {
  const q = query.toLowerCase().trim();
  const title = (doc.title || "").toLowerCase();
  const text = recallDocText(doc).toLowerCase();
  let score = 0, hits = 0;
  if (q && title.includes(q)) score += 5;
  else if (q && text.includes(q)) score += 3;
  const words = q.split(/[\s,?.!“”"’'()/]+/).filter(w => w.length >= 2);
  for (const w of words) {
    if (title.includes(w)) { score += 2; hits++; }
    else if (text.includes(w)) { score += 1; hits++; }
  }
  for (const t of (doc.tags || [])) if (q.includes(t.toLowerCase())) score += 1.5;
  for (const [, terms] of RECALL_CONCEPTS) {
    const qHit = terms.some(t => q.includes(t.toLowerCase()));
    const dHit = terms.some(t => text.includes(t.toLowerCase()));
    if (qHit && dHit) { score += 1.4; hits++; }
  }
  return { score, hits, words };
}
function recallSnippet(doc, words) {
  const body = KBODY[doc.id] || doc.body || doc.title || "";
  const lower = body.toLowerCase();
  let idx = -1;
  for (const w of words) { const i = lower.indexOf(w); if (i !== -1 && (idx === -1 || i < idx)) idx = i; }
  const start = idx > 50 ? idx - 40 : 0;
  let snip = body.slice(start, start + 170);
  if (start > 0) snip = "…" + snip;
  if (start + 170 < body.length) snip = snip + "…";
  return snip;
}
function recallHighlight(text, words) {
  const terms = words.filter(w => w.length >= 2);
  if (!terms.length) return text;
  const esc = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
  const re = new RegExp("(" + esc.join("|") + ")", "gi");
  const lowerTerms = terms.map(t => t.toLowerCase());
  return text.split(re).map((p, i) =>
    lowerTerms.includes(p.toLowerCase())
      ? <mark key={i} className="hl">{p}</mark>
      : <React.Fragment key={i}>{p}</React.Fragment>);
}

/* mock GET /recall?q=&type= — hybrid retrieval → ranked documents (§6.2 contract) */
function recallSearch(all, query, typeFilter) {
  const ranked = all
    .filter(d => !typeFilter || typeFilter === "all" || d.type === typeFilter)
    .map(d => { const s = recallScore(d, query); return { doc: d, ...s }; })
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6);
  const top = ranked[0] ? ranked[0].score : 1;
  ranked.forEach(r => { r.sim = Math.min(0.97, 0.5 + 0.45 * (r.score / top)); r.matched = Math.max(1, r.hits); });
  return ranked;
}

/* mock POST /ask — answer grounded in retrieved docs, cited inline [n] (§6.3 contract).
   Uses the real model when available, else a deterministic context-grounded reply. */
async function askHermes(query, ranked, lang) {
  const T = (en, th) => lang === "en" ? en : th;
  const context = ranked.map((r, i) => `[${i + 1}] ${r.doc.title}: ${KBODY[r.doc.id] || r.doc.body || ""}`).join("\n");
  try {
    if (ranked.length && window.claude && window.claude.complete) {
      const langLine = lang === "en"
        ? "Answer in English, concise (max 4 sentences). Cite sources inline like [1], [2] referring to the numbered context."
        : "ตอบเป็นภาษาไทยกระชับ ไม่เกิน 4 ประโยค อ้างอิงแหล่งแบบ [1], [2] ตามหมายเลขบริบทที่ให้";
      const sys = "You are HERMES, the guild librarian. Only use the provided context. If nothing matches, say so. " + langLine + "\n\nContext:\n" + context;
      const reply = await window.claude.complete(sys + "\n\nQuestion: " + query);
      if (reply && reply.trim()) return reply.trim();
    }
  } catch (e) { /* fall through to deterministic reply */ }
  if (!ranked.length) return T("I couldn't find anything matching in the codex. Try different words, or add a note first.", "ไม่พบเอกสารที่ตรงในคลังความรู้ ลองใช้คำอื่น หรือเพิ่มบันทึกก่อน");
  const b0 = KBODY[ranked[0].doc.id] || ranked[0].doc.body || "";
  const b1 = ranked[1] ? (KBODY[ranked[1].doc.id] || ranked[1].doc.body || "") : "";
  return T(
    `Based on the codex, the most relevant source is “${ranked[0].doc.title}” [1]. ${b0}${b1 ? ` This aligns with “${ranked[1].doc.title}” [2].` : ""}`,
    `จากคลังความรู้ แหล่งที่เกี่ยวข้องที่สุดคือ “${ranked[0].doc.title}” [1] · ${b0}${b1 ? ` และสอดคล้องกับ “${ranked[1].doc.title}” [2]` : ""}`
  );
}

/* answer text with clickable inline [n] citations that jump back to the source doc */
function AnswerBody({ text, results, onCite, streaming }) {
  const parts = (text || "").split(/(\[\d+\])/g);
  return (
    <span>
      {parts.map((p, i) => {
        const m = p.match(/^\[(\d+)\]$/);
        if (m) {
          const r = results && results[+m[1] - 1];
          if (r) return <button key={i} className="cite-inline" onClick={() => onCite(r.doc)} title={r.doc.title}>{m[1]}</button>;
        }
        return <React.Fragment key={i}>{p}</React.Fragment>;
      })}
      {streaming && <span className="stream-caret" />}
    </span>
  );
}

function Recall({ lang }) {
  const T = (en, th) => lang === "en" ? en : th;
  const [q, setQ] = useState("");
  const [results, setResults] = useState(null);   // null | [] | [{doc,sim,...}]
  const [answer, setAnswer] = useState("");       // progressively built while streaming
  const [phase, setPhase] = useState("idle");     // idle | retrieving | streaming | done
  const [docType, setDocType] = useState("all");
  const [sel, setSel] = useState(null);
  const runRef = useRef(0);
  const extra = (typeof loadCodex === "function") ? loadCodex() : [];
  const all = [...extra, ...KNOWLEDGE];
  const busy = phase === "retrieving" || phase === "streaming";

  const ask = async (text, typeOverride) => {
    const query = (text ?? q).trim();
    if (!query || busy) return;
    const type = typeOverride ?? docType;
    const run = ++runRef.current;
    setQ(query); setAnswer(""); setResults(null); setPhase("retrieving");

    // ---- GET /recall?q=&type= : hybrid retrieval (keyword + meaning), ranked ----
    await new Promise(r => setTimeout(r, 460));            // simulate retrieval latency
    if (run !== runRef.current) return;
    const ranked = recallSearch(all, query, type);
    setResults(ranked);

    // ---- POST /ask : answer grounded in retrieved docs ----
    const full = await askHermes(query, ranked, lang);
    if (run !== runRef.current) return;

    // ---- stream the answer token-by-token ----
    setPhase("streaming");
    const toks = full.split(/(\s+)/);
    let acc = "";
    for (let i = 0; i < toks.length; i++) {
      if (run !== runRef.current) return;
      acc += toks[i];
      setAnswer(acc);
      if (toks[i].trim()) await new Promise(r => setTimeout(r, 20));
    }
    if (run !== runRef.current) return;
    setPhase("done");
  };

  const suggestions = [
    T("How did we decide on refresh tokens?", "เราตัดสินใจเรื่อง refresh token อย่างไร?"),
    T("Which retrieval approach did we pick?", "เราเลือก retrieval แบบไหน?"),
    T("What are our testing standards?", "มาตรฐานการเขียน test ของเรา"),
  ];
  const typeTabs = [["all", T("all types", "ทุกประเภท")], ...KTYPE_OPTS.map(t => [t, T(KTYPE_EN[t], KTYPE_TH[t])])];

  return (
    <div className="content-pad fade-in">
      <PageHead kicker={T("Knowledge · Recall", "ความรู้ · Recall")} title={T("Recall", "ค้นหาความรู้")} tag="live"
        desc={T("Ask the guild's knowledge base in plain language — HERMES retrieves the most relevant documents and answers with citations.",
                "ถามคลังความรู้ด้วยภาษาธรรมดา — HERMES จะค้นเอกสารที่เกี่ยวข้องที่สุดแล้วตอบพร้อมอ้างอิง")} />
      <HelpNote tag="live">{T("It runs a hybrid search over your Codex notes (keyword + meaning), then synthesizes an answer. Click any [number] in the answer to jump to its source document.",
        "ระบบค้นแบบ hybrid จากบันทึกในหน้า Codex (คำสำคัญ + ความหมาย) แล้วสรุปคำตอบ · กดเลข [n] ในคำตอบเพื่อไปยังเอกสารต้นทาง")}</HelpNote>

      <div className="search-bar" style={{ margin: "16px 0 12px", padding: "14px 18px" }}>
        <span style={{ fontSize: 16 }}>🔮</span>
        <input value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === "Enter" && ask()}
          placeholder={T("Ask anything about the guild's knowledge…", "ถามอะไรก็ได้เกี่ยวกับคลังความรู้…")} />
        <Btn kind="gold" sm onClick={() => ask()}>{T("Search", "สืบค้น")}</Btn>
      </div>

      <div className="recall-filters" style={{ marginBottom: 14 }}>
        <span className="mono faint" style={{ fontSize: 11 }}>{T("filter", "กรอง")}</span>
        {typeTabs.map(([k, label]) => (
          <button key={k} className={`tab-pill ${docType === k ? "on" : ""}`}
            onClick={() => { setDocType(k); if (results || busy) ask(q, k); }}>{label}</button>
        ))}
      </div>

      {!results && !busy && (
        <div className="grid cols-3" style={{ marginBottom: 18 }}>
          {suggestions.map((s, i) => (
            <button key={i} className="codex-row" style={{ justifyContent: "flex-start" }} onClick={() => ask(s)}>
              <span className="codex-type">💡</span>
              <div className="codex-main"><div className="codex-title" style={{ fontSize: 13 }}>{s}</div><div className="codex-meta">{T("suggested question", "คำถามแนะนำ")}</div></div>
            </button>
          ))}
        </div>
      )}

      <div className="grid" style={{ gridTemplateColumns: "1fr 360px", gap: 16, alignItems: "start" }}>
        {/* ---- answer + citations ---- */}
        <Panel title={T("HERMES answer", "คำตอบจาก HERMES")} en="SYNTHESIS" icon="⚜" right={<FeatureTag kind="live" />}>
          {phase === "retrieving" ? (
            <div className="row" style={{ gap: 10, color: "var(--ink-2)" }}>
              <span className="typing-bubble" style={{ display: "inline-flex" }}><span /><span /><span /></span>
              {T("HERMES is retrieving and reading the codex…", "HERMES กำลังค้นและอ่านคลังความรู้…")}
            </div>
          ) : (phase === "streaming" || phase === "done") ? (
            <div style={{ fontSize: 14, lineHeight: 1.8, color: "var(--ink)" }}>
              <div className="row" style={{ gap: 9, marginBottom: 10 }}><span className="wchat-crest">⚜</span><span className="mono gold-text" style={{ fontSize: 12 }}>HERMES</span></div>
              <AnswerBody text={answer} results={results} onCite={setSel} streaming={phase === "streaming"} />
              {phase === "done" && results && results.length > 0 && (
                <div className="citations">
                  <div className="cite-label mono">{T("Sources", "แหล่งอ้างอิง")}</div>
                  <div className="cite-chips">
                    {results.map((r, i) => (
                      <button key={r.doc.id} className="cite-chip" onClick={() => setSel(r.doc)} title={r.doc.title}>
                        <span className="cite-num">{i + 1}</span>
                        <span className="cite-title">{r.doc.title}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ) : (
            <Empty icon="🔮" title={T("No query yet", "ยังไม่มีการสืบค้น")} sub={T("Ask a question above to search the codex", "พิมพ์คำถามด้านบนเพื่อค้นคลังความรู้")} />
          )}
        </Panel>

        {/* ---- retrieved documents ---- */}
        <Panel title={T("Documents found", "เอกสารที่เจอ")} en="RETRIEVAL" icon="🔍" bodyPad={false}
          right={results ? <span className="mono faint" style={{ fontSize: 11 }}>{results.length}</span> : null}>
          <div style={{ padding: 8 }}>
            {!results && busy ? (
              <div className="muted" style={{ fontSize: 13, padding: "10px 8px" }}>{T("ranking documents…", "กำลังจัดอันดับเอกสาร…")}</div>
            ) : !results ? (
              <div className="muted" style={{ fontSize: 12.5, padding: "10px 8px", lineHeight: 1.6 }}>{T("Results appear here, ranked by relevance — keyword and meaning combined.", "ผลลัพธ์จะแสดงที่นี่ เรียงตามความเกี่ยวข้อง (คำสำคัญ + ความหมาย)")}</div>
            ) : results.length === 0 ? (
              <Empty icon="🔍" title={T("No strong matches", "ไม่พบที่ตรงพอ")} sub={T("Try different words, or add a note to the Codex", "ลองคำอื่น หรือเพิ่มบันทึกในคลัง")} />
            ) : (
              <div className="col" style={{ gap: 8 }}>
                {results.map((r, i) => <RecallResult key={r.doc.id} rank={i + 1} r={r} T={T} onOpen={setSel} />)}
              </div>
            )}
          </div>
        </Panel>
      </div>

      {sel && <CodexDrawer k={sel} onClose={() => setSel(null)} />}
    </div>
  );
}

function ApiConnections({ t, bare }) {
  const [keys, setKeys] = useState(() => (window.loadApiKeys ? loadApiKeys() : []));
  const [name, setName] = useState("");
  const [provider, setProvider] = useState(API_PROVIDERS[0].key);
  const [secret, setSecret] = useState("");
  useEffect(() => { saveApiKeys(keys); }, [keys]);
  const add = () => {
    const n = name.trim(); if (!n || !secret.trim()) return;
    setKeys(prev => [...prev, { id: "api" + Date.now().toString(36), name: n, provider, key: secret.trim() }]);
    setName(""); setSecret("");
  };
  const remove = (id) => setKeys(prev => prev.filter(k => k.id !== id));
  return (
    <Panel title={bare ? null : t("api.title")} en={bare ? null : "API CONNECTIONS"} icon={bare ? null : "🔌"} right={bare ? null : <span className="mono faint" style={{ fontSize: 11 }}>{t("api.count", { n: keys.length })}</span>}>
      <div className="muted" style={{ fontSize: 12.5, marginBottom: 12, lineHeight: 1.6 }}>{t("api.desc")}</div>
      {keys.length > 0 && (
        <div className="api-list">
          {keys.map(k => (
            <div key={k.id} className="api-row">
              <span className="api-ic">🔑</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="api-name">{k.name}</div>
                <div className="mono faint" style={{ fontSize: 11 }}>{(API_PROVIDERS.find(p => p.key === k.provider) || {}).label || k.provider} · {maskKey(k.key)}</div>
              </div>
              <button className="api-del" title={t("api.del")} onClick={() => remove(k.id)}>🗑</button>
            </div>
          ))}
        </div>
      )}
      <div className="api-add">
        <input className="bf-input" placeholder={t("api.namePh")} value={name} onChange={e => setName(e.target.value)} />
        <div className="api-add-row">
          <Select value={provider} onChange={setProvider} minWidth={150}
            options={API_PROVIDERS.map(p => ({ value: p.key, label: p.label }))} />
          <input className="bf-input" type="password" placeholder={t("api.secretPh")} value={secret} onChange={e => setSecret(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
          <Btn kind="gold" sm icon="➕" onClick={add}>{t("common.add")}</Btn>
        </div>
      </div>
    </Panel>
  );
}

/* ---------------- character sprite (animated idle / walk sheets) ---------------- */
let _wt = (k) => k;
const wt = (k, v) => _wt(k, v);
function CharacterSprite({ charId, walking, h = 40, flip = false, style }) {
  const set = charSetById(charId) || { idleUrl: "public/assets/ceo-idle.png", walkUrl: "public/assets/ceo-walk.png", fw: 158, fh: 356, n: 40 };
  const n = set.n || 40;
  const dispW = Math.round(h * set.fw / set.fh);
  const url = walking ? (set.walkUrl || set.idleUrl) : set.idleUrl;
  return (
    <div className="ceo-sprite" aria-hidden="true"
      style={{ width: dispW, height: Math.round(h),
        backgroundImage: `url("${url}")`,
        backgroundSize: `calc(${dispW}px * ${n}) 100%`,
        backgroundPositionX: `calc(var(--f, 0) * ${dispW}px * -1)`,
        transform: flip ? "scaleX(-1)" : "none", ...style }} />
  );
}

/* ---- CEO summary (combined chat) + per-room chat helpers ---- */
function _agentLine(c) {
  const actKey = ((typeof ROLE_ACTS !== "undefined" && ROLE_ACTS[c.classKey]) || ["thinking"])[0];
  const act = (typeof ACTS !== "undefined" && ACTS[actKey]) || { th: "กำลังคิด" };
  const left = QUESTS.filter(q => q.party.includes(c.id) && q.status !== "done").reduce((s, q) => s + Math.max(0, (q.steps || 0) - (q.stepDone || 0)), 0);
  return `${c.name.split(" ")[0]} (${act.th}${left ? `, เหลือ ${left} งาน` : ""})`;
}
function ceoContext(rooms, chars) {
  const lines = rooms.map((r, i) => {
    const mem = roomAgents(r, i, rooms, chars);
    const tok = mem.reduce((s, c) => s + (c.mana || 0), 0);
    return `ห้อง ${r.name}: ${mem.length} คน, token ${tok}. ${mem.slice(0, 4).map(_agentLine).join("; ") || "ว่าง"}`;
  });
  return `คุณคือ CEO ของระบบ มีหน้าที่สรุปภาพรวมว่าแต่ละห้องทำอะไร ถึงไหนแล้ว ใช้ token เท่าไร ตอบไทยสั้นกระชับ.\n${lines.join("\n")}`;
}
function ceoReply(p, rooms, chars) {
  const q = p.toLowerCase();
  const busy = chars.filter(c => c.status === "busy" || c.status === "on").length;
  const tok = chars.reduce((s, c) => s + (c.mana || 0), 0);
  if (/(token|โทเคน|ใช้ไป|ต้นทุน|งบ)/.test(q)) {
    const per = rooms.map((r, i) => `${r.name} ${roomAgents(r, i, rooms, chars).reduce((s, c) => s + (c.mana || 0), 0)}`).join(" · ");
    return `รวมใช้ ~${tok} token ครับ แยกตามห้อง: ${per}`;
  }
  if (/(ใคร|who|ห้องไหน)/.test(q))
    return rooms.map((r, i) => `${r.name}: ${roomAgents(r, i, rooms, chars).map(c => c.name.split(" ")[0]).join(", ") || "—"}`).join(" | ");
  return `รายงานภาพรวมครับ: ${rooms.length} ห้อง · ${chars.length} เอเจนต์ (กำลังทำงาน ${busy}). ` +
    rooms.map((r, i) => { const m = roomAgents(r, i, rooms, chars); return `${r.name} ${m.length} คน${m.length ? " — " + _agentLine(m[0]) : ""}`; }).join(" · ");
}
function roomReply(p, room, roomChars) {
  if (!roomChars.length) return `ห้อง ${room.name} ยังไม่มีเอเจนต์ครับ — กด ‘✨ สร้างเอเจนต์’ เพื่อเพิ่ม`;
  const named = roomChars.find(c => p.includes(c.name.split(" ")[0]));
  if (named) return `${named.name}: ${_agentLine(named)} — งานปัจจุบัน “${named.task}”`;
  const q = p.toLowerCase();
  if (/(ใคร|who|มีใคร)/.test(q)) return `ห้องนี้มี: ${roomChars.map(c => c.name).join(", ")}`;
  if (/(ทำอะไร|งาน|ยุ่ง|สถานะ|activity)/.test(q)) return roomChars.map(_agentLine).join(" · ");
  return `ถามทีมในห้อง ${room.name} ได้เลยครับ เช่น “ใครทำอะไรอยู่” หรือเอ่ยชื่อสมาชิกเพื่อถามรายตัว`;
}

function RoomChat({ room, roomChars }) {
  const greet = { who: "ai", text: `ถามทีมในห้อง “${room.name}” ได้เลยครับ — เอ่ยชื่อสมาชิกเพื่อถามรายตัว หรือเลือกหัวข้อด้านล่าง`, choices: ["ใครทำอะไรอยู่", "สรุปคิวงาน", "สถานะล่าสุด", "📎 ขอส่งไฟล์ให้ทีม"] };
  const [msgs, setMsgs] = useState([greet]);
  const [draft, setDraft] = useState(""); const [busy, setBusy] = useState(false);
  const [atts, setAtts] = useState([]); const [menu, setMenu] = useState(false);
  const sc = useRef(null), fileRef = useRef(null), imgRef = useRef(null), reqRef = useRef(null);
  const followups = ["ใครทำอะไรอยู่", "สรุปคิวงาน", "📎 ขอส่งไฟล์ให้ทีม"];
  useEffect(() => { if (sc.current) sc.current.scrollTop = sc.current.scrollHeight; }, [msgs, busy, atts]);
  const readFile = (file, kind) => new Promise(res => { const rd = new FileReader(); rd.onload = () => res({ id: Date.now() + "_" + Math.random().toString(36).slice(2), kind, name: file.name, size: file.size, dataUrl: rd.result }); rd.readAsDataURL(file); });
  const pickFiles = async (e, kind) => { const files = [...e.target.files]; e.target.value = ""; for (const f of files) { const a = await readFile(f, kind); setAtts(p => [...p, a]); } setMenu(false); };
  const send = async (text, extraAtts) => {
    const t = (text ?? draft).trim(); const sendAtts = extraAtts || atts;
    if ((!t && sendAtts.length === 0) || busy) return;
    setMsgs(m => [...m, { who: "me", text: t, attachments: sendAtts }]);
    setDraft(""); setAtts([]); setMenu(false); setBusy(true);
    if (!sendAtts.length && /ขอส่งไฟล์|ส่งไฟล์ให้ทีม|อัปโหลด|แนบไฟล์ให้/.test(t)) {
      await new Promise(r => setTimeout(r, 450));
      setMsgs(m => [...m, { who: "ai", text: "ได้เลยครับ — แนบไฟล์หรือรูปที่อยากให้ทีมช่วยดู ผมจะให้ Agent อ่านและสรุปให้", request: "any" }]);
      setBusy(false); return;
    }
    if (sendAtts.length) {
      await new Promise(r => setTimeout(r, 600));
      const names = sendAtts.map(a => a.name).join(", ");
      setMsgs(m => [...m, { who: "ai", text: `รับไฟล์ “${names}” แล้วครับ — ให้ Agent ในห้องช่วยวิเคราะห์และสรุปผล จากนั้นจะส่งออกเป็นไฟล์ในแท็บ ‘ไฟล์ส่งออก’`, choices: followups }]);
      setBusy(false); return;
    }
    let reply = "";
    try { if (window.claude && window.claude.complete) { const sys = `คุณเป็นผู้ช่วยรายงานสถานะของทีมในห้อง ${room.name}. สมาชิก: ${roomChars.map(_agentLine).join("; ") || "ว่าง"}. ตอบไทยสั้นกระชับ`; reply = await window.claude.complete(sys + "\n\nคำถาม: " + t); } } catch (e) { reply = ""; }
    if (!reply || !reply.trim()) reply = roomReply(t, room, roomChars);
    setMsgs(m => [...m, { who: "ai", text: reply.trim(), choices: followups }]);
    setBusy(false);
  };
  const onAiUpload = async (e) => { const files = [...e.target.files]; e.target.value = ""; const list = []; for (const f of files) list.push(await readFile(f, f.type.startsWith("image") ? "image" : "file")); send("", list); };
  return (
    <div className="ra-chat">
      <div className="ra-scroll" ref={sc}>
        {msgs.map((m, i) => (
          <div key={i} className={`rc-msg ${m.who}`}>
            <div className={`wbubble ${m.who}`}>{m.who === "ai" && <span className="wbubble-ic">🤖</span>}<span className="wbubble-txt">{m.text}</span></div>
            {m.attachments && m.attachments.length > 0 && (
              <div className="wb-atts">{m.attachments.map(a => a.kind === "image"
                ? <img key={a.id} className="wb-att-img" src={a.dataUrl} alt={a.name} title={a.name} />
                : <span key={a.id} className="wb-att">📎 {a.name}</span>)}</div>
            )}
            {m.request && (
              <div className="rc-req">
                <button className="rc-reqbtn" onClick={() => reqRef.current && reqRef.current.click()}>⬆ เลือกไฟล์/รูปเพื่อส่งให้ทีม</button>
                <input ref={reqRef} type="file" multiple style={{ display: "none" }} onChange={onAiUpload} />
              </div>

/* ---------------- living agents ---------------- */
function useLivingAgents(room, active, chars) {
  const stateRef = useRef({ agents: [], claimed: new Set() });
  const roomRef = useRef(room); roomRef.current = room;
  const aliveRef = useRef(true);
  useEffect(() => () => { aliveRef.current = false; }, []);
  const [, force] = React.useReducer(x => x + 1, 0);
  const sig = chars.map(c => c.id).join(",");
  useEffect(() => {
    const g = buildGrid(room);
    stateRef.current.claimed = new Set();
    stateRef.current.agents = chars.map(c => { const s = randomWalkable(g, room.w, room.h) || [1, 1]; return { id: c.id, char: c, cx: s[0], cy: s[1], path: [], sitUntil: 0, seat: null, goalSeat: null, warp: null, activity: "walking", actUntil: 0, bubble: null, subs: [], face: 0 }; });
    force();
  }, [room.id, sig]);
  useEffect(() => {
    if (!active) return;
    const iv = setInterval(() => {
      const rm = roomRef.current, w = rm.w, h = rm.h;
      const g = buildGrid(rm); const seats = seatCells(rm); const st = stateRef.current; const now = Date.now();
      st.agents.forEach(a => {
        if (a.warp) return;                               // mid-teleport
        // ----- seated & working: drive the live activity -----
        if (a.seat && a.sitUntil > now) {
          if (now >= a.actUntil) advanceActivity(a, now);
          tickSubs(a, now);
          return;
        }
        // seat session ended → stand up
        if (a.seat) { st.claimed.delete(a.seat.x + "," + a.seat.y); a.seat = null; a.activity = "walking"; a.bubble = null; a.subs = []; }
        if (a.path.length) { const [nx, ny] = a.path.shift(); if (nx < a.cx) a.face = 1; else if (nx > a.cx) a.face = 0; a.cx = nx; a.cy = ny; a.activity = "walking"; a.bubble = null; return; }
        // GOING TO WORK → warp straight to the seat (ignores walls)
        if (Math.random() < 0.6 && seats.length) {
          const free = seats.filter(s => !st.claimed.has(s.x + "," + s.y) && g[idx(s.x, s.y, w)]);
          if (free.length) {
            const s = free[(Math.random() * free.length) | 0];

            }, 300);

      )}

      )}

      <svg className="rc-links" viewBox={`0 0 ${room.w} ${room.h}`} preserveAspectRatio="none">
        {agents.flatMap(a => (a.subs || []).map(s => (
          <line key={s.id} x1={a.cx + 0.5} y1={a.cy + 0.2} x2={a.cx + 0.5 + s.dx} y2={a.cy + 0.45 + s.dy} />

              : (a.seat && !a.warp && act && act.cls ? <span className="rc-actchip">{act.icon}</span> : null)}

            <span className="rc-agent-status" data-s={a.char.status} />

          </button>

        || (r.objects || []).find(o => objCells(o).some(([cx, cy]) => cx === x && cy === y));

            <button className="btn btn-danger btn-sm" onClick={resetDefault} title={wt("world.resetTitle")} style={{ display: canReset ? "" : "none" }}>{wt("world.reset")}</button>
          </div>
        )}
        <button className={`btn btn-ghost btn-sm btn-icon ${soundOn ? "rv-sound-on" : ""}`} onClick={toggleSound} title={wt("world.soundTitle")}>{soundOn ? "🔔" : "🔕"}</button>
        {canCreate && <button className="btn btn-gold btn-sm" onClick={() => onSpawn && onSpawn()} title={wt("world.spawnTitle")}>{wt("world.spawnAgent")}</button>}
        <span className="live-badge"><span className="pulse-dot" />🎭 {chars.length}</span>
        {canTemplate && <button className="btn btn-ghost btn-sm" onClick={() => onSaveTemplate && onSaveTemplate()} title={wt("world.saveTplTitle")}>{wt("world.saveTpl")}</button>}
        {canBuild

/* ---- inline rich Body input — same tiptap system as DocEditor, drops into forms ---- */
function RichBody({ value, onChange, placeholder, minHeight = 110 }) {
  const elRef = useRef(null), faRef = useRef(null), edRef = useRef(null), cbRef = useRef(onChange);
  cbRef.current = onChange;
  const [mode, setMode] = useState("loading");
  useEffect(() => {
    let dead = false, ed;
    const initial = (value || "").trim();
    const initialHtml = /</.test(initial) ? initial
      : initial.split(/\n\n+/).filter(Boolean).map(p => "<p>" + p.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/\n/g, "<br>") + "</p>").join("");
    loadTiptap().then(({ Editor, StarterKit }) => {
      if (dead || !elRef.current) return;
      ed = new Editor({ element: elRef.current, extensions: [StarterKit], content: initialHtml,
        onUpdate: ({ editor }) => cbRef.current && cbRef.current(editor.getText(), editor.getHTML()) });
      edRef.current = ed; setMode("tiptap");
    }).catch(() => { if (dead) return; if (faRef.current) faRef.current.innerHTML = initialHtml; setMode("fallback"); });
    return () => { dead = true; if (ed) ed.destroy(); };
  }, []);
  const emitFallback = () => { if (faRef.current && cbRef.current) cbRef.current(faRef.current.innerText, faRef.current.innerHTML); };
  const cmd = (name) => {
    if (mode === "tiptap" && edRef.current) {
      const c = edRef.current.chain().focus();
      ({ bold: () => c.toggleBold(), italic: () => c.toggleItalic(), h1: () => c.toggleHeading({ level: 1 }), h2: () => c.toggleHeading({ level: 2 }), ul: () => c.toggleBulletList(), ol: () => c.toggleOrderedList(), code: () => c.toggleCodeBlock() }[name])().run();
    } else if (faRef.current) {
      faRef.current.focus();
      const map = { bold: ["bold"], italic: ["italic"], h1: ["formatBlock", "<h1>"], h2: ["formatBlock", "<h2>"], ul: ["insertUnorderedList"], ol: ["insertOrderedList"], code: ["formatBlock", "<pre>"] };
      const [c, a] = map[name]; document.execCommand(c, false, a); emitFallback();
    }
  };
  return (
    <div className="richbody">
      <div className="rb-tools">
        <button type="button" title="ตัวหนา" onClick={() => cmd("bold")}><b>B</b></button>
        <button type="button" title="ตัวเอียง" onClick={() => cmd("italic")}><i>I</i></button>
        <button type="button" onClick={() => cmd("h1")}>H1</button>
        <button type="button" onClick={() => cmd("h2")}>H2</button>
        <button type="button" onClick={() => cmd("ul")}>• รายการ</button>
        <button type="button" onClick={() => cmd("ol")}>1. รายการ</button>
        <button type="button" onClick={() => cmd("code")}>{"</>"}</button>
      </div>
      <div className="rb-edit-wrap" style={{ minHeight }}>
        {mode === "loading" && <div className="rb-loading mono faint">กำลังโหลดตัวแก้ไข…</div>}
        <div ref={elRef} className="rb-editor" data-placeholder={placeholder || ""} style={{ display: mode === "tiptap" ? "block" : "none" }} />
        <div ref={faRef} className="rb-editor" contentEditable={mode === "fallback"} suppressContentEditableWarning onInput={emitFallback} data-placeholder={placeholder || ""} style={{ display: mode === "fallback" ? "block" : "none" }} />
      </div>
    </div>
  );
}

/* ---------------- OVERVIEW dashboard (per-room) ---------------- */
function OverviewTab({ rooms, chars, onOpen, query }) {
  const q = (query || "").trim().toLowerCase();
  const shown = rooms.map((r, i) => ({ r, i })).filter(({ r, i }) => {
    if (!q) return true;
    if (r.name.toLowerCase().includes(q)) return true;
    return roomAgents(r, i, rooms, chars).some(c => c.name.toLowerCase().includes(q));
  });
  return (
    <div className="ov-grid">
      {shown.map(({ r, i }) => {
        const members = roomAgents(r, i, rooms, chars);
        const active = members.filter(c => c.status === "on" || c.status === "busy").length;
        const tokens = members.reduce((s, c) => s + (c.mana || 0), 0);
        return (
          <div key={r.id} className="ov-card" onClick={() => onOpen(r.id)}>
            <div className="ov-head">
              <div className="ov-thumb"><RoomThumb room={r} /></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="ov-name">{r.name}</div>
                <div className="ov-stats mono">
                  <span>👥 {members.length}</span>
                  <span className="ov-active">🟢 {wt("world.ovActive", { n: active })}</span>
                  <span>🔵 {fmtTok(tokens)} token</span>
                </div>
              </div>
              <span className="ov-enter">{wt("world.enterRoom")}</span>
            </div>
            <div className="ov-agents">
              {members.length === 0 ? <div className="muted" style={{ fontSize: 12, padding: "6px 2px" }}>{wt("world.ovNoAgent")}</div> :
                members.slice(0, 5).map(c => {
                  const actKey = ((typeof ROLE_ACTS !== "undefined" && ROLE_ACTS[c.classKey]) || ["thinking"])[0];
                  const act = (typeof ACTS !== "undefined" && ACTS[actKey]) || { icon: "💭", th: "กำลังคิด" };
                  const quests = QUESTS.filter(q => q.party.includes(c.id) && q.status !== "done");
                  const left = quests.reduce((s, q) => s + Math.max(0, (q.steps || 0) - (q.stepDone || 0)), 0);
                  return (
                    <div key={c.id} className="ov-agent">
                      <span className="ov-dot" data-s={c.status} />
                      <span className="ov-aname">{c.name.split(" ")[0]}</span>
                      <span className="ov-act">{act.icon} {act.th}</span>
                      <span className="ov-task" title={c.task}>{c.task}</span>
                      <span className="ov-left mono">{left > 0 ? wt("world.ovLeft", { n: left }) : wt("world.ovIdle")}</span>
                    </div>
                  );
                })}
              {members.length > 5 && <div className="muted" style={{ fontSize: 11, paddingLeft: 2 }}>{wt("world.ovMore", { n: members.length - 5 })}</div>}
            </div>
          </div>
        );
      })}
      {shown.length === 0 && <div className="room-empty muted">{wt("world.ovNoMatch")}</div>}
    </div>
  );
}

        </div>
      )}
    </div>
      {doc && <DocEditor docId={doc.id} title={doc.title} seed={doc.seed} onClose={() => setDoc(null)} />}
    </>
  );
}

function RoleBadge({ roleKey, roles, T }) {
  const r = roleByKey(roles, roleKey);
  return <span className={`badge ${r.color}`} data-no-lex>{T(r.en, r.th)}</span>;
}

function StatusPill({ status, T }) {
  const on = status === "active";
  return <span className={`badge ${on ? "on" : "warn"}`} data-no-lex><span className="dot" />{on ? T("Active", "ใช้งาน") : T("Suspended", "ระงับ")}</span>;
}

function QuotaCell({ u, T }) {
  const pct = usagePct(u);
  const tone = u.quota == null ? "ok" : pct >= 90 ? "crit" : pct >= 70 ? "warn" : "ok";
  return (
    <span className="quota-cell" data-no-lex>
      <span className="quota-meter"><i className={`q-${tone}`} style={{ width: Math.max(3, pct) + "%" }} /></span>
      <span className="quota-num mono faint">{u.quota == null ? T("unlimited", "ไม่จำกัด") : `${fmtTok(u.used)} / ${fmtTok(u.quota)}`}</span>
    </span>
  );
}

   CHARACTER BUILDER — create / edit an adventurer (AI agent)

let _bt = (k) => k;
const bt = (k, v) => _bt(k, v);

function Field({ label, hint, children }) {
  return (
    <div className="bf">
      <label className="bf-label">{label}{hint && <span className="bf-hint">{hint}</span>}</label>
      {children}
    </div>
  );
}

function Segmented({ value, onChange, options }) {
  // accepts both {key,label} (app) and {value,label}/string (kit) option shapes
  const norm = options.map(o => (typeof o === "string" ? { key: o, label: o } : { key: o.key ?? o.value, label: o.label }));
  return (
    <div className="seg">
      {norm.map(o => (
        <button key={o.key} type="button" className={`seg-btn ${value === o.key ? "on" : ""}`} onClick={() => onChange(o.key)}>
          {o.label}
        </button>
      ))}
    </div>
  );
}

function TagInput({ tags, onChange, suggest = [], placeholder }) {
  const [draft, setDraft] = useState("");
  const add = (t) => { t = t.trim(); if (t && !tags.includes(t)) onChange([...tags, t]); setDraft(""); };
  const remaining = suggest.filter(s => !tags.includes(s)).slice(0, 6);
  return (
    <div className="taginput">
      <div className="tag-chips">
        {tags.map(t => (
          <span key={t} className="tag-chip">{t}<button type="button" onClick={() => onChange(tags.filter(x => x !== t))}>✕</button></span>
        ))}
        <input value={draft} onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); add(draft); } else if (e.key === "Backspace" && !draft && tags.length) onChange(tags.slice(0, -1)); }}
          placeholder={tags.length ? "" : placeholder} />
      </div>
      {remaining.length > 0 && (
        <div className="tag-suggest">
          {remaining.map(s => <button key={s} type="button" className="tag-sg" onClick={() => add(s)}>+ {s}</button>)}
        </div>
      )}
    </div>
  );
}

function RuleList({ rules, onChange }) {
  const set = (i, v) => onChange(rules.map((r, idx) => idx === i ? v : r));
  const remove = (i) => onChange(rules.filter((_, idx) => idx !== i));
  return (
    <div className="rulelist">
      {rules.map((r, i) => (
        <div key={i} className="rule-row">
          <span className="rule-num">{i + 1}</span>
          <input value={r} onChange={e => set(i, e.target.value)} placeholder={bt("bld.rule.ph")} />
          <button type="button" className="rule-del" onClick={() => remove(i)}>✕</button>
        </div>
      ))}
      <button type="button" className="rule-add" onClick={() => onChange([...rules, ""])}>{bt("bld.rule.add")}</button>

}

function ClassPicker({ value, onChange, locked }) {

          <span className="class-th">{o.th}</span>
          <span className="class-en mono">{o.en}</span>
        </button>
      ))}
    </div>

}

/* ---- character card gallery (image sprite sets) ---- */
function CharacterGallery({ value, onChange, canPick, canAdd }) {
  const [cards, setCards] = useState(() => loadCharacters());
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState(""); const [idleF, setIdleF] = useState(null); const [walkF, setWalkF] = useState(null);
  const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const doAdd = async () => {
    if (!idleF) { setErr(bt("bld.gal.errIdle")); return; }
    setBusy(true); setErr("");
    try {
      const res = await processCharacterSheets(idleF, walkF);
      const id = addCharacter({ name: name.trim() || bt("bld.gal.newChar"), ...res });
      setCards(loadCharacters()); onChange(id);
      setAdding(false); setName(""); setIdleF(null); setWalkF(null);
    } catch (e) { setErr(bt("bld.gal.errProcess")); }
    setBusy(false);
  };
  const del = async (id, e) => { e.stopPropagation(); if (id === "ceo") return; if (await uiConfirm({ title: bt("bld.gal.delTitle"), message: bt("bld.gal.delMsg"), danger: true })) { removeCharacter(id); setCards(loadCharacters()); if (value === id) onChange("ceo"); } };
  return (
    <div className={`char-gallery ${!canPick ? "is-locked" : ""}`}>
      {cards.map(c => (
        <button key={c.id} type="button" disabled={!canPick} className={`char-card ${value === c.id ? "on" : ""}`} onClick={() => canPick && onChange(c.id)}>
          <span className="char-card-art"><CharacterSprite charId={c.id} walking={false} h={58} style={{ position: "static" }} /></span>
          <span className="char-card-name">{c.name}</span>
          {canAdd && !c.builtin && <span className="char-card-del" onClick={(e) => del(c.id, e)}>🗑</span>}
        </button>
      ))}
      {canAdd && !adding && (
        <button type="button" className="char-card char-card-add" onClick={() => setAdding(true)}>
          <span className="cc-plus">＋</span><span className="char-card-name">{bt("bld.gal.add")}</span>
        </button>
      )}
      {canAdd && adding && (
        <div className="char-add-panel">
          <input className="bf-input" placeholder={bt("bld.gal.namePh")} value={name} onChange={e => setName(e.target.value)} />
          <label className="char-file">{bt("bld.gal.idle")}<input type="file" accept="image/*" onChange={e => setIdleF(e.target.files[0] || null)} /></label>
          <label className="char-file">{bt("bld.gal.walk")}<input type="file" accept="image/*" onChange={e => setWalkF(e.target.files[0] || null)} /></label>
          <div className="mono faint" style={{ fontSize: 10.5 }}>{bt("bld.gal.hint")}</div>
          {err && <div className="char-err">{err}</div>}
          <div className="row" style={{ gap: 8 }}>
            <Btn kind="ghost" sm onClick={() => { setAdding(false); setErr(""); }}>{bt("common.cancel")}</Btn>
            <Btn kind="gold" sm onClick={doAdd} style={{ opacity: busy ? .6 : 1, pointerEvents: busy ? "none" : "auto" }}>{busy ? bt("bld.gal.processing") : bt("bld.gal.add")}</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- managed single-select with gated “+ add” ---- */
function OptionSelect({ kind, value, onChange, canAdd, placeholder, locked }) {
  const [opts, setOpts] = useState(() => (loadOptions()[kind] || []));
  const [adding, setAdding] = useState(false); const [v, setV] = useState("");
  const add = () => { const t = v.trim(); if (!t) return; const o = addOption(kind, t); setOpts(o[kind]); onChange(t); setV(""); setAdding(false); };
  return (
    <div className="opt-select">
      <Select block disabled={locked} value={opts.includes(value) ? value : ""} placeholder={placeholder || bt("bld.select.placeholder")}
        onChange={val => onChange(val)}
        options={[{ value: "", label: placeholder || bt("bld.select.placeholder") }, ...opts.map(o => ({ value: o, label: o }))]} />
      {!locked && canAdd && (adding
        ? <div className="opt-add-row"><input className="bf-input" autoFocus value={v} onChange={e => setV(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); add(); } }} placeholder={bt("bld.opt.newName")} /><Btn kind="gold" sm onClick={add}>{bt("common.add")}</Btn><button type="button" className="opt-cancel" onClick={() => setAdding(false)}>✕</button></div>
        : <button type="button" className="opt-add-btn" onClick={() => setAdding(true)}>{bt("bld.opt.addNew")}</button>)}
    </div>
  );
}

/* ---- managed multi-select chips with gated “+ add” ---- */
function OptionMulti({ kind, values, onChange, canAdd }) {
  const [opts, setOpts] = useState(() => (loadOptions()[kind] || []));
  const [adding, setAdding] = useState(false); const [v, setV] = useState("");
  const toggle = (o) => onChange(values.includes(o) ? values.filter(x => x !== o) : [...values, o]);
  const add = () => { const t = v.trim(); if (!t) return; const o = addOption(kind, t); setOpts(o[kind]); if (!values.includes(t)) onChange([...values, t]); setV(""); setAdding(false); };
  return (
    <div className="opt-multi">
      <div className="opt-chips">
        {opts.map(o => <button type="button" key={o} className={`opt-chip ${values.includes(o) ? "on" : ""}`} onClick={() => toggle(o)}>{o}</button>)}
        {opts.length === 0 && <span className="muted" style={{ fontSize: 12 }}>{bt("bld.opt.none")}</span>}
      </div>
      {canAdd && (adding
        ? <div className="opt-add-row"><input className="bf-input" autoFocus value={v} onChange={e => setV(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); add(); } }} placeholder={bt("bld.opt.newName")} /><Btn kind="gold" sm onClick={add}>{bt("common.add")}</Btn><button type="button" className="opt-cancel" onClick={() => setAdding(false)}>✕</button></div>
        : <button type="button" className="opt-add-btn" onClick={() => setAdding(true)}>{bt("bld.opt.addNew")}</button>)}
    </div>
  );
}

/* ---- skill picker: each skill carries a required SKILL.md ---- */
function SkillField({ skills, docs, onChange, canAdd }) {
  const [opts, setOpts] = useState(() => (loadOptions().skills || []));
  const [adding, setAdding] = useState(false);
  const [managing, setManaging] = useState(false);
  const [editing, setEditing] = useState(null);   // original skill name while editing
  const [name, setName] = useState(""); const [md, setMd] = useState(""); const [viewing, setViewing] = useState(null);
  const toggle = (o) => { const has = skills.includes(o); onChange(has ? skills.filter(x => x !== o) : [...skills, o], docs); };
  const startEdit = (o) => { setEditing(o); setName(o); setMd(docs[o] || ""); setAdding(true); setViewing(null); };
  const del = async (o) => {
    const ok = window.uiConfirm
      ? await window.uiConfirm({ title: bt("bld.skill.delTitle"), message: bt("bld.skill.delMsg", { name: o }), danger: true, confirmText: bt("bld.skill.delConfirm") })
      : window.confirm(bt("bld.skill.delConfirmQ", { name: o }));
    if (!ok) return;
    setOpts(removeOption("skills", o).skills || []);
    const nd = { ...docs }; delete nd[o];
    onChange(skills.filter(x => x !== o), nd);
    if (viewing === o) setViewing(null);
  };
  const save = () => {
    const n = name.trim(); if (!n || !md.trim()) return;
    let nd = { ...docs };
    let next = skills;
    if (editing && editing !== n) { removeOption("skills", editing); delete nd[editing]; next = skills.map(x => (x === editing ? n : x)); }
    addOption("skills", n); setOpts(loadOptions().skills);
    nd[n] = md.trim();
    if (!editing && !next.includes(n)) next = [...next, n];
    onChange(next, nd);
    setName(""); setMd(""); setAdding(false); setEditing(null);
  };
  const cancel = () => { setAdding(false); setEditing(null); setName(""); setMd(""); };
  return (
    <div className="opt-multi">
      <div className="opt-chips">
        {opts.map(o => managing
          ? <span key={o} className={`opt-chip manage ${skills.includes(o) ? "on" : ""}`}>
              {o}{docs[o] ? " 📄" : ""}

/* ---- per-agent .md files (open / download / add) ---- */
function _htmlToMd(html) {
  const el = document.createElement("div"); el.innerHTML = html || "";
  const out = [];
  el.childNodes.forEach(n => {
    if (n.nodeType === 3) { const t = n.textContent.trim(); if (t) out.push(t); return; }
    const tag = (n.tagName || "").toLowerCase(); const txt = (n.textContent || "").trim();
    if (tag === "h1") out.push("# " + txt); else if (tag === "h2") out.push("## " + txt); else if (tag === "h3") out.push("### " + txt);
    else if (tag === "ul" || tag === "ol") { n.querySelectorAll("li").forEach(li => out.push("- " + li.textContent.trim())); }
    else if (tag === "pre") out.push("```\n" + txt + "\n```");
    else if (txt) out.push(txt);
  });
  return out.join("\n\n") + "\n";
}
function _downloadMd(name, html) {
  const blob = new Blob([_htmlToMd(html)], { type: "text/markdown;charset=utf-8" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500);
}
function AgentDocs({ owner, profileDocs, onOpen, canEdit }) {
  const base = ["SKILL.md", "TOOLS.md", "EXAMPLES.md", "REFERENCE.md"];
  const fkey = "guildos.docfiles." + owner;
  const [extra, setExtra] = useState(() => { try { return JSON.parse(localStorage.getItem(fkey) || "[]"); } catch (e) { return []; } });
  const files = [...base, ...extra];
  const seedOf = (f) => (profileDocs && profileDocs[f]) || (typeof DOC_SEED !== "undefined" && DOC_SEED[f]) || "";
  const contentOf = (f) => { try { const s = localStorage.getItem("guildos.doc.agent:" + owner + ":" + f); if (s != null) return s; } catch (e) { } return seedOf(f); };
  const addFile = async () => {
    let nm = await uiPrompt({ title: bt("bld.doc.addTitle"), placeholder: bt("bld.doc.addPh") }); if (!nm) return;
    nm = String(nm).trim(); if (!/\.md$/i.test(nm)) nm += ".md"; if (files.includes(nm)) return;
    const nx = [...extra, nm]; setExtra(nx); try { localStorage.setItem(fkey, JSON.stringify(nx)); } catch (e) { }
  };
  return (
    <div className="agent-docs">
      {files.map(f => (
        <div key={f} className="adoc-row">
          <span className="adoc-name mono">📄 {f}</span>
          <button type="button" className="adoc-btn" onClick={() => onOpen({ id: "agent:" + owner + ":" + f, title: f + bt("bld.doc.suffix"), seed: contentOf(f) })}>{bt("bld.doc.open")}</button>
          <button type="button" className="adoc-btn" onClick={() => _downloadMd(f, contentOf(f))}>⬇ .md</button>
        </div>
      ))}
      {canEdit && <button type="button" className="opt-add-btn" onClick={addFile}>{bt("bld.doc.add")}</button>}
    </div>
  );
}

  const submit = () => {
    if (!canSave) return;
    Sys.saveUser(f, edit);
    onClose();
  };

  return (
    <div className="drawer-overlay" data-no-lex onClick={onClose} style={{ justifyContent: "center", alignItems: "center", padding: 24 }}>
      <div className="userform ornate" onClick={e => e.stopPropagation()}>
        <div className="builder-head">
          <span className="ph-icon" style={{ fontSize: 18 }}>{edit ? "✎" : "➕"}</span>
          <div>
            <div className="kicker">{edit ? T("Edit user", "แก้ไขสมาชิก") : T("New user", "เพิ่มสมาชิก")}</div>
            <h2 style={{ fontFamily: "var(--font-head)", fontSize: 19, margin: "2px 0 0", color: "var(--ink)" }}>
              {edit ? f.display || T("User", "สมาชิก") : T("Create an account", "สร้างบัญชีใหม่")}
            </h2>
          </div>
          <button className="drawer-close" onClick={onClose} style={{ marginLeft: "auto" }}>✕</button>
        </div>

        <div className="userform-body">
          <Field label={T("Avatar", "รูปแทนตัว")}>
            <div className="avatar-pick">
              {AVATARS.map(a => (
                <button key={a} type="button" className={`avatar-opt ${f.avatar === a ? "on" : ""}`} onClick={() => set("avatar", a)}>{a}</button>
              ))}
            </div>
          </Field>
          <div className="grid cols-2" style={{ gap: 12 }}>
            <Field label={T("Display name", "ชื่อที่แสดง")}>
              <input className="bf-input" value={f.display} onChange={e => set("display", e.target.value)} placeholder={T("e.g. Nicha Thongdee", "เช่น ณิชา ทองดี")} />
            </Field>
            <Field label={T("Username", "ชื่อผู้ใช้")}>

            </Field>
          </div>
          <Field label={T("Email", "อีเมล")}>

          </Field>
          <div className="grid cols-2" style={{ gap: 12 }}>
            <Field label={T("Role", "บทบาท")}>
              <Select block value={f.role} onChange={v => set("role", v)}
                options={roles.map(r => ({ value: r.key, label: T(r.en, r.th) }))} />
            </Field>
            <Field label={T("Status", "สถานะ")}>
              <Select block value={f.status} onChange={v => set("status", v)}
                options={[{ value: "active", label: T("Active", "ใช้งาน") }, { value: "suspended", label: T("Suspended", "ระงับ") }]} />
            </Field>
          </div>
          <Field label={T("Token quota", "โควตาโทเคน")} hint={T("per reset period", "ต่อรอบ")}>
            <div className="row" style={{ gap: 10 }}>
              <label className="ck-inline" data-no-lex>
                <input type="checkbox" checked={unlimited} onChange={e => set("quota", e.target.checked ? null : 100000)} />
                {T("Unlimited", "ไม่จำกัด")}
              </label>
              {!unlimited && (
                <>
                  <input className="bf-input" type="number" style={{ width: 130 }} value={f.quota} onChange={e => set("quota", Math.max(0, +e.target.value))} />
                  <Select value={f.period} minWidth={120} onChange={v => set("period", v)}
                    options={[{ value: "daily", label: T("daily", "รายวัน") }, { value: "weekly", label: T("weekly", "รายสัปดาห์") }, { value: "monthly", label: T("monthly", "รายเดือน") }]} />

          <Btn kind="ghost" onClick={onClose}>{T("Cancel", "ยกเลิก")}</Btn>
