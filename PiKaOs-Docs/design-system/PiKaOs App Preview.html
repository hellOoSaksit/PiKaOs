/* ============================================================
   NOTIFY — Boss question alerts with a countdown, then routed to
   the topbar "งาน" Todo bell.
   • A fresh question shows as a floating card with a countdown.
   • When the countdown ends (or ✕), it collapses into the topbar
     Todo badge (📜 งาน) instead of staying on screen.
   • The Todo bell lists pending questions; each has “เข้าไปต่อ”
     that jumps into the relevant room.
   ============================================================ */
const NOTIFY_LS = "guildos.notify.v1";
const NOTIFY_COUNTDOWN = 7000; // ms a card stays before collapsing to the bell
function loadNotify() { try { return JSON.parse(localStorage.getItem(NOTIFY_LS) || "[]"); } catch (e) { return []; } }
function saveNotify(a) { try { localStorage.setItem(NOTIFY_LS, JSON.stringify(a)); } catch (e) { } try { window.dispatchEvent(new Event("guildos-notify")); } catch (e) { } }
function pushNotify(n) {
  const a = loadNotify();
  a.unshift({ id: "nt" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), ts: Date.now(), seen: false, ...n });
  saveNotify(a.slice(0, 20));
}
function markSeen(id) { saveNotify(loadNotify().map(x => x.id === id ? { ...x, seen: true } : x)); }
function resolveNotify(id) { saveNotify(loadNotify().filter(x => x.id !== id)); }
/* mark a task done/acted — keeps it in history instead of deleting */
function markDone(id) { saveNotify(loadNotify().map(x => x.id === id ? { ...x, done: true, seen: true } : x)); }
function undoneNotify(id) { saveNotify(loadNotify().map(x => x.id === id ? { ...x, done: false } : x)); }
function toggleStar(id) { saveNotify(loadNotify().map(x => x.id === id ? { ...x, starred: !x.starred } : x)); }
function _rooms() { try { return JSON.parse(localStorage.getItem("guildos.rooms.v2") || "{}").rooms || []; } catch (e) { return []; } }
function _enterRoom(n) { if (n.roomId) window.__pendingRoom = n.roomId; if (window.__guildGo) window.__guildGo("world"); try { window.dispatchEvent(new Event("guildos-enter-room")); } catch (e) { } markDone(n.id); }
/* navigate to the page a notification relates to:
   room → world+enter room · explicit n.route → that page · otherwise the Task Board (approvals/tasks live there) */
function _goNotify(n) {
  if (n.roomId) { window.__pendingRoom = n.roomId; if (window.__guildGo) window.__guildGo("world"); try { window.dispatchEvent(new Event("guildos-enter-room")); } catch (e) { } }
  else if (n.route && window.__guildGo) window.__guildGo(n.route);
  else if (window.__guildGo) window.__guildGo("quests");
  markDone(n.id);   // ไปอยู่ในประวัติหลังกด
}
function _goLabel(n) { return n.roomId ? "เข้าไปต่อ" : (n.route ? "ไปที่หน้า" : "ไปกระดานงาน"); }
function clearNotify() { saveNotify([]); }
function relTime(ts) {
  const s = Math.floor((Date.now() - (ts || Date.now())) / 1000);
  if (s < 60) return "เมื่อสักครู่";
  const m = Math.floor(s / 60); if (m < 60) return m + " นาทีที่แล้ว";
  const h = Math.floor(m / 60); if (h < 24) return h + " ชม.ที่แล้ว";
  return Math.floor(h / 24) + " วันที่แล้ว";
}

/* ---- floating cards (fresh questions, with countdown) ---- */
function NotifyDock() {
  const [items, setItems] = React.useState(loadNotify);
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => {
    const h = () => setItems(loadNotify());
    window.addEventListener("guildos-notify", h); window.addEventListener("storage", h);
    const iv = setInterval(() => { setNow(Date.now()); }, 250);
    return () => { window.removeEventListener("guildos-notify", h); window.removeEventListener("storage", h); clearInterval(iv); };
  }, []);
  const visible = items.filter(n => !n.seen);
  // auto-collapse to the bell when countdown elapses
  React.useEffect(() => {
    visible.forEach(n => { if (now - n.ts >= NOTIFY_COUNTDOWN) markSeen(n.id); });
  }, [now, visible.map(n => n.id).join(",")]);
  if (!visible.length) return null;
  const rooms = _rooms();
  return (
    <div className="notify-dock">
      {visible.slice(0, 3).map(n => {
        const rm = rooms.find(r => r.id === n.roomId);
        const left = Math.max(0, Math.ceil((n.ts + NOTIFY_COUNTDOWN - now) / 1000));
        return (
          <div key={n.id} className="notify-card">
            <div className="notify-head">
              <span className="notify-ic">❓</span>
              <span className="notify-from">{n.from || "Agent"}</span>
              <span className="notify-count" title="จะย้ายไปแถบงาน (Todo)">⏱ {left}s</span>
              <button className="notify-x" title="ส่งไปแถบงานเลย" onClick={() => markSeen(n.id)}>✕</button>
            </div>
            <div className="notify-q">{n.question}</div>
            <div className="notify-foot">
              <span className="notify-meta mono">{rm ? "🏠 " + rm.name : (n.taskTitle ? "📌 " + n.taskTitle : "")}</span>
              <button className="notify-go" onClick={() => _goNotify(n)}>{_goLabel(n)} →</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

            <input className="uim-input" type="password" value={nw} onChange={e => { setNw(e.target.value); setErr(""); }} />
            <label className="bf-label">{t("pw.confirm")}</label>
            <input className="uim-input" type="password" value={cf} onChange={e => { setCf(e.target.value); setErr(""); }} onKeyDown={e => e.key === "Enter" && submit()} />
            {err && <div className="uim-warn">{err}</div>}
          </div>
          <div className="uim-actions">
            <button className="uim-btn ghost" onClick={onClose}>{t("pw.cancel")}</button>
            <button className="uim-btn primary" onClick={submit}>{t("pw.save")}</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [user, setUser] = useState("somchai");
  const [route, setRoute] = useState("me");
  const [theme, setThemeState] = useState(() => { const t = localStorage.getItem("guild-theme"); return (t === "pro" || t === "pro-dark") ? t : "pro"; });
  // active lexicon = ภาษาที่แสดง + รูปแบบคำศัพท์ รวมเป็นชุดเดียว (รหัสชุดจาก data/lexicons/*.json)
  const [lex, setLexState] = useState(() => {
    const saved = localStorage.getItem("guild-lex");
    if (saved && packById(saved)) return saved;
    // migrate จากคีย์เก่า (ถ้าเคยตั้งไว้)
    const oldLang = localStorage.getItem("guild-language");
    const oldStyle = localStorage.getItem("guild-style");
    if (oldLang || oldStyle) {
      const id = oldLang === "en" ? (oldStyle === "formal" ? "english_pro" : "english") : (oldStyle || "formal");
      if (packById(id)) return id;
    }
    // ผู้ใช้ใหม่ → ภาษา/รูปแบบเริ่มต้นตาม master ของ i18n (English + Formal, จาก flag isDefault*)
    return (LEX_PACKS.find(p => p.lang === DEFAULT_LANG && p.styleKey === DEFAULT_STYLE) || defaultPack() || {}).id || "english_pro";
  });
  const lastByLang = React.useRef({});
  const [agentSel, setAgentSel] = useState(null);
  const [questSel, setQuestSel] = useState(null);
  const [chars, setChars] = useState(() => loadChars());
  const [archived, setArchived] = useState(() => loadArchived());
  const [builder, setBuilder] = useState(null);   // null | {} | {existing char}

  // ---- RBAC / users (Phase 4) ----
  const [users, setUsers] = useState(() => loadU("users", USERS_SEED));
  const [roles, setRoles] = useState(() => loadU("roles", ROLES_SEED));
  const [rolePerms, setRolePerms] = useState(() => {
    const loaded = loadU("rolePerms", ROLE_PERMS_SEED);
    // migrate: ensure newer room.* permissions exist per seed (union, never removes)
    const out = { ...loaded };
    for (const rk of Object.keys(ROLE_PERMS_SEED)) {
      const cur = new Set(out[rk] || []);
      ROLE_PERMS_SEED[rk].filter(k => /^room\.|^character\.|^options\./.test(k)).forEach(k => cur.add(k));
      out[rk] = [...cur];
    }
    return out;
  });
  const [userPerms, setUserPerms] = useState(() => loadU("userPerms", USER_PERMS_SEED));
  const [audit, setAudit] = useState(() => loadU("audit", AUDIT_SEED));
  const [workflows, setWorkflows] = useState(() => loadWF("workflows", WORKFLOWS_SEED));
  const [toolRuns, setToolRuns] = useState(() => loadWF("runs", TOOL_RUNS_SEED));
  const [currentUserId] = useState("u_somchai");
  const [viewAsRole, setViewAsRole] = useState(null);   // role override for testing
  const [userSel, setUserSel] = useState(null);         // selected user id (detail)
  const [userForm, setUserForm] = useState(null);       // null | {} | user

  const setTheme = (t) => { setThemeState(t); localStorage.setItem("guild-theme", t); };
  // เลือก "รูปแบบคำศัพท์" ตรง ๆ ด้วยรหัสชุด
  const setLex = (id) => {
    if (!packById(id)) return;
    setLexState(id);
    localStorage.setItem("guild-lex", id);
    const p = packById(id); if (p) lastByLang.current[p.lang] = id;
  };
  // เลือก "ภาษาที่แสดง" → สลับไปชุดที่เคยใช้ของภาษานั้น (หรือชุดเริ่มต้นของภาษานั้น)
  const pickLanguage = (code) => {
    const remembered = lastByLang.current[code];
    const target = (remembered && packById(remembered)) ? remembered : (defaultPackForLang(code) || {}).id;
    if (target) setLex(target);
  };
  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);
  useEffect(() => { saveChars(chars); }, [chars]);
  useEffect(() => { saveArchived(archived); window.__archived = archived; }, [archived]);
  useEffect(() => { saveU("users", users); }, [users]);
  useEffect(() => { saveU("roles", roles); }, [roles]);
  useEffect(() => { saveU("rolePerms", rolePerms); }, [rolePerms]);
  useEffect(() => { saveU("userPerms", userPerms); }, [userPerms]);
  useEffect(() => { saveU("audit", audit); }, [audit]);
  useEffect(() => { saveWF("workflows", workflows); }, [workflows]);
  useEffect(() => { window.__workflows = workflows; }, [workflows]);
  useEffect(() => { saveWF("runs", toolRuns); }, [toolRuns]);
  // ทุกอย่างมาจากชุดที่กำลังใช้ — ภาษา/โหมดองค์กร derive จากข้อมูลในไฟล์ ไม่มี hardcode
  const activePack = packById(lex) || defaultPack() || {};
  const language = activePack.lang || "th";
  const formal = !!activePack.formal;
  const styleKey = activePack.styleKey || "formal";   // รูปแบบคำศัพท์สำหรับ i18n key-based
  const t = makeT(language, styleKey);                // t("some.key", { var }) — ไม่ hardcode
  lastByLang.current[language] = lex;   // จำสไตล์ล่าสุดของภาษาปัจจุบัน

  // expose live roster to data.jsx getters / byId
  window.__chars = chars;
  window.__charById = Object.fromEntries(chars.map(c => [c.id, c]));

  const go = (r) => {
    // closing every open overlay/popup when navigating away
    setAgentSel(null); setQuestSel(null); setBuilder(null);
    setUserForm(null); setUserSel(null);
    try { window.dispatchEvent(new Event("guildos-route-change")); } catch (e) { }
    try { document.body.classList.remove("nav-open"); } catch (e) { }
    setRoute(r);
    document.querySelector(".content")?.scrollTo(0, 0);
    if (r === "search") { const h = window.uiLoading && window.uiLoading({ title: "กำลังเชื่อมต่อคลังความรู้…", message: "HERMES Recall" }); setTimeout(() => h && h.close(), 820); }
  };
  window.__guildGo = go;

  const S = {
    chars,
    byId: (id) => chars.find(c => c.id === id),
    add: (c) => setChars(prev => [...prev, c]),
    update: (c) => setChars(prev => prev.map(x => x.id === c.id ? c : x)),
    remove: (id) => { const c = (window.__chars || []).find(x => x.id === id); if (c && c.locked) { try { window.uiAlert({ title: "ลบไม่ได้", message: "Agent CEO เป็นตำแหน่งตายตัว ลบไม่ได้ทุกสิทธิ์ (รวมถึงผู้ดูแลระบบ)" }); } catch (e) { } return; } setChars(prev => prev.filter(x => x.id !== id)); if (c) setArchived(a => [c, ...a.filter(x => x.id !== id)]); },
    archived,
    restore: (id) => { const c = (window.__archived || []).find(x => x.id === id); if (c) setChars(cs => cs.find(x => x.id === id) ? cs : [...cs, { ...c, pos: randPos() }]); setArchived(a => a.filter(x => x.id !== id)); },
    purge: (id) => setArchived(a => a.filter(x => x.id !== id)),
    openBuilder: (initial) => setBuilder(initial || {}),
    loadSamples: () => setChars(SAMPLE_CHARS.map(c => ({ ...c, pos: randPos() }))),
  };

  const saveChar = (c) => {
    if (chars.find(x => x.id === c.id)) S.update(c); else S.add(c);
    setBuilder(null);
  };

  // ---- resolve current user + permissions ----
  const T = (en, th) => language === "en" ? en : th;
  const baseMe = userById(users, currentUserId) || users[0];
  const effRole = viewAsRole || baseMe.role;
  const me = { ...baseMe, role: effRole };
  const mePerms = resolvePerms(effRole, rolePerms, userPerms[baseMe.id]);
  const can = (k) => mePerms.has(k);
  const logAudit = (action, targetType, target, meta) =>
    setAudit(prev => [{ id: "ev" + Date.now(), actor: currentUserId, action, targetType, target, meta, time: T("just now", "เมื่อสักครู่") }, ...prev]);

  const Sys = {
    users, roles, rolePerms, userPerms, audit, me, can, T, language, go,
    workflows, toolRuns,
    toggleWorkflow: (w) => {
      setWorkflows(prev => prev.map(x => x.id === w.id ? { ...x, enabled: !x.enabled } : x));
      logAudit("workflow.toggle", "workflow", w.id, (w.enabled ? "− disabled" : "+ enabled"));
    },
    recordRun: (wf, input, res) => {
      const run = { id: "tr_" + Date.now(), wf: wf.id, agent: null, quest: null,
        status: res.status, started: { en: "just now", th: "เมื่อสักครู่" }, dur: res.dur,
        input, output: res.output, error: res.error };
      setToolRuns(prev => [run, ...prev]);
      setWorkflows(prev => prev.map(x => x.id === wf.id ? { ...x, runs: (x.runs || 0) + 1, lastStatus: res.status } : x));
    },
    openBuilder: S.openBuilder,
    viewAsRole, setViewAsRole,
    openUserForm: (u) => setUserForm(u || {}),
    saveUser: (f, edit) => {
      if (edit) { setUsers(prev => prev.map(x => x.id === f.id ? { ...x, ...f } : x)); logAudit("user.update", "user", f.id, T("profile updated", "แก้ไขโปรไฟล์")); }
      else {
        const id = "u_" + String(f.username || ("user" + Date.now())).toLowerCase();
        setUsers(prev => [...prev, { ...f, id, used: 0, lastLogin: T("never", "ยังไม่เข้า"), joined: T("just now", "เพิ่งสร้าง") }]);
        logAudit("user.create", "user", id, T(roleByKey(roles, f.role).en, roleByKey(roles, f.role).th));
      }
    },
    toggleSuspend: (u) => {

      setUsers(prev => prev.map(x => x.id === u.id ? { ...x, status: next } : x));
      logAudit(next === "suspended" ? "user.suspend" : "user.update", "user", u.id, next === "suspended" ? T("suspended", "ระงับบัญชี") : T("restored", "คืนสถานะ"));
    },
    setRole: (u, role) => { setUsers(prev => prev.map(x => x.id === u.id ? { ...x, role } : x)); logAudit("role.update", "user", u.id, "→ " + T(roleByKey(roles, role).en, roleByKey(roles, role).th)); },
    setQuota: (u, q) => { setUsers(prev => prev.map(x => x.id === u.id ? { ...x, quota: q } : x)); logAudit("quota.update", "user", u.id, q == null ? T("unlimited", "ไม่จำกัด") : fmtTok(q)); },
    resetUsage: (u) => setUsers(prev => prev.map(x => x.id === u.id ? { ...x, used: 0 } : x)),
    setUserPerm: (u, key, effect) => {
      setUserPerms(prev => {
        const cur = { ...(prev[u.id] || {}) };
        if (effect == null) delete cur[key]; else cur[key] = effect;
        return { ...prev, [u.id]: cur };
      });
      if (effect) logAudit(effect === "grant" ? "permission.grant" : "permission.deny", "user", u.id, (effect === "grant" ? "+ " : "− ") + key);
    },
    setRolePerm: (roleKey, key, on) => {
      setRolePerms(prev => {

    addRole: () => {

        setRolePerms(prev => ({ ...prev, [key]: [] }));
      });
    },
  };

  // auto-redirect away from a protected route the current (possibly switched) role can't see
  const ROUTE_PERM = { admin: "user.view.any", userDetail: "user.view.any", roles: "role.manage", audit: "audit.view" };
  useEffect(() => {

  if (!loggedIn) return <Login onEnter={(n) => { setUser(n || "somchai"); setLoggedIn(true); }} t={t} />;

  const screen = (() => {
    const guard = (perm, el) => can(perm) ? el : <MyDashboard Sys={Sys} onAgent={setAgentSel} onQuest={setQuestSel} />;
    switch (route) {
      case "me": return <MyDashboard Sys={Sys} onAgent={setAgentSel} onQuest={setQuestSel} />;
      case "hall": return <World onAgent={setAgentSel} S={S} can={can} t={t} />;
      case "agents": return <Agents onAgent={setAgentSel} S={S} can={can} t={t} />;
      case "quests": return <QuestBoard onQuest={setQuestSel} can={can} t={t} />;
      case "world": return <World onAgent={setAgentSel} S={S} can={can} t={t} />;
      case "meeting": return <Meeting S={S} t={t} />;
      case "codex": return <Codex t={t} />;
      case "search": return <Recall lang={language} />;
      case "sitemap": return <SitemapAudit t={t} lang={language} can={can} actor={me.display_name || me.username || "ผู้ใช้"} />;
      case "mana": return <Mana S={S} t={t} />;
      case "treasury": return <Treasury t={t} />;
      case "stats": return <Chronicle S={S} t={t} />;
      case "admin": return guard("user.view.any", <Admin Sys={Sys} onUser={(id) => { setUserSel(id); go("userDetail"); }} />);
      case "toolsmgr": return guard("options.manage", <ToolsManager can={can} t={t} />);
      case "userDetail": return guard("user.view.any", <UserDetail Sys={Sys} userId={userSel} onAgent={setAgentSel} />);
      case "roles": return guard("role.manage", <RolesPermissions Sys={Sys} />);
      case "audit": return guard("audit.view", <AuditLog Sys={Sys} />);
      case "workflows": return <Workflows Sys={Sys} />;
      case "settings": return <Settings theme={theme} setTheme={setTheme} lex={lex} setLex={setLex} pickLanguage={pickLanguage} language={language} formal={formal} go={go} t={t} />;
      case "library": return <ComponentLibrary onBack={() => go("settings")} t={t} />;
      case "history": return <QuestLog t={t} />;
      case "watch": return <Watchtower t={t} />;
      default: return <MyDashboard Sys={Sys} onAgent={setAgentSel} onQuest={setQuestSel} />;
    }
  })();

  return (
    <div className="app" key={lex}>
      <Sidebar route={route} go={go} t={t} can={can} />
      <div className="main">
        <Topbar route={route} theme={theme} setTheme={setTheme} user={user} language={language} t={t}
          me={me} roles={roles} onSignOut={() => setLoggedIn(false)}
          onSaveProfile={(u) => setUsers(prev => prev.map(x => x.id === currentUserId ? { ...x, ...u } : x))}
          roleSwitch={{ label: t("topbar.viewAs"), value: effRole, roles, onChange: setViewAsRole, T }} />
        <div className="content">{screen}</div>
      </div>
      {userForm && <UserForm Sys={Sys} initial={userForm.id ? userForm : null} onClose={() => setUserForm(null)} />}
      {agentSel && <AgentDrawer a={agentSel} onClose={() => setAgentSel(null)} t={t}
        onEdit={(c) => { setAgentSel(null); setBuilder(c); }}
        onDelete={async (id) => { const c = chars.find(x => x.id === id); if (c && c.locked) { await window.uiAlert({ title: t("ad.cantDelTitle"), message: t("ad.ceoLockedAlert") }); return; } setAgentSel(null); S.remove(id); }} />}
      {questSel && <QuestDrawer q={questSel} onClose={() => setQuestSel(null)} t={t} onAgent={(a) => { setQuestSel(null); setAgentSel(a); }} />}
      {builder && <CharacterBuilder initial={builder.id ? builder : null} onSave={saveChar} onClose={() => setBuilder(null)} can={can} archived={archived} t={t} onRestore={(id) => { S.restore(id); setBuilder(null); }} />}
      <UIModalHost />
      <UILoadingHost />
    </div>
  );
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ===== lib/tweaks-app.jsx ===== */
/* PiKaOs — ES module (migrated from PiKaOs-Core/tweaks-app.jsx). */

/* ============================================================
   TWEAKS — professional, office-appropriate controls:
     · ธีม (Day / Night)   — clean corporate light (pro) ↔ dark (pro-dark)
     · สีหลัก (Accent)      — professional accent: blue / teal / indigo / slate
     · ทรง (Shape)          — corner geometry
     · ชีวิตชีวา (Motion)   — energy of transitions, pulses & agent glides
   Themes live in CSS ([data-theme="pro" | "pro-dark"]); tweaks just switch +
   layer accent / radius / motion on top via <html> vars & data-attrs.
   ============================================================ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "กลางวัน",
  "accent": "#4361ee",
  "shape": "ปกติ",
  "motion": "ปกติ"
}/*EDITMODE-END*/;

/* modern accents — confident hues, each deep enough for white button text */
const TW_ACCENTS = {
  "#4361ee": { bright: "#5872f2", deep: "#3048d4", glow: "rgba(67,97,238,0.26)" },   // อินดิโก
  "#2563eb": { bright: "#3b82f6", deep: "#1d4ed8", glow: "rgba(37,99,235,0.26)" },   // น้ำเงิน
  "#6a4be8": { bright: "#7c5cf0", deep: "#5436c8", glow: "rgba(106,75,232,0.26)" },  // ม่วง
  "#475569": { bright: "#5a6577", deep: "#374151", glow: "rgba(71,85,105,0.24)" },  // สเลต
};
const TW_ACCENT_VARS = ["--gold", "--gold-bright", "--gold-deep", "--gold-glow", "--gold-grad", "--gold-grad-hover"];

const TW_SHAPES = {
  "มุมคม": { "--radius": "2px", "--radius-lg": "3px", "--radius-sm": "1px" },
  "ปกติ": { "--radius": "6px", "--radius-lg": "10px", "--radius-sm": "4px" },
  "มนนุ่ม": { "--radius": "14px", "--radius-lg": "22px", "--radius-sm": "9px" },
};
const TW_SHAPE_VARS = ["--radius", "--radius-lg", "--radius-sm"];
const TW_MOTION = { "สงบ": "calm", "ปกติ": "regular", "คึกคัก": "lively" };

function ensureMotionCSS() {
  if (document.getElementById("tw-motion-css")) return;
  const s = document.createElement("style"); s.id = "tw-motion-css";
  s.textContent = `
    html[data-motion="calm"] * { transition-duration: .45s !important; }
    html[data-motion="calm"] .pulse-dot, html[data-motion="calm"] .hermes-fab-live,
    html[data-motion="calm"] [class*="pulse"] { animation-duration: 3.4s !important; }
    html[data-motion="calm"] .rc-agent { transition-duration: .9s !important; }
    html[data-motion="lively"] * { transition-duration: .1s !important; }
    html[data-motion="lively"] .pulse-dot, html[data-motion="lively"] [class*="pulse"] { animation-duration: .7s !important; }
    html[data-motion="lively"] .rc-agent { transition-duration: .26s !important; }
    html[data-motion="lively"] .room-card:hover, html[data-motion="lively"] .myagent-card:hover { transform: translateY(-5px) scale(1.012); }
  `;
  document.head.appendChild(s);
}

function applyTweaks(t) {
  const el = document.documentElement;
  // day / night — professional themes
  // day/night theme is owned by the app's topbar toggle (data-theme pro / pro-dark)
  const ac = TW_ACCENTS[t.accent] || TW_ACCENTS["#4361ee"];
  const accent = TW_ACCENTS[t.accent] ? t.accent : "#4361ee";
  el.style.setProperty("--gold", accent);
  el.style.setProperty("--gold-bright", ac.bright);
  el.style.setProperty("--gold-deep", ac.deep);
  el.style.setProperty("--gold-glow", ac.glow);
  el.style.setProperty("--gold-grad", `linear-gradient(180deg,${ac.bright} 0%,${accent} 52%,${ac.deep} 100%)`);
  el.style.setProperty("--gold-grad-hover", `linear-gradient(180deg,${ac.bright} 0%,${ac.bright} 52%,${accent} 100%)`);
  // shape
  TW_SHAPE_VARS.forEach(k => el.style.removeProperty(k));
  Object.entries(TW_SHAPES[t.shape] || TW_SHAPES["ปกติ"]).forEach(([k, v]) => el.style.setProperty(k, v));
  // motion
  el.setAttribute("data-motion", TW_MOTION[t.motion] || "regular");
}

function TweaksApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => { ensureMotionCSS(); }, []);
  React.useEffect(() => { applyTweaks(t); }, [t.accent, t.shape, t.motion]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="สีหลัก" />
      <TweakColor label="สีเน้น (Accent)" value={t.accent} options={Object.keys(TW_ACCENTS)}
        onChange={(v) => setTweak("accent", v)} />

      <TweakSection label="รูปทรง" />
      <TweakRadio label="ความโค้งมุม" value={t.shape} options={Object.keys(TW_SHAPES)}
        onChange={(v) => setTweak("shape", v)} />

      <TweakSection label="ชีวิตชีวา" />
      <TweakRadio label="พลังงานการเคลื่อนไหว" value={t.motion} options={Object.keys(TW_MOTION)}
        onChange={(v) => setTweak("motion", v)} />
    </TweaksPanel>
  );
}

(function mountTweaks() {
  const mount = () => {
    let host = document.getElementById("tweaks-root");
    if (!host) { host = document.createElement("div"); host.id = "tweaks-root"; document.body.appendChild(host); }
    try { ReactDOM.createRoot(host).render(<TweaksApp />); } catch (e) { /* ignore */ }
  };
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", mount); else mount();
})();

/* ===== lib/fx.js ===== */
/* PiKaOs — ES module (migrated from GuildOS/fx.js). */


/* ============================================================
   FX.JS — responsive shell helpers (no framework).
   Injects a hamburger + scrim for the off-canvas sidebar on
   small screens, and wires open/close behaviour.
   ============================================================ */
(function () {
  function init() {
    if (document.getElementById("nav-burger")) return;
    if (!document.body) return;

    var burger = document.createElement("button");
    burger.id = "nav-burger";
    burger.className = "nav-burger";
    burger.setAttribute("aria-label", "เปิด/ปิดเมนู");
    burger.innerHTML = "<span></span><span></span><span></span>";

    var scrim = document.createElement("div");
    scrim.className = "nav-scrim";

    document.body.appendChild(burger);
    document.body.appendChild(scrim);

    burger.addEventListener("click", function (e) {
      e.stopPropagation();
      document.body.classList.toggle("nav-open");
    });
    scrim.addEventListener("click", function () {
      document.body.classList.remove("nav-open");
    });
    // close the drawer after choosing a destination
    document.addEventListener("click", function (e) {
      if (e.target.closest && e.target.closest(".nav-item")) {
        document.body.classList.remove("nav-open");
      }
    });
    // tidy up if the viewport grows past the breakpoint
    window.addEventListener("resize", function () {
      if (window.innerWidth > 980) document.body.classList.remove("nav-open");
    });
    // close on Escape
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") document.body.classList.remove("nav-open");
    });
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
  // re-assert in case the body was re-rendered late
  setTimeout(init, 600);
  setTimeout(init, 1500);
})();
