/* CEO report-back block on task cards */
.list-rows .codex-row { flex-wrap: wrap; }
.ceo-report { flex-basis: 100%; width: 100%; display: flex; gap: 10px; align-items: flex-start; margin-top: 12px; padding: 12px 14px;
  background: var(--bg-3); border: 1px solid var(--line-soft); border-radius: var(--radius); }
.ceo-report.is-done { background: color-mix(in srgb, var(--emerald) 7%, var(--bg-3)); border-color: color-mix(in srgb, var(--emerald) 30%, var(--line)); }
.ceo-report-av { font-size: 16px; flex: 0 0 auto; width: 28px; height: 28px; display: grid; place-items: center; background: var(--raised-grad); border: 1px solid var(--gold-deep); border-radius: 50%; }
.ceo-report.is-done .ceo-report-av { border-color: color-mix(in srgb, var(--emerald) 50%, var(--line)); }
.ceo-report-body { flex: 1; min-width: 0; }
.ceo-report-head { font-size: 12px; color: var(--ink); margin-bottom: 2px; }
.ceo-report-head .mono { font-size: 10.5px; }
.ceo-report-text { font-size: 13px; line-height: 1.5; color: var(--ink-2); text-wrap: pretty; }
.ceo-report-done { flex: 0 0 auto; align-self: center; font-family: var(--font-mono); font-weight: 600; font-size: 11px; letter-spacing: .04em; color: #fff; background: var(--emerald); border-radius: 4px; padding: 3px 10px; }
.notify-count { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; color: var(--gold-bright); }
.notify-card .notify-x { margin-left: 8px; }
/* topbar Todo bell */
.tb-todo { position: relative; cursor: pointer; }
.tb-todo.open, .tb-todo:hover { border-color: var(--gold-deep); }
.tb-badge { position: absolute; top: -6px; right: -6px; min-width: 17px; height: 17px; padding: 0 4px; border-radius: 9px;
  background: var(--crimson, #c2554f); color: #fff; font-family: var(--font-mono); font-size: 10.5px; font-weight: 800; line-height: 17px; text-align: center;
  box-shadow: 0 0 0 2px var(--bg-2); animation: tbBadgePulse 1.8s ease-in-out infinite; }
@keyframes tbBadgePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
.tb-scrim { position: fixed; inset: 0; z-index: 2147483638; background: transparent; cursor: default; }
.tb-todo-pop { position: fixed; top: 64px; right: 14px; width: 320px; max-width: 86vw; z-index: 2147483640; cursor: default;
  background: var(--bg-2); border: 1.5px solid var(--gold-deep); border-radius: var(--radius-lg); box-shadow: 0 28px 70px -18px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.06), 0 0 40px -20px var(--gold-glow);
  max-height: 60vh; overflow-y: auto; animation: notifyIn .2s cubic-bezier(.2,.8,.2,1); }
.tb-todo-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 13px; border-bottom: 1px solid var(--line);
  font-family: var(--font-head); font-weight: 700; font-size: 13.5px; color: var(--ink); position: sticky; top: 0; background: var(--bg-2); }
.tb-todo-empty { padding: 22px 14px; text-align: center; color: var(--ink-3); font-size: 13px; }
.tb-todo-item { padding: 11px 13px; border-bottom: 1px solid var(--line-soft); }
.tb-todo-item:last-child { border-bottom: none; }
.tt-from { font-family: var(--font-head); font-weight: 700; font-size: 12.5px; color: var(--gold-bright); margin-bottom: 3px; }
.tt-q { font-size: 12.5px; line-height: 1.5; color: var(--ink); margin-bottom: 8px; text-wrap: pretty; }
.tt-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.tt-foot .mono { font-size: 10.5px; color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tt-x { background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-2); border-radius: var(--radius-sm); font-size: 11.5px; padding: 5px 9px; cursor: pointer; }
.tt-x:hover { color: var(--ink); border-color: var(--bronze); }

/* ---------------- ROOM PICKER (lobby) ---------------- */
.room-picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
.room-card { display: flex; flex-direction: column; cursor: pointer; overflow: hidden;
  background: var(--panel-grad); border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-raised); transition: border-color .15s, transform .12s, box-shadow .15s; }
.room-card:hover { border-color: var(--gold-deep); transform: translateY(-3px); box-shadow: var(--shadow-pop), 0 0 26px -12px var(--gold-glow); }
.room-card-art { position: relative; aspect-ratio: 32 / 20; background: #0b0e14; overflow: hidden; border-bottom: 1px solid var(--line); }
.room-thumb-cv { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
.room-card-enter { position: absolute; right: 10px; bottom: 10px; font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: .04em;
  color: #fff; background: var(--gold-grad); border: 1px solid var(--gold-deep); border-radius: 18px; padding: 4px 12px;
  opacity: 0; transform: translateY(6px); transition: opacity .15s, transform .15s; box-shadow: var(--shadow-raised); }
.room-card:hover .room-card-enter { opacity: 1; transform: translateY(0); }
.room-card-foot { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }
.room-card-name { font-family: var(--font-head); font-weight: 700; font-size: 14.5px; color: var(--ink);
  background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; margin: -2px -6px; width: calc(100% + 12px); }
.room-card-name:hover { border-color: var(--line); } .room-card-name:focus { outline: none; border-color: var(--gold-deep); background: var(--bg-1); }
.room-card-meta { display: flex; align-items: center; gap: 12px; font-size: 11.5px; color: var(--ink-3); }
.room-card-tag { position: absolute; left: 10px; top: 10px; font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: .02em;
  color: var(--gold-bright); background: rgba(8,5,2,.72); border: 1px solid var(--gold-deep); border-radius: 16px; padding: 3px 10px; backdrop-filter: blur(2px); max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.room-card-q { position: absolute; right: 10px; top: 10px; font-family: var(--font-mono); font-weight: 800; font-size: 11.5px;
  color: #15110a; background: rgba(245,243,238,.95); border: 1px solid rgba(0,0,0,.2); border-radius: 16px; padding: 3px 9px; box-shadow: 0 1px 4px rgba(0,0,0,.35); }
.tpl-card .room-card-art { background: var(--bg-3); }
.tpl-badge { position: absolute; left: 10px; top: 10px; font-family: var(--font-mono); font-weight: 700; font-size: 10.5px;
  color: var(--ink); background: var(--bg-2); border: 1px solid var(--line); border-radius: 14px; padding: 3px 9px; box-shadow: var(--shadow-raised); }
.room-card-ceo { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-2); }
.rcc-badge { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: .05em; color: #fff;
  background: var(--gold-grad); border: 1px solid var(--gold-deep); border-radius: 12px; padding: 1px 8px; }
.room-card-del { margin-left: auto; background: transparent; border: none; cursor: pointer; font-size: 13px; opacity: .55; padding: 2px 4px; border-radius: 6px; }
.room-card-del:hover { opacity: 1; background: color-mix(in srgb, var(--ruby, #c2554f) 22%, transparent); }
.room-card-new { align-items: center; justify-content: center; gap: 7px; min-height: 220px; text-align: center;
  border-style: dashed; border-color: var(--line); background: var(--bg-1); color: var(--ink-2); }
.room-card-new:hover { border-color: var(--gold-deep); color: var(--ink); }
.rc-plus { font-size: 34px; color: var(--gold-bright); line-height: 1; }

/* ---------------- ROOM VIEW ---------------- */
.room-view { display: flex; flex-direction: column; gap: 12px; }
.rv-topbar { display: flex; align-items: center; gap: 12px; background: var(--panel-grad); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 9px 12px; box-shadow: var(--shadow-raised); }
.rs-back { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-body); font-size: 13px; font-weight: 600; white-space: nowrap;
  color: var(--ink); background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius-sm);
  padding: 7px 13px; cursor: pointer; transition: border-color .14s, color .14s, transform .1s; }
.rs-back span { font-size: 15px; } .rs-back:hover { border-color: var(--gold-deep); color: var(--gold-bright); transform: translateX(-2px); }
.rv-name { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--ink); background: transparent;
  border: 1px solid transparent; border-radius: var(--radius-sm); padding: 4px 8px; min-width: 120px; max-width: 320px; }
.rv-name:hover { border-color: var(--line); } .rv-name:focus { outline: none; border-color: var(--gold-deep); background: var(--bg-1); }
.rv-spacer { flex: 1; }
/* undo / redo / reset */
.rv-actions { display: flex; gap: 6px; }
.rv-act { font-family: var(--font-body); font-size: 14px; font-weight: 700; color: var(--ink); background: var(--raised-grad);
  border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 7px 11px; cursor: pointer; transition: all .12s; line-height: 1; white-space: nowrap; }
.rv-act:hover:not(:disabled) { border-color: var(--gold-deep); color: var(--gold-bright); }
.rv-act:disabled { opacity: .32; cursor: default; }
.rv-act.danger { font-size: 12.5px; }
.rv-act.danger:hover:not(:disabled) { border-color: var(--ruby, #c2554f); color: var(--ruby, #c2554f); }
.rv-build { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; font-weight: 700; white-space: nowrap;
  color: var(--ink); background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 7px 14px; cursor: pointer; transition: all .14s; }
.rv-build:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.rv-build.on { background: var(--gold-grad); color: #fff; border-color: var(--gold-deep); box-shadow: 0 0 16px -6px var(--gold-glow); }
.rv-hint { font-size: 11.5px; color: var(--ink-2); background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 8px 14px; letter-spacing: .01em; }

.rv-body { display: flex; gap: 14px; align-items: flex-start; }
.rv-body.is-build { align-items: stretch; }
@media (max-width: 760px) { .rv-body { flex-direction: column; } }

/* canvas + overlays */
.room-canvas-wrap { position: relative; flex: 1; min-width: 0; width: 100%; margin: 0 auto;
  border-radius: var(--radius-lg); overflow: hidden; border: 2px solid #1b1f2a; box-shadow: var(--shadow-panel), inset 0 0 60px rgba(0,0,0,.4);
  background: #0b0e14; touch-action: none; }
.room-canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }
.rc-hi { position: absolute; box-sizing: border-box; border: 2px solid var(--gold-bright); background: color-mix(in srgb, var(--gold-glow) 22%, transparent); pointer-events: none; z-index: 8; }
.rc-ghost { position: absolute; box-sizing: border-box; border: 2px dashed var(--gold-bright); background: color-mix(in srgb, var(--gold-glow) 16%, transparent); border-radius: 3px; pointer-events: none; z-index: 8; }

.rc-agents { position: absolute; inset: 0; pointer-events: none; }
.rc-agent { position: absolute; transform: translate(-50%, -90%); background: transparent; border: none; padding: 0; cursor: pointer;
  pointer-events: auto; display: flex; flex-direction: column; align-items: center;
  transition: left .5s linear, top .5s linear; }
.rc-agent .pixel-sprite, .rc-agent .ceo-sprite { position: relative; z-index: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,.5)); }
.ceo-sprite { background-image: url(public/assets/ceo-idle.png); background-repeat: no-repeat; image-rendering: pixelated; }
.ceo-sprite.walking { background-image: url(public/assets/ceo-walk.png); }
.rc-agent-shadow { position: absolute; bottom: 1px; width: 60%; height: 18%; min-height: 4px; border-radius: 50%; background: rgba(0,0,0,.4); filter: blur(1.5px); }
.rc-agent-status { position: absolute; top: 0; right: 12%; width: 8px; height: 8px; border-radius: 50%; z-index: 3; border: 1px solid rgba(0,0,0,.5); }
.rc-agent-status[data-s="on"] { background: var(--emerald); box-shadow: 0 0 6px var(--emerald); }
.rc-agent-status[data-s="busy"] { background: var(--gold-bright); box-shadow: 0 0 6px var(--gold-glow); }
.rc-agent-status[data-s="idle"], .rc-agent-status[data-s="away"] { background: #9aa0a8; }
.rc-agent.seated .pixel-sprite { filter: drop-shadow(0 2px 2px rgba(0,0,0,.5)); }
.rc-agent:hover { z-index: 999 !important; } .rc-agent:hover .pixel-sprite, .rc-agent:hover .ceo-sprite { filter: drop-shadow(0 0 6px var(--gold-glow)) drop-shadow(0 2px 2px rgba(0,0,0,.5)); }

/* ---- warp-to-work teleport ---- */
.rc-agent.warping { transition: none !important; z-index: 900 !important; }
.rc-agent.warp-out .pixel-sprite, .rc-agent.warp-out .ceo-sprite { animation: agentWarpOut .3s ease-in forwards; }
.rc-agent.warp-in .pixel-sprite, .rc-agent.warp-in .ceo-sprite { animation: agentWarpIn .38s cubic-bezier(.2,.9,.3,1.25) forwards; }
@keyframes agentWarpOut { 0% { transform: none; opacity: 1; } 100% { transform: scaleX(.12) scaleY(1.5) translateY(-5px); opacity: 0; } }
@keyframes agentWarpIn { 0% { transform: scaleX(.12) scaleY(1.5) translateY(-5px); opacity: 0; } 55% { opacity: 1; } 100% { transform: none; opacity: 1; } }
.rc-warp-fx { position: absolute; bottom: -2%; left: 50%; width: 150%; aspect-ratio: 1; transform: translate(-50%, 35%); border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--gold-glow) 75%, transparent) 0%, color-mix(in srgb, var(--gold-glow) 30%, transparent) 38%, transparent 64%);
  pointer-events: none; z-index: 0; animation: warpRing .6s ease-out infinite; }
@keyframes warpRing { 0% { opacity: .15; transform: translate(-50%, 35%) scale(.45); } 45% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, 35%) scale(1.3); } }

/* ---------------- BUILD PALETTE ---------------- */
.build-palette { width: 280px; flex: 0 0 280px; display: flex; flex-direction: column; overflow: hidden; align-self: stretch; }
@media (max-width: 760px) { .build-palette { width: 100%; flex: none; } }
.bp-cats { display: flex; flex-wrap: wrap; gap: 4px; padding: 9px; border-bottom: 1px solid var(--line); }
.bp-cat { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--ink-2); background: var(--bg-3);
  border: 1px solid var(--line); border-radius: 16px; padding: 4px 11px; cursor: pointer; transition: all .12s; }
.bp-cat:hover { color: var(--ink); border-color: var(--bronze); }
.bp-cat.on { background: var(--gold-grad); color: #fff; border-color: var(--gold-deep); }
.bp-body { padding: 12px; overflow-y: auto; flex: 1; max-height: 460px; }
.bp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.bp-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 9px 4px; cursor: pointer;
  background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius); transition: all .12s; font-family: inherit; }
.bp-item:hover { border-color: var(--bronze); transform: translateY(-1px); }
.bp-item.on { border-color: var(--gold-deep); box-shadow: 0 0 0 1px var(--gold-glow), 0 0 14px -6px var(--gold-glow); }
.bp-swatch { width: 34px; height: 34px; border-radius: 7px; border: 1px solid rgba(0,0,0,.3); }
.bp-prevwrap { width: 40px; height: 40px; display: grid; place-items: center; }
.item-prev { max-width: 40px; max-height: 40px; image-rendering: pixelated; }
.bp-label { font-size: 10.5px; color: var(--ink-2); text-align: center; line-height: 1.15; }
.bp-item.on .bp-label { color: var(--ink); }
.bp-item:disabled { opacity: .38; cursor: not-allowed; }
.bp-item:disabled:hover { border-color: var(--line); transform: none; }
.bp-lock { padding: 7px 12px; font-size: 11px; color: var(--ruby, #c2554f); border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--ruby, #c2554f) 8%, transparent); }
.rv-nobuild { display: inline-flex; align-items: center; font-size: 12.5px; color: var(--ink-3); background: var(--bg-3); border: 1px dashed var(--line); border-radius: var(--radius-sm); padding: 7px 12px; white-space: nowrap; }
.rv-spawn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; font-weight: 700; white-space: nowrap;
  color: #fff; background: var(--gold-grad); border: 1px solid var(--gold-deep); border-radius: var(--radius-sm); padding: 7px 13px; cursor: pointer; transition: filter .12s, transform .1s; box-shadow: 0 4px 12px -6px var(--gold-glow); }
.rv-spawn:hover { filter: brightness(1.05); transform: translateY(-1px); }

/* appearance lock + per-agent API hint (builder) */
.class-pick.is-locked { opacity: .82; }
.class-pick.is-locked .class-opt { cursor: not-allowed; }
.class-pick.is-locked .class-opt:not(.on) { opacity: .45; filter: grayscale(.5); }
.class-pick.is-locked .class-opt.on { border-color: var(--gold-deep); box-shadow: 0 0 0 1px var(--gold-glow); }
.appearance-lock { margin-top: 8px; font-size: 11.5px; color: var(--ink-3); background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 6px 10px; }
.swatch:disabled { cursor: not-allowed; opacity: .5; }
.api-empty-hint { font-size: 12px; color: var(--ink-3); background: var(--bg-1); border: 1px dashed var(--line); border-radius: var(--radius-sm); padding: 8px 11px; }

/* settings · API connections */
.api-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.api-row { display: flex; align-items: center; gap: 11px; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); padding: 9px 12px; }
.api-ic { width: 30px; height: 30px; flex: 0 0 30px; display: grid; place-items: center; border-radius: 8px; background: var(--raised-grad); border: 1px solid var(--gold-deep); font-size: 14px; }
.api-name { font-family: var(--font-head); font-weight: 700; font-size: 14px; color: var(--ink); }
.api-del { margin-left: auto; background: transparent; border: none; cursor: pointer; font-size: 14px; opacity: .55; padding: 4px 6px; border-radius: 6px; }
.api-del:hover { opacity: 1; background: color-mix(in srgb, var(--ruby, #c2554f) 20%, transparent); }
.api-add { display: flex; flex-direction: column; gap: 9px; border-top: 1px solid var(--line-soft); padding-top: 14px; }
.api-add-row { display: flex; gap: 9px; align-items: center; }
.api-add-row select { flex: 0 0 150px; }
.api-add-row input { flex: 1; min-width: 0; }

/* ---- builder: character gallery + managed option lists ---- */
.char-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
.char-gallery.is-locked { opacity: .85; }
.char-card { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 6px 8px; cursor: pointer;
  background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius); transition: all .12s; font-family: inherit; }
.char-card:hover:not(:disabled) { border-color: var(--bronze); transform: translateY(-1px); }
.char-card.on { border-color: var(--gold-deep); box-shadow: 0 0 0 1px var(--gold-glow), 0 0 14px -6px var(--gold-glow); }
.char-card:disabled { cursor: not-allowed; }
.char-card-art { height: 62px; display: grid; place-items: end center; overflow: hidden; }
.char-card-name { font-size: 11.5px; color: var(--ink-2); text-align: center; line-height: 1.15; }
.char-card.on .char-card-name { color: var(--ink); font-weight: 700; }
.char-card-del { position: absolute; top: 3px; right: 3px; font-size: 11px; opacity: .55; background: var(--bg-1); border-radius: 5px; padding: 1px 3px; }
.char-card-del:hover { opacity: 1; }
.char-card-add { justify-content: center; border-style: dashed; color: var(--ink-2); min-height: 92px; }
.char-card-add .cc-plus { font-size: 26px; color: var(--gold-bright); line-height: 1; }
.char-add-panel { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 8px; padding: 12px; border: 1px dashed var(--gold-deep); border-radius: var(--radius); background: var(--bg-1); }
.char-file { display: flex; flex-direction: column; gap: 4px; font-size: 11.5px; color: var(--ink-2); }
.char-file input { font-size: 11px; color: var(--ink-3); }
.char-err { font-size: 11.5px; color: var(--ruby, #c2554f); }

.opt-select, .opt-multi { display: flex; flex-direction: column; gap: 8px; }
.opt-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.opt-chip { font-family: var(--font-body); font-size: 12.5px; color: var(--ink-2); background: var(--bg-3); border: 1px solid var(--line);
  border-radius: 16px; padding: 5px 12px; cursor: pointer; transition: all .12s; }
.opt-chip:hover { border-color: var(--bronze); color: var(--ink); }
.opt-chip.on { background: var(--gold-grad); color: #fff; border-color: var(--gold-deep); font-weight: 600; }
.opt-add-btn { align-self: flex-start; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--gold-bright);
  background: transparent; border: 1px dashed var(--gold-deep); border-radius: var(--radius-sm); padding: 5px 11px; cursor: pointer; }
.opt-add-btn:hover { background: color-mix(in srgb, var(--gold-glow) 12%, transparent); }
.opt-add-btn { transition: background .14s, color .14s, border-color .14s, transform .2s var(--spring); }
.opt-add-btn:active { transform: scale(.95); transition-duration: .05s; }
.opt-add-btn.on { background: color-mix(in srgb, var(--gold) 12%, transparent); border-style: solid; }
/* manage mode: chip with inline ✎ / ✕ actions */
.opt-chip.manage { display: inline-flex; align-items: center; gap: 2px; padding-right: 6px; cursor: default; }
.chip-act { border: none; background: none; cursor: pointer; font-size: 11px; line-height: 1; color: inherit; opacity: .75; padding: 3px 4px; border-radius: 999px; transition: background .12s, color .12s, opacity .12s, transform .2s var(--spring); }
.chip-act:hover { opacity: 1; background: rgba(0,0,0,.12); }
.opt-chip.manage:not(.on) .chip-act:hover { background: var(--bg-4); color: var(--ink); }
.opt-chip.manage:not(.on) .chip-act.danger:hover { background: color-mix(in srgb, var(--crimson) 14%, transparent); color: var(--crimson); }
.chip-act:active { transform: scale(.78); transition-duration: .05s; }
.opt-add-row { display: flex; align-items: center; gap: 7px; }
.opt-add-row input { flex: 1; min-width: 0; }
.opt-cancel { background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-2); border-radius: var(--radius-sm); cursor: pointer; padding: 6px 9px; font-size: 12px; }
.skill-add { display: flex; flex-direction: column; gap: 7px; padding: 10px; border: 1px dashed var(--gold-deep); border-radius: var(--radius); background: var(--bg-1); }
.skill-md { white-space: pre-wrap; font-family: var(--font-mono); font-size: 11px; line-height: 1.5; color: var(--ink-2); background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 9px 11px; margin: 2px 0 0; max-height: 160px; overflow: auto; }
@media (max-width: 640px) { .api-add-row { flex-wrap: wrap; } .api-add-row select, .api-add-row input { flex: 1 1 100%; } }
.bp-tools { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--line); }
.bp-tool { flex: 1; font-family: var(--font-body); font-size: 12.5px; font-weight: 600; color: var(--ink); background: var(--bg-3);
  border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px; cursor: pointer; transition: all .12s; }
.bp-tool:hover:not(:disabled) { border-color: var(--gold-deep); color: var(--gold-bright); }
.bp-tool.on { background: var(--gold-grad); color: #fff; border-color: var(--gold-deep); }
.bp-tool:disabled { opacity: .4; cursor: default; }
.room-aside { width: 300px; flex: 0 0 300px; align-self: stretch; display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 760px) { .room-aside { width: 100%; flex: none; } }
.ra-tabs { display: flex; border-bottom: 1px solid var(--line); }
.ra-tab { flex: 1; font-family: var(--font-body); font-size: 12.5px; font-weight: 600; color: var(--ink-2); background: transparent; border: none; border-bottom: 2px solid transparent; padding: 9px 6px; cursor: pointer; }
.ra-tab.on { color: var(--gold-bright); border-bottom-color: var(--gold-deep); }
.ra-chat { display: flex; flex-direction: column; flex: 1; min-height: 320px; }
.ra-scroll { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 9px; max-height: 460px; }
.ra-input { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--line); }
.ra-input input { flex: 1; min-width: 0; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--ink); font-family: var(--font-body); font-size: 13px; outline: none; }
.ra-input input:focus { border-color: var(--gold-deep); }
.ra-files { padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 9px; max-height: 520px; }
.ra-files-head { font-size: 11px; color: var(--gold); letter-spacing: .04em; margin-bottom: 2px; }
.ra-file { background: var(--bg-1); border: 1px solid var(--line-soft); border-left: 3px solid var(--gold-deep); border-radius: var(--radius-sm); padding: 8px 11px; }
.ra-file-name { font-size: 12.5px; font-weight: 700; color: var(--gold-bright); }
.ra-file-th { font-size: 12px; color: var(--ink); margin-top: 2px; }
.ra-file-d { font-size: 11px; color: var(--ink-3); margin-top: 2px; line-height: 1.45; }
.ra-file { text-align: left; cursor: pointer; transition: border-color .12s, transform .1s; font-family: inherit; width: 100%; }
.ra-file:hover { border-left-color: var(--gold-bright); transform: translateX(2px); }
.ra-file-open { float: right; color: var(--gold-bright); }
.ra-file--shared { border-left-color: var(--emerald); }
.ra-file--shared:hover { border-left-color: var(--emerald); }
.ra-agent-sel { width: 100%; margin-bottom: 4px; }

/* view mode: dock the aside as a horizontal panel at the bottom */
.rv-body.is-view { flex-direction: column; align-items: stretch; }
.rv-body.is-view .room-canvas-wrap { align-self: center; }
.rv-body.is-view .room-aside { width: 100%; flex: 0 0 auto; align-self: stretch; height: 560px; max-height: 560px; }
.rv-body.is-view .ra-files { flex: 1; flex-direction: row; flex-wrap: wrap; align-content: flex-start; max-height: none; overflow-y: auto; gap: 10px; }
.rv-body.is-view .ra-files-head { flex-basis: 100%; margin: 2px 0; }
.rv-body.is-view .ra-file { width: 232px; flex: 0 0 232px; }
.rv-body.is-view .ra-file:hover { transform: translateY(-2px); }
.rv-body.is-view .ra-agent-sel { flex-basis: 240px; width: 240px; margin: 0; }
.rv-body.is-view .ra-chat { min-height: 0; flex: 1; }
.rv-body.is-view .ra-scroll { max-height: none; flex: 1; }

/* Claude-desktop-style room chat: choices, attachments, + menu */
.rc-msg { display: flex; flex-direction: column; gap: 5px; }
.rc-msg.me { align-items: flex-end; }
.wb-atts { display: flex; flex-wrap: wrap; gap: 6px; max-width: 82%; }
.rc-msg.me .wb-atts { justify-content: flex-end; }
.wb-att { font-size: 11.5px; background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: 10px; padding: 4px 9px; color: var(--ink-2); }
.wb-att-img { width: 84px; height: 84px; border-radius: 10px; object-fit: cover; border: 1px solid var(--line); }
.rc-choices { display: flex; flex-wrap: wrap; gap: 6px; max-width: 94%; }
.rc-choice { font-family: var(--font-body); font-size: 12px; background: var(--bg-2); border: 1px solid var(--gold-deep); color: var(--gold-bright); border-radius: 16px; padding: 5px 12px; cursor: pointer; transition: all .12s; }
.rc-choice:hover { background: color-mix(in srgb, var(--gold) 14%, var(--bg-2)); }
.rc-choice:disabled { opacity: .5; cursor: default; }
.rc-reqbtn { font-family: var(--font-body); font-size: 12.5px; background: var(--bg-1); border: 1px dashed var(--gold-deep); color: var(--gold-bright); border-radius: 12px; padding: 7px 14px; cursor: pointer; }
.rc-reqbtn:hover { background: color-mix(in srgb, var(--gold) 10%, var(--bg-1)); }
.rc-atts { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 12px 0; }
.rc-att { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 16px; padding: 3px 6px 3px 8px; font-size: 11.5px; color: var(--ink-2); max-width: 190px; }
.rc-att img { width: 26px; height: 26px; border-radius: 6px; object-fit: cover; }
.rc-att-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rc-att button { border: none; background: transparent; color: var(--ink-3); cursor: pointer; font-size: 12px; padding: 0 2px; }
.rc-compose { display: flex; align-items: flex-end; gap: 8px; padding: 10px; border-top: 1px solid var(--line); position: relative; }
.rc-plus-wrap { position: relative; }
.rc-plus { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--line); background: var(--bg-1); color: var(--ink-2); font-size: 18px; cursor: pointer; display: grid; place-items: center; line-height: 1; }
.rc-plus:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.rc-menu { position: absolute; bottom: 42px; left: 0; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-panel); padding: 6px; display: flex; flex-direction: column; gap: 2px; min-width: 172px; z-index: 20; }
.rc-menu button { text-align: left; background: transparent; border: none; color: var(--ink); font-family: var(--font-body); font-size: 13px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; }
.rc-menu button:hover { background: var(--bg-4); }
.rc-text { flex: 1; min-width: 0; background: var(--bg-1); border: 1px solid var(--line); border-radius: 18px; padding: 9px 14px; color: var(--ink); font-family: var(--font-body); font-size: 13.5px; outline: none; }
.rc-text:focus { border-color: var(--gold-deep); }
.rc-send { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--gold-grad); color: #fff; font-size: 14px; cursor: pointer; display: grid; place-items: center; flex: 0 0 auto; }
.rc-send:disabled { opacity: .5; cursor: default; }

/* AI export files */
.ra-exp-headrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
.ra-exp-gen { font-family: var(--font-body); font-size: 11px; font-weight: 600; background: var(--gold-grad); color: #fff; border: none; border-radius: 14px; padding: 4px 11px; cursor: pointer; white-space: nowrap; }
.ra-exp-gen:hover { filter: brightness(1.06); }
.ra-exp { display: flex; align-items: center; gap: 10px; width: 246px; flex: 0 0 246px; background: var(--bg-1); border: 1px solid var(--line-soft); border-left: 3px solid var(--gold-deep); border-radius: var(--radius-sm); padding: 9px 11px; }
.ra-exp-ic { font-size: 22px; line-height: 1; }
.ra-exp-main { flex: 1; min-width: 0; }
.ra-exp-name { font-size: 12.5px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ra-exp-meta { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
.ra-exp-by { font-size: 10px; color: var(--ink-4); margin-top: 1px; }
.ra-exp-actions { display: flex; flex-direction: column; gap: 4px; }
.ra-exp-actions button { width: 28px; height: 24px; border: 1px solid var(--line); background: var(--bg-2); border-radius: 5px; cursor: pointer; color: var(--ink-2); font-size: 12px; }
.ra-exp-actions button:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.ra-exp.tone-emerald { border-left-color: var(--emerald); }
.ra-exp.tone-gold { border-left-color: var(--gold); }
.ra-exp.tone-sapphire { border-left-color: var(--sapphire); }
.ra-exp.tone-violet { border-left-color: var(--amethyst); }

/* room info tab — room data linked to its task */
.ra-roominfo { gap: 10px; }
.ri-meta { flex-basis: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.ri-mrow { background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 8px 11px; display: flex; flex-direction: column; gap: 2px; }
.ri-k { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); }
.ri-v { font-size: 13px; font-weight: 600; color: var(--ink); }
.ri-task { width: 260px; flex: 0 0 260px; background: var(--bg-1); border: 1px solid var(--line-soft); border-left: 3px solid var(--gold-deep); border-radius: var(--radius-sm); padding: 10px 12px; }
.ri-task-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ri-code { font-size: 11px; font-weight: 600; color: var(--gold-bright); }
.ri-task-title { font-size: 13px; font-weight: 700; color: var(--ink); margin: 6px 0 8px; }
.ri-task-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.ri-task-actions button { font-family: var(--font-body); font-size: 11px; background: var(--bg-2); border: 1px solid var(--line); color: var(--ink-2); border-radius: var(--radius-sm); padding: 4px 8px; cursor: pointer; }
.ri-task-actions button:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
@media (max-width: 760px) { .ri-meta { grid-template-columns: 1fr 1fr; } }

/* segmented toggle (create-task: new room vs existing) — kit segmented */
.seg-toggle { display: flex; gap: 3px; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); padding: 3px; }
.seg-toggle button { flex: 1; font-family: var(--font-body); font-size: 13px; font-weight: 600; padding: 8px 10px; border: none; background: transparent; color: var(--ink-3); border-radius: var(--radius-sm); cursor: pointer; transition: background .15s, color .15s, box-shadow .15s, transform .25s var(--spring); }
.seg-toggle button:hover:not(.on) { color: var(--ink-2); }
.seg-toggle button:active { transform: scale(.96); transition-duration: .05s; }
.seg-toggle button.on { background: var(--bg-2); color: var(--gold-bright); box-shadow: var(--shadow-raised); }

/* ---- sitemap audit screen ---- */
.sm-bar { display: flex; align-items: center; gap: 10px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 8px 10px 8px 14px; margin: 14px 0 10px; box-shadow: var(--shadow-soft); }
.sm-bar .sm-ic { font-size: 16px; opacity: .7; }
.sm-bar input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--ink); font-family: var(--font-mono); font-size: 14px; }
.sm-clear { background: transparent; border: none; color: var(--ink-3); cursor: pointer; font-size: 13px; }
.sm-examples { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.sm-chip { font-family: var(--font-mono); font-size: 12px; background: var(--bg-2); border: 1px solid var(--line); color: var(--ink-2); border-radius: 14px; padding: 3px 11px; cursor: pointer; }
.sm-chip:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.sm-loading { display: flex; align-items: center; gap: 12px; color: var(--ink-2); font-size: 14px; padding: 10px 4px; }
.sm-summary { display: flex; gap: 18px; align-items: stretch; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 18px; box-shadow: var(--shadow-soft); }
.sm-score { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 120px; border-right: 1px solid var(--line); padding-right: 18px; }
.sm-score-num { font-family: var(--font-head); font-size: 42px; font-weight: 700; line-height: 1; color: var(--emerald); }
.sm-score-num span { font-size: 20px; }
.sm-score.warn .sm-score-num { color: var(--gold-bright); }
.sm-score.bad .sm-score-num { color: var(--crimson); }
.sm-score-lbl { font-size: 11px; color: var(--ink-3); letter-spacing: .08em; margin-top: 4px; }
.sm-sumdetail { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 9px; min-width: 0; }
.sm-target { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sm-track { height: 8px; border-radius: 99px; background: var(--bg-4); overflow: hidden; }
.sm-fill { height: 100%; border-radius: 99px; background: var(--emerald); transition: width .5s cubic-bezier(.4,0,.2,1); }
.sm-fill.warn { background: var(--gold); }
.sm-fill.bad { background: var(--crimson); }
.sm-counts { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 12.5px; }
.sm-grade { font-weight: 700; font-size: 12px; padding: 2px 10px; border-radius: 20px; }
.sm-grade.ok { color: var(--emerald); background: color-mix(in srgb, var(--emerald) 14%, transparent); }
.sm-grade.warn { color: var(--gold-bright); background: color-mix(in srgb, var(--gold) 16%, transparent); }
.sm-grade.bad { color: var(--crimson); background: color-mix(in srgb, var(--crimson) 14%, transparent); }
.sm-cnt.ok { color: var(--emerald); }
.sm-cnt.miss { color: var(--crimson); }
.sm-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.sm-col { background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
.sm-col-head { font-family: var(--font-head); font-weight: 700; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.sm-col-head span { font-family: var(--font-mono); font-size: 12px; background: var(--bg-4); color: var(--ink-2); border-radius: 12px; padding: 1px 9px; }
.sm-col-head.ok { color: var(--emerald); }
.sm-col-head.miss { color: var(--crimson); }
.sm-item { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: var(--radius-sm); border: 1px solid var(--line-soft); background: var(--bg-1); margin-bottom: 7px; }
.sm-item-mark { width: 22px; height: 22px; flex: 0 0 22px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #fff; }
.sm-item.ok .sm-item-mark { background: var(--emerald); }
.sm-item.miss .sm-item-mark { background: var(--crimson); }
.sm-item-body { flex: 1; min-width: 0; }
.sm-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.sm-item-desc { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
.sm-item-cat { font-size: 10px; color: var(--ink-4); background: var(--bg-3); border-radius: 6px; padding: 2px 7px; white-space: nowrap; }
.sm-allgood { font-size: 14px; color: var(--emerald); padding: 16px 6px; text-align: center; }
@media (max-width: 760px) { .sm-cols { grid-template-columns: 1fr; } .sm-summary { flex-direction: column; } .sm-score { border-right: none; border-bottom: 1px solid var(--line); padding-right: 0; padding-bottom: 12px; } }

/* sitemap match — categories, training, term matching */
.sm-section-h { font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; margin: 18px 0 8px; }
.sm-cats { display: flex; gap: 8px; flex-wrap: wrap; }
.sm-cat { font-family: var(--font-body); font-size: 13px; font-weight: 600; background: var(--bg-2); border: 1px solid var(--line); color: var(--ink-2); border-radius: 18px; padding: 6px 15px; cursor: pointer; transition: all .12s; }
.sm-cat:hover { border-color: var(--gold-deep); }
.sm-cat.on { background: color-mix(in srgb, var(--gold) 15%, var(--bg-2)); border-color: var(--gold); color: var(--ink); }
.sm-cat.add { border-style: dashed; color: var(--ink-3); }
.sm-addcat { margin-top: 10px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
.sm-addcat-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.sm-addcat-from { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.sm-fromchip { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 12.5px; background: var(--bg-1); border: 1px solid var(--line); color: var(--ink-2); border-radius: 16px; padding: 5px 12px; cursor: pointer; }
.sm-fromchip input { accent-color: var(--gold); }
.sm-fromchip.on { background: color-mix(in srgb, var(--gold) 14%, var(--bg-2)); border-color: var(--gold); color: var(--ink); }
.sm-fromchip button { background: transparent; border: none; color: inherit; cursor: pointer; font-size: 11px; opacity: .7; padding: 0 0 0 2px; }
.sm-cat.del { border-color: color-mix(in srgb, var(--crimson) 45%, transparent); color: var(--crimson); }
.sm-cat.del:hover { background: color-mix(in srgb, var(--crimson) 10%, transparent); }
.sm-settings { background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; max-width: 640px; }
.sm-set-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.sm-set-label { font-size: 13.5px; font-weight: 600; color: var(--ink); min-width: 130px; flex: 0 0 130px; }
.sm-set-row select { max-width: 230px; }
.sm-set-hint { font-size: 11.5px; color: var(--ink-3); }
.sm-set-toggle { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--ink-2); cursor: pointer; }
.sm-set-toggle input { width: 16px; height: 16px; accent-color: var(--gold); }
.sm-set-note { font-size: 11px; color: var(--ink-4); border-top: 1px solid var(--line); padding-top: 12px; }
.sm-log { display: flex; flex-direction: column; gap: 4px; }
.sm-logrow { display: grid; grid-template-columns: 130px 1fr auto auto; gap: 12px; align-items: center; padding: 8px 12px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 12.5px; }
.sm-log-act { font-weight: 700; color: var(--ink); }
.sm-log-detail { color: var(--ink-2); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sm-log-actor { font-size: 11px; color: var(--gold-bright); white-space: nowrap; }
.sm-log-time { font-size: 11px; color: var(--ink-4); white-space: nowrap; }
@media (max-width: 760px) { .sm-logrow { grid-template-columns: 1fr; gap: 2px; } }
.sm-aicheck { display: inline-flex; align-items: center; gap: 9px; font-size: 13px; color: var(--ink-2); cursor: pointer; margin: 2px 0 14px; }
.sm-aicheck input { width: 16px; height: 16px; accent-color: var(--gold); }
.sm-train { background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
.sm-train-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.sm-up { margin-left: auto; font-family: var(--font-body); font-size: 12.5px; font-weight: 600; background: var(--gold-grad); color: #fff; border: none; border-radius: 16px; padding: 6px 14px; cursor: pointer; }
.sm-up:hover { filter: brightness(1.06); }
.sm-train-list { display: flex; flex-wrap: wrap; gap: 8px; }
.sm-tr { display: flex; align-items: center; gap: 9px; width: 260px; flex: 0 0 260px; background: var(--bg-1); border: 1px solid var(--line-soft); border-left: 3px solid var(--emerald); border-radius: var(--radius-sm); padding: 8px 10px; }
.sm-tr-ic { font-size: 18px; }
.sm-tr-body { flex: 1; min-width: 0; }
.sm-tr-name { font-size: 12px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sm-tr-meta { font-size: 11px; color: var(--ink-3); }

/* ---- in-app modal (confirm / prompt) ---- */
.uim-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(6,8,12,.62); backdrop-filter: blur(2px); display: grid; place-items: center; padding: 24px; animation: fadeIn .14s ease; }

@media (prefers-reduced-motion: reduce) { .uim { animation: fadeIn .15s ease; } }
.uim.danger { border-color: var(--crimson, #c2554f); box-shadow: 0 30px 80px -20px rgba(0,0,0,.7), 0 0 70px -26px var(--crimson, #c2554f); }

/* ---- loading popup module ---- */
