/* tabbed task detail (brief vs AI worklog) */
.doc-tabs { display: flex; gap: 6px; }
.doc-tab { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; padding: 5px 14px; border: 1px solid var(--line); background: var(--bg-2); color: var(--ink-3); border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-body); }
.doc-tab span { font-size: 13px; font-weight: 700; white-space: nowrap; }
.doc-tab em { font-style: normal; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; opacity: .75; }
.doc-tab:hover { border-color: var(--gold-deep); color: var(--ink); }
.doc-tab.on { background: color-mix(in srgb, var(--gold) 12%, var(--bg-2)); border-color: var(--gold); color: var(--ink); }
.doc-tools { display: flex; gap: 4px; }
.doc-tools button { min-width: 32px; height: 30px; padding: 0 8px; background: var(--bg-3); border: 1px solid var(--line); color: var(--ink); border-radius: var(--radius-sm); cursor: pointer; font-size: 12.5px; font-family: var(--font-mono); }
.doc-tools button:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.doc-saved { font-size: 11px; }
.doc-close { background: var(--bg-3); border: 1px solid var(--line); color: var(--ink); border-radius: var(--radius-sm); padding: 7px 13px; cursor: pointer; font-size: 13px; font-weight: 600; }
.doc-close:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.doc-body { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 28px 20px 80px; }
.doc-loading { color: var(--ink-3); font-family: var(--font-mono); font-size: 13px; padding: 40px; }
.doc-editor { width: 100%; max-width: 760px; }
.doc-editor .ProseMirror, .doc-editor[contenteditable] { min-height: 60vh; outline: none; color: var(--ink); font-size: 15px; line-height: 1.7; }
.doc-editor .ProseMirror:focus { outline: none; }

/* ---- inline rich Body input (RichBody) ---- */
.richbody { border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--bg-3); overflow: hidden; transition: border-color .15s, box-shadow .15s, background .15s; }
.richbody:focus-within { border-color: var(--gold); background: var(--bg-2); box-shadow: 0 0 0 3px var(--gold-glow); }
.rb-tools { display: flex; gap: 2px; flex-wrap: wrap; padding: 5px 6px; border-bottom: 1px solid var(--line-soft); }
.rb-tools button { border: none; background: none; cursor: pointer; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--ink-3); padding: 4px 8px; border-radius: var(--radius-sm); transition: background .12s, color .12s, transform .2s var(--spring); }
.rb-tools button:hover { background: var(--bg-4); color: var(--ink); }
.rb-tools button:active { transform: scale(.86); transition-duration: .05s; }
.rb-edit-wrap { position: relative; }
.rb-loading { padding: 12px; font-size: 11.5px; }
.rb-editor { padding: 10px 12px; font-size: 13.5px; line-height: 1.65; color: var(--ink); cursor: text; }
.rb-editor .ProseMirror, .rb-editor[contenteditable] { outline: none; min-height: 88px; }
.rb-editor p { margin: 0 0 8px; }
.rb-editor h1 { font-size: 17px; margin: 8px 0 6px; }
.rb-editor h2 { font-size: 15px; margin: 8px 0 4px; }
.rb-editor ul, .rb-editor ol { margin: 0 0 8px; padding-left: 22px; }
.rb-editor pre { background: var(--bg-4); border-radius: 6px; padding: 8px 10px; font-family: var(--font-mono); font-size: 12px; overflow-x: auto; }
.rb-editor .ProseMirror p.is-editor-empty:first-child::before { content: attr(data-placeholder); color: var(--ink-4); float: left; height: 0; pointer-events: none; }
/* skill md viewer keeps plain-text linebreaks */
.skill-md { white-space: pre-wrap; }
.doc-editor h1 { font-family: var(--font-head); font-size: 26px; margin: 18px 0 10px; color: var(--ink); }
.doc-editor h2 { font-family: var(--font-head); font-size: 19px; margin: 16px 0 8px; color: var(--ink); }
.doc-editor p { margin: 8px 0; } .doc-editor ul, .doc-editor ol { padding-left: 24px; margin: 8px 0; }
.doc-editor pre { background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px; font-family: var(--font-mono); font-size: 13px; overflow-x: auto; }
.doc-editor code { font-family: var(--font-mono); }

/* ---------------- HERMES chat (tab) + World tabs ---------------- */
.world-screen { padding-bottom: 24px; }
.world-tabs { display: inline-flex; gap: 3px; margin: 4px 0 18px; padding: 3px; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); }
.wtab { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--ink-3); background: transparent; border: none;
  border-radius: var(--radius-sm); padding: 8px 16px; cursor: pointer; transition: background .15s, color .15s, box-shadow .15s, transform .25s var(--spring); }
.wtab:hover { color: var(--ink-2); }
.wtab:active { transform: scale(.94); transition-duration: .05s; }
.wtab.on { color: var(--gold-bright); background: var(--bg-2); box-shadow: var(--shadow-raised); }
.rooms-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.room-search { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 8px 12px; max-width: 420px; }
.room-search input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--ink); font-family: var(--font-body); font-size: 13.5px; }
.room-search .rs-ic { opacity: .6; font-size: 13px; }
.room-search .rs-clear { background: transparent; border: none; color: var(--ink-3); cursor: pointer; font-size: 12px; }
.room-empty { grid-column: 1 / -1; padding: 28px; text-align: center; font-size: 13.5px; }

.hermes-fulltab { display: flex; flex-direction: column; height: calc(100vh - 230px); min-height: 380px; overflow: hidden;
  background: var(--panel-grad); border: 1px solid var(--gold-deep); border-radius: var(--radius-lg); box-shadow: var(--shadow-panel); }
.hermes-inputbar--tab { position: static; margin: 10px; box-shadow: none; }

/* ---------------- OVERVIEW dashboard ---------------- */
.ov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.ov-card { background: var(--panel-grad); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-raised);
  padding: 14px; cursor: pointer; transition: border-color .15s, transform .12s, box-shadow .15s; }
.ov-card:hover { border-color: var(--gold-deep); transform: translateY(-2px); box-shadow: var(--shadow-pop), 0 0 22px -12px var(--gold-glow); }
.ov-head { display: flex; align-items: center; gap: 12px; }
.ov-thumb { width: 84px; height: 53px; flex: 0 0 84px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--line); background: #0b0e14; }
.ov-thumb .room-thumb-cv { width: 100%; height: 100%; }
.ov-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ov-stats { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11.5px; color: var(--ink-3); margin-top: 4px; }
.ov-stats .ov-active { color: var(--emerald); }
.ov-enter { font-family: var(--font-display); font-weight: 700; font-size: 11px; color: var(--gold-bright); white-space: nowrap; opacity: 0; transition: opacity .15s; }
.ov-card:hover .ov-enter { opacity: 1; }
.ov-agents { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; border-top: 1px solid var(--line-soft); padding-top: 10px; }
.ov-agent { display: flex; align-items: center; gap: 8px; font-size: 11.5px; }
.ov-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; background: #9aa0a8; }
.ov-dot[data-s="on"] { background: var(--emerald); box-shadow: 0 0 5px var(--emerald); }
.ov-dot[data-s="busy"] { background: var(--gold-bright); box-shadow: 0 0 5px var(--gold-glow); }
.ov-aname { font-weight: 700; color: var(--ink); flex: 0 0 auto; }
.ov-act { color: var(--ink-2); flex: 0 0 auto; }
.ov-task { color: var(--ink-3); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ov-left { color: var(--gold-bright); flex: 0 0 auto; font-size: 10.5px; }
.hermes-bar { position: fixed; left: var(--sidebar-w); right: 0; bottom: 0; z-index: 55;
  padding: 0 24px 14px; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.hermes-bar > * { pointer-events: auto; }
.hermes-inputbar { display: flex; align-items: center; gap: 10px; max-width: 1452px; margin: 0 auto; width: 100%;
  background: var(--panel-grad); border: 1px solid var(--gold-deep); border-radius: 30px; padding: 8px 8px 8px 14px;
  box-shadow: var(--shadow-pop), 0 0 30px -12px var(--gold-glow); cursor: text; }
.hermes-crest-sm { width: 32px; height: 32px; flex: 0 0 32px; display: grid; place-items: center; border-radius: 50%;
  background: var(--raised-grad); border: 1px solid var(--gold-deep); color: var(--gold-bright); font-size: 16px; box-shadow: 0 0 12px -4px var(--gold-glow); }
.hermes-inputbar input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--ink);
  font-family: var(--font-body); font-size: 14px; padding: 8px 4px; }
.hermes-inputbar input::placeholder { color: var(--ink-3); }
.hermes-toggle { background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-2); border-radius: 50%;
  width: 34px; height: 34px; flex: 0 0 34px; cursor: pointer; font-size: 11px; line-height: 1; transition: all .12s; }
.hermes-toggle:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.hermes-send { background: var(--gold-grad); color: #fff; border: 1px solid var(--gold-deep); border-radius: 22px;
  padding: 9px 18px; font-family: var(--font-display); font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 12px -6px var(--gold-glow); }
.hermes-send:hover { background: var(--gold-grad-hover); }
.hermes-log { max-width: 1452px; margin: 0 auto; width: 100%; height: 360px; max-height: 52vh; display: flex; flex-direction: column;
  overflow: hidden; background: var(--panel-grad); border: 1px solid var(--gold-deep); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-pop), 0 0 60px -28px var(--gold-glow); animation: slideIn .22s cubic-bezier(.2,.8,.2,1); }
.hermes-log-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
.hermes-log-head .feature-tag { margin-left: auto; }
.hermes-log-scroll { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.wchat-crest { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 8px; font-size: 15px; flex: 0 0 30px;
  background: var(--raised-grad); border: 1px solid var(--gold-deep); color: var(--gold-bright); box-shadow: 0 0 14px -5px var(--gold-glow); }
.wchat-name { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: .08em; color: var(--gold-bright); }
.wchat-expand { background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-2); border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 13px; line-height: 1; padding: 6px 10px; cursor: pointer; }
.wchat-expand:hover { background: var(--bg-4); color: var(--gold-bright); border-color: var(--gold-deep); }
.wbubble { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; max-width: 92%; }
.wbubble.me { align-self: flex-end; background: var(--gold-grad); color: #fff; padding: 8px 12px; border-radius: 12px 12px 4px 12px; }
.wbubble.ai { align-self: flex-start; background: var(--bg-3); border: 1px solid var(--line); color: var(--ink); padding: 8px 12px; border-radius: 4px 12px 12px 12px; }
.wbubble-ic { color: var(--gold-bright); flex: 0 0 auto; }
.wchat-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 14px 0; }
@media (max-width: 720px) { .hermes-bar { left: 0; padding: 0 12px 10px; } .world-screen { padding-bottom: 78px; } }

/* room sound toggle (kit button) — active tint when on */
.rv-sound-on { color: var(--gold-bright); border-color: color-mix(in srgb, var(--gold) 42%, transparent) !important; background: color-mix(in srgb, var(--gold) 10%, var(--bg-2)) !important; }

/* ---------------- LIVE ACTIVITY · BUBBLES · SUB-AGENTS ---------------- */
.rc-actchip { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); z-index: 5;
  background: var(--panel-grad); border: 1px solid var(--gold-deep); border-radius: 20px; padding: 1px 5px; font-size: 11px;
  line-height: 1.3; box-shadow: 0 2px 6px -2px rgba(0,0,0,.6); white-space: nowrap; }
.rc-bubble { position: absolute; bottom: 100%; left: 50%; transform: translate(-50%, -4px); z-index: 30;
  background: var(--panel-grad); border: 1px solid var(--line); color: var(--ink); border-radius: 10px; padding: 5px 9px;
  font-size: 11.5px; font-weight: 600; line-height: 1.25; white-space: nowrap; box-shadow: var(--shadow-raised); }
.rc-bubble::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--panel-2, #20242e); }
.rc-bubble.input { border-color: var(--gold-deep); color: var(--gold-bright); animation: bubblePulse 1.4s ease-in-out infinite; }
.rc-bubble.perm { border-color: var(--ruby, #c2554f); color: #e8897f; animation: bubblePulse 1s ease-in-out infinite; }
.rc-bubble.done { border-color: var(--emerald); color: var(--emerald); }
@keyframes bubblePulse { 0%,100% { transform: translate(-50%,-4px) scale(1); box-shadow: var(--shadow-raised); } 50% { transform: translate(-50%,-7px) scale(1.04); box-shadow: var(--shadow-raised), 0 0 14px -3px var(--gold-glow); } }

/* activity-driven sprite motion (seated workers; bob is off when seated) */
.rc-agent.act-writing .pixel-sprite { animation: actType .42s steps(2) infinite; }
.rc-agent.act-reading .pixel-sprite { animation: actRead 2.6s ease-in-out infinite; }
.rc-agent.act-running .pixel-sprite { animation: actRun .26s linear infinite; }
.rc-agent.act-thinking .pixel-sprite { animation: actThink 2.4s ease-in-out infinite; }
.rc-agent.act-done .pixel-sprite { animation: actPop .5s cubic-bezier(.2,.9,.3,1.4); }
@keyframes actType { 0% { transform: translateY(0); } 100% { transform: translateY(-1.5px); } }
@keyframes actRead { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
@keyframes actRun  { 0% { transform: translateX(-1px); } 50% { transform: translateX(1px); } 100% { transform: translateX(-1px); } }
@keyframes actThink{ 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2.5px); } }
@keyframes actPop  { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }

/* tether lines parent → sub-agent */
.rc-links { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
.rc-links line { stroke: var(--gold-bright); stroke-width: 1.4; stroke-dasharray: 3 3; opacity: .55; vector-effect: non-scaling-stroke; animation: dashFlow .6s linear infinite; }
@keyframes dashFlow { to { stroke-dashoffset: -6; } }

.rc-subagent { position: absolute; transform: translate(-50%, -90%); display: flex; flex-direction: column; align-items: center;
  pointer-events: none; transition: left .5s linear, top .5s linear; filter: saturate(.85) brightness(.95); }
.rc-subagent .pixel-sprite, .rc-subagent .ceo-sprite { filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); opacity: .92; }
.rc-subagent .rc-agent-shadow { position: absolute; bottom: 1px; width: 56%; height: 16%; min-height: 3px; border-radius: 50%; background: rgba(0,0,0,.38); filter: blur(1.2px); }
.rc-sub-tag { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); z-index: 3; font-family: var(--font-mono);
  font-size: 8px; letter-spacing: .08em; color: #fff; background: var(--gold-grad); border: 1px solid var(--gold-deep); border-radius: 8px; padding: 0 4px; line-height: 1.5; }
.rc-sub-act { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); z-index: 4; font-size: 9px; }

/* ===== styles/kit-overlays.css ===== */
/* ============================================================
   PiKaOs KIT OVERLAYS — shared styles for the imperative in-app
   popups (confirm/alert/prompt, loading, notifications) so they
   use the new design language app-wide. Ported from the PiKaOs
   component-kit reference.
   ============================================================ */

/* spinner */
.pk-spin { width: 15px; height: 15px; border-radius: 50%; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; animation: pk-spin .7s linear infinite; display: inline-block; }
.pk-spin.dark { border-color: color-mix(in srgb, var(--ink-3) 35%, transparent); border-top-color: var(--ink-3); }
@keyframes pk-spin { to { transform: rotate(360deg); } }

/* overlay + base modal */
.pk-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: color-mix(in srgb, var(--bg-0) 62%, transparent);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
@media (prefers-reduced-motion: no-preference) { .pk-overlay { animation: pk-fade .16s ease both; } }
@keyframes pk-fade { from { opacity: 0; } to { opacity: 1; } }
.pk-modal {
  background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-pop); width: min(380px, 100%); padding: 24px;
}
@media (prefers-reduced-motion: no-preference) { .pk-modal { animation: pk-pop .35s cubic-bezier(.34,1.9,.6,1) both; } }
@keyframes pk-pop { from { transform: scale(.9) translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }
.pk-modal .pk-foot { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
.pk-modal .pk-foot .btn { min-width: 104px; }

/* confirm / alert / prompt (status style — centered icon pop) */
.pk-modal.status { width: min(372px, 100%); text-align: center; }
.status-ic {
  width: 62px; height: 62px; border-radius: 50%; margin: 2px auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; line-height: 1;
}
.status-ic.ok   { background: color-mix(in srgb, var(--emerald) 14%, transparent); color: var(--emerald); }
.status-ic.err  { background: color-mix(in srgb, var(--crimson) 14%, transparent); color: var(--crimson); }
.status-ic.warn { background: color-mix(in srgb, var(--amber, #d98a0c) 16%, transparent); color: var(--amber, #d98a0c); }
.status-ic.info { background: color-mix(in srgb, var(--sapphire) 14%, transparent); color: var(--sapphire); }
.status-ic.ask  { background: color-mix(in srgb, var(--gold) 14%, transparent); color: var(--gold-bright); }
.status-ic.trash{ background: color-mix(in srgb, var(--crimson) 13%, transparent); color: var(--crimson); }
@media (prefers-reduced-motion: no-preference) { .pk-modal.status .status-ic { animation: status-pop .55s cubic-bezier(.34,1.9,.6,1) both; } }
@keyframes status-pop { from { opacity: 0; transform: scale(.3); } 60% { transform: scale(1.08); } to { opacity: 1; transform: scale(1); } }
.pk-modal.status h3 { font-size: 18px; font-weight: 700; color: var(--ink); margin: 0 0 6px; }
.pk-modal.status p { font-size: 13px; color: var(--ink-3); line-height: 1.6; margin: 0 0 4px; text-wrap: pretty; }
.pk-modal .pk-input {
  width: 100%; margin-top: 14px; font-family: var(--font-body); font-size: 14px; color: var(--ink);
  background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius-sm);
  padding: 11px 12px; outline: none; text-align: left;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.pk-input:focus { border-color: var(--gold); background: var(--bg-2); box-shadow: 0 0 0 3px var(--gold-glow); }
.pk-cd { display: inline-flex; align-items: center; gap: 7px; margin-top: 12px; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-3); }
.pk-cd-num { min-width: 22px; height: 22px; padding: 0 6px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; background: var(--crimson); }
.pk-warn { margin-top: 12px; font-size: 12px; font-weight: 500; color: var(--crimson); background: color-mix(in srgb, var(--crimson) 9%, transparent); border: 1px solid color-mix(in srgb, var(--crimson) 30%, transparent); border-radius: var(--radius-sm); padding: 8px 10px; text-wrap: pretty; }
/* countdown badge inside the confirm button */
.btn-cd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; margin-left: 8px; padding: 0 5px;
  border-radius: 999px; font-family: var(--font-mono); font-size: 11.5px; font-weight: 700;
  background: rgba(255,255,255,.28); color: #fff;
}
.btn.is-counting { opacity: 1; }
.btn.btn-danger.is-counting, .btn.btn-gold.is-counting { filter: saturate(.85) brightness(.97); }

/* loading — pixel walker + indeterminate bar */
.pk-modal.load { width: min(380px, 100%); text-align: center; }
.load-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
.load-frame {
  position: relative; height: 150px;
  background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius);
  overflow: hidden; display: flex; align-items: flex-end; justify-content: center;
}
.load-frame::after { content: ""; position: absolute; bottom: 17px; left: 50%; transform: translateX(-50%); width: 70px; height: 13px; border-radius: 50%; background: rgba(0,0,0,.18); filter: blur(3px); }
.walker { position: relative; z-index: 2; margin-bottom: 15px; width: 56px; height: 126px; background: url(public/assets/ceo-walk.png) 0 0 / 2240px 126px no-repeat; image-rendering: pixelated; }
@media (prefers-reduced-motion: no-preference) { .walker.walking { animation: ceo-walk 1.15s steps(40) infinite; } }
@keyframes ceo-walk { from { background-position-x: 0; } to { background-position-x: -2240px; } }
.load-track { height: 8px; border-radius: 999px; background: var(--bg-4); overflow: hidden; margin-top: 16px; position: relative; }
.load-indet { position: absolute; top: 0; left: 0; height: 100%; width: 38%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); animation: load-indet 1.15s ease-in-out infinite; }
@keyframes load-indet { 0% { left: -40%; } 100% { left: 100%; } }
.load-meta { display: flex; align-items: center; justify-content: center; margin-top: 12px; }
.load-label { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-3); }

/* notifications panel (topbar Todo bell) */
.notif-pop {
  position: fixed; z-index: 410; width: 360px; max-width: calc(100vw - 28px);
  background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-pop); overflow: hidden;
}
@media (prefers-reduced-motion: no-preference) { .notif-pop { animation: pk-pop .3s cubic-bezier(.34,1.9,.6,1) both; transform-origin: top right; } }
.notif-pop-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px 12px; }
.notif-pop-head h4 { font-size: 15px; font-weight: 700; color: var(--ink); margin: 0; }
.notif-head-acts { display: flex; align-items: center; gap: 6px; }
.notif-clear { border: none; background: none; cursor: pointer; font-family: var(--font-body); font-size: 11.5px; font-weight: 600; color: var(--ink-3); padding: 5px 9px; border-radius: 999px; transition: background .12s, color .12s, transform .2s var(--spring); }
.notif-clear:hover { background: var(--bg-3); color: var(--crimson); }
.notif-clear:active { transform: scale(.92); transition-duration: .05s; }
.notif-toprow { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.notif-time { font-size: 10px; color: var(--ink-4); flex: none; }
.notif-av.sys { background: color-mix(in srgb, var(--sapphire) 13%, transparent); }
.notif-dot { position: absolute; top: 14px; right: 12px; width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }
.notif-row { position: relative; }
.notif-row.unread .notif-from { color: var(--ink); }
.notif-q { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.notif-pop-head .n-count { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--gold-bright); background: color-mix(in srgb, var(--gold) 12%, transparent); border-radius: 999px; padding: 2px 9px; }
.notif-pop-close { width: 26px; height: 26px; border: none; background: none; border-radius: 50%; cursor: pointer; color: var(--ink-3); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background .12s, color .12s, transform .2s var(--spring); }
.notif-pop-close:hover { background: var(--bg-3); color: var(--ink); } .notif-pop-close:active { transform: scale(.84); transition-duration: .05s; }
.notif-pop-list { max-height: 380px; overflow-y: auto; padding: 6px; border-top: 1px solid var(--line-soft); }
/* 3-tab switcher (New / History / Starred) */
.notif-tabs { display: flex; gap: 4px; padding: 0 12px 10px; }
.notif-tab { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 6px;
  border: 1px solid var(--line); background: var(--bg-3); color: var(--ink-3); border-radius: 9px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: background .14s, color .14s, border-color .14s; }
.notif-tab:hover { color: var(--ink-2); background: var(--bg-4); }
.notif-tab.on { background: color-mix(in srgb, var(--gold) 13%, transparent); color: var(--gold-bright); border-color: color-mix(in srgb, var(--gold) 42%, transparent); }
.notif-tab-n { min-width: 17px; height: 17px; padding: 0 4px; border-radius: 999px; background: var(--bg-1); color: var(--ink-3);
  font-size: 10px; font-weight: 700; display: inline-grid; place-items: center; }
.notif-tab.on .notif-tab-n { background: var(--gold-grad); color: #fff; }
.notif-star { border: none; background: none; cursor: pointer; font-size: 14px; color: var(--ink-4); padding: 0 2px; line-height: 1; transition: color .14s, transform .15s var(--spring); }
.notif-star:hover { transform: scale(1.2); color: var(--gold-bright); }
.notif-star.on { color: var(--gold-bright); }
.notif-row.done { opacity: .72; }
.notif-row.done .notif-q { color: var(--ink-3); }
.notif-row { display: flex; gap: 11px; padding: 11px 12px; border-radius: var(--radius); position: relative; transition: background .15s; }
.notif-row:hover { background: var(--bg-3); }
.notif-row.unread { background: color-mix(in srgb, var(--gold) 6%, transparent); }
.notif-row.unread:hover { background: color-mix(in srgb, var(--gold) 11%, transparent); }
@media (prefers-reduced-motion: no-preference) { .notif-pop.open .notif-row { animation: notif-row-in .34s cubic-bezier(.34,1.9,.6,1) both; } .notif-pop.open .notif-row:nth-child(2){animation-delay:.04s;} .notif-pop.open .notif-row:nth-child(3){animation-delay:.08s;} .notif-pop.open .notif-row:nth-child(4){animation-delay:.12s;} }
@keyframes notif-row-in { from { opacity: 0; transform: translateY(-7px); } to { opacity: 1; transform: none; } }
.notif-av { width: 38px; height: 38px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; font-size: 17px; background: color-mix(in srgb, var(--gold) 13%, transparent); }
.notif-bd { flex: 1; min-width: 0; }
.notif-from { font-size: 12px; font-weight: 700; color: var(--ink); }
.notif-q { font-size: 13px; line-height: 1.5; color: var(--ink-2); margin-top: 2px; text-wrap: pretty; }
.notif-row-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 9px; }
.notif-room { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); }
.notif-row-acts { display: flex; gap: 7px; }
.notif-pop-empty { text-align: center; color: var(--ink-4); font-size: 13px; padding: 30px 16px; }
.notif-scrim { position: fixed; inset: 0; z-index: 405; }

/* ============================================================
   Kit mini-switch — restyles every raw checkbox in settings rows
   (.sm-set-toggle, .sm-aicheck, .ck-inline) without markup changes
   ============================================================ */
.sm-set-toggle input[type="checkbox"],
.sm-aicheck input[type="checkbox"],
.ck-inline input[type="checkbox"] {
  appearance: none; -webkit-appearance: none; margin: 0; flex: none;
  width: 36px; height: 21px; border-radius: 999px; position: relative; cursor: pointer;
  background: var(--bg-4); border: 1px solid var(--line);
  transition: background .2s ease, border-color .2s ease;
  vertical-align: middle;
}
.sm-set-toggle input[type="checkbox"]::after,
.sm-aicheck input[type="checkbox"]::after,
.ck-inline input[type="checkbox"]::after {
  content: ""; position: absolute; top: 2px; left: 2px; width: 15px; height: 15px;
  border-radius: 50%; background: var(--bg-2); box-shadow: 0 1px 2px rgba(0,0,0,.25);
  transition: left .25s var(--spring, cubic-bezier(.34,1.9,.6,1)), width .15s;
}
.sm-set-toggle input[type="checkbox"]:active::after,
.sm-aicheck input[type="checkbox"]:active::after,
.ck-inline input[type="checkbox"]:active::after { width: 19px; }
.sm-set-toggle input[type="checkbox"]:checked,
.sm-aicheck input[type="checkbox"]:checked,
.ck-inline input[type="checkbox"]:checked { background: var(--gold); border-color: var(--gold-deep); }
.sm-set-toggle input[type="checkbox"]:checked::after,
.sm-aicheck input[type="checkbox"]:checked::after,
.ck-inline input[type="checkbox"]:checked::after { left: calc(100% - 17px); background: #fff; }
.sm-set-toggle input[type="checkbox"]:checked:active::after,
.sm-aicheck input[type="checkbox"]:checked:active::after,
.ck-inline input[type="checkbox"]:checked:active::after { left: calc(100% - 21px); }
.sm-set-toggle input[type="checkbox"]:focus-visible,
.sm-aicheck input[type="checkbox"]:focus-visible,
.ck-inline input[type="checkbox"]:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--gold-glow); }

/* ===== styles/dashboard.css ===== */
/* ============================================================
   MY DASHBOARD (/me) — personal workspace styles.
   Built on the shared design tokens so all three themes
   (night / day / professional) render correctly.
   ============================================================ */

/* ---------- Greeting hero ---------- */
.me-hero {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  padding: 26px 26px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  background: var(--panel-grad);
  box-shadow: var(--shadow-panel);
  position: relative; overflow: hidden;
}
.me-hero::before { content: none; }
.me-hero-av {
  width: 60px; height: 60px; flex: 0 0 60px; border-radius: var(--radius-lg);
  display: grid; place-items: center; font-size: 30px;
  background: var(--bg-3); border: 1px solid var(--line);
  box-shadow: none;
}
.me-hero-main { flex: 1 1 260px; min-width: 0; }
.me-greet-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.me-greet {
  font-family: var(--font-head); font-weight: 700; font-size: 23px;
  color: var(--ink); margin: 0; line-height: 1.3; letter-spacing: -0.02em;
}
.me-date {
  font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-3);
  letter-spacing: .03em; margin-top: 3px;
}
.me-summary {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-top: 12px;
}
.me-chip {
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  font-size: 12px; color: var(--ink-2);
  background: var(--bg-3); border: 1px solid var(--line-soft);
  border-radius: 20px; padding: 4px 11px;
}
.me-chip b { color: var(--ink); font-weight: 700; }
.me-chip .me-chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 7px var(--emerald); }
.me-hero-actions { display: flex; gap: 9px; flex-wrap: wrap; justify-content: flex-end; }
@media (max-width: 860px) {
  .me-hero { flex-wrap: wrap; }
  .me-hero-actions { width: 100%; justify-content: flex-start; }
}

/* ---------- Metric cards ---------- */
.me-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 16px 0 18px; }
@media (max-width: 1180px) { .me-metrics { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .me-metrics { grid-template-columns: 1fr; } }

.me-metric {
  background: var(--raised-grad); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 15px 16px 14px;
  box-shadow: var(--shadow-raised);
  display: flex; flex-direction: column; gap: 9px; min-height: 112px;
}
.mm-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.mm-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-3); }
.mm-ico {
  width: 28px; height: 28px; flex: 0 0 28px; border-radius: 8px; display: grid; place-items: center; font-size: 15px;
  background: var(--bg-2); border: 1px solid var(--line);
}
.mm-value { font-family: var(--font-display); font-weight: 700; font-size: 27px; color: var(--ink); line-height: 1; display: flex; align-items: baseline; gap: 6px; }
.mm-value .mm-unit { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); font-weight: 400; }
.mm-foot { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: auto; }
.mm-foot.up { color: var(--emerald); }
.mm-foot.down { color: var(--crimson); }
.mm-foot.warn { color: var(--gold-bright); }

/* mini sparkbars */
.mm-spark { display: flex; align-items: flex-end; gap: 3px; height: 26px; margin-top: 2px; }
.mm-spark i { flex: 1; border-radius: 2px 2px 0 0; background: color-mix(in srgb, var(--sapphire) 55%, var(--bg-4)); min-height: 3px; transition: height .3s; }
.mm-spark i.hot { background: var(--gold-grad); }

/* ---------- Section: My dashboard grid ---------- */
.me-grid { display: grid; grid-template-columns: 1fr var(--rail-w); gap: 18px; align-items: start; }
@media (max-width: 1280px) { .me-grid { grid-template-columns: 1fr; } }
.me-rail { display: flex; flex-direction: column; gap: 16px; }

/* ---------- Focus quest (featured) ---------- */
.focus-quest {
  position: relative; overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--gold) 40%, var(--line));
  border-radius: var(--radius-lg);
  background:
    radial-gradient(520px 180px at 100% 0%, color-mix(in srgb, var(--gold) 9%, transparent), transparent 70%),
    var(--panel-grad);
  box-shadow: var(--shadow-panel);
}
.fq-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-bottom: 1px solid var(--line-soft);
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--gold-deep);
}
.fq-banner .fq-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px var(--gold-glow); animation: blink 1.6s infinite; }
.fq-body { padding: 16px 18px 18px; }
.fq-top { display: flex; align-items: flex-start; gap: 13px; }
.fq-title { font-family: var(--font-head); font-weight: 700; font-size: 18px; color: var(--ink); line-height: 1.3; flex: 1; min-width: 0; }
.fq-deadline {
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  font-family: var(--font-mono); font-size: 11px; color: var(--crimson);
  background: color-mix(in srgb, var(--crimson) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--crimson) 32%, transparent);
  border-radius: 20px; padding: 4px 11px;
}
.fq-desc { font-size: 13px; color: var(--ink-3); line-height: 1.55; margin: 8px 0 14px; }
.fq-progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.fq-progress-row .meter { flex: 1; height: 9px; }
.fq-progress-num { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-2); min-width: 92px; text-align: right; }

.fq-steps { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
.fq-step {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px; border-radius: var(--radius);
  background: transparent; border: 1px solid transparent; cursor: pointer;
  text-align: left; width: 100%; font-family: inherit; color: var(--ink-2);
  transition: background .12s, border-color .12s;
}
.fq-step:hover { background: var(--bg-3); border-color: var(--line-soft); }
.fq-check {
  width: 20px; height: 20px; flex: 0 0 20px; border-radius: 6px;
  border: 1.5px solid var(--line); background: var(--bg-1);
  display: grid; place-items: center; font-size: 12px; color: transparent;
  transition: background .14s, border-color .14s, color .14s;
}
.fq-step.done .fq-check { background: var(--gold-grad); border-color: var(--gold-deep); color: #fff; }
[data-theme="pro"] .fq-step.done .fq-check { color: #fff; }
.fq-step-label { flex: 1; min-width: 0; font-size: 13px; }
.fq-step.done .fq-step-label { color: var(--ink-4); text-decoration: line-through; text-decoration-color: var(--line); }
.fq-step-n { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); }

.fq-foot { display: flex; align-items: center; gap: 12px; padding-top: 14px; border-top: 1px solid var(--line-soft); }
.fq-party { display: flex; align-items: center; }
.fq-party-av {
  width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; font-size: 14px;
  background: var(--bg-3); border: 1px solid var(--line); box-shadow: 0 1px 0 rgba(0,0,0,.25);
}
.fq-reward { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-2); }
.fq-reward b { color: var(--gold-bright); }

/* ---------- Token budget ring ---------- */
.budget-ring-wrap { display: flex; align-items: center; gap: 18px; margin-bottom: 6px; }
.budget-ring { width: 96px; height: 96px; flex: 0 0 96px; border-radius: 50%; display: grid; place-items: center; position: relative; }
.budget-ring::after {
  content: ""; position: absolute; inset: 9px; border-radius: 50%;
  background: var(--bg-2); border: 1px solid var(--line-soft);
}
.br-inner { position: relative; z-index: 1; text-align: center; }
.br-pct { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--ink); line-height: 1; }
.br-cap { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-3); letter-spacing: .06em; text-transform: uppercase; margin-top: 3px; }
.budget-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.bm-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 12.5px; white-space: nowrap; }
.bm-row .bm-k { color: var(--ink-3); }
.bm-row .bm-v { font-family: var(--font-mono); color: var(--ink); font-weight: 600; }
.bm-v.crit { color: var(--crimson); }

.budget-split { display: flex; gap: 10px; margin: 14px 0 4px; }
.bs-cell { flex: 1; background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 10px 12px; }
.bs-cell .bs-k { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-3); white-space: nowrap; }
.bs-cell .bs-v { font-family: var(--font-head); font-weight: 700; font-size: 15px; color: var(--ink); margin-top: 3px; }
.bs-cell .bs-v small { font-family: var(--font-mono); font-size: 10px; font-weight: 400; color: var(--ink-3); }

/* by-agent breakdown */
.by-agent { display: flex; flex-direction: column; gap: 9px; margin-top: 14px; }
.ba-cap { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-4); }
.ba-row { display: flex; align-items: center; gap: 10px; }
.ba-ico { width: 22px; height: 22px; flex: 0 0 22px; border-radius: 6px; display: grid; place-items: center; font-size: 12px; background: var(--bg-3); border: 1px solid var(--line); }
.ba-name { font-size: 12px; color: var(--ink-2); width: 78px; flex: 0 0 78px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ba-bar { flex: 1; height: 6px; border-radius: 20px; background: var(--bg-4); overflow: hidden; }
.ba-bar > i { display: block; height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--sapphire), color-mix(in srgb, var(--sapphire) 50%, #fff)); }
.ba-val { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); width: 38px; text-align: right; }

/* quick actions in rail */
.qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.qa-btn {
  display: flex; align-items: center; gap: 9px; padding: 11px 12px;
  border-radius: var(--radius); border: 1px solid var(--line); background: var(--bg-1);
  cursor: pointer; color: var(--ink-2); font-family: var(--font-body); font-size: 12.5px; text-align: left;
  transition: border-color .14s, background .14s, transform .1s;
}
.qa-btn:hover { border-color: var(--gold-deep); color: var(--ink); background: var(--bg-3); transform: translateY(-1px); }
.qa-btn .qa-ico { font-size: 15px; }

/* access list (re-uses rbac.css .access-line; add role row) */
.me-role-row { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; padding-bottom: 11px; border-bottom: 1px solid var(--line-soft); }

/* ===== styles/rbac.css ===== */
/* ============================================================
   RBAC / USERS / DASHBOARD — Phase 4 screen styles
   ============================================================ */

/* ---- role switcher (topbar) ---- */
.role-switch { display: flex; align-items: center; gap: 3px; background: var(--bg-1); border: 1px solid var(--line);
  border-radius: 999px; padding: 3px 3px 3px 10px; margin-right: 10px; }
.rs-label { font-size: 10px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }
.rs-btn { border: none; background: transparent; color: var(--ink-3); font-family: var(--font-body); font-size: 11.5px;
  padding: 4px 9px; border-radius: 999px; cursor: pointer; white-space: nowrap; transition: all .14s; }
.rs-btn:hover { color: var(--ink); }
.rs-btn.on { background: var(--gold-grad); color: #fff; font-weight: 600; box-shadow: 0 1px 4px -1px var(--gold-glow); }
@media (max-width: 1100px) { .rs-label { display: none; } }

/* ---- user table ---- */
.utable { display: flex; flex-direction: column; }
.utable-th, .utable-tr { display: grid; grid-template-columns: 1fr 116px 116px 168px 92px 82px; align-items: center; gap: 10px; }
.utable-th { padding: 0 12px 9px; font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--line); }
.utable-tr { padding: 11px 12px; border-bottom: 1px solid var(--line-soft); cursor: pointer; border-radius: var(--radius); transition: background .14s; }
.utable-tr:hover { background: var(--bg-1); }
.utable-tr.is-suspended { opacity: .55; }
.uc-user { display: flex; align-items: center; gap: 11px; min-width: 0; }
.uavatar { width: 34px; height: 34px; flex: none; border-radius: 9px; display: grid; place-items: center; font-size: 17px;
  background: var(--bg-3); border: 1px solid var(--line); }
.uu-name { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.uu-sub { display: block; font-size: 11px; color: var(--ink-4); }
.uc-seen { font-size: 11.5px; }
.uc-act { display: flex; gap: 5px; justify-content: flex-end; }
@media (max-width: 1180px) {
  .utable-th, .utable-tr { grid-template-columns: 1fr 110px 150px 80px; }
  .uc-status, .uc-seen { display: none; }
}

/* ---- quota cell + meters ---- */
.quota-cell { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.quota-meter { height: 6px; border-radius: 3px; background: var(--bg-3); overflow: hidden; }
.quota-meter i { display: block; height: 100%; border-radius: 3px; }
.quota-meter i.q-ok { background: linear-gradient(90deg, var(--emerald), color-mix(in srgb, var(--emerald) 60%, var(--gold))); }
.quota-meter i.q-warn { background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }
.quota-meter i.q-crit { background: linear-gradient(90deg, var(--crimson), color-mix(in srgb, var(--crimson) 70%, var(--gold-bright))); }
.quota-num { font-size: 10.5px; }
.role-line { display: flex; align-items: center; gap: 9px; }
.perm-hint { font-size: 11px; color: var(--ink-4); font-style: italic; }

/* ---- back link ---- */
.back-link { background: none; border: none; color: var(--ink-3); font-family: var(--font-body); font-size: 13px;
  cursor: pointer; padding: 0; margin-bottom: 14px; }
.back-link:hover { color: var(--gold-bright); }

/* ---- user detail header ---- */
.udetail-head { display: flex; align-items: center; gap: 16px; }
.udetail-avatar { width: 62px; height: 62px; flex: none; border-radius: 16px; display: grid; place-items: center; font-size: 30px;
  background: var(--bg-3); border: 1px solid var(--line); box-shadow: var(--shadow-pop); }

/* ---- quota chips ---- */
.quota-chip { border: 1px solid var(--line); background: var(--bg-1); color: var(--ink-2); font-family: var(--font-mono);
  font-size: 11.5px; padding: 5px 11px; border-radius: 999px; cursor: pointer; transition: all .14s; }
.quota-chip:hover { border-color: var(--gold-deep); color: var(--gold-bright); }
.quota-chip.on { background: var(--gold-grad); color: #fff; border-color: var(--gold-deep); font-weight: 600; }
.quota-chip.reset { color: var(--ink-3); }

/* ---- permission override rows ---- */
.perm-row { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: var(--radius); background: var(--bg-1);
  border: 1px solid var(--line-soft); }
.perm-row.editable { cursor: pointer; }
.perm-row.editable:hover { border-color: var(--gold-deep); }
.perm-state { width: 18px; height: 18px; flex: none; border-radius: 5px; display: grid; place-items: center; font-size: 11px; font-weight: 700; }
.perm-state.on { color: var(--emerald); background: color-mix(in srgb, var(--emerald) 16%, transparent); }
.perm-state.off { color: var(--ink-4); background: var(--bg-3); }
.perm-name { flex: 1; font-size: 12.5px; color: var(--ink); }
.perm-tag { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 5px; }
.perm-tag.grant { color: var(--emerald); background: color-mix(in srgb, var(--emerald) 15%, transparent); }
.perm-tag.deny { color: var(--crimson); background: color-mix(in srgb, var(--crimson) 15%, transparent); }

/* ---- roles & permissions matrix ---- */
.rbac-panel { overflow: hidden; }
.rbac-scroll { overflow-x: auto; }
.rbac-matrix { width: 100%; border-collapse: collapse; min-width: 560px; }
.rbac-matrix th, .rbac-matrix td { padding: 10px 12px; text-align: left; }
.rbac-permcol { width: 42%; }
.rbac-matrix thead th { border-bottom: 1px solid var(--line); vertical-align: bottom; }
.rbac-rolecol { text-align: center; }
.rbac-rolecol .badge { display: inline-flex; }
.rbac-rolecount { display: block; font-size: 10px; margin-top: 4px; }
.rbac-grouprow td { background: var(--bg-1); font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase;
  letter-spacing: .06em; color: var(--ink-4); padding: 7px 12px; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
/* clearer row hover — gold tint + left accent so the active row reads instantly */
.rbac-matrix tbody tr:not(.rbac-grouprow) { transition: background .14s, box-shadow .14s; }
.rbac-matrix tbody tr:not(.rbac-grouprow):hover { background: color-mix(in srgb, var(--gold) 12%, transparent);
  box-shadow: inset 3px 0 0 var(--gold-deep); }
.rbac-permname { font-size: 13px; color: var(--ink); }
.rbac-cell { text-align: center; }
.rbac-toggle { width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--line); background: var(--bg-3);
  color: var(--emerald); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .14s; }
/* clearer cell hover — fill with gold tint, stronger border, slight lift */
.rbac-toggle:hover:not(.locked) { border-color: var(--gold-deep);
  background: color-mix(in srgb, var(--gold) 22%, var(--bg-3)); transform: scale(1.12); }
.rbac-toggle.on:hover:not(.locked) { background: color-mix(in srgb, var(--emerald) 32%, transparent);
  border-color: var(--emerald); }
.rbac-toggle.changed { box-shadow: 0 0 0 2px var(--gold-bright), 0 0 0 4px var(--gold-glow); }
.rbac-toggle.on { background: color-mix(in srgb, var(--emerald) 18%, transparent); border-color: color-mix(in srgb, var(--emerald) 45%, transparent); }
.rbac-toggle.locked { cursor: default; opacity: .85; }
.rbac-toggle.on.locked { background: color-mix(in srgb, var(--amethyst) 16%, transparent); color: var(--amethyst); border-color: color-mix(in srgb, var(--amethyst) 40%, transparent); }

/* ---- audit log ---- */
/* filter bar: search + time range */
.audit-filters { display: flex; gap: 10px; align-items: center; margin: 6px 0 12px; flex-wrap: wrap; }
.audit-search { flex: 1; min-width: 240px; display: flex; align-items: center; gap: 8px;
  background: var(--bg-3); border: 1px solid var(--line); border-radius: 10px; padding: 0 10px; height: 40px;
  transition: border-color .14s, box-shadow .14s; }
.audit-search:focus-within { border-color: var(--gold-deep); box-shadow: 0 0 0 3px var(--gold-glow); }
.audit-search .as-ic { font-size: 14px; opacity: .7; }
.audit-search input { flex: 1; border: none; background: transparent; outline: none; color: var(--ink);
  font-size: 13.5px; font-family: inherit; }
.audit-search .as-clear { border: none; background: var(--bg-4); color: var(--ink-3); width: 22px; height: 22px;
  border-radius: 6px; cursor: pointer; font-size: 11px; flex: none; transition: background .14s, color .14s; }
.audit-search .as-clear:hover { background: color-mix(in srgb, var(--crimson) 20%, var(--bg-4)); color: var(--crimson); }
.audit-pills { display: flex; gap: 8px; align-items: center; margin: 0 0 14px; flex-wrap: wrap; }
.audit-count { font-size: 11.5px; color: var(--ink-4); margin-left: 2px; }
.audit-clear-all { margin-left: auto; border: none; background: transparent; color: var(--gold-bright);
  font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background .14s; }
.audit-clear-all:hover { background: color-mix(in srgb, var(--gold) 12%, transparent); }
.audit-date-clear { border: 1px solid var(--line); background: var(--bg-3); color: var(--ink-3); width: 38px; height: 40px;
  border-radius: 10px; cursor: pointer; font-size: 13px; flex: none; transition: background .14s, color .14s, border-color .14s; }
.audit-date-clear:hover { background: color-mix(in srgb, var(--crimson) 16%, var(--bg-3)); color: var(--crimson); border-color: color-mix(in srgb, var(--crimson) 40%, transparent); }
.tab-pill { border: 1px solid var(--line); background: var(--bg-3); color: var(--ink-3); font-family: var(--font-mono);
  font-size: 11.5px; padding: 6px 13px; border-radius: 999px; cursor: pointer; transition: background .14s, color .14s, border-color .14s, transform .2s var(--spring); text-transform: capitalize; }
.tab-pill:hover { color: var(--ink-2); background: var(--bg-4); }
.tab-pill:active { transform: scale(.94); transition-duration: .05s; }
.tab-pill.on { background: color-mix(in srgb, var(--gold) 12%, transparent); color: var(--gold-bright); border-color: color-mix(in srgb, var(--gold) 42%, transparent); font-weight: 600; }
.audit-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-bottom: 1px solid var(--line-soft); }
.audit-row:last-child { border-bottom: none; }
.audit-ic { width: 32px; height: 32px; flex: none; border-radius: 9px; display: grid; place-items: center; font-size: 14px; background: var(--bg-3); }
.audit-ic[data-tone="ok"] { background: color-mix(in srgb, var(--emerald) 15%, transparent); }
.audit-ic[data-tone="warn"] { background: color-mix(in srgb, var(--crimson) 15%, transparent); }
.audit-ic[data-tone="info"] { background: color-mix(in srgb, var(--sapphire) 14%, transparent); }
.audit-body { flex: 1; min-width: 0; }
.audit-line { font-size: 13px; color: var(--ink); }
.audit-actor { font-weight: 600; color: var(--ink); }
.audit-target { font-weight: 600; color: var(--gold-bright); }
.audit-time { font-size: 11px; white-space: nowrap; }

/* ---- user form modal ---- */
.userform { width: min(560px, 96vw); max-height: 92vh; overflow: auto; background: var(--bg-2); border: 1px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-pop); display: flex; flex-direction: column; }
.userform-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
.userform-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--line); }
.avatar-pick { display: flex; flex-wrap: wrap; gap: 7px; }
.avatar-opt { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--line); background: var(--bg-1); font-size: 18px; cursor: pointer; transition: all .14s; }
.avatar-opt:hover { border-color: var(--gold-deep); }
.avatar-opt.on { border-color: var(--gold-bright); background: var(--gold-glow); box-shadow: 0 0 0 2px var(--gold-glow); }
.ck-inline { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-2); cursor: pointer; }
.ck-inline input { accent-color: var(--gold-deep); }

/* ---- my dashboard access list / quota warn ---- */
.access-line { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-2); }
.access-tick { color: var(--emerald); font-weight: 700; font-size: 12px; }
.quota-warn { margin-top: 12px; padding: 9px 12px; border-radius: var(--radius); font-size: 12px; line-height: 1.5;
  color: var(--crimson); background: color-mix(in srgb, var(--crimson) 9%, transparent); border: 1px solid color-mix(in srgb, var(--crimson) 25%, transparent); }

/* ---- Recall: retrieved-document cards + citations ---- */
.recall-result { display: flex; align-items: flex-start; gap: 11px; width: 100%; text-align: left;
  background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 11px 12px;
  cursor: pointer; transition: all .14s; font-family: var(--font-body); }
.recall-result:hover { border-color: var(--gold-deep); background: var(--bg-2); }
.rr-rank { flex: none; width: 20px; height: 20px; border-radius: 6px; display: grid; place-items: center;
  font-size: 11px; font-weight: 700; color: var(--gold-bright); background: color-mix(in srgb, var(--gold) 16%, transparent); }
.rr-main { flex: 1; min-width: 0; }
.rr-top { display: flex; align-items: baseline; gap: 8px; }
.rr-title { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600; color: var(--ink); }
.rr-score { flex: none; font-size: 12px; font-weight: 600; color: var(--emerald); }
.rr-snippet { font-size: 12px; line-height: 1.55; color: var(--ink-3); margin: 4px 0 6px; }
.rr-snippet mark.hl, mark.hl { background: color-mix(in srgb, var(--gold) 32%, transparent); color: var(--ink);
  border-radius: 3px; padding: 0 2px; }
.rr-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 10.5px; color: var(--ink-4); }
.rr-open { flex: none; align-self: center; font-size: 11px; color: var(--ink-4); opacity: 0; transition: opacity .14s; }
.recall-result:hover .rr-open { opacity: 1; color: var(--gold-bright); }

.citations { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line-soft); }
.cite-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-4); margin-bottom: 8px; }
.cite-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.cite-chip { display: inline-flex; align-items: center; gap: 7px; max-width: 100%; background: var(--bg-1);
  border: 1px solid var(--line); border-radius: 999px; padding: 4px 11px 4px 5px; cursor: pointer; transition: all .14s; }
.cite-chip:hover { border-color: var(--gold-deep); background: var(--bg-2); }
.cite-num { flex: none; width: 17px; height: 17px; border-radius: 50%; display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: #fff; background: var(--gold-grad); }
.cite-title { font-size: 12px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

/* ---- Recall §4.5 upgrades: relevance bar, inline citations, streaming, filters ---- */
.rr-scorewrap { flex: none; display: flex; align-items: center; gap: 6px; }
.rr-scorebar { width: 42px; height: 5px; border-radius: 3px; background: var(--bg-3); overflow: hidden; }
.rr-scorebar i { display: block; height: 100%; border-radius: 3px; }
.rr-scorebar.t-hi i  { background: linear-gradient(90deg, var(--emerald), color-mix(in srgb, var(--emerald) 55%, var(--gold))); }
.rr-scorebar.t-mid i { background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }
.rr-scorebar.t-lo i  { background: linear-gradient(90deg, var(--bronze), var(--gold-deep)); }

/* clickable inline [n] citation in the answer body */
.cite-inline { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 17px;
  padding: 0 4px; margin: 0 1px; vertical-align: baseline; transform: translateY(-1px);
  font-family: var(--font-mono); font-size: 10px; font-weight: 700; line-height: 1;
  color: #fff; background: var(--gold-grad); border: none; border-radius: 999px; cursor: pointer; transition: filter .14s, box-shadow .14s; }
.cite-inline:hover { filter: brightness(1.08); box-shadow: 0 0 0 2px var(--gold-glow); }

/* streaming caret */
.stream-caret { display: inline-block; width: 2px; height: 1.05em; vertical-align: text-bottom; margin-left: 2px;
  background: var(--gold-bright); animation: caret-blink 1s steps(1) infinite; }
@keyframes caret-blink { 50% { opacity: 0; } }

/* document type filter row */
.recall-filters { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

/* ============================================================
   WORKFLOWS / "โต๊ะปรุงเวท" — §4.7
   ============================================================ */
.spin-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px;
  border: 1.5px solid currentColor; border-top-color: transparent; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* workflow library cards */
.wf-card { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-bottom: 1px solid var(--line-soft); }
.wf-card:last-child { border-bottom: none; }
.wf-card.off { opacity: .6; }
.wf-ic { flex: none; width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 20px;
  background: var(--bg-3); border: 1px solid var(--line); }
.wf-body { flex: 1; min-width: 0; cursor: pointer; }
.wf-top { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
.wf-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.wf-trigger { font-size: 10.5px; color: var(--ink-4); }
.wf-desc { font-size: 12.5px; color: var(--ink-3); line-height: 1.5; margin: 4px 0 7px; }
.wf-foot { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; font-size: 11px; color: var(--ink-4); }
.wf-foot .badge { transform: scale(.92); }
.wf-actions { display: flex; align-items: center; gap: 8px; flex: none; }

/* enable/disable switch — kit mini-switch motion */
.wf-switch { width: 38px; height: 22px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-4);
  position: relative; cursor: pointer; transition: background .2s ease, border-color .2s ease; flex: none; padding: 0; }
.wf-switch.on { background: var(--gold); border-color: var(--gold-deep); }
.wf-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,.25); transition: left .25s var(--spring), width .15s; }
.wf-switch.on .wf-knob { left: calc(100% - 18px); }
.wf-switch:active .wf-knob { width: 20px; }
.wf-switch.on:active .wf-knob { left: calc(100% - 22px); }

/* JSON / code blocks */
.wf-json { font-family: var(--font-mono); font-size: 11.5px; line-height: 1.55; color: var(--ink-2); background: var(--bg-1);
  border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 10px 12px; margin: 0; white-space: pre-wrap; word-break: break-word; overflow-x: auto; }
.wf-json.ok { border-color: color-mix(in srgb, var(--emerald) 35%, transparent); background: color-mix(in srgb, var(--emerald) 7%, transparent); }
.wf-json.err { border-color: color-mix(in srgb, var(--crimson) 35%, transparent); background: color-mix(in srgb, var(--crimson) 7%, transparent); color: var(--crimson); }
.wf-endpoint { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); background: var(--bg-1);
  border: 1px dashed var(--line); border-radius: var(--radius); padding: 7px 10px; word-break: break-all; }

/* tool_run rows */
.toolrun { border: 1px solid var(--line-soft); border-radius: var(--radius); background: var(--bg-1); overflow: hidden; }
.toolrun.open { border-color: var(--line); }
.toolrun-head { display: flex; align-items: center; gap: 11px; width: 100%; padding: 10px 12px; background: none; border: none; cursor: pointer; text-align: left; font-family: var(--font-body); }
.toolrun-head:hover { background: var(--bg-2); }
.tr-ic { flex: none; width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 15px; background: var(--bg-3); border: 1px solid var(--line); }
.tr-main { flex: 1; min-width: 0; }
.tr-top { display: flex; align-items: center; gap: 8px; }
.tr-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tr-top .badge { transform: scale(.88); flex: none; }
.tr-meta { display: flex; flex-wrap: wrap; gap: 5px; font-size: 10.5px; color: var(--ink-4); margin-top: 3px; }
.tr-caret { flex: none; color: var(--ink-4); font-size: 11px; }
.toolrun-body { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px 12px; }
@media (max-width: 1180px) { .toolrun-body { grid-template-columns: 1fr; } }

/* builder canvas (mock embedded editor) */
.wf-builder { width: min(720px, 96vw); max-height: 92vh; overflow: auto; background: var(--bg-2);
  border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-pop); display: flex; flex-direction: column; }
.wf-canvas { padding: 20px; background:
  repeating-linear-gradient(0deg, transparent, transparent 23px, var(--line-soft) 23px, var(--line-soft) 24px),
  repeating-linear-gradient(90deg, transparent, transparent 23px, var(--line-soft) 23px, var(--line-soft) 24px), var(--bg-1); }
.wf-canvas-note { font-size: 11px; color: var(--ink-4); background: var(--bg-2); border: 1px dashed var(--line);
  border-radius: var(--radius); padding: 8px 11px; line-height: 1.5; margin-bottom: 16px; }
.wf-flow { display: flex; flex-direction: column; align-items: center; gap: 0; }
.wf-node { display: flex; align-items: center; gap: 11px; width: min(380px, 100%); padding: 12px 14px; background: var(--bg-2);
  border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-pop); }
.wf-node.trigger { border-color: var(--gold-deep); background: color-mix(in srgb, var(--gold) 8%, var(--bg-2)); }
.wf-node-ic { flex: none; width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-size: 16px; background: var(--bg-3); border: 1px solid var(--line); }
.wf-node-t { font-size: 13px; font-weight: 600; color: var(--ink); }
.wf-node-d { font-size: 10.5px; color: var(--ink-4); margin-top: 1px; }
.wf-conn { height: 18px; width: 2px; background: var(--line); position: relative; }
.wf-conn span { position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px;
  border-right: 2px solid var(--line); border-bottom: 2px solid var(--line); transform: translateX(-50%) rotate(45deg); }

/* workflow picker in agent builder */
.wf-pick { display: flex; flex-direction: column; gap: 6px; }
.wf-pick-opt { display: flex; align-items: center; gap: 9px; padding: 8px 11px; border-radius: var(--radius);
  border: 1px solid var(--line); background: var(--bg-1); cursor: pointer; font-family: var(--font-body); font-size: 13px; color: var(--ink-2); transition: all .14s; }
.wf-pick-opt:hover { border-color: var(--gold-deep); }
.wf-pick-opt.on { border-color: var(--gold-bright); background: var(--gold-glow); color: var(--ink); }

/* ===== styles/fx.css ===== */
/* ============================================================
   FX + RESPONSIVE — micro-interactions, motion polish, and a
   responsive shell (off-canvas sidebar on small screens).
   All motion is gated behind prefers-reduced-motion.
   ============================================================ */

/* ---------- micro-interactions ---------- */
@media (prefers-reduced-motion: no-preference) {
  .btn, .nav-item, .room-card, .myagent-card, .agent-card, .codex-row,
  .wtab, .bp-item, .theme-toggle button, .rs-btn, .adoc-btn, .done-toggle,
  .tb-todo, .profile-card, .feature-tag, .quest-card, .room-card-new,
  .bp-cat, .hermes-fab, .notify-go, .qbadge, .me-chip {
    transition: transform .16s cubic-bezier(.3,.7,.4,1), box-shadow .22s ease,
                background-color .18s ease, border-color .18s ease, color .18s ease;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(1px) scale(.985); }
  .nav-item:hover { transform: translateX(2px); }
  .room-card:hover, .myagent-card:hover, .agent-card:hover { transform: translateY(-3px); }
  .codex-row:hover { transform: translateY(-1px); box-shadow: var(--shadow-raised); }
  .quest-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-panel); }

  catch { return fallback; }

function saveU(key, val) { try { localStorage.setItem(U_KEYS[key], JSON.stringify(val)); } catch {} }

/* ---- permission resolver: role perms + grants − denies (deny wins) ---- */
function resolvePerms(roleKey, rolePermsMap, userOverride) {
  if (roleKey === "admin") return new Set(PERM_KEYS); // admin always has every permission
  const set = new Set(rolePermsMap[roleKey] || []);
  const ov = userOverride || {};
  for (const k of Object.keys(ov)) {
    if (ov[k] === "grant") set.add(k);
    else if (ov[k] === "deny") set.delete(k);
  }
  return set;
}

/* ---- mock POST /workflows/:id/run → simulate webhook, resolve to a tool_run ----
   Returns {status, output, error, dur}. ~12% of runs fail for realism. */
function simulateRun(wf, input) {
  return new Promise(resolve => {
    const t = 700 + Math.random() * 1400;
    setTimeout(() => {
      const fail = Math.random() < 0.12;
      const dur = (t / 1000).toFixed(1) + "s";
      if (fail) {
        resolve({ status: "failed", output: null, dur,
          error: "Step failed: upstream returned 502 (gateway). Retry or check the flow." });
      } else {
        // shape a plausible output from the workflow kind
        let output = { ok: true };
        if (wf.id === "wf_pr_review") output = { risks: Math.floor(Math.random() * 3), comments: 2 + Math.floor(Math.random() * 5), verdict: "approve" };
        else if (wf.id === "wf_ingest") output = { chunks: 6 + Math.floor(Math.random() * 12), embedded: 6 + Math.floor(Math.random() * 12), doc_id: "k" + (3 + Math.floor(Math.random() * 5)) };
        else if (wf.id === "wf_daily_digest") output = { items: 10 + Math.floor(Math.random() * 20), posted: true };
        else if (wf.id === "wf_deploy") output = { deployed: true, env: input.env || "staging" };
        resolve({ status: "ok", output, dur, error: null });
      }
    }, t);
  });
}

/* ============================================================
   OFFICE DESIGNER — data: isometric geometry, furniture catalog,
   multi-office persistence + a seeded starter office.
   Top-down grid coords (gx,gy); rendered in 2:1 isometric.
   ============================================================ */

const ISO = { TW: 58, TH: 29, PAD: 26 };   // tile width / height (2:1) + canvas padding

/* grid (gx,gy) -> screen px (top-left of the tile's bounding box).
   originX centers the diamond so x=0..W maps inside the canvas. */
function isoPos(gx, gy, W) {
  const originX = (W - 1) * ISO.TW / 2 + ISO.PAD;
  return {
    x: originX + (gx - gy) * ISO.TW / 2,
    y: ISO.PAD + (gx + gy) * ISO.TH / 2,
  };
}
/* canvas pixel size for a W×H grid (before object height) */
function isoCanvasSize(W, H) {
  return { w: (W + H) * ISO.TW / 2 + ISO.PAD * 2, h: (W + H) * ISO.TH / 2 + ISO.PAD * 2 + 60 };
}
/* inverse: screen px (relative to canvas) -> nearest grid cell */
function tileFromScreen(px, py, W) {
  const originX = (W - 1) * ISO.TW / 2 + ISO.PAD;
  const a = (px - originX) / (ISO.TW / 2);
  const b = (py - ISO.PAD - ISO.TH / 2) / (ISO.TH / 2);   // -TH/2: aim at tile center
  return { gx: Math.round((a + b) / 2), gy: Math.round((b - a) / 2) };
}

/* ---- a starter office layout (programmatic) ---- */
const OFFICE_W = 12, OFFICE_H = 10;
let _oid = 0;
const oobj = (type, gx, gy, rot = 0) => ({ id: "o" + (++_oid) + "_" + Math.random().toString(36).slice(2, 5), type, gx, gy, rot });

function seedOffice() {
  const objs = [];
  // perimeter walls (leave a door gap on the south edge)
  for (let x = 0; x < OFFICE_W; x++) {
    objs.push(oobj("wall", x, 0));
    if (x !== 6 && x !== 7) objs.push(oobj("wall", x, OFFICE_H - 1)); else objs.push(oobj("door", x, OFFICE_H - 1, 2));
  }
  for (let y = 1; y < OFFICE_H - 1; y++) { objs.push(oobj("wall", 0, y)); objs.push(oobj("glass", OFFICE_W - 1, y)); }
  // a meeting room divider (glass) around top-right
  objs.push(oobj("glass", 8, 3), oobj("glass", 9, 3), oobj("glass", 10, 3));
  // desks row (with chairs facing them)
  const desks = [[2, 2], [4, 2], [2, 4], [4, 4]];
  desks.forEach(([x, y]) => { objs.push(oobj("desk", x, y, 1)); objs.push(oobj("chair", x, y + 1, 3)); });
  // meeting table top-right
  objs.push(oobj("meet", 9, 1), oobj("chair", 8, 1, 0), oobj("chair", 10, 1, 2));
  // lounge + decor
  objs.push(oobj("sofa", 2, 7, 0), oobj("rug", 3, 7), oobj("plant", 1, 7));
  objs.push(oobj("shelf", 6, 1, 1), oobj("server", 10, 7), oobj("water", 9, 7));
  objs.push(oobj("tree", 6, 7), oobj("crystal", 5, 7), oobj("lamp", 3, 2));
  return { id: "off_main", name: "ออฟฟิศหลัก", floor: "wood", w: OFFICE_W, h: OFFICE_H, objects: objs, seats: true };
}

/* ---- persistence ---- */
const OFFICE_KEY = "guildos-offices-v1";
function loadOffices() {
  try {
    const raw = localStorage.getItem(OFFICE_KEY);
    if (raw === null) return [seedOffice()];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) && arr.length ? arr : [seedOffice()];
  } catch { return [seedOffice()]; }
}
function saveOffices(arr) { try { localStorage.setItem(OFFICE_KEY, JSON.stringify(arr)); } catch {} }
function blankOffice(name) {
  return { id: "off_" + Date.now(), name: name || "ออฟฟิศใหม่", floor: "marble", w: OFFICE_W, h: OFFICE_H, objects: [], seats: true };
}

Object.assign(window, {
  ISO, isoPos, isoCanvasSize, tileFromScreen,
  FURNI, FURNI_GROUPS, furniOf, FLOORS, OFFICE_W, OFFICE_H, oobj,
  seedOffice, loadOffices, saveOffices, blankOffice,
});

const SHEET_COLS = 5, SHEET_ROWS = 8, SHEET_N = 40;

  { id: "ceo", name: "CEO", th: "ผู้บริหาร", idleUrl: "public/assets/ceo-idle.png", walkUrl: "public/assets/ceo-walk.png", fw: 158, fh: 356, n: 40, builtin: true },

/* ---- in-browser sprite-sheet processing (mirrors the offline packer) ---- */
function _sheetBBox(img) {
  const cw = Math.floor(img.width / SHEET_COLS), ch = Math.floor(img.height / SHEET_ROWS);
  const cv = document.createElement("canvas"); cv.width = img.width; cv.height = img.height;
  const ctx = cv.getContext("2d"); ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0, 0, img.width, img.height).data; const W = img.width;
  let x0 = cw, y0 = ch, x1 = 0, y1 = 0;
  for (let r = 0; r < SHEET_ROWS; r++) for (let c = 0; c < SHEET_COLS; c++) {
    const ox = c * cw, oy = r * ch;
    for (let y = 0; y < ch; y++) { const rowBase = (oy + y) * W; for (let x = 0; x < cw; x++) {
      if (d[(rowBase + ox + x) * 4 + 3] > 20) { if (x < x0) x0 = x; if (x > x1) x1 = x; if (y < y0) y0 = y; if (y > y1) y1 = y; }
    } }
  }
  if (x1 < x0) { x0 = 0; y0 = 0; x1 = cw - 1; y1 = ch - 1; }
  return { cw, ch, x0, y0, w: x1 + 1 - x0, h: y1 + 1 - y0 };
}
function _packStrip(img, b, fw, fh, pad) {
  const cv = document.createElement("canvas"); cv.width = fw * SHEET_N; cv.height = fh;
  const ctx = cv.getContext("2d"); ctx.imageSmoothingEnabled = false;
  const offX = Math.round((fw - b.w) / 2), offY = fh - pad - b.h;
  for (let i = 0; i < SHEET_N; i++) {
    const c = i % SHEET_COLS, r = (i / SHEET_COLS) | 0;
    ctx.drawImage(img, c * b.cw + b.x0, r * b.ch + b.y0, b.w, b.h, i * fw + offX, offY, b.w, b.h);
  }
  return cv.toDataURL("image/png");
}
function _loadImg(file) {
  return new Promise((res, rej) => {
    const img = new Image(); img.onload = () => res(img); img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}
/* process idle + walk files → packed character entry (no id/name) */
async function processCharacterSheets(idleFile, walkFile) {
  const idleImg = await _loadImg(idleFile);
  const walkImg = walkFile ? await _loadImg(walkFile) : idleImg;
  const bi = _sheetBBox(idleImg), bw = _sheetBBox(walkImg);
  const pad = 6;
  const fw = Math.max(bi.w, bw.w) + pad * 2, fh = Math.max(bi.h, bw.h) + pad * 2;
  const idleUrl = _packStrip(idleImg, bi, fw, fh, pad);
  const walkUrl = _packStrip(walkImg, bw, fw, fh, pad);
  return { idleUrl, walkUrl, fw, fh, n: SHEET_N };
}
function addCharacter(entry) {
  const list = loadCharacters();
  const id = "ch" + Date.now().toString(36);
  const next = [...list.filter(c => !c.builtin), { ...entry, id }];
  saveCharacters([...BUILTIN_CHARACTERS, ...next]);
  return id;
}
function removeCharacter(id) {
  if (id === "ceo") return;
  saveCharacters(loadCharacters().filter(c => c.id !== id));
}

function _hashStr(s) { let h = 0; s = String(s || ""); for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; return h; }
/* an agent belongs to its homeRoom if set, else it's distributed by a stable hash */
function roomAgents(room, roomIndex, rooms, chars) {
  const n = Math.max(1, (rooms || []).length);
  // the locked Agent CEO is the work-distributor → present in EVERY room, always.
  return (chars || []).filter(c => c.locked || (c.homeRoom ? c.homeRoom === room.id : (_hashStr(c.id) % n) === roomIndex));
}

/* ---- floor painting ---- */
function drawFloor(ctx, px, py, cell, type, x, y) {
  const seam = Math.max(1, Math.round(cell * 0.045));
  let a, b, line;
  switch (type) {
    case 1: a = PAL.woodA; b = PAL.woodB; line = PAL.woodLine; break;
    case 2: a = PAL.tileA; b = PAL.tileB; line = PAL.tileLine; break;
    case 3: a = PAL.carpetA; b = PAL.carpetB; line = PAL.carpetLine; break;
    case 4: a = PAL.concA; b = PAL.concB; line = PAL.concLine; break;
    case 5: a = PAL.grassA; b = PAL.grassB; line = PAL.grassLine; break;
    default: return; // void
  }
  if (type === 1) { // planks: alternate rows + bottom seam
    ctx.fillStyle = (y & 1) ? b : a; ctx.fillRect(px, py, cell, cell);
    ctx.fillStyle = line; ctx.fillRect(px, py + cell - seam, cell, seam);
    ctx.fillRect(px + ((x & 1) ? Math.round(cell / 2) : 0), py, seam, cell);
  } else if (type === 2 || type === 4) { // tiles: grout grid
    ctx.fillStyle = ((x + y) & 1) ? b : a; ctx.fillRect(px, py, cell, cell);
    ctx.fillStyle = line; ctx.fillRect(px, py + cell - seam, cell, seam); ctx.fillRect(px + cell - seam, py, seam, cell);
  } else { // carpet / grass: soft checker
    ctx.fillStyle = a; ctx.fillRect(px, py, cell, cell);
    ctx.fillStyle = b; if ((x + y) & 1) ctx.fillRect(px, py, cell, cell);
    if (type === 5) { ctx.fillStyle = PAL.grassLine; ctx.fillRect(px + Math.round(cell * 0.3), py + Math.round(cell * 0.6), seam, seam); }
  }
}

/* ---- walls + doors (struct layer). nb = {n,e,s,w} booleans: is neighbor also wall ---- */
function drawWall(ctx, px, py, cell) {
  ctx.fillStyle = PAL.wall; ctx.fillRect(px, py, cell, cell);
  const t = Math.max(1, Math.round(cell * 0.16));
  ctx.fillStyle = PAL.wallHi; ctx.fillRect(px, py, cell, t);
  ctx.fillStyle = PAL.wallSh; ctx.fillRect(px, py + cell - t, cell, t);
}
function drawDoor(ctx, px, py, cell) {
  ctx.fillStyle = PAL.doorMat; ctx.fillRect(px, py, cell, cell);
  ctx.fillStyle = PAL.doorWood;
  const m = Math.round(cell * 0.14);
  ctx.fillRect(px + m, py + m, cell - 2 * m, cell - 2 * m);
  ctx.fillStyle = PAL.doorHi; ctx.fillRect(px + m, py + m, cell - 2 * m, Math.max(1, Math.round(cell * 0.1)));
}

/* ============================================================
   FURNITURE CATALOG. Each item:
     w,h     footprint in cells (at rot 0)
     block   true = blocks walking
     seat    true = agents can sit here (walkable, a seat anchor)
     onWall  hint: meant to sit against a wall (decor)
     cat     palette category
     draw(ctx,x0,y0,cell,P)  paints into base footprint [x0..x0+w*cell]
   ============================================================ */
function mkR(ctx, x0, y0, cell) {
  return (a, b, w, h, c) => {
    ctx.fillStyle = c;
    ctx.fillRect(Math.round(x0 + a * cell), Math.round(y0 + b * cell),
      Math.max(1, Math.round(w * cell)), Math.max(1, Math.round(h * cell)));
  };
}

    const ctx = this.ensure(); if (!ctx) return; if (ctx.state === "suspended") ctx.resume();
    const t = ctx.currentTime;
    [[783.99, 0], [1046.5, 0.11], [1318.5, 0.22]].forEach(([f, dt]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "triangle"; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + dt);
      g.gain.exponentialRampToValueAtTime(0.13, t + dt + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.42);
      o.connect(g); g.connect(ctx.destination); o.start(t + dt); o.stop(t + dt + 0.45);
    });
  }
};

/* ---- per-agent activity state machine (mutates agent in place) ---- */
function spawnSubs(a, now) {
  if (a.subs && a.subs.length) return;
  const n = 1 + (Math.random() < 0.45 ? 1 : 0);
  const offs = [[1.15, -0.15], [-1.15, -0.15], [0.0, -1.2]];
  a.subs = Array.from({ length: n }, (_, i) => ({
    id: a.id + "_sub" + i + "_" + now, dx: offs[i][0], dy: offs[i][1],
    act: WORK_ACTS[(Math.random() * WORK_ACTS.length) | 0],
    until: now + 4500 + Math.random() * 5000,
  }));
}
function tickSubs(a, now) {
  if (!a.subs || !a.subs.length) return;
  a.subs = a.subs.filter(s => s.until > now);
  a.subs.forEach(s => { if (Math.random() < 0.28) s.act = WORK_ACTS[(Math.random() * WORK_ACTS.length) | 0]; });
}
/* advance a seated/working agent to its next live activity */
function advanceActivity(a, now) {
  const cur = a.activity;
  if (cur === "done") { // finished its turn → now waits for the next instruction
    a.activity = "waiting"; a.bubble = ACTS.waiting.bubble; a.actUntil = now + 2600 + Math.random() * 3200; return;
  }
  if (cur === "waiting" || cur === "permission") { // "user" responded → back to work
    a.activity = pickActivity(a.char); a.bubble = null; a.actUntil = now + 2000 + Math.random() * 2600; return;
  }
  const r = Math.random();
  if (r < 0.15) { a.activity = "done"; a.bubble = ACTS.done.bubble; a.actUntil = now + 1500; Sound.chime(); return; }
  if (r < 0.23) { a.activity = "permission"; a.bubble = ACTS.permission.bubble; a.actUntil = now + 3200 + Math.random() * 3000; return; }
  a.activity = pickActivity(a.char); a.bubble = null; a.actUntil = now + 1800 + Math.random() * 2600;
  if (["running", "searching", "thinking"].includes(a.activity) && Math.random() < 0.7) spawnSubs(a, now);
}

Object.assign(window, { ACTS, WORK_ACTS, ROLE_ACTS, pickActivity, Sound, spawnSubs, tickSubs, advanceActivity });
