@media (prefers-reduced-motion: reduce) { .pk-savebar { transition: opacity .2s; } .pk-savebar.show { transform: translate(-50%, 0); } }

/* ===== styles/styles.css ===== */
/* ===========================================================
   GUILD OS — Dark Fantasy RPG Agent-Ops
   Parchment + Gold. Light/Dark themes.
   =========================================================== */

/* ===========================================================
   GUILD OS — PiKaOs design language
   Calm neutral surfaces · ONE indigo accent · springy cartoon physics.
   :root = pro (light). [data-theme="pro-dark"] = night. No other themes.
   =========================================================== */
:root {
  /* --- PRO (light, default): clean SaaS, cool neutrals, one confident accent --- */
  --bg-0: #eceef2;
  --bg-1: #f4f6f8;
  --bg-2: #ffffff;
  --bg-3: #f3f5f7;
  --bg-4: #e8ebef;
  --line: #e3e7ec;
  --line-soft: #eef1f4;

  --ink: #111726;
  --ink-2: #3e4654;
  --ink-3: #69707d;
  --ink-4: #9aa1ad;

  /* the one brand accent — confident indigo (the "gold" token family) */
  --gold: #4361ee;
  --gold-bright: #5872f2;
  --gold-deep: #3048d4;
  --gold-glow: rgba(67,97,238,0.26);

  --bronze: #8b93a1;
  --crimson: #e0413f;
  --crimson-deep: #c5322f;
  --emerald: #12a150;
  --amber: #d98a0c;          /* warning state only */
  --sapphire: #3b82f6;
  --amethyst: #7c5cf0;
  --ruby: #e0417a;

  --letter-face: #ffffff;    /* 3D cartoon letter fill */

  --panel-grad: #ffffff;
  --raised-grad: #ffffff;
  --gold-grad: linear-gradient(180deg, #5168f0 0%, #4361ee 100%);
  --gold-grad-hover: linear-gradient(180deg, #5f74f2 0%, #4f6bef 100%);

  --paper-texture: none;

  --shadow-panel: 0 1px 2px rgba(17,24,39,0.05), 0 10px 26px -18px rgba(17,24,39,0.16);
  --shadow-raised: 0 1px 2px rgba(17,24,39,0.07);
  --shadow-pop: 0 22px 50px -18px rgba(17,24,39,0.24);

  --radius: 9px;
  --radius-lg: 14px;
  --radius-sm: 6px;

  --sidebar-w: 256px;
  --rail-w: 360px;

  /* spring easings — cartoon "physical button" motion (define once) */
  --spring: cubic-bezier(.34,1.9,.6,1);        /* release overshoot */
  --spring-soft: cubic-bezier(.34,1.4,.64,1);  /* gentle */

  /* type: Mitr for 3D display letters, IBM Plex Sans Thai for everything, JetBrains mono for kickers */
  --font-toon: "Mitr", "IBM Plex Sans Thai", system-ui, sans-serif;
  --font-display: "IBM Plex Sans Thai", "Noto Sans Thai", system-ui, sans-serif;
  --font-hero: "Mitr", "IBM Plex Sans Thai", system-ui, sans-serif;
  --font-head: "IBM Plex Sans Thai", "Noto Sans Thai", system-ui, sans-serif;
  --font-body: "IBM Plex Sans Thai", "Noto Sans Thai", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

/* PRO-DARK (night) — clean dark SaaS */
[data-theme="pro-dark"] {
  --bg-0: #0c0e12; --bg-1: #111419; --bg-2: #171a21; --bg-3: #1d2129; --bg-4: #262b34;
  --line: #2a2f39; --line-soft: #21252d;
  --ink: #e8eaef; --ink-2: #b2b8c3; --ink-3: #828a97; --ink-4: #5a626e;
  --gold: #6076f6; --gold-bright: #8194f9; --gold-deep: #4d63ec; --gold-glow: rgba(96,118,246,0.34);
  --bronze: #8b93a1; --crimson: #f0524f; --crimson-deep: #d23f3c; --emerald: #2bbd6b; --amber: #eda22b; --sapphire: #5b94f7; --amethyst: #9a7cf5; --ruby: #f0588f;
  --letter-face: #eef1ff;
  --panel-grad: #171a21;
  --raised-grad: #1d2129;
  --gold-grad: linear-gradient(180deg, #6076f6 0%, #4f64ec 100%);
  --gold-grad-hover: linear-gradient(180deg, #7286f8 0%, #5d72f0 100%);
  --paper-texture: none;
  --shadow-panel: 0 1px 2px rgba(0,0,0,0.3), 0 14px 34px -20px rgba(0,0,0,0.65);
  --shadow-raised: 0 1px 2px rgba(0,0,0,0.45);
  --shadow-pop: 0 24px 56px -20px rgba(0,0,0,0.72);
}
/* modern dark: indigo primary buttons take white text */
[data-theme="pro-dark"] .btn-gold { color: #ffffff !important; text-shadow: none; }
/* Professional themes: calm the fantasy ornamentation */
[data-theme="pro"] .ornate::before, [data-theme="pro"] .ornate::after,
[data-theme="pro-dark"] .ornate::before, [data-theme="pro-dark"] .ornate::after { display: none; }
[data-theme="pro"] .sidebar::after, [data-theme="pro-dark"] .sidebar::after { opacity: 0; }
[data-theme="pro"] .brand-crest, [data-theme="pro"] .login-crest,
[data-theme="pro-dark"] .brand-crest, [data-theme="pro-dark"] .login-crest { box-shadow: var(--shadow-raised); }
[data-theme="pro"] .display, [data-theme="pro"] .kicker,
[data-theme="pro-dark"] .display, [data-theme="pro-dark"] .kicker { letter-spacing: .08em; }
[data-theme="pro"] .worldmap.mmo { background: radial-gradient(120% 120% at 50% 0%, #eef3fb, #e3e9f2 75%); }
[data-theme="pro"] .btn-gold, [data-theme="pro-dark"] .btn-gold { color: #fff; text-shadow: none; }

/* modern: structural frames use neutral lines, not the accent color */
[data-theme="pro"] .drawer, [data-theme="pro-dark"] .drawer,
[data-theme="pro"] .login-card, [data-theme="pro-dark"] .login-card,
[data-theme="pro"] .login-crest, [data-theme="pro-dark"] .login-crest,
[data-theme="pro"] .builder, [data-theme="pro-dark"] .builder,
[data-theme="pro"] .brand-crest, [data-theme="pro-dark"] .brand-crest,
[data-theme="pro"] .nav-item.active, [data-theme="pro-dark"] .nav-item.active,
[data-theme="pro"] .hermes-pop, [data-theme="pro-dark"] .hermes-pop,
[data-theme="pro"] .hermes-fulltab, [data-theme="pro-dark"] .hermes-fulltab,
[data-theme="pro"] .qedit-modal, [data-theme="pro-dark"] .qedit-modal,
[data-theme="pro"] .uim-card, [data-theme="pro-dark"] .uim-card,
[data-theme="pro"] .notify-card, [data-theme="pro-dark"] .notify-card,
[data-theme="pro"] .chat-sys, [data-theme="pro-dark"] .chat-sys,
[data-theme="pro"] .wchat-modal, [data-theme="pro-dark"] .wchat-modal {
  border-color: var(--line) !important;
}
/* drop the accent glow halos on those frames too */
[data-theme="pro"] .login-card, [data-theme="pro-dark"] .login-card,
[data-theme="pro"] .builder, [data-theme="pro-dark"] .builder,
[data-theme="pro"] .hermes-pop, [data-theme="pro-dark"] .hermes-pop,
[data-theme="pro"] .qedit-modal, [data-theme="pro-dark"] .qedit-modal,
[data-theme="pro"] .notify-card, [data-theme="pro-dark"] .notify-card {
  box-shadow: var(--shadow-pop) !important;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg-1);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

#root { height: 100vh; }

::selection { background: color-mix(in srgb, var(--gold) 28%, transparent); color: var(--ink); }

/* ============================================================
   3D CARTOON LETTERS (PiKaOs signature) — stroke-behind-fill + stacked hard shadows
   ============================================================ */
.ltr {
  font-family: var(--font-toon);
  font-weight: 700;
  color: var(--letter-face);
  -webkit-text-stroke: 6px var(--gold-deep);
  paint-order: stroke fill;          /* outline behind fill — no lines inside the glyph */
  text-shadow:
    0 2px 0 var(--gold),
    0 4px 0 var(--gold),
    0 6px 0 var(--gold-deep),
    0 8px 0 var(--gold-deep),
    0 10px 0 color-mix(in srgb, var(--gold-deep) 70%, #0c0e12),
    0 16px 22px var(--gold-glow);
  transform-origin: 50% 100%;
  display: inline-block;
  line-height: 1;
}
@supports not (paint-order: stroke) { .ltr { -webkit-text-stroke: 0; } }

@media (prefers-reduced-motion: no-preference) {
  .ltr.drop {
    animation: ltr-drop 1.05s cubic-bezier(.22,.9,.32,1) both;
    animation-delay: calc(var(--i, 0) * var(--drop-step, 0.18s) + 0.12s);
  }
  .ltr.jelly { animation: ltr-jelly .6s cubic-bezier(.45,.05,.35,1) both; animation-delay: 0s !important; }
}
@keyframes ltr-drop {
  0%   { opacity: 0; transform: translateY(-60vh) rotate(var(--tilt, -6deg)); }
  55%  { opacity: 1; transform: translateY(0) rotate(0deg); }
  68%  { transform: translateY(0) scaleX(1.12) scaleY(.82); }
  80%  { transform: translateY(-8px) scaleX(.97) scaleY(1.03); }
  100% { transform: translateY(0) scale(1); }
}
@keyframes ltr-jelly {
  0%, 100% { transform: scale(1); }
  35%  { transform: scale(1.12, .84); }
  60%  { transform: scale(.93, 1.07); }
  80%  { transform: scale(1.04, .96); }
}

/* credit line — mono, uppercase, faint, centered */
.credit {
  font-family: var(--font-mono); font-weight: 500;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-4); text-align: center;
}
.credit b { color: var(--ink-3); font-weight: 600; }

/* Scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb {
  background: var(--bg-4);
  border-radius: 20px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover { background: var(--bronze); background-clip: padding-box; }

/* ---------- Typography helpers ---------- */
.display { font-family: var(--font-display); font-weight: 700; letter-spacing: .04em; }
.kicker {
  font-family: var(--font-mono);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .2em;
  font-size: 10.5px;
  color: var(--ink-3);
}
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.thai-serif { font-family: var(--font-head); }

/* ============================================================
   APP SHELL
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  background:
    var(--paper-texture),
    var(--bg-1);
}

/* ---------- Sidebar ---------- */
.sidebar {
  position: relative;
  background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar::after {
  /* gold edge filigree */
  content: "";
  position: absolute; top: 0; right: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, transparent, var(--gold-deep) 30%, var(--gold-deep) 70%, transparent);
  opacity: .5;
}

.brand {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 20px 18px;
  border-bottom: 1px solid var(--line-soft);
}
.brand-crest {
  width: 38px; height: 38px; flex: 0 0 38px;
  display: grid; place-items: center;
  border-radius: 9px;
  background: var(--raised-grad);
  border: 1px solid var(--gold-deep);
  box-shadow: var(--shadow-raised), 0 0 18px -6px var(--gold-glow);
  color: var(--gold-bright);
  font-size: 20px;
}
/* small 3D Mitr brand logo */
.brand-logo {
  flex: 0 0 38px; width: 38px; height: 42px;
  display: grid; place-items: center; padding-top: 2px;
  cursor: default;
}
.brand-logo .ltr {
  font-size: 34px;
  -webkit-text-stroke-width: 3px;
  text-shadow:
    0 1px 0 var(--gold),
    0 2px 0 var(--gold-deep),
    0 3px 0 var(--gold-deep),
    0 6px 9px var(--gold-glow);
}
.brand-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--ink); line-height: 1.1; letter-spacing: .02em; }
.brand-sub { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: .08em; margin-top: 2px; }

.nav { flex: 1; overflow-y: auto; padding: 14px 12px 16px; }
.nav-group + .nav-group { margin-top: 18px; }
.nav-label {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .18em;
  color: var(--ink-4);
  padding: 0 10px 8px;
  display: flex; align-items: center; gap: 8px;
}
.nav-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }

.nav-item {
  position: relative;
  display: flex; align-items: center; gap: 11px;
  padding: 9px 11px;
  border-radius: var(--radius);
  color: var(--ink-2);
  cursor: pointer;
  font-size: 14px;
  border: 1px solid transparent;
  transition: background .14s, color .14s, border-color .14s;
  user-select: none;
}
.nav-item .ni-icon { width: 18px; text-align: center; opacity: .85; font-size: 15px; flex: 0 0 18px; }
.nav-item:hover { background: var(--bg-3); color: var(--ink); }
.nav-item.active {
  background: var(--raised-grad);
  color: var(--gold-bright);
  border-color: var(--gold-deep);
  box-shadow: var(--shadow-raised);
}
.nav-item.active::before {
  content: ""; position: absolute; left: -1px; top: 7px; bottom: 7px; width: 3px;
  border-radius: 3px; background: var(--gold-grad);
  box-shadow: 0 0 10px var(--gold-glow);
}
.nav-item .ni-tag {
  margin-left: auto; font-family: var(--font-mono); font-size: 10px;
  color: var(--ink); background: var(--bg-4); border: 1px solid var(--line);
  padding: 1px 6px; border-radius: 20px; line-height: 1.6;
}
.nav-item .ni-tag.alert { color: #fff; background: var(--crimson-deep); border-color: var(--crimson); }

.sidebar-foot {
  padding: 12px 16px;
  border-top: 1px solid var(--line-soft);
  font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3);
  display: flex; flex-direction: column; gap: 5px;
}
.sidebar-foot .row { display: flex; align-items: center; gap: 7px; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 0 0 var(--emerald); animation: pulse 2.4s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(127,164,90,.55); }
  70% { box-shadow: 0 0 0 7px rgba(127,164,90,0); }
  100% { box-shadow: 0 0 0 0 rgba(127,164,90,0); }
}

/* ---------- Main column ---------- */
.main { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

.topbar {
  height: 62px; flex: 0 0 62px;
  display: flex; align-items: center; gap: 16px;
  padding: 0 22px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, var(--bg-2), color-mix(in srgb, var(--bg-1) 80%, transparent));
  backdrop-filter: blur(4px);
}
.topbar-title { display: flex; align-items: center; gap: 11px; min-width: 0; }
.topbar-title .tt-icon { font-size: 18px; color: var(--ink-3); }
.topbar-title h1 { font-family: var(--font-head); font-weight: 700; font-size: 18px; margin: 0; color: var(--ink); white-space: nowrap; }
.topbar-title .tt-en { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em;
  color: var(--emerald); padding: 3px 9px; border-radius: 20px;
  border: 1px solid color-mix(in srgb, var(--emerald) 40%, transparent);
  background: color-mix(in srgb, var(--emerald) 12%, transparent);
}
.topbar-spacer { flex: 1; }

.content { flex: 1; overflow-y: auto; overflow-x: hidden; }
.content-pad { padding: 34px 40px 48px; max-width: 1500px; }

/* ============================================================
   PRIMITIVES
   ============================================================ */

/* Panel / parchment card */
.panel {
  position: relative;
  background: var(--panel-grad);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-panel);
}
.panel.inset { background: var(--bg-1); }
.panel-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line-soft);
}
.panel-head h3 { font-family: var(--font-head); font-weight: 700; font-size: 15px; margin: 0; color: var(--ink); }
.panel-head .ph-icon { color: var(--gold); font-size: 15px; }
.panel-head .ph-spacer { flex: 1; }
.panel-body { padding: 16px; }
.panel-body.no-pad { padding: 0; }

/* corner ornaments */
.ornate::before, .ornate::after {
  content: ""; position: absolute; width: 14px; height: 14px; pointer-events: none;
  border-color: var(--gold-deep); opacity: .6;
}
.ornate::before { top: 7px; left: 7px; border-top: 2px solid; border-left: 2px solid; border-top-left-radius: 4px; }
.ornate::after { bottom: 7px; right: 7px; border-bottom: 2px solid; border-right: 2px solid; border-bottom-right-radius: 4px; }

/* Buttons — cartoon "physical button": 3D base shadow, sink on press, springy release */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-body); font-weight: 700; font-size: 14px;
  padding: 10px 18px; border-radius: var(--radius);
  cursor: pointer; border: 1px solid transparent; white-space: nowrap;
  transition: transform .25s var(--spring), box-shadow .25s var(--spring), background .14s, border-color .14s, filter .14s;
  user-select: none;
}
.btn:active { transition-duration: .05s; }
.btn-gold {
  background: var(--gold-grad); color: #fff; border: none;
  box-shadow: 0 3px 0 var(--gold-deep);
  text-shadow: none;
}
.btn-gold:hover { background: var(--gold-grad-hover); transform: translateY(-1px); box-shadow: 0 4px 0 var(--gold-deep); }
.btn-gold:active { transform: translateY(3px) scale(.985); box-shadow: 0 0 0 var(--gold-deep); }
.btn-ghost {
  background: var(--bg-2); color: var(--ink); border: 1px solid var(--line);
  box-shadow: 0 2px 0 var(--line);
}
.btn-ghost:hover { background: var(--bg-3); transform: translateY(-1px); box-shadow: 0 3px 0 var(--line); }
.btn-ghost:active { transform: translateY(2px) scale(.985); box-shadow: 0 0 0 var(--line); }
.btn-danger {
  background: var(--crimson); color: #fff; border: none;
  box-shadow: 0 3px 0 var(--crimson-deep);
}
.btn-danger:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--crimson-deep); filter: brightness(1.04); }
.btn-danger:active { transform: translateY(3px) scale(.985); box-shadow: 0 0 0 var(--crimson-deep); }
.btn[disabled], .btn:disabled { opacity: .55; pointer-events: none; box-shadow: none; transform: none; }
.btn-sm { padding: 7px 14px; font-size: 12.5px; font-weight: 600; border-radius: var(--radius-sm); }
.btn-icon { padding: 8px 10px; }
.btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--gold-glow); }

/* Rank chip — disciplined: neutral base, indigo for top tiers */
.rank {
  display: inline-grid; place-items: center;
  width: 26px; height: 26px; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-weight: 700; font-size: 13px;
  flex: 0 0 26px;
  background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-2);
  box-shadow: var(--shadow-raised);
}
.rank.S { background: var(--gold-grad); color: #fff; border: none; box-shadow: 0 2px 0 var(--gold-deep); }
.rank.A { background: color-mix(in srgb, var(--gold) 14%, var(--bg-2)); color: var(--gold-bright); border-color: color-mix(in srgb, var(--gold) 42%, transparent); }
.rank.B { color: var(--ink); }
.rank.C { color: var(--ink-2); }
.rank.D { color: var(--ink-3); }

/* Badges / chips */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .03em;
  padding: 2px 9px; border-radius: 20px; line-height: 1.7;
  border: 1px solid var(--line); color: var(--ink-2); background: var(--bg-3);
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge.on { color: var(--emerald); border-color: color-mix(in srgb,var(--emerald) 40%,transparent); background: color-mix(in srgb,var(--emerald) 12%,transparent); }
.badge.busy { color: var(--gold-bright); border-color: color-mix(in srgb,var(--gold) 45%,transparent); background: color-mix(in srgb,var(--gold) 12%,transparent); }
.badge.idle { color: var(--ink-3); }
.badge.warn { color: var(--crimson); border-color: color-mix(in srgb,var(--crimson) 40%,transparent); background: color-mix(in srgb,var(--crimson) 12%,transparent); }
.badge.info { color: var(--sapphire); border-color: color-mix(in srgb,var(--sapphire) 40%,transparent); background: color-mix(in srgb,var(--sapphire) 12%,transparent); }
.badge.magic { color: var(--amethyst); border-color: color-mix(in srgb,var(--amethyst) 40%,transparent); background: color-mix(in srgb,var(--amethyst) 12%,transparent); }

/* Meter / bar — kit progress: flat token fills, no colored glow */
.meter { height: 8px; border-radius: 999px; background: var(--bg-4); overflow: hidden; }
.meter > i { display: block; height: 100%; border-radius: 999px; transition: width .5s var(--spring-soft); }
.meter.mana > i { background: var(--sapphire); }
.meter.xp > i { background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }
.meter.hp > i { background: linear-gradient(90deg,#a8463a,#d07a55); }

/* Avatar (pixel-character portrait frame) */
.avatar {
  position: relative;
  width: 44px; height: 44px; border-radius: 9px; flex: 0 0 44px;
  display: block; overflow: hidden;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--av, var(--gold)) 16%, var(--bg-2)) 0%, var(--bg-1) 70%);
  box-shadow: var(--shadow-raised);
}
.avatar.portrait::after {
  content: ""; position: absolute; left: 8%; right: 8%; bottom: 4px; height: 4px; border-radius: 50%;
  background: rgba(0,0,0,.35); filter: blur(1px);
}
.pixel-sprite { display: block; }
.pixel-sprite.bob { animation: spriteBob 1.6s ease-in-out infinite; }
@keyframes spriteBob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-2px); } }
.avatar.sm { width: 34px; height: 34px; flex-basis: 34px; border-radius: 7px; font-size: 14px; }
.avatar.lg { width: 64px; height: 64px; flex-basis: 64px; border-radius: 12px; font-size: 24px; }
.avatar .a-ring { position: absolute; inset: -1px; border-radius: inherit; border: 2px solid transparent; }
.avatar.on .a-ring { border-color: var(--emerald); box-shadow: 0 0 10px -2px var(--emerald); }
.avatar.busy .a-ring { border-color: var(--gold); box-shadow: 0 0 10px -2px var(--gold-glow); }

/* Section divider with diamond */
.divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; color: var(--gold-deep); }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--line), transparent); }
.divider .gem { width: 7px; height: 7px; transform: rotate(45deg); background: var(--gold); box-shadow: 0 0 8px var(--gold-glow); }

/* Stat tile */
.stat-tile {
  background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 14px 16px; box-shadow: var(--shadow-raised);
}
.stat-tile .st-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .08em; color: var(--ink-3); text-transform: uppercase; }
.stat-tile .st-value { font-family: var(--font-display); font-weight: 700; font-size: 26px; color: var(--ink); margin-top: 4px; display: flex; align-items: baseline; gap: 7px; }
.stat-tile .st-value .unit { font-size: 12px; color: var(--ink-3); font-family: var(--font-mono); }
.stat-tile .st-delta { font-family: var(--font-mono); font-size: 11px; margin-top: 6px; }
.st-delta.up { color: var(--emerald); }
.st-delta.down { color: var(--crimson); }

/* grids */
.grid { display: grid; gap: 16px; }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-4 { grid-template-columns: repeat(4, 1fr); }

@media (max-width: 1180px) {
  .cols-4 { grid-template-columns: repeat(2, 1fr); }
  .cols-3 { grid-template-columns: repeat(2, 1fr); }
}

.row { display: flex; align-items: center; gap: 10px; }
.col { display: flex; flex-direction: column; }
.muted { color: var(--ink-3); }
.faint { color: var(--ink-4); }
.gold-text { color: var(--gold-bright); }

/* fade-in */
.fade-in { animation: fadeInOpacity .35s ease both; }
@keyframes fadeInOpacity { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.stagger > * { animation: fadeIn .4s ease both; }
.stagger > *:nth-child(1){animation-delay:.02s}
.stagger > *:nth-child(2){animation-delay:.06s}
.stagger > *:nth-child(3){animation-delay:.10s}
.stagger > *:nth-child(4){animation-delay:.14s}
.stagger > *:nth-child(5){animation-delay:.18s}
.stagger > *:nth-child(6){animation-delay:.22s}
.stagger > *:nth-child(7){animation-delay:.26s}
.stagger > *:nth-child(8){animation-delay:.30s}

/* ===== styles/components.css ===== */
/* ============================================================
   COMPONENT + SCREEN STYLES
   ============================================================ */

/* ---------- Page header ---------- */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--line-soft); }
.page-title { font-family: var(--font-head); font-weight: 700; font-size: 26px; margin: 6px 0 0; color: var(--ink); letter-spacing: -0.02em; line-height: 1.15; }
.page-desc { margin: 10px 0 0; color: var(--ink-3); font-size: 14px; max-width: 600px; line-height: 1.6; }

/* ---------- Mana orb (inline) ---------- */
.mana-orb { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px;
  background: radial-gradient(circle at 35% 30%, #a8d2ff, #4f79ad); box-shadow: 0 0 6px -1px var(--sapphire); vertical-align: -1px; }

/* ---------- Agent card ---------- */
.agent-card {
  display: flex; gap: 13px; text-align: left; width: 100%;
  background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 14px; cursor: pointer; color: inherit; font-family: inherit;
  box-shadow: var(--shadow-raised); transition: transform .1s, border-color .14s, box-shadow .14s;
}
.agent-card:hover { transform: translateY(-2px); border-color: var(--bronze); box-shadow: var(--shadow-raised), 0 14px 28px -18px rgba(0,0,0,.7); }
.agent-card.compact { padding: 11px; gap: 11px; }
.ac-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.ac-top { display: flex; align-items: center; gap: 8px; }
.ac-name { font-family: var(--font-head); font-weight: 700; font-size: 14.5px; color: var(--ink); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-role { font-size: 10.5px; color: var(--ink-3); letter-spacing: .02em; }
.ac-task { display: flex; align-items: center; gap: 7px; }
.ac-task-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 6px; background: var(--ink-4); }
.ac-task-dot[data-s="on"] { background: var(--emerald); box-shadow: 0 0 6px var(--emerald); }
.ac-task-dot[data-s="busy"] { background: var(--gold); box-shadow: 0 0 6px var(--gold-glow); animation: blink 1.4s infinite; }
.ac-task-dot[data-s="idle"] { background: var(--ink-3); }
@keyframes blink { 50% { opacity: .35; } }
.ac-meta { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
.ac-mana { font-size: 11px; color: var(--ink-2); margin-left: auto; }

/* ---------- Quest card ---------- */
.quest-card {
  display: flex; gap: 14px; text-align: left; width: 100%;
  background: var(--panel-grad); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 15px; cursor: pointer; color: inherit; font-family: inherit; position: relative; overflow: hidden;
  box-shadow: var(--shadow-panel); transition: transform .1s, border-color .14s;
}
.quest-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--ink-4); opacity: .35; }
.quest-card.status-active::before { background: var(--ink); opacity: .9; box-shadow: none; }
.quest-card.status-review::before { background: var(--sapphire); }
.quest-card.status-done::before { background: var(--emerald); }
.quest-card.status-failed::before { background: var(--crimson); }
.quest-card:hover { transform: translateY(-2px); border-color: var(--bronze); }
.qc-left { display: flex; align-items: flex-start; padding-top: 2px; }
.qc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 9px; }
.qc-top { display: flex; align-items: center; gap: 9px; }
.qc-id { font-size: 11px; color: var(--ink-3); letter-spacing: .04em; }
.qc-deadline { font-size: 10.5px; margin-left: auto; }
.qc-title { font-family: var(--font-head); font-weight: 700; font-size: 15px; color: var(--ink); line-height: 1.35; }
.qc-progress-row { display: flex; align-items: center; gap: 12px; }
.qc-progress-row .meter { flex: 1; }
.qc-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.qc-party { display: flex; align-items: center; }
.qc-party-av { width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; font-size: 13px;
  background: var(--bg-3); border: 1px solid var(--line); box-shadow: 0 1px 0 rgba(0,0,0,.3); position: relative; }
.qc-reward { font-size: 13px; color: var(--ink); font-weight: 600; }

/* ---------- Activity feed ---------- */
.act-row { display: flex; gap: 11px; padding: 10px 4px; border-bottom: 1px solid var(--line-soft); }
.act-row:last-child { border-bottom: none; }
.act-icon { width: 30px; height: 30px; flex: 0 0 30px; display: grid; place-items: center; border-radius: 8px;
  background: var(--bg-3); border: 1px solid var(--line); font-size: 15px; }
.act-icon[data-tone="ok"] { border-color: color-mix(in srgb,var(--emerald) 45%,transparent); }
.act-icon[data-tone="warn"] { border-color: color-mix(in srgb,var(--crimson) 45%,transparent); }
.act-icon[data-tone="info"] { border-color: color-mix(in srgb,var(--sapphire) 45%,transparent); }
.act-body { flex: 1; min-width: 0; }

/* ---------- Chat ---------- */
.chat-wrap { display: flex; flex-direction: column; height: 100%; }
.chat-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.chat-msg { display: flex; gap: 11px; }
.chat-msg-body { flex: 1; min-width: 0; }
.chat-msg-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.chat-msg-name { font-family: var(--font-head); font-weight: 700; font-size: 13.5px; }
.chat-time { font-size: 10px; margin-left: auto; }
.chat-bubble { background: var(--bg-3); border: 1px solid var(--line); border-radius: 4px 10px 10px 10px;
  padding: 9px 13px; font-size: 13.5px; line-height: 1.5; color: var(--ink); }
.chat-attach { display: inline-flex; align-items: center; gap: 7px; margin-top: 7px; font-size: 11px; color: var(--ink-2);
  background: var(--bg-4); border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px; }
.chat-sys { display: flex; align-items: center; gap: 11px; padding: 9px 13px; border-radius: 8px;
  background: color-mix(in srgb, var(--gold) 8%, var(--bg-2)); border: 1px solid color-mix(in srgb,var(--gold) 28%,transparent); }
.chat-sys-crest { color: var(--gold-bright); font-size: 16px; }
.chat-sys-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.chat-sys-name { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: .1em; color: var(--gold-bright); }
.typing-bubble { display: inline-flex; gap: 4px; align-items: center; width: max-content; }
.typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); animation: typing 1.2s infinite; }
.typing-bubble span:nth-child(2) { animation-delay: .2s; }
.typing-bubble span:nth-child(3) { animation-delay: .4s; }
@keyframes typing { 0%,60%,100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
.chat-input { display: flex; gap: 10px; padding: 13px 16px; border-top: 1px solid var(--line); background: var(--bg-2); }
.chat-input input { flex: 1; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 11px 14px; color: var(--ink); font-family: var(--font-body); font-size: 13.5px; }
.chat-input input:focus { outline: none; border-color: var(--gold-deep); box-shadow: 0 0 0 3px var(--gold-glow); }

/* ---------- Empty ---------- */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 20px; text-align: center; }
.empty-icon { font-size: 38px; opacity: .55; margin-bottom: 12px; filter: grayscale(.3); }

/* ---------- Right rail (hall) ---------- */
.hall-grid { display: grid; grid-template-columns: 1fr var(--rail-w); gap: 18px; align-items: start; }
@media (max-width: 1280px) { .hall-grid { grid-template-columns: 1fr; } }
.rail { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 0; }
.rail-chat { height: 460px; display: flex; flex-direction: column; }
.rail-chat .panel-body { padding: 0; flex: 1; min-height: 0; }

/* ---------- Alerts ---------- */
.alert-count { font-family: var(--font-mono); font-size: 11px; font-weight: 700; min-width: 20px; height: 20px;
  padding: 0 6px; border-radius: 10px; display: inline-grid; place-items: center; background: var(--bg-3); color: var(--ink-2); }
.alert-count.crit { background: var(--crimson); color: #fff; }
.alerts { display: flex; flex-direction: column; }
.alert-row { display: flex; gap: 11px; align-items: flex-start; padding: 11px 13px; border-bottom: 1px solid var(--line-soft); }
.alert-row:last-child { border-bottom: none; }
.alert-ic { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 14px; flex: none; }
.alert-sev-critical .alert-ic { background: color-mix(in srgb, var(--crimson) 16%, transparent); }
.alert-sev-warn .alert-ic { background: color-mix(in srgb, var(--gold) 20%, transparent); }
.alert-sev-info .alert-ic { background: color-mix(in srgb, var(--sapphire) 15%, transparent); }
.alert-body { flex: 1; min-width: 0; background: none; border: none; padding: 0; text-align: left; font-family: inherit; }
.alert-title { font-size: 13px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 7px; }
.alert-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.alert-sev-critical .alert-dot { background: var(--crimson); animation: alertPulse 1.6s ease-in-out infinite; }
.alert-sev-warn .alert-dot { background: var(--gold-bright); }
.alert-sev-info .alert-dot { background: var(--sapphire); }
.alert-detail { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; line-height: 1.5; }
.alert-time { font-size: 10px; margin-top: 3px; }
.alert-dismiss { background: none; border: none; color: var(--ink-4); cursor: pointer; font-size: 13px; padding: 3px 5px;
  border-radius: 6px; line-height: 1; flex: none; }
.alert-dismiss:hover { color: var(--ink); background: var(--bg-3); }
.alert-empty { padding: 18px 14px; text-align: center; color: var(--ink-3); font-size: 12.5px; }
@keyframes alertPulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--crimson) 45%, transparent); }
  60% { box-shadow: 0 0 0 5px transparent; }
}

/* tabs — kit segmented pill */
.tabs { display: inline-flex; gap: 3px; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); padding: 3px; }
.tab { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--ink-3); font-family: var(--font-body); border: none; background: transparent; }
.tab.active { background: var(--bg-2); color: var(--gold-bright); box-shadow: var(--shadow-raised); }
.tab:hover:not(.active) { color: var(--ink-2); }

/* segmented list */
.list-rows { display: flex; flex-direction: column; }
.list-rows > * + * { margin-top: 10px; }

/* ---------- World map (de-emphasized) ---------- */
.worldmap { position: relative; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--line);
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, transparent 1px 28px),
    radial-gradient(circle at 50% 40%, color-mix(in srgb,var(--sapphire) 14%, var(--bg-1)), var(--bg-0));
  min-height: 200px; }
.wm-room { position: absolute; border: 1px dashed var(--line); border-radius: 8px; }
.wm-room .wm-label { position: absolute; top: 6px; left: 9px; font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-4); letter-spacing: .08em; }
.wm-token { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 3px; transition: left .8s ease, top .8s ease; }
.wm-token .wm-pin { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 15px;
  background: var(--raised-grad); border: 1.5px solid; box-shadow: 0 4px 10px -4px rgba(0,0,0,.6); }
.wm-token .wm-name { font-family: var(--font-mono); font-size: 9px; color: var(--ink-2); background: var(--bg-0); padding: 1px 5px; border-radius: 10px; border: 1px solid var(--line); white-space: nowrap; }

/* ---------- Detail drawer ---------- */
.drawer-overlay { position: fixed; inset: 0; background: rgba(8,5,2,.6); backdrop-filter: blur(3px); z-index: 60;
  display: flex; justify-content: flex-end; animation: fadeIn .2s ease; }
.drawer { width: 460px; max-width: 92vw; height: 100%; background: var(--panel-grad); border-left: 1px solid var(--gold-deep);
  box-shadow: var(--shadow-pop); overflow-y: auto; animation: slideIn .26s cubic-bezier(.2,.8,.2,1); }
@keyframes slideIn { from { transform: translateX(40px); opacity: .6; } to { transform: none; opacity: 1; } }
.drawer-head { padding: 22px 22px 18px; border-bottom: 1px solid var(--line); display: flex; gap: 14px; align-items: flex-start; }
.drawer-body { padding: 22px; display: flex; flex-direction: column; gap: 20px; }
.drawer-close { margin-left: auto; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink-2);
  width: 32px; height: 32px; cursor: pointer; font-size: 15px; }
.drawer-close:hover { background: var(--bg-4); color: var(--ink); }

.kv { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.kv-item { background: var(--bg-1); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 11px 13px; }
.kv-item .kv-label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; }
.kv-item .kv-val { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--ink); margin-top: 3px; }

.stat-line { display: flex; align-items: center; gap: 12px; }
.stat-line .sl-label { font-size: 12.5px; color: var(--ink-2); width: 92px; flex: 0 0 92px; }
.stat-line .meter { flex: 1; }
.stat-line .sl-num { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); width: 40px; text-align: right; }

/* ---------- Codex / list table ---------- */
.codex-row { display: flex; align-items: center; gap: 13px; padding: 13px 15px; border: 1px solid var(--line);
  border-radius: var(--radius); background: var(--raised-grad); cursor: pointer; box-shadow: var(--shadow-raised); transition: border-color .14s, transform .1s; }
.codex-row:hover { border-color: var(--bronze); transform: translateX(2px); }
.codex-type { width: 38px; height: 38px; flex: 0 0 38px; border-radius: 8px; display: grid; place-items: center; font-size: 17px;
  background: var(--bg-2); border: 1px solid var(--line); }
.codex-main { flex: 1; min-width: 0; }
.codex-title { font-family: var(--font-head); font-weight: 700; font-size: 14px; color: var(--ink); }
.codex-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.tag { font-family: var(--font-mono); font-size: 10px; color: var(--ink-2); background: var(--bg-2); border: 1px solid var(--line); padding: 1px 7px; border-radius: 20px; }

/* ---------- Login (PiKaOs hero) ---------- */
.login-stage {
  position: relative; min-height: 100vh; height: 100vh; overflow-y: auto;
  display: flex; flex-direction: column; align-items: center;
  padding: clamp(32px, 7vh, 76px) 22px 26px;
  background:
    radial-gradient(900px 460px at 50% -8%, var(--gold-glow), transparent 60%),
    radial-gradient(var(--line) 1px, transparent 1px) 0 0 / 26px 26px,
    var(--bg-1);
}
.login-stage::before {
  /* fade the dot grid top + bottom */
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(180deg, var(--bg-1) 0%, transparent 22%, transparent 78%, var(--bg-1) 100%);
}
.login-stage > * { position: relative; z-index: 1; }

.login-hero { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: clamp(22px, 4vh, 38px); }
.login-logo { display: flex; gap: clamp(2px, 1vw, 8px); justify-content: center; }
.login-logo .ltr { font-size: clamp(54px, 11vw, 104px); }
.login-tagline {
  font-family: var(--font-mono); font-weight: 500; font-size: 11.5px;
  letter-spacing: .26em; text-transform: uppercase; color: var(--ink-4);
}
.login-card { width: min(400px, 100%); position: relative; z-index: 2;
  background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-panel); padding: 28px; }
.login-card-title { font-family: var(--font-body); font-weight: 700; font-size: 20px; color: var(--ink); margin: 0 0 4px; }
.login-card-sub { font-size: 13px; color: var(--ink-3); margin: 0 0 22px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 7px; font-family: var(--font-body); }
.field .field-wrap { position: relative; display: flex; align-items: center; }
.field .f-icon { position: absolute; left: 13px; font-size: 14px; opacity: .6; }
.field input { width: 100%; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 12px 14px 12px 38px; color: var(--ink); font-family: var(--font-body); font-size: 14px;
  transition: background .14s, border-color .14s, box-shadow .14s; }
.field input:focus { outline: none; background: var(--bg-2); border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
.login-master { display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
.login-credit { margin-top: auto; padding-top: 30px; }
@media (prefers-reduced-motion: no-preference) {
  .rise-in { animation: rise-in .6s ease both; }
}
@keyframes rise-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

/* ---------- Login — full PiKaOs auth states (validation / forgot / success) ---------- */
.login-cardhead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
.login-kicker { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-4); }
.lf { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.lf-label { font-size: 13px; font-weight: 600; color: var(--ink-2); }
.lf-row { display: flex; align-items: baseline; justify-content: space-between; }
.lf-input { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 11px 12px; outline: none; transition: border-color .15s, box-shadow .15s, background .15s; }
.lf-input::placeholder { color: var(--ink-4); }
.lf-input:focus { border-color: var(--gold); background: var(--bg-2); box-shadow: 0 0 0 3px var(--gold-glow); }
.lf.has-error .lf-input { border-color: var(--crimson); box-shadow: 0 0 0 3px color-mix(in srgb, var(--crimson) 18%, transparent); }
.lf-error { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--crimson); }
.forgot { font-size: 12px; font-weight: 500; color: var(--gold-bright); background: none; border: none; cursor: pointer; font-family: var(--font-body); padding: 0; transition: transform .25s cubic-bezier(.34,2.2,.6,1); }
.forgot:hover { color: var(--gold-deep); text-decoration: underline; }
.forgot:active { transform: scale(.88); transition-duration: .05s; }
.pw-wrap { position: relative; }
.pw-toggle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer; font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: .06em; color: var(--ink-3); padding: 6px 8px; border-radius: var(--radius-sm); transition: transform .25s cubic-bezier(.34,2.2,.6,1), background .15s, color .15s; }
.pw-toggle:hover { background: var(--bg-4); color: var(--ink-2); }
.pw-toggle:active { transform: translateY(-50%) scale(.86); transition-duration: .05s; }
.login-spin { width: 15px; height: 15px; border-radius: 50%; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; animation: loginSpin .7s linear infinite; }
@keyframes loginSpin { to { transform: rotate(360deg); } }
.form-alert { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 16px; border: 1px solid; }
.form-alert.error { color: var(--crimson-deep); border-color: color-mix(in srgb, var(--crimson) 40%, transparent); background: color-mix(in srgb, var(--crimson) 10%, transparent); }
[data-theme="pro-dark"] .form-alert.error { color: var(--crimson); }
.login-note { font-size: 12.5px; color: var(--ink-3); background: var(--bg-3); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 16px; }
.login-note strong { color: var(--sapphire); font-weight: 600; }
.login-success { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 22px 4px 10px; text-align: center; }
.login-success-ic { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: color-mix(in srgb, var(--emerald) 14%, transparent); border: 1.5px solid color-mix(in srgb, var(--emerald) 45%, transparent); animation: loginPop .45s cubic-bezier(.34,1.56,.64,1) both; }
.login-success-ic svg { width: 28px; height: 28px; }
@keyframes loginPop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.login-success-title { font-size: 18px; font-weight: 700; color: var(--ink); }
.login-success-sub { font-size: 13px; color: var(--ink-3); }
.login-monochip { font-family: var(--font-mono); font-size: 11.5px; color: var(--emerald); background: color-mix(in srgb, var(--emerald) 10%, transparent); border: 1px solid color-mix(in srgb, var(--emerald) 35%, transparent); border-radius: 999px; padding: 4px 12px; }
.login-back { background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 12.5px; font-weight: 500; color: var(--gold-bright); transition: transform .25s cubic-bezier(.34,2.2,.6,1); }
.login-back:hover { text-decoration: underline; }
.login-back:active { transform: scale(.88); transition-duration: .05s; }

/* ---------- Theme toggle — kit segmented ---------- */
.theme-toggle { display: inline-flex; background: var(--bg-3); border: 1px solid var(--line); border-radius: 999px; padding: 3px; gap: 2px; }
.theme-toggle button { border: none; background: transparent; width: 32px; height: 26px; border-radius: 999px; cursor: pointer; color: var(--ink-3); font-size: 13px; display: inline-flex; align-items: center; justify-content: center; }
.theme-toggle button.on { background: var(--bg-2); color: var(--gold-bright); box-shadow: var(--shadow-raised); }

/* topbar mini stats */
.tb-stat { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--line); background: var(--bg-2); }
.tb-stat .tbs-ico { font-size: 14px; }
.tb-stat .tbs-num { font-family: var(--font-mono); font-size: 13px; color: var(--ink); font-weight: 600; }
.tb-stat .tbs-lbl { font-size: 11px; color: var(--ink-3); }

/* search */
.search-bar { display: flex; align-items: center; gap: 10px; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 11px 15px; }
.search-bar input { flex: 1; background: transparent; border: none; color: var(--ink); font-family: var(--font-body); font-size: 14px; }
.search-bar input:focus { outline: none; }

/* ---------- Character Builder ---------- */
.builder { width: 960px; max-width: 96vw; max-height: 92vh; display: flex; flex-direction: column;
  background: var(--panel-grad); border: 1px solid var(--gold-deep); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-pop), 0 0 60px -30px var(--gold-glow); animation: slideIn .24s cubic-bezier(.2,.8,.2,1); overflow: hidden; }
.builder-head { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--line); }
.builder-body { display: grid; grid-template-columns: 1fr 280px; gap: 0; flex: 1; min-height: 0; }
.builder-form { padding: 22px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.builder-preview { border-left: 1px solid var(--line); background: var(--bg-1); padding: 20px; overflow-y: auto; }
.builder-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--bg-2); }
@media (max-width: 760px) { .builder-body { grid-template-columns: 1fr; } .builder-preview { border-left: none; border-top: 1px solid var(--line); } }

.bf { display: flex; flex-direction: column; gap: 7px; }
.bf-label { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--ink); display: flex; align-items: baseline; gap: 8px; }
.bf-hint { font-family: var(--font-body); font-weight: 400; font-size: 11px; color: var(--ink-3); }
.bf-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.bf-input { width: 100%; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px 12px;
  color: var(--ink); font-family: var(--font-body); font-size: 13.5px; resize: vertical; }
.bf-input:focus { outline: none; border-color: var(--gold-deep); box-shadow: 0 0 0 3px var(--gold-glow); }
select.bf-input { cursor: pointer; }

.seg { display: inline-flex; background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius); padding: 3px; gap: 2px; width: 100%; }
.seg-btn { flex: 1; border: none; background: transparent; color: var(--ink-3); font-family: var(--font-body); font-size: 12.5px; padding: 7px 6px; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; }
.seg-btn.on { background: var(--raised-grad); color: var(--gold-bright); box-shadow: var(--shadow-raised); font-weight: 600; }
.seg-btn:hover:not(.on) { color: var(--ink); }

.taginput { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 8px; }
.tag-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.tag-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink); background: var(--bg-3); border: 1px solid var(--line); border-radius: 20px; padding: 3px 5px 3px 10px; }
.tag-chip button { border: none; background: var(--bg-4); color: var(--ink-3); width: 16px; height: 16px; border-radius: 50%; cursor: pointer; font-size: 9px; line-height: 1; }
.tag-chip button:hover { background: var(--crimson-deep); color: #fff; }
.tag-chips input { flex: 1; min-width: 100px; background: transparent; border: none; color: var(--ink); font-family: var(--font-body); font-size: 13px; padding: 4px; }
.tag-chips input:focus { outline: none; }
.tag-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag-sg { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); background: transparent; border: 1px dashed var(--line); border-radius: 20px; padding: 2px 9px; cursor: pointer; }
.tag-sg:hover { color: var(--gold-bright); border-color: var(--gold-deep); }

.rulelist { display: flex; flex-direction: column; gap: 8px; }
.rule-row { display: flex; align-items: center; gap: 8px; }
.rule-num { width: 22px; height: 22px; flex: 0 0 22px; display: grid; place-items: center; border-radius: 5px; font-family: var(--font-mono); font-size: 11px;
  background: var(--bg-3); border: 1px solid var(--line); color: var(--gold); }
.rule-row input { flex: 1; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 8px 11px; color: var(--ink); font-family: var(--font-body); font-size: 13px; }
.rule-row input:focus { outline: none; border-color: var(--gold-deep); box-shadow: 0 0 0 3px var(--gold-glow); }
.rule-del { border: 1px solid var(--line); background: var(--bg-3); color: var(--ink-3); width: 28px; height: 28px; border-radius: var(--radius-sm); cursor: pointer; font-size: 11px; flex: 0 0 28px; }
.rule-del:hover { background: var(--crimson-deep); color: #fff; border-color: var(--crimson); }
.rule-add { align-self: flex-start; border: 1px dashed var(--line); background: transparent; color: var(--ink-2); font-family: var(--font-body); font-size: 12.5px; padding: 7px 14px; border-radius: var(--radius); cursor: pointer; }
.rule-add:hover { border-color: var(--gold-deep); color: var(--gold-bright); }

.class-pick { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.class-opt { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 12px 6px 9px; cursor: pointer;
  background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); transition: border-color .14s, background .14s; }
.class-opt:hover { border-color: var(--bronze); }
.class-opt.on { border-color: var(--gold-deep); background: var(--raised-grad); box-shadow: 0 0 14px -4px var(--gold-glow); }
.class-opt .pixel-sprite { image-rendering: pixelated; }
.class-th { font-family: var(--font-head); font-weight: 700; font-size: 12px; color: var(--ink); margin-top: 4px; }
.class-en { font-size: 9.5px; color: var(--ink-3); }

.swatches { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; box-shadow: var(--shadow-raised); }
.swatch.on { border-color: var(--gold-bright); box-shadow: 0 0 0 2px var(--bg-1), 0 0 0 4px var(--gold-deep); }

.preview-card { background: var(--raised-grad); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px 16px; box-shadow: var(--shadow-raised); }
.preview-portrait { display: grid; place-items: center; height: 110px; border-radius: var(--radius); position: relative;
  background: linear-gradient(180deg, color-mix(in srgb, var(--gold) 8%, var(--bg-1)), var(--bg-0));
  border: 1px solid var(--line-soft); overflow: hidden; }
.preview-portrait::after { content: ""; position: absolute; left: 30%; right: 30%; bottom: 10px; height: 6px; border-radius: 50%; background: rgba(0,0,0,.4); filter: blur(2px); }

/* ---------- Feature status tags (มีผล / ไม่มีผล) ---------- */
.feature-tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: .02em; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--line); white-space: nowrap; cursor: help; line-height: 1.6; }
.feature-tag .ft-ic { font-size: 9px; }
.ft-live { color: var(--emerald); border-color: color-mix(in srgb,var(--emerald) 45%,transparent); background: color-mix(in srgb,var(--emerald) 12%,transparent); }
.ft-local { color: var(--sapphire); border-color: color-mix(in srgb,var(--sapphire) 45%,transparent); background: color-mix(in srgb,var(--sapphire) 12%,transparent); }
.ft-demo { color: var(--ink-3); border-color: var(--line); background: var(--bg-2); }

/* ---------- Help note (plain-language explanation) ---------- */
.help-note { display: flex; align-items: flex-start; gap: 9px; padding: 11px 14px; border-radius: var(--radius);
  background: color-mix(in srgb, var(--sapphire) 7%, var(--bg-2)); border: 1px solid var(--line-soft);
  font-size: 12.5px; color: var(--ink-2); line-height: 1.55; }
.help-note-ic { color: var(--sapphire); font-size: 14px; flex: 0 0 auto; margin-top: 1px; }
.help-note-text { flex: 1; }
.help-note .feature-tag { flex: 0 0 auto; align-self: center; }

/* ---------- Page header tweak ---------- */
.page-head .kicker { white-space: nowrap; }

/* ---------- Admin user table ---------- */
.admin-table { display: flex; flex-direction: column; }
.admin-th, .admin-tr { display: grid; grid-template-columns: 1.6fr 1.4fr 0.9fr 1.3fr 0.6fr 0.7fr; align-items: center; gap: 10px; }
.admin-th { padding: 6px 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-4); border-bottom: 1px solid var(--line); }
.admin-tr { padding: 11px 12px; border-bottom: 1px solid var(--line-soft); cursor: pointer; border-radius: var(--radius); transition: background .12s; }
.admin-tr:hover { background: var(--bg-3); }
.admin-tr:last-child { border-bottom: none; }
.col-user { display: flex; align-items: center; gap: 10px; min-width: 0; }
.au-name { display: block; font-family: var(--font-head); font-weight: 700; font-size: 13.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.au-sub { display: block; font-size: 10.5px; color: var(--ink-3); }
.ar-role { display: block; font-size: 12.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ar-pos { display: block; font-size: 10.5px; color: var(--ink-3); }
.col-tok { display: flex; align-items: center; gap: 8px; }
.at-num { font-size: 12px; color: var(--ink); min-width: 38px; }
.at-bar { flex: 1; height: 5px; border-radius: 20px; background: var(--bg-4); overflow: hidden; min-width: 30px; }
.at-bar > i { display: block; height: 100%; border-radius: 20px; background: linear-gradient(90deg,#4f79ad,#7fb0e0); }
.at-pct { font-size: 10px; }
.col-suc { font-size: 12.5px; color: var(--ink-2); text-align: right; }
.col-act { display: flex; gap: 5px; justify-content: flex-end; }
.admin-iconbtn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg-3); color: var(--ink-2); cursor: pointer; font-size: 12px; display: grid; place-items: center; }
.admin-iconbtn:hover { background: var(--bg-4); color: var(--gold-bright); border-color: var(--gold-deep); }
.admin-iconbtn.danger:hover { background: var(--crimson-deep); color: #fff; border-color: var(--crimson); }
@media (max-width: 1080px) {
  .admin-th .col-role, .admin-tr .col-role, .admin-th .col-suc, .admin-tr .col-suc { display: none; }
  .admin-th, .admin-tr { grid-template-columns: 1.7fr 1fr 1.4fr 0.7fr; }
}

/* ---------- Theme picker (settings) ---------- */
.theme-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 720px) { .theme-picker { grid-template-columns: 1fr; } }
.theme-card { text-align: left; cursor: pointer; padding: 0; overflow: hidden; border-radius: var(--radius-lg);
  border: 1px solid var(--line); background: var(--bg-2); box-shadow: var(--shadow-raised); transition: border-color .14s, transform .1s; }
.theme-card:hover { transform: translateY(-2px); border-color: var(--bronze); }
.theme-card.on { border-color: var(--gold-deep); box-shadow: 0 0 0 2px var(--gold-glow), var(--shadow-raised); }
.theme-swatch { height: 78px; position: relative; display: flex; align-items: flex-end; gap: 5px; padding: 12px; }
.theme-swatch .sw-chip { width: 26px; height: 26px; border-radius: 6px; border: 1px solid rgba(0,0,0,.15); box-shadow: 0 1px 2px rgba(0,0,0,.2); }
.theme-card-body { padding: 12px 14px; display: flex; align-items: center; gap: 9px; }
.theme-card-body .tcb-name { font-family: var(--font-head); font-weight: 700; font-size: 14px; color: var(--ink); }
.theme-card-body .tcb-en { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
.theme-card-check { margin-left: auto; width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; font-size: 11px;
  background: var(--gold-grad); color: #fff; border: 1px solid var(--gold-deep); }

/* ---------- Vocabulary picker (settings) ---------- */
.lex-picker { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (max-width: 720px) { .lex-picker { grid-template-columns: 1fr; } }
.lex-card { display: flex; align-items: center; gap: 13px; text-align: left; cursor: pointer; padding: 15px 16px;
  border-radius: var(--radius-lg); border: 1px solid var(--line); background: var(--raised-grad); box-shadow: var(--shadow-raised);
  transition: border-color .14s, transform .1s; }
.lex-card:hover { transform: translateY(-2px); border-color: var(--bronze); }
.lex-card.on { border-color: var(--gold-deep); box-shadow: 0 0 0 2px var(--gold-glow), var(--shadow-raised); }
.lex-ic { width: 42px; height: 42px; flex: 0 0 42px; display: grid; place-items: center; font-size: 21px; border-radius: 10px;
  background: var(--bg-2); border: 1px solid var(--line); }
.lex-type { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .05em; color: var(--amethyst);
  background: color-mix(in srgb, var(--amethyst) 12%, transparent); border: 1px solid color-mix(in srgb, var(--amethyst) 35%, transparent);
  padding: 2px 7px; border-radius: 999px; white-space: nowrap; }

/* generic placeholder for unbuilt screens */
.placeholder-art { display: grid; place-items: center; min-height: 320px; border: 1px dashed var(--line); border-radius: var(--radius-lg); background:
  repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 10px, transparent 10px 20px), var(--bg-1); }

/* ============================================================
   PiKaOs MOTION LAYER — springy "physical" feedback across the kit
   Every interactive element sinks/scales on press and springs back.
   All gated behind prefers-reduced-motion via the @media wrapper below.
   ============================================================ */
@media (prefers-reduced-motion: no-preference) {

  /* segmented control */
  .seg-btn { transition: transform .25s var(--spring), background .14s, color .14s, box-shadow .25s var(--spring); }
  .seg-btn:active { transition-duration: .05s; transform: scale(.94); }
  .seg-btn.on { background: var(--bg-2); color: var(--gold-bright); box-shadow: var(--shadow-raised); font-weight: 600; }

  /* tabs */
  .tab { transition: transform .25s var(--spring), background .14s, color .14s; }
  .tab:active { transition-duration: .05s; transform: scale(.93); }

  /* theme toggle + small icon buttons */
  .theme-toggle button { transition: transform .25s var(--spring), background .14s, color .14s; }
  .theme-toggle button:active { transition-duration: .05s; transform: scale(.86); }
  .admin-iconbtn, .drawer-close, .rule-del, .alert-dismiss { transition: transform .25s var(--spring), background .14s, color .14s, border-color .14s; }
  .admin-iconbtn:active, .drawer-close:active, .rule-del:active, .alert-dismiss:active { transition-duration: .05s; transform: scale(.86); }

  /* cards — lift on hover, sink on press */
  .agent-card, .quest-card, .codex-row, .theme-card, .lex-card, .class-opt {
    transition: transform .25s var(--spring), border-color .14s, box-shadow .14s, background .14s;
  }
  .agent-card:active, .quest-card:active, .codex-row:active, .theme-card:active, .lex-card:active, .class-opt:active {
    transition-duration: .07s; transform: scale(.985);
  }

  /* swatches + tag chips + suggestion chips */
  .swatch { transition: transform .25s var(--spring), border-color .14s, box-shadow .14s; }
  .swatch:active { transition-duration: .05s; transform: scale(.9); }
  .tag-chip { animation: chip-pop .3s var(--spring) both; }
  .tag-chip button, .tag-sg, .rule-add { transition: transform .2s var(--spring), background .14s, color .14s, border-color .14s; }
  .tag-chip button:active, .tag-sg:active, .rule-add:active { transition-duration: .05s; transform: scale(.88); }

  /* drawer + builder spring open */
  .drawer { animation: drawer-in .34s var(--spring); }
  .builder { animation: pop-in .35s var(--spring); }
}
@keyframes chip-pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes drawer-in { from { transform: translateX(46px); opacity: .4; } to { transform: none; opacity: 1; } }
@keyframes pop-in { from { transform: scale(.9) translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }

/* segmented active also applies without motion */
.seg-btn.on { background: var(--bg-2); color: var(--gold-bright); box-shadow: var(--shadow-raised); }
/* focus discipline — always the 3px gold ring, never an outline */
.seg-btn:focus-visible, .tab:focus-visible, .theme-toggle button:focus-visible,
.admin-iconbtn:focus-visible, .agent-card:focus-visible, .quest-card:focus-visible,
.codex-row:focus-visible, .theme-card:focus-visible, .lex-card:focus-visible {
  outline: none; box-shadow: 0 0 0 3px var(--gold-glow);
}

/* ============================================================
   PiKaOs Select / Dropdown (kit) — used app-wide in place of native <select>
   ============================================================ */
.dd { position: relative; display: inline-block; }
.dd-btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-body); font-size: 13.5px; font-weight: 500; color: var(--ink);
  background: var(--bg-3); border: 1px solid var(--line); border-radius: var(--radius-sm);
  padding: 10px 14px; min-width: 200px; justify-content: space-between; cursor: pointer;
  transition: border-color .15s ease, box-shadow .15s ease, background .15s ease, transform .25s var(--spring);
}
.dd-btn:hover:not(:disabled) { background: var(--bg-2); }
.dd-btn:active:not(:disabled) { transform: scale(.98); transition-duration: .05s; }
.dd-btn:disabled { opacity: .55; cursor: default; }
.dd.open .dd-btn { border-color: var(--gold); background: var(--bg-2); box-shadow: 0 0 0 3px var(--gold-glow); }
.dd-value { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dd-caret { font-size: 10px; color: var(--ink-3); transition: transform .3s var(--spring); flex: none; }
.dd.open .dd-caret { transform: rotate(180deg); }
.dd-menu {
  position: absolute; top: calc(100% + 6px); left: 0; min-width: 100%; z-index: 60;
  background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow-pop); padding: 5px; transform-origin: top center;
  visibility: hidden; opacity: 0; transform: translateY(-6px) scale(.96);
  max-height: 280px; overflow-y: auto;
}
.dd.open .dd-menu { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }
@media (prefers-reduced-motion: no-preference) {
  .dd-menu { transition: opacity .18s ease, transform .3s var(--spring), visibility 0s linear .18s; }
  .dd.open .dd-menu { transition: opacity .15s ease, transform .3s var(--spring), visibility 0s; }
  .dd.open .dd-item, .dd.open .ms-item { animation: dd-item-in .3s ease both; animation-delay: calc(var(--i) * .03s); }
}
@keyframes dd-item-in { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.dd-item {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-size: 13.5px; font-weight: 500; color: var(--ink-2);
  border-radius: var(--radius-sm); padding: 9px 11px; cursor: pointer; border: none;
  background: none; width: 100%; font-family: var(--font-body); text-align: left;
  transition: background .12s ease, color .12s ease, transform .2s var(--spring);
}
.dd-item:hover:not(:disabled) { background: var(--bg-3); color: var(--ink); }
.dd-item:active:not(:disabled) { transform: scale(.97); transition-duration: .05s; }
.dd-item:disabled { opacity: .45; cursor: default; }
.dd-item.selected { color: var(--gold-bright); font-weight: 600; }
.dd-item .tick { font-family: var(--font-mono); font-size: 11px; color: var(--gold-bright); opacity: 0; transform: scale(.5); transition: opacity .2s ease, transform .25s var(--spring); }
.dd-item.selected .tick { opacity: 1; transform: scale(1); }
/* multi-select facet */
.ms-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  font-size: 13.5px; font-weight: 500; color: var(--ink-2);
  border: none; background: none; border-radius: var(--radius-sm); padding: 8px 10px; cursor: pointer;
