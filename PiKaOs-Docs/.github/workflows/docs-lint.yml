# CI — makes the docs conventions machine-enforced, not human memory.
# Validates frontmatter (7 fields + vocab), markdown links, heading anchors, and `related:` paths
# across docs/. Cross-repo links (../../PiKaOs-Core/…) are skipped here (sibling repos aren't checked out).
name: docs-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint docs (frontmatter + links + anchors + related)
        run: python scripts/docs-lint.py
