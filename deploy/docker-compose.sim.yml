# PiKaOs — DEV overlay for the split backend/ai stack (the default local way to run).
#
# Overlay on docker-compose.backend.yml (and usable on docker-compose.ai.yml). It does two things so
# a separate-stack run behaves like the old all-in-one dev experience:
#   1) points the datastore URLs at `host.docker.internal` — the data services run as their OWN compose
#      project (separate network) and publish their ports to the host, just like RDS / ElastiCache / S3
#      in a real split deploy. `environment:` here wins over the `env_file: Backend/.env` values.
#   2) bind-mounts ../Backend + sets UVICORN_RELOAD → backend hot-reloads on code change (dev).
# `extra_hosts: host-gateway` makes host.docker.internal resolve on Linux/CI too (Docker Desktop adds
# it automatically on Windows/Mac).
#
# Bring the four stacks up in order (this is what start.bat automates):
#   1) DATA   : docker compose -p pikaos-data -f deploy/docker-compose.data.yml up -d --wait
#   2) BACKEND: docker compose -p pikaos-backend \
#                 -f deploy/docker-compose.backend.yml -f deploy/docker-compose.sim.yml \
#                 up -d --build --wait backend
#   3) AI     : docker compose -p pikaos-ai -f deploy/docker-compose.ai.yml up -d --build
#   4) FRONT  : docker compose -p pikaos-frontend -f deploy/docker-compose.frontend.dev.yml up -d --build
services:
  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://pikaos:pikaos@host.docker.internal:5432/pikaos
      REDIS_URL: redis://host.docker.internal:6379/0
      MINIO_ENDPOINT: host.docker.internal:9000
      UVICORN_RELOAD: "1"             # dev hot-reload (entrypoint runs uvicorn --reload, 1 worker)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../Backend:/app               # hot-reload: code edits on the host reflect in the container

  worker:
    environment:
      DATABASE_URL: postgresql+asyncpg://pikaos:pikaos@host.docker.internal:5432/pikaos
      REDIS_URL: redis://host.docker.internal:6379/0
      MINIO_ENDPOINT: host.docker.internal:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../Backend:/app
