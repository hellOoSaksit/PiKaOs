<!-- @dsCard group="Colors" viewport="700x120" subtitle="color-mix tinted status chips" name="State chips (tints)" -->
<!DOCTYPE html><html lang="en" data-theme="pro"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Mitr:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css"><style>html,body{height:auto;overflow:visible}body{margin:0;padding:18px 22px;background:var(--bg-1);font-family:var(--font-body);color:var(--ink)}
.cap{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:11px}
.rowg{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.sw{border-radius:9px;overflow:hidden;border:1px solid var(--line);background:var(--bg-2);width:150px}
.sw i{display:block;height:48px}.sw .m{padding:7px 9px}.sw .n{font-family:var(--font-head);font-weight:600;font-size:12px}.sw .v{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:1px}
.dot{width:28px;height:28px;border-radius:7px;border:1px solid var(--line)}
.lab{display:flex;align-items:center;gap:9px;font-family:var(--font-head);font-weight:600;font-size:12.5px}
.lab .v{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);font-weight:400}</style></head>
<body><div class="cap">State chips — color-mix tints (~12% bg / ~40% border)</div><div class="rowg"><span class="badge on"><span class="dot"></span>Active</span><span class="badge busy"><span class="dot"></span>Running</span><span class="badge warn"><span class="dot"></span>Alert</span><span class="badge info"><span class="dot"></span>Review</span><span class="badge magic"><span class="dot"></span>Research</span></div></body></html>
