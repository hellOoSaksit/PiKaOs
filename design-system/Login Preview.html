<!DOCTYPE html>
<html lang="en" data-theme="pro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PiKaOs — Login (preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  [data-theme="pro"] {
    --bg-0:#eceef2; --bg-1:#f4f6f8; --bg-2:#ffffff; --bg-3:#f3f5f7; --bg-4:#e8ebef;
    --line:#e3e7ec; --line-soft:#eef1f4;
    --ink:#111726; --ink-2:#3e4654; --ink-3:#69707d; --ink-4:#9aa1ad;
    --gold:#4361ee; --gold-bright:#5872f2; --gold-deep:#3048d4; --gold-glow:rgba(67,97,238,.26);
    --crimson:#e0413f; --crimson-deep:#c5322f; --emerald:#12a150; --sapphire:#3b82f6;
    --letter-face:#ffffff;
    --shadow-panel:0 10px 30px rgba(17,23,38,.08), 0 2px 6px rgba(17,23,38,.05);
    --shadow-raised:0 1px 2px rgba(17,23,38,.07);
  }
  [data-theme="pro-dark"] {
    --bg-0:#0c0e12; --bg-1:#111419; --bg-2:#171a21; --bg-3:#1d2129; --bg-4:#262b34;
    --line:#2a2f39; --line-soft:#21252d;
    --ink:#e8eaef; --ink-2:#b2b8c3; --ink-3:#828a97; --ink-4:#5a626e;
    --gold:#6076f6; --gold-bright:#8194f9; --gold-deep:#4d63ec; --gold-glow:rgba(96,118,246,.34);
    --crimson:#f0524f; --crimson-deep:#d23f3c; --emerald:#2bbd6b; --sapphire:#5b94f7;
    --letter-face:#eef1ff;
    --shadow-panel:0 14px 40px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.35);
    --shadow-raised:0 1px 2px rgba(0,0,0,.4);
  }
  :root { --radius:9px; --radius-lg:14px; --radius-sm:6px;
    --font-body:"IBM Plex Sans Thai", system-ui, sans-serif;
    --font-mono:"JetBrains Mono", monospace; --font-toon:"Mitr", var(--font-body); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-body); }
  .stage { min-height: 100vh; min-height: 100dvh;
    background: radial-gradient(1100px 520px at 50% -180px, var(--gold-glow), transparent 70%), var(--bg-1);
    color: var(--ink); display: flex; flex-direction: column; align-items: center; padding: 48px 20px 28px;
    overflow: hidden; position: relative; }
  .stage::before { content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(var(--line) 1px, transparent 1.4px); background-size: 26px 26px; opacity: .5;
    mask-image: linear-gradient(to bottom, transparent, black 12%, black 70%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, black 12%, black 70%, transparent); }
  .theme-toggle { position: absolute; top: 18px; right: 18px; z-index: 3;
    font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; letter-spacing: .06em;
    background: var(--bg-2); color: var(--ink-2); border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 16px; cursor: pointer; transition: transform .25s cubic-bezier(.34,1.9,.6,1), background .15s; }
  .theme-toggle:hover { background: var(--bg-4); } .theme-toggle:active { transform: scale(.92); transition-duration: .05s; }
  .hero { position: relative; z-index: 1; text-align: center; margin-top: 16px; }
  .logo3d { display: flex; justify-content: center; align-items: flex-end; gap: 4px; font-family: var(--font-toon);
    font-weight: 700; font-size: clamp(64px, 12vw, 120px); line-height: 1; user-select: none; }
  .logo3d .ltr { display: inline-block; color: var(--letter-face); -webkit-text-stroke: 6px var(--gold-deep);
    paint-order: stroke fill; cursor: pointer;
    text-shadow: 0 2px 0 var(--gold), 0 4px 0 var(--gold), 0 6px 0 var(--gold-deep), 0 8px 0 var(--gold-deep),
      0 10px 0 color-mix(in srgb, var(--gold-deep) 70%, #0c0e12), 0 16px 22px var(--gold-glow);
    transform-origin: 50% 100%; }
  @supports not (paint-order: stroke) { .logo3d .ltr { -webkit-text-stroke: 0; } }
  @media (prefers-reduced-motion: no-preference) {
    .logo3d.play .ltr { animation: ltr-drop 1.05s cubic-bezier(.22,.9,.32,1) both; animation-delay: calc(var(--i) * 0.13s + 0.15s); }
    .logo3d .ltr.jelly { animation: ltr-jelly .6s cubic-bezier(.45,.05,.35,1) both; animation-delay: 0s !important; }
  }
  @keyframes ltr-drop { 0%{transform:translateY(-60vh) rotate(var(--tilt,-8deg)) scaleY(1.15);opacity:0;}
    55%{transform:translateY(0) rotate(0) scaleY(1);opacity:1;} 68%{transform:translateY(-4%) scaleX(1.12) scaleY(.82);}
    80%{transform:translateY(-14%) scaleX(.96) scaleY(1.06);} 90%{transform:translateY(0) scaleX(1.04) scaleY(.94);} 100%{transform:translateY(0) scale(1);opacity:1;} }
  @keyframes ltr-jelly { 0%{transform:scale(1,1);} 35%{transform:scale(1.12,.84) translateY(3%);} 60%{transform:scale(.93,1.07) translateY(-4%);} 80%{transform:scale(1.04,.96);} 100%{transform:scale(1,1);} }
  .hero .tagline { margin-top: 18px; font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
  @media (prefers-reduced-motion: no-preference) {
    .hero .tagline, .card, .credit { animation: rise-in .6s ease both; animation-delay: 1.15s; }
    .card { animation-delay: 1.3s; } .credit { animation-delay: 1.6s; } }
  @keyframes rise-in { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
  .card { position: relative; z-index: 1; width: min(400px, 100%); margin-top: 34px; background: var(--bg-2);
    border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-panel); padding: 28px 28px 24px; }
  .card-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .card-title { font-size: 20px; font-weight: 700; color: var(--ink); }
  .card-kicker { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-4); }
  .bf { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .bf-label { font-size: 13px; font-weight: 600; color: var(--ink-2); }
  .bf-row { display: flex; align-items: baseline; justify-content: space-between; }
  .forgot { font-size: 12px; font-weight: 500; color: var(--gold-bright); text-decoration: none; cursor: pointer;
    background: none; border: none; font-family: var(--font-body); padding: 0; transition: transform .25s cubic-bezier(.34,2.2,.6,1); }
  .forgot:hover { color: var(--gold-deep); text-decoration: underline; } .forgot:active { transform: scale(.88); transition-duration: .05s; }
  .bf-input { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); background: var(--bg-3);
    border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 11px 12px; outline: none;
    transition: border-color .15s, box-shadow .15s, background .15s; }
  .bf-input::placeholder { color: var(--ink-4); }
  .bf-input:focus { border-color: var(--gold); background: var(--bg-2); box-shadow: 0 0 0 3px var(--gold-glow); }
  .bf.has-error .bf-input { border-color: var(--crimson); box-shadow: 0 0 0 3px color-mix(in srgb, var(--crimson) 18%, transparent); }
  .bf-error { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--crimson); }
  .pw-wrap { position: relative; }
  .pw-toggle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); border: none; background: none;
    cursor: pointer; font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
    color: var(--ink-3); padding: 6px 8px; border-radius: var(--radius-sm);
    transition: transform .25s cubic-bezier(.34,2.2,.6,1), background .15s, color .15s; }
  .pw-toggle:hover { background: var(--bg-4); color: var(--ink-2); } .pw-toggle:active { transform: translateY(-50%) scale(.86); transition-duration: .05s; }
  .btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-body);
    font-size: 14.5px; font-weight: 700; border-radius: var(--radius); padding: 12px 16px; border: none; cursor: pointer;
    transition: transform .25s cubic-bezier(.34,1.9,.6,1), filter .15s, box-shadow .12s; }
  .btn-gold { background: linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--gold)); color: #fff;
    box-shadow: 0 3px 0 var(--gold-deep), var(--shadow-raised); }
  .btn-gold:hover:not(:disabled) { filter: brightness(1.06); transform: translateY(-1px); box-shadow: 0 4px 0 var(--gold-deep), var(--shadow-raised); }
  .btn-gold:active:not(:disabled) { transform: translateY(3px) scale(.985); box-shadow: 0 0 0 var(--gold-deep); transition-duration: .05s; }
  .btn-gold:disabled { opacity: .65; cursor: default; }
  .spinner { width: 15px; height: 15px; border-radius: 50%; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .form-alert { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 16px; border: 1px solid; }
  .form-alert.error { color: var(--crimson-deep); border-color: color-mix(in srgb, var(--crimson) 40%, transparent); background: color-mix(in srgb, var(--crimson) 10%, transparent); }
  [data-theme="pro-dark"] .form-alert.error { color: var(--crimson); }
  .success { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 22px 4px 10px; text-align: center; }
  .success-ic { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--emerald) 14%, transparent); border: 1.5px solid color-mix(in srgb, var(--emerald) 45%, transparent);
    animation: pop-in .45s cubic-bezier(.34,1.56,.64,1) both; }
  .success-ic svg { width: 28px; height: 28px; }
  @keyframes pop-in { from{transform:scale(.4);opacity:0;} to{transform:scale(1);opacity:1;} }
  .success-title { font-size: 18px; font-weight: 700; color: var(--ink); }
  .success-sub { font-size: 13px; color: var(--ink-3); }
  .success .mono-chip { font-family: var(--font-mono); font-size: 11.5px; color: var(--emerald);
    background: color-mix(in srgb, var(--emerald) 10%, transparent); border: 1px solid color-mix(in srgb, var(--emerald) 35%, transparent); border-radius: 999px; padding: 4px 12px; }
  .success .back, .back-link { margin-top: 6px; background: none; border: none; cursor: pointer; font-family: var(--font-body);
    font-size: 12.5px; font-weight: 500; color: var(--gold-bright); transition: transform .25s cubic-bezier(.34,2.2,.6,1); }
  .success .back:hover, .back-link:hover { text-decoration: underline; } .back-link:active { transform: scale(.88); transition-duration: .05s; }
  .qei-note { font-size: 12.5px; color: var(--ink-3); background: var(--bg-3); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 16px; }
  .qei-note strong { color: var(--sapphire); font-weight: 600; }
  .credit { position: relative; z-index: 1; margin-top: auto; padding-top: 36px; font-family: var(--font-mono); font-size: 11px;
    font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-4); text-align: center; }
  .credit b { color: var(--ink-3); font-weight: 600; }
  @media (max-width: 480px) { .stage { padding-top: 36px; } .card { padding: 22px 18px 18px; } }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#4361ee"/><text x="50" y="64" font-family="sans-serif" font-size="40" font-weight="700" fill="#fff" text-anchor="middle">P</text></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;
const LETTERS = ["P","i","K","a","O","s"];
const TILTS = ["-9deg","6deg","-5deg","8deg","-7deg","5deg"];

function Logo3D() {
  const wobble = (e) => { const el = e.currentTarget; el.classList.remove("jelly"); void el.offsetWidth; el.classList.add("jelly"); };
  return (
    <h1 className="logo3d play" aria-label="PiKaOs">
      {LETTERS.map((ch, i) => (
        <span className="ltr" key={i} onClick={wobble} style={{ "--i": i, "--tilt": TILTS[i] }}>{ch}</span>
      ))}
    </h1>
  );
}
function ErrorMsg({ children }) {
  return (<span className="bf-error">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.6"/><path d="M8 4.5V8.8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/><circle cx="8" cy="11.4" r="0.9" fill="currentColor"/></svg>
    {children}</span>);
}
function validateUser(v){ const s=(v||"").trim(); if(!s) return "Username or email is required";
  if(s.includes("@")){ if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(s)) return "That email address doesn't look right"; }
  else { if(s.length<3) return "Username must be at least 3 characters"; if(!/^[a-zA-Z0-9._-]+$/.test(s)) return "Only letters, numbers and . _ - allowed"; } return ""; }
function validatePw(v){ if(!v) return "Password is required"; if(v.length<6) return "Password must be at least 6 characters"; return ""; }

function LoginCard() {
  const [view, setView] = useState("login");
  const [user, setUser] = useState(""); const [pw, setPw] = useState("");
  const [touched, setTouched] = useState({ user:false, pw:false });
  const [showPw, setShowPw] = useState(false); const [busy, setBusy] = useState(false);
  const [formError, setFormError] = useState(""); const [sentTo, setSentTo] = useState("");
  const userErr = validateUser(user); const pwErr = validatePw(pw);
  const submit = (e) => { e.preventDefault(); setTouched({user:true,pw:true}); setFormError("");
    if(userErr||pwErr) return; setBusy(true);
    setTimeout(()=>{ setBusy(false); if(pw==="wrongpw") setFormError("Invalid credentials. Please check and try again."); else setView("success"); },1100); };
  const submitForgot = (e) => { e.preventDefault(); setTouched({user:true,pw:false}); if(validateUser(user)) return;
    setBusy(true); setTimeout(()=>{ setBusy(false); setSentTo(user.trim()); setView("forgot-sent"); },900); };
  const reset = () => { setView("login"); setPw(""); setFormError(""); setTouched({user:false,pw:false}); };

  if (view === "success") return (
    <section className="card"><div className="success">
      <div className="success-ic"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5L10 17.5L19 7" stroke="var(--emerald)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
      <div className="success-title">Welcome back!</div><div className="success-sub">Signed in as</div>
      <div className="mono-chip">{user.trim()}</div><button className="back" onClick={reset}>← Back to login</button>
    </div></section>);
  if (view === "forgot-sent") return (
    <section className="card"><div className="success">
      <div className="success-ic"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7.5L12 13L20 7.5" stroke="var(--emerald)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><rect x="4" y="6" width="16" height="12" rx="2" stroke="var(--emerald)" strokeWidth="2"/></svg></div>
      <div className="success-title">Check your inbox</div><div className="success-sub">If an account exists for</div>
      <div className="mono-chip">{sentTo}</div><div className="success-sub">we've sent a password reset link.</div>
      <button className="back" onClick={reset}>← Back to login</button>
    </div></section>);

  const isForgot = view === "forgot";
  return (
    <section className="card">
      <div className="card-head"><h2 className="card-title">{isForgot?"Reset password":"Login"}</h2>
        <span className="card-kicker">{isForgot?"ACCOUNT RECOVERY":"PIKAOS / AUTH"}</span></div>
      {isForgot && <p className="qei-note">Enter your <strong>username or email</strong> and we'll send you a link to reset your password.</p>}
      {formError && <div className="form-alert error" role="alert">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.6"/><path d="M5.5 5.5L10.5 10.5M10.5 5.5L5.5 10.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>{formError}</div>}
      <form onSubmit={isForgot?submitForgot:submit} noValidate>
        <div className={"bf"+(touched.user&&userErr?" has-error":"")}>
          <label className="bf-label" htmlFor="lu">Username / Email</label>
          <input id="lu" className="bf-input" type="text" placeholder="you@company.com" autoComplete="username" value={user}
            onChange={(e)=>{setUser(e.target.value);setFormError("");}} onBlur={()=>setTouched(t=>({...t,user:true}))}/>
          {touched.user&&userErr?<ErrorMsg>{userErr}</ErrorMsg>:null}
        </div>
        {!isForgot && <div className={"bf"+(touched.pw&&pwErr?" has-error":"")}>
          <div className="bf-row"><label className="bf-label" htmlFor="lp">Password</label>
            <button type="button" className="forgot" onClick={()=>{setView("forgot");setFormError("");}}>Forgot password?</button></div>
          <div className="pw-wrap">
            <input id="lp" className="bf-input" type={showPw?"text":"password"} placeholder="••••••••" autoComplete="current-password" style={{paddingRight:64}} value={pw}
              onChange={(e)=>{setPw(e.target.value);setFormError("");}} onBlur={()=>setTouched(t=>({...t,pw:true}))}/>
            <button type="button" className="pw-toggle" onClick={()=>setShowPw(s=>!s)}>{showPw?"HIDE":"SHOW"}</button></div>
          {touched.pw&&pwErr?<ErrorMsg>{pwErr}</ErrorMsg>:null}
        </div>}
        <button className="btn btn-gold" type="submit" disabled={busy}>
          {busy?<span className="spinner"/>:null}{busy?(isForgot?"Sending…":"Signing in…"):(isForgot?"Send reset link":"Sign in")}</button>
      </form>
      {isForgot && <button className="back-link" style={{display:"block",margin:"14px auto 0"}} onClick={reset}>← Back to login</button>}
    </section>
  );
}
function App() {
  const [theme, setTheme] = useState("pro");
  React.useEffect(()=>{ document.documentElement.setAttribute("data-theme", theme); },[theme]);
  return (
    <div className="stage">
      <button className="theme-toggle" onClick={()=>setTheme(t=>t==="pro"?"pro-dark":"pro")}>THEME: {theme==="pro"?"PRO":"PRO·DARK"}</button>
      <header className="hero"><Logo3D/><p className="tagline">SIGN IN TO CONTINUE</p></header>
      <LoginCard/>
      <footer className="credit">Created by <b>saksit chuenmaiwaiy</b></footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
