[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Collect ONLY the kernel's own tests. Plugins are symlinked into app/plugins/<id>/ and carry their
# own backend/tests/, so an unbounded rootdir scan would pull a plugin's suite into Core's run — Core's
# suite must stay plugin-free (CI runs it with no plugins linked). Run a plugin's tests by explicit path.
testpaths = tests
addopts = -q
