appId: io.pikaos.desktop
productName: PiKaOs Desktop
directories:
  output: dist
files:
  - out/**/*
  - package.json
asar: true
# Signing deferred (unsigned build for now).
# Bundled renderer: Frontend/dist is copied in and served via the app://pikaos protocol
# (src/main/protocol.ts), never file://.
extraResources:
  - from: ../Frontend/dist
    to: frontend
