# PiKaOs — BACKEND server(s): API + worker. For deploying on its OWN server, pointing at EXTERNAL
# Postgres / Redis / MinIO (managed services or a separate data host). No datastores run here.
#
# Before deploy, in Backend/.env point these at the external services (NOT the compose hostnames):
#   DATABASE_URL=postgresql+asyncpg://USER:PW@<db-host>:5432/pikaos
#   REDIS_URL=redis://:<pw>@<redis-host>:6379/0   (+ REDIS_PASSWORD — required in production)
#   MINIO_ENDPOINT=<s3-or-minio-host>  MINIO_SECURE=true  (S3: STORAGE_PROVIDER=s3 + STORAGE_REGION)
#   ENVIRONMENT=production  COOKIE_SECURE=true  + strong JWT_SECRET / SECRET_KEY (same SECRET_KEY on
#   every backend AND worker, or the worker can't decrypt stored LLM keys).
#
# Run both on one box:        docker compose -f deploy/docker-compose.backend.yml up -d --build
# API on one, worker another: ... up -d --build backend   |   ... up -d --build worker
services:
  backend:
    build: ../Backend
    restart: unless-stopped
    env_file:
      - ../Backend/.env       # external DB/Redis/MinIO + secrets
      - ../.env.ai            # LLM/embed providers
    ports:
      - "8000:8000"
    # prod: hot-reload off; scale uvicorn workers via WEB_CONCURRENCY (Backend/docker-entrypoint.sh).
    environment:
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}

  worker:
    build: ../Backend
    restart: unless-stopped
    env_file:
      - ../Backend/.env
      - ../.env.ai
    command: ["arq", "app.worker.WorkerSettings"]
    # The worker shares the backend image (whose Dockerfile HEALTHCHECK probes /api/version) but runs
    # no HTTP server — override with arq's own liveness: `arq --check` exits 0 only if the worker wrote
    # a recent health record to Redis (release-and-rollback.md §2: every service reports health so the
    # rolling update / auto-rollback can see it).
    healthcheck:
      test: ["CMD", "arq", "app.worker.WorkerSettings", "--check"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3
