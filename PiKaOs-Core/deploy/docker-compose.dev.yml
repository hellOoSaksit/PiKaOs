# PiKaOs — local dev BASE compose (kernel-only: backend).
#
# There is no `frontend` service. PiKaOs is a desktop app: the renderer is served to Electron either
# from `Frontend/dist` over `app://pikaos` (packaged path) or by a Vite dev server run ON THE HOST for
# hot reload (start-desktop-dev.bat). A container could serve neither to Electron without pretending to
# be a browser, and UI is verified in Electron only. The prod compose still builds the nginx static
# bundle — that is the web deployment, a separate artifact.
#
# Tool-plugin sidecars (postgres/redis/minio/...) are NOT defined here — they are merged in from each
# enabled plugin's `compose.fragment.yml` by `Backend/scripts/render_compose.py`, matching the
# install-time compose generation model (PiKaOs-Docs/docs/architecture/kernel-redesign.md §3). All
# services share ONE compose network/project now, so datastores are reached at their plugin-id
# hostname (`db`, `redis`, `minio` — see each plugin's `.env.example` defaults), not
# `host.docker.internal`.
#
# Never edit docker-compose.generated.yml by hand — it's a build artifact. Edit this file (kernel
# services) or a plugin's compose.fragment.yml (tool sidecars) instead, then re-run render_compose.py
# (start.sh / start.bat do this automatically).
services:
  backend:
    build: ../Backend
    restart: unless-stopped
    env_file:
      - ../Backend/.env
      - ../.env.ai
    ports:
      - "8000:8000"
    environment:
      UVICORN_RELOAD: "1"        # dev hot-reload (entrypoint runs uvicorn --reload, 1 worker)
    volumes:
      - ../Backend:/app          # hot-reload: code edits on the host reflect in the container
      - kernelstate:/app/state   # kernel local-JSON state (plugin registry + nav + user prefs)
      # dev-only: the mock TEST plugin's repo, mounted at the path its gitignored symlink resolves to
      # (Backend/app/plugins/mock -> ../../../../PiKaOs-Plugin-Mock/backend → /PiKaOs-Plugin-Mock/backend
      # inside /app). Lets the loader discover ONE harmless plugin so the Modules screen has a row to
      # exercise. Real tool plugins stay undiscovered here (they need their sidecars); mount them the same
      # way when a dev stack should run them for real.
      - ../../PiKaOs-Plugin-Mock:/PiKaOs-Plugin-Mock:ro

volumes:
  kernelstate:
