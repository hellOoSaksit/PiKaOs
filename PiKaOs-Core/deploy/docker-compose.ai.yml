# PiKaOs — AI tier: the arq worker (agent loop + RAG ingest) and, optionally, a colocated local
# model server (Ollama for LLM + embeddings). Its OWN project/network so heavy local-model compute
# can't starve the API box (the whole reason to split it). The worker talks to the backend ONLY via
# the shared Redis queue + Postgres — never HTTP — so no inter-service API/key is needed.
#
# Datastores are EXTERNAL (the data stack) via host.docker.internal; values come from --env-file
# with dev-safe defaults, so this one file runs in BOTH modes:
#   dev :  docker compose -f deploy/docker-compose.ai.yml -p pikaos-ai up -d --build
#   prod:  docker compose --env-file deploy/.env.prod -f deploy/docker-compose.ai.yml -p pikaos-ai up -d --build
#
# Ollama is behind the `localai` profile → NOT started by default (you "may" run local AI). Turn it
# on only when you want models running on this box:
#   ... -p pikaos-ai --profile localai up -d            # starts worker + ollama
#   docker compose -p pikaos-ai exec ollama ollama pull llama3.2:1b   # then set LLM_PROVIDER=ollama in .env.ai
# When ollama runs in THIS stack the worker reaches it at http://ollama:11434 (same network).
services:
  worker:
    build: ../Backend
    restart: unless-stopped
    env_file:
      - ../Backend/.env       # base app config + datastore creds (overridden below for external)
      - ../.env.ai            # LLM/embed provider selection (the swappable AI layer)
    environment:
      # external datastores (data stack) — dev defaults; prod values injected via --env-file deploy/.env.prod
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://pikaos:pikaos@host.docker.internal:5432/pikaos}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-host.docker.internal:9000}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-pikaos}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-pikaos-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-pikaos}
      # SECRET_KEY must MATCH the backend (or the worker can't decrypt stored LLM keys). Empty in dev
      # → both derive from the shared JWT_SECRET.
      SECRET_KEY: ${SECRET_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      # local model server colocated in THIS box (used only when a provider in .env.ai = ollama)
      LLM_BASE_URL: http://ollama:11434
      EMBED_BASE_URL: http://ollama:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"   # resolve host.docker.internal on Linux/CI too
    # worker-entrypoint resolves the plugin registry → ENABLED_MODULES (a plugin disabled in the install
    # UI also stops its jobs here), then execs arq. (plugin-lifecycle-ui §7)
    command: ["bash", "worker-entrypoint.sh"]
    # This worker uses the backend image, whose Dockerfile HEALTHCHECK probes /api/version — but a
    # worker runs no HTTP server, so that probe can never pass. Override with arq's own liveness:
    # `arq --check` exits 0 only when the worker wrote a recent health record to Redis. MUST mirror the
    # worker healthcheck in docker-compose.backend.yml (release-and-rollback.md §2).
    healthcheck:
      test: ["CMD", "arq", "app.plugins.redis.worker.WorkerSettings", "--check"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["localai"]     # opt-in: only starts with `--profile localai`
    volumes:
      - ollama_models:/root/.ollama   # cache pulled models across restarts
    ports:
      - "11434:11434"         # exposed for `ollama pull` / debugging from the host

volumes:
  ollama_models:
