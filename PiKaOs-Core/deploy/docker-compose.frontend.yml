# PiKaOs — FRONTEND server: the static SPA on nginx (tiny; or skip the server entirely and push the
# built `dist/` to a CDN / S3). Proxies /api + /ws to the backend, so set BACKEND_URL to the backend's
# reachable URL. The browser stays same-origin → no CORS needed on the backend for this path.
#
# Run:  BACKEND_URL=https://api.example.com docker compose -f deploy/docker-compose.frontend.yml up -d --build
#   RESOLVER defaults to Docker's embedded DNS (127.0.0.11); set it if your platform differs.
#   If the backend is on another host/LB, BACKEND_URL is that public URL; if same host, its address.
services:
  frontend:
    build:
      context: ../Frontend
      target: prod            # the nginx static build (not the Vite dev server)
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      RESOLVER: ${RESOLVER:-127.0.0.11}
    ports:
      - "80:80"
