# PiKaOs — PROD-MODE DATA stack overlay (on deploy/docker-compose.data.yml).
#
# Injects strong creds from deploy/.env.prod (via `--env-file`) so Postgres / Redis / MinIO init
# with PRODUCTION passwords instead of the dev defaults baked in Backend/.env. `environment:` wins
# over `env_file:`. NO secrets live here — only ${refs} resolved from the --env-file at run time.
#
#   docker compose --env-file deploy/.env.prod \
#     -f deploy/docker-compose.data.yml -f deploy/docker-compose.prod.data.yml \
#     -p pikaos-data up -d --wait
#
# ⚠ Postgres bakes POSTGRES_PASSWORD at FIRST init only — `docker compose -p pikaos-data down -v`
#   (wipe the pgdata volume) before the first prod boot, or it keeps the old password.
services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    # REDIS_PASSWORD present → the image's command enables --requirepass (auth ON).
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # Fix-NET-02: in prod publish ONLY the S3 API (9000) — the admin web console (9001) must not be
    # host-reachable. `!override` replaces the base service's `ports` list (compose merges lists by
    # append otherwise, which can't remove 9001). Reach the console via an SSH tunnel when needed.
    ports: !override
      - "9000:9000"
    #
    # Fix-NET-01 (host firewall, NOT loopback): the data ports are published on the host on purpose so
    # the separate backend/ai compose stacks reach them over host.docker.internal (docker gateway IP,
    # not 127.0.0.1 — binding to loopback here would BREAK that cross-stack path). Restrict external
    # exposure at the host firewall instead: default-deny inbound, allow 5432/6379/9000 only from the
    # backend host / docker bridge. See runbook-provisioning (Fix-NET-04). Revisit once the topology
    # reconcile (Fix-ARCH-01) decides whether prod collapses the data tier onto one internal network.
