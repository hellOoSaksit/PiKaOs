# PiKaOs backend infrastructure.
# Frontend is NOT here — it runs via npm / start.bat (see README.md).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pikaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pikaos}
      POSTGRES_DB: ${POSTGRES_DB:-pikaos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pikaos} -d ${POSTGRES_DB:-pikaos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    # Pinned by digest (was :latest) for reproducible/secure builds — A4 hardening.
    # This is the exact image in use as of 2026-06-15; bump deliberately after testing
    # a newer MinIO release (re-pin via: docker image inspect minio/minio --format '{{.RepoDigests}}').
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-pikaos}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-pikaos-secret}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./Backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pikaos}:${POSTGRES_PASSWORD:-pikaos}@db:5432/${POSTGRES_DB:-pikaos}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-pikaos}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-pikaos-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-pikaos}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SEED_PASSWORD: ${SEED_PASSWORD:-pikaos123}
      UVICORN_RELOAD: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  pgdata:
  redisdata:
  miniodata:
