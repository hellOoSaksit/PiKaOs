# PiKaOs backend infrastructure.
# Frontend is NOT here — it runs via npm / start.bat (see README.md).
# Every service sets `restart: unless-stopped` so a crash (or host reboot) is recovered
# automatically without one dead container taking the stack down — A8 resilience.
#
# Per-component env (deploy-separable): each service loads its OWN env_file, so a component can be
# deployed on its own with just its file —
#   db · minio · backend · worker → Backend/.env   (backend stack: app config + datastore creds)
#   backend · worker also load    → .env.ai        (LLM/embed providers — the swappable AI layer)
#   frontend →                      Frontend/.env  (VITE_* — PUBLIC, baked into the bundle; no secrets)
# backend and worker load the SAME Backend/.env, so they share SECRET_KEY (must match, or the worker
# can't decrypt LLM keys the backend stored). Secrets live only in these gitignored files.

services:
  db:
    # Postgres + pgvector. RAG (phase E / M2) needs the `vector` extension: doc_chunks store
    # bge-m3 embeddings and are searched by cosine distance (docs/architecture/knowledge-rag.md §3).
    # The extension itself is created by migration 0005_doc_chunks; this image just ships the
    # shared library so `CREATE EXTENSION vector` succeeds. Same PG 16 major as before — the
    # existing pgdata volume is reused (no recreate needed).
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: ./Backend/.env          # POSTGRES_USER/PASSWORD/DB (the image ignores the rest)
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ → compose passes a literal $; the container shell expands it from the env_file vars
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: ./Backend/.env          # REDIS_PASSWORD (empty = no auth; the image ignores the rest)
    # Enable --requirepass only when REDIS_PASSWORD is set. $$ → compose passes a literal $, the
    # container shell does the ${VAR:+...} expansion at runtime.
    command: ["sh", "-c", "redis-server $${REDIS_PASSWORD:+--requirepass \"$$REDIS_PASSWORD\"}"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+--no-auth-warning -a \"$$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    # Pinned by digest (was :latest) for reproducible/secure builds — A4 hardening.
    # This is the exact image in use as of 2026-06-15; bump deliberately after testing
    # a newer MinIO release (re-pin via: docker image inspect minio/minio --format '{{.RepoDigests}}').
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: ./Backend/.env          # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD (the image ignores the rest)
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./Backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./Backend/.env
      - ./.env.ai
    environment:
      # Dev: hot-reload (1 worker). For a prod-style run drop UVICORN_RELOAD and set
      # WEB_CONCURRENCY (worker count) — see Backend/docker-entrypoint.sh (A8).
      UVICORN_RELOAD: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # arq worker — runs engine jobs (agent_run, hermes_*) out-of-process from the web app
  # so a slow/crashed job can't take the API down (B2). Same image, command = arq.
  worker:
    build: ./Backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./Backend/.env
      - ./.env.ai
    volumes:
      - ./Backend:/app
    command: ["arq", "app.worker.WorkerSettings"]

  # frontend — Vite dev server in Docker (whole stack runs here; logs viewed in Docker, not a cmd tab).
  # Bind mount = hot reload; node_modules in a named volume (off the Windows host). Vite proxies
  # /api + /ws to the backend over the compose network. VITE_POLL=true so the watcher fires on a
  # Windows→Docker bind mount; VITE_OPEN=false so it doesn't try to launch a browser in the container.
  frontend:
    build:
      context: ./Frontend
      target: dev                   # local dev = Vite hot-reload (the prod target is the nginx static build)
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: ./Frontend/.env       # VITE_API_BASE (PUBLIC app config — baked into the bundle)
    environment:
      # compose-network dev-server knobs (not app config): how Vite runs inside this stack
      VITE_PROXY_TARGET: http://backend:8000
      VITE_OPEN: "false"
      VITE_POLL: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  redisdata:
  miniodata:
  frontend_node_modules:
