# Phase 0 infra. pgvector image so future RAG phases can add embeddings without
# swapping the DB. Only Postgres is needed for the Sitemap Beta.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pikaos
      POSTGRES_PASSWORD: pikaos
      POSTGRES_DB: pikaos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pikaos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
