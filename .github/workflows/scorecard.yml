# Fix-KIT-05 — OpenSSF Scorecard: automated supply-chain / project-health scoring, published as SARIF
# to the Security tab. All actions SHA-pinned (Fix-KIT-06).
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 2 * * 1" # weekly, Monday 02:00 UTC
  push:
    branches: [main]

# Least privilege at the workflow level; the job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result
      id-token: write        # publish results to the OpenSSF API (OIDC)
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
