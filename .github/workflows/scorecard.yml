# Fix-KIT-05 — OpenSSF Scorecard: automated supply-chain / project-health scoring, published as SARIF
# to the Security tab. All actions SHA-pinned (Fix-KIT-06).
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 2 * * 1" # weekly, Monday 02:00 UTC
  push:
    branches: [main]

# Least privilege at the workflow level; the job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result
      id-token: write        # publish results to the OpenSSF API (OIDC)
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          sarif_file: results.sarif
