# CI — makes the pre-ship checks machine-enforced, not human memory (A6).
# Monorepo: the app lives under PiKaOs-Core/, so every path is prefixed with it. GitHub Actions only
# reads workflows from the repo-root .github/, which is why this lives here (not PiKaOs-Core/.github/).
# Frontend: lint (react-hooks) + vitest + build + component-first guard. Desktop: tsc + vitest (the
# Electron main process only — Frontend/ lives inside Desktop/, so Desktop's vitest.config.ts scopes it
# out; the renderer is this frontend job's business, from its own install).
# Architecture: static plugin gates.
# Backend: pytest on the real stack (tests hit the live server, so we spin docker compose).
name: CI

# Fix-DEP-01: least-privilege GITHUB_TOKEN. CI only lints/builds/tests — it never writes to the repo
# or pushes packages — so read-only contents is all any job needs. Individual jobs can widen this if
# they ever must (they don't today).
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PiKaOs-Core/Desktop/Frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PiKaOs-Core/Desktop/Frontend/package-lock.json
      - run: npm ci
      - name: Lint (react-hooks/rules-of-hooks = error)
        run: npm run lint
      - name: Test (vitest)
        run: npm test
      - name: Build
        run: npm run build
      - name: Component-first guard (no raw <select> in screens — use ui/Dropdown.jsx)
        run: |
          if grep -rn "<select" src/screens src/App.jsx; then
            echo "::error::raw <select> found — use ui/Dropdown.jsx (CLAUDE.md §1.1)"
            exit 1
          fi

  # The Electron main process. Its suite mocks `electron` itself, so this needs no display and no
  # running app — just node. Until this job existed the Desktop gates ran only on the dev machine,
  # which is how "green locally, broken on main" gets in (roadmap-v3 T0).
  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PiKaOs-Core/Desktop
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PiKaOs-Core/Desktop/package-lock.json
      - run: npm ci
      - name: Typecheck (tsc --noEmit, strict)
        run: npx tsc --noEmit
      - name: Test (vitest)
        run: npm test

  # Static architecture gates (plugin-architecture.md §15) — no DB/stack needed, so this is fast.
  # grimp/import-linter parse source (they don't import modules); the manifest check is pure jsonschema.
  architecture:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PiKaOs-Core/Backend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'  # match the runtime image (Dockerfile: python:3.12-slim)
          cache: pip
          cache-dependency-path: PiKaOs-Core/Backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: No forbidden imports (Core ↛ plugins · plugin ↛ sibling plugin, §2)
        run: lint-imports
      - name: Plugin manifests structurally valid (§3)
        run: python scripts/check_manifests.py

  backend:
    runs-on: ubuntu-latest
    # No plugin repos are checked out in CI, so Core's suite runs plugin-free (testpaths = tests) and
    # needs no datastore sidecar — render_compose.py sees an empty app/plugins/ and emits just the
    # kernel base compose (backend, no tool fragments). Gitignored .env files aren't in the
    # checkout; seed CI with the tracked *.example (dev creds) first.
    env:
      BE: docker compose -p pikaos -f PiKaOs-Core/deploy/docker-compose.generated.yml
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Seed env files (dev defaults)
        run: cp PiKaOs-Core/Backend/.env.example PiKaOs-Core/Backend/.env
      - name: Render compose (kernel base — no plugins linked in CI)
        run: python PiKaOs-Core/Backend/scripts/render_compose.py
      - name: Start backend
        run: $BE up -d --build backend
      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8000/api/health && { echo "healthy"; exit 0; }
            sleep 2
          done
          echo "backend did not become healthy"; $BE logs backend; exit 1
      - name: Run tests
        run: $BE exec -T backend pytest -q
      - name: Tear down
        if: always()
        run: $BE down -v
