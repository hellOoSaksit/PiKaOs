# CI — makes the CLAUDE.md pre-ship checks machine-enforced, not human memory (A6).
# Frontend: lint (react-hooks) + build + component-first guard. Backend: pytest on the
# real stack (tests hit the live server, so we spin docker compose).
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - name: Lint (react-hooks/rules-of-hooks = error)
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Component-first guard (no raw <select> in screens — use ui/Dropdown.jsx)
        run: |
          if grep -rn "<select" src/screens src/App.jsx; then
            echo "::error::raw <select> found — use ui/Dropdown.jsx (CLAUDE.md §1.1)"
            exit 1
          fi

  backend:
    runs-on: ubuntu-latest
    # The split stacks load gitignored .env files; seed CI with the tracked *.example (dev creds).
    env:
      BE: docker compose -p pikaos-backend -f deploy/docker-compose.backend.yml -f deploy/docker-compose.sim.yml
    steps:
      - uses: actions/checkout@v5
      - name: Seed env files (dev defaults)
        run: |
          cp Backend/.env.example Backend/.env
          cp Frontend/.env.example Frontend/.env
          cp .env.ai.example .env.ai
      - name: Start data stack (db, redis, minio)
        run: docker compose -p pikaos-data -f deploy/docker-compose.data.yml up -d --wait
      - name: Start backend stack (migrate + seed)
        run: $BE up -d --build backend
      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8000/api/health && { echo "healthy"; exit 0; }
            sleep 2
          done
          echo "backend did not become healthy"; $BE logs backend; exit 1
      - name: Run tests
        run: $BE exec -T backend pytest -q
      - name: Tear down
        if: always()
        run: |
          $BE down -v
          docker compose -p pikaos-data -f deploy/docker-compose.data.yml down -v
